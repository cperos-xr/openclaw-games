<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0a0a0a"/>
  <!-- absolute blackness -->
  <!-- treasure piles (barely visible) -->
  <g fill="#3a3020" opacity="0.7">
    <rect x="50" y="300" width="100" height="80"/>
    <rect x="450" y="280" width="120" height="100"/>
  </g>
  <!-- pedestal with scarab -->
  <g transform="translate(300,200)">
    <rect x="0" y="0" width="60" height="40" fill="#2a2410" stroke="#d4af37" stroke-width="2"/>
    <!-- golden scarab -->
    <ellipse cx="30" cy="20" rx="15" ry="10" fill="#ffd700" stroke="#ff0" stroke-width="1"/>
  </g>
  <!-- exit west -->
  <rect x="100" y="180" width="60" height="60" fill="#0a0a0a" stroke="#d4af37" stroke-width="4"/>
  <text x="130" y="212" font-family="monospace" font-size="8" fill="#d4af37" text-anchor="middle">BURIAL</text>
  <!-- exit east (altar) -->
  <rect x="480" y="180" width="60" height="60" fill="#0a0a0a" stroke="#d4af37" stroke-width="4"/>
  <text x="510" y="212" font-family="monospace" font-size="8" fill="#d4af37" text-anchor="middle">ALTAR</text>
</svg>
