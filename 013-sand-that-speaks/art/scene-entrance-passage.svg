<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#1a1410"/>
  <!-- corridor walls -->
  <rect x="0" y="0" width="640" height="250" fill="#2a2410"/>
  <!-- floor with sand -->
  <rect x="0" y="250" width="640" height="150" fill="#3a3020"/>
  <!-- hieroglyphs on walls -->
  <g font-family="monospace" font-size="10" fill="#d4af37">
    <text x="80" y="100">𓀀𓁹𓂀</text>
    <text x="200" y="130">𓃒𓃓𓃔</text>
    <text x="400" y="100">𓆣𓇓𓇔</text>
  </g>
  <!-- massive stone door east -->
  <rect x="450" y="120" width="120" height="160" fill="#2a2410" stroke="#d4af37" stroke-width="6"/>
  <text x="510" y="200" font-family="monospace" font-size="10" fill="#d4af37" text-anchor="middle">DOOR</text>
  <!-- stone key on floor -->
  <g transform="translate(150,280)">
    <rect x="0" y="0" width="20" height="10" fill="#d4af37" stroke="#0f0" stroke-width="1"/>
    <text x="10" y="7" font-family="monospace" font-size="5" fill="#000" text-anchor="middle">KEY</text>
  </g>
  <!-- torch on floor -->
  <g transform="translate(320,300)">
    <rect x="0" y="0" width="6" height="30" fill="#4a3020"/>
    <rect x="2" y="10" width="2" height="8" fill="#f80"/>
  </g>
</svg>
