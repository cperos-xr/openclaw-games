<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#87CEEB"/>
  <!-- daylight sky -->
  <rect x="0" y="0" width="640" height="200" fill="#0a0a1a"/>
  <!-- tunnel opening -->
  <rect x="270" y="100" width="100" height="200" fill="#1a1410"/>
  <!-- sunlight shaft -->
  <rect x="300" y="0" width="40" height="150" fill="#ffd700" opacity="0.5"/>
  <!-- desert sand -->
  <rect x="0" y="300" width="640" height="100" fill="#d4a017"/>
  <!-- pyramid in distance -->
  <g transform="translate(400,120)">
    <polygon points="0,80 40,0 80,80" fill="#c2a060"/>
  </g>
</svg>
