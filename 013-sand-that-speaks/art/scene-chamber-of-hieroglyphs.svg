<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#1a1410"/>
  <!-- walls -->
  <rect x="0" y="0" width="640" height="300" fill="#2a2410"/>
  <!-- floor -->
  <rect x="0" y="300" width="640" height="100" fill="#3a3020"/>
  <!-- statue of Pharaoh -->
  <g transform="translate(280,100)">
    <ellipse cx="40" cy="80" rx="25" ry="40" fill="#2a2410" stroke="#d4af37" stroke-width="2"/>
    <circle cx="40" cy="30" r="20" fill="#3a3020" stroke="#d4af37" stroke-width="2"/>
    <!-- ankh missing -->
    <circle cx="40" cy="10" r="5" fill="#f00" opacity="0.7"/>
  </g>
  <!-- pedestal -->
  <rect x="300" y="180" width="40" height="20" fill="#3a3020" stroke="#d4af37" stroke-width="2"/>
  <!-- south passage -->
  <rect x="280" y="320" width="80" height="60" fill="#1a1410" stroke="#d4af37" stroke-width="4"/>
  <text x="320" y="352" font-family="monospace" font-size="10" fill="#d4af37" text-anchor="middle">SOUTH</text>
  <!-- ankh amulet on pedestal -->
  <g transform="translate(310,190)">
    <ellipse cx="10" cy="20" rx="6" ry="10" fill="#ffd700" stroke="#0f0" stroke-width="1"/>
    <rect x="8" y="10" width="4" height="10" fill="#ffd700"/>
  </g>
</svg>
