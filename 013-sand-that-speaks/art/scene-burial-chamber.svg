<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#1a1410"/>
  <!-- walls with paintings -->
  <rect x="0" y="0" width="640" height="280" fill="#2a2410"/>
  <!-- afteralke paintings (stars, boats) -->
  <g fill="#4a4030">
    <circle cx="100" cy="80" r="10"/>
    <path d="M200,50 L250,80 L200,110 L150,80 Z" fill="#4a4030"/>
    <ellipse cx="500" cy="100" rx="30" ry="10"/>
  </g>
  <!-- sarcophagus on dais -->
  <g transform="translate(260,150)">
    <rect x="0" y="0" width="120" height="40" fill="#3a3020" stroke="#d4af37" stroke-width="4"/>
    <rect x="10" y="10" width="100" height="20" fill="#2a2410"/>
    <!-- scroll on dais -->
    <g transform="translate(60,60)">
      <rect x="0" y="0" width="30" height="20" fill="#5a4030" stroke="#ffd700" stroke-width="1"/>
    </g>
  </g>
  <!-- east door (treasury) -->
  <rect x="500" y="250" width="80" height="80" fill="#1a1410" stroke="#d4af37" stroke-width="4"/>
  <text x="540" y="292" font-family="monospace" font-size="10" fill="#d4af37" text-anchor="middle">TREASURY</text>
</svg>
