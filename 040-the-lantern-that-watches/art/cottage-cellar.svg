<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <!-- Background: Darkness -->
  <rect width="640" height="400" fill="#000000" />
  <!-- Midground: Stone walls/floor -->
  <path d="M 0 320 L 640 320" stroke="#333333" stroke-width="4" />
  <path d="M 100 0 L 100 320 M 540 0 L 540 320" stroke="#111111" stroke-width="2" />
  <!-- Shelves -->
  <rect x="120" y="100" width="100" height="180" fill="#1a0d00" stroke="#000000" stroke-width="2" />
  <line x1="120" y1="140" x2="220" y2="140" stroke="#000000" />
  <line x1="120" y1="200" x2="220" y2="200" stroke="#000000" />
  <!-- Barrel -->
  <ellipse cx="400" cy="280" rx="30" ry="40" fill="#1a0d00" stroke="#000000" stroke-width="2" />
  <line x1="375" y1="260" x2="425" y2="260" stroke="#000000" />
  <line x1="375" y1="300" x2="425" y2="300" stroke="#000000" />
  <!-- Atmosphere: Phosphor glow floor hint -->
  <rect x="0" y="320" width="640" height="80" fill="#003300" opacity="0.2" />
</svg>