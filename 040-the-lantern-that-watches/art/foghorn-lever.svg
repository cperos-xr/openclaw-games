  <circle cx="32" cy="44" r="6" fill="#111111" stroke="#000000" stroke-width="1" />
  <!-- Main Lever Arm -->
  <rect x="30" y="10" width="4" height="34" fill="#666666" stroke="#000000" />
  <!-- Handle/Grabbing bit -->
  <rect x="24" y="8" width="16" height="6" fill="#FF8800" rx="2" />
  <!-- Mechanical context lines -->
  <line x1="28" y1="44" x2="36" y2="44" stroke="#000000" stroke-width="2" />
  <line x1="32" y1="38" x2="32" y2="50" stroke="#000000" stroke-width="2" />
  <rect x="24" y="50" width="16" height="4" fill="#000000" opacity="0.4" />
</svg>