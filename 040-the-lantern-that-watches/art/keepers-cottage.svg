<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <pattern id="hatch-dark" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#000000" stroke-width="1"/>
    </pattern>
  </defs>
  <!-- Background: Night sky -->
  <rect width="640" height="400" fill="#000088" />
  <!-- Ground: Dark grass -->
  <rect x="0" y="300" width="640" height="100" fill="#006600" />
  <!-- Midground: The Cottage -->
  <path d="M 120 300 L 120 180 L 220 100 L 320 180 L 320 300 Z" fill="#333333" stroke="#000000" stroke-width="3" />
  <path d="M 120 180 L 320 180" stroke="#000000" stroke-width="2" />
  <rect x="180" y="240" width="40" height="60" fill="#000000" /> <!-- Door -->
  <rect x="250" y="200" width="30" height="30" fill="#FFFF00" opacity="0.4" /> <!-- Window -->
  <!-- Tower Base in background -->
  <rect x="450" y="50" width="100" height="250" fill="#111111" stroke="#000000" stroke-width="3" />
  <!-- Atmosphere: Fog -->
  <rect width="640" height="400" fill="url(#hatch-dark)" opacity="0.3" />
</svg>