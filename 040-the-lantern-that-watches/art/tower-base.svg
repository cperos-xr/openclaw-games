<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <!-- Background: Night/Darkened base -->
  <rect width="640" height="400" fill="#000000" />
  <!-- Tower Structure (Tapering upwards) -->
  <path d="M 120 400 L 220 0 L 420 0 L 520 400 Z" fill="#222222" stroke="#000000" stroke-width="4" />
  <!-- Entrance door -->
  <rect x="280" y="320" width="80" height="80" fill="#000000" stroke="#333333" stroke-width="2" />
  <!-- Metal bands -->
  <line x1="165" y1="200" x2="475" y2="200" stroke="#111111" stroke-width="4" />
  <line x1="190" y1="100" x2="450" y2="100" stroke="#111111" stroke-width="4" />
  <!-- Ground: Rocky/Barren -->
  <rect x="0" y="380" width="640" height="20" fill="#111111" />
</svg>