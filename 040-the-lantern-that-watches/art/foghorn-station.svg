<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <!-- Background: Gray fog -->
  <rect width="640" height="400" fill="#222222" />
  <!-- Patterned Fog -->
  <defs>
    <pattern id="fog-hatch" width="8" height="8" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="8" y2="8" stroke="#333333" stroke-width="1" />
    </pattern>
  </defs>
  <rect width="640" height="400" fill="url(#fog-hatch)" />
  <!-- Midground: Foghorn Mechanism -->
  <rect x="240" y="200" width="160" height="150" fill="#331a00" stroke="#000000" stroke-width="4" />
  <ellipse cx="320" cy="180" rx="30" ry="20" fill="#111111" stroke="#000000" stroke-width="2" /> <!-- Horn opening -->
  <rect x="300" y="250" width="40" height="100" fill="#000000" stroke="#000000" />
  <!-- Pipes -->
  <path d="M 400 280 L 500 280 L 500 400" fill="none" stroke="#111111" stroke-width="8" />
  <path d="M 240 280 L 140 280 L 140 400" fill="none" stroke="#111111" stroke-width="8" />
</svg>