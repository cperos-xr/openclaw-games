<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Silk handkerchief - cream colored, folded -->
<rect x="12" y="14" width="40" height="36" fill="#f0e8d0" stroke="#c0b8a0" stroke-width="1.5" rx="2"/>
<!-- Fold lines -->
<line x1="32" y1="14" x2="32" y2="50" stroke="#d0c8b0" stroke-width="1"/>
<line x1="12" y1="32" x2="52" y2="32" stroke="#d0c8b0" stroke-width="1"/>
<!-- Embroidery: D.V. Harrow initials hint -->
<text x="32" y="28" text-anchor="middle" fill="#4466aa" font-size="9" font-family="serif" font-weight="bold">DV</text>
<!-- Soft fabric shimmer -->
<rect x="14" y="16" width="16" height="14" fill="#fff" opacity="0.15" rx="1"/>
</svg>