<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<!-- Ward key - heavy brass key with asylum crest -->
<!-- Key bow -->
<circle cx="18" cy="24" r="10" fill="none" stroke="#d4a030" stroke-width="3.5"/>
<circle cx="18" cy="24" r="4" fill="#806020"/>
<!-- Asylum crest (cracked mirror) in bow -->
<line x1="14" y1="20" x2="22" y2="28" stroke="#a07020" stroke-width="1"/>
<line x1="22" y1="20" x2="14" y2="28" stroke="#a07020" stroke-width="1"/>
<!-- Key shaft -->
<rect x="26" y="22" width="26" height="5" fill="#d4a030" stroke="#b08020" stroke-width="1" rx="1"/>
<!-- Key teeth -->
<rect x="44" y="27" width="4" height="7" fill="#d4a030"/>
<rect x="50" y="27" width="4" height="5" fill="#d4a030"/>
<!-- Brass aging -->
<rect x="30" y="23" width="3" height="3" fill="#a07020" opacity="0.5"/>
<rect x="38" y="23" width="2" height="2" fill="#a07020" opacity="0.4"/>
</svg>