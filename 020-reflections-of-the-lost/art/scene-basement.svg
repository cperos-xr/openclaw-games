<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <!-- Layer 1: Background -->
  <rect width="640" height="400" fill="#080810"/>
  
  <!-- Layer 2: Walls -->
  <rect x="0" y="0" width="640" height="250" fill="#121218"/>
  <!-- Concrete texture hints -->
  <rect x="50" y="50" width="30" height="20" fill="#151518" opacity="0.5" rx="1"/>
  <rect x="200" y="80" width="25" height="15" fill="#151518" opacity="0.4" rx="1"/>
  <rect x="450" y="60" width="35" height="25" fill="#151518" opacity="0.45" rx="1"/>
  <rect x="550" y="100" width="28" height="18" fill="#151518" opacity="0.4" rx="1"/>
  
  <!-- Layer 3: Floor -->
  <rect x="0" y="250" width="640" height="150" fill="#141415"/>
  <!-- Floor stains -->
  <rect x="100" y="280" width="40" height="30" fill="#0d0d10" opacity="0.5" rx="3"/>
  <rect x="500" y="300" width="50" height="25" fill="#0d0d10" opacity="0.4" rx="3"/>
  
  <!-- Layer 4: Chalk circle -->
  <circle cx="320" cy="300" r="100" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.85"/>
  <!-- Internal chalk markings -->
  <circle cx="320" cy="300" r="8" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  <line x1="280" y1="280" x2="360" y2="320" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <line x1="280" y1="320" x2="360" y2="280" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  
  <!-- Layer 5: Body-shaped depression -->
  <ellipse cx="320" cy="300" rx="30" ry="70" fill="#0a0a0e" opacity="0.6"/>
  <ellipse cx="320" cy="280" rx="15" ry="18" fill="#08080c" opacity="0.5"/>
  <!-- Smooth worn concrete -->
  <ellipse cx="320" cy="300" rx="35" ry="75" fill="#121210" opacity="0.3"/>
  
  <!-- Layer 6: Seven mirrors around circle -->
  <!-- Mirror 1 (top) -->
  <rect x="310" y="160" width="20" height="35" fill="#1a1a25" stroke="#808080" stroke-width="2"/>
  <!-- Mirror 2 (top-right) -->
  <rect x="390" y="190" width="20" height="35" fill="#1a1a25" stroke="#808080" stroke-width="2" transform="rotate(30 400 207)"/>
  <!-- Mirror 3 (bottom-right) -->
  <rect x="395" y="315" width="20" height="35" fill="#1a1a25" stroke="#808080" stroke-width="2" transform="rotate(-30 405 332)"/>
  <!-- Mirror 4 (bottom) -->
  <rect x="310" y="385" width="20" height="35" fill="#1a1a25" stroke="#808080" stroke-width="2"/>
  <!-- Mirror 5 (bottom-left) -->
  <rect x="225" y="315" width="20" height="35" fill="#1a1a25" stroke="#808080" stroke-width="2" transform="rotate(30 235 332)"/>
  <!-- Mirror 6 (top-left) -->
  <rect x="230" y="190" width="20" height="35" fill="#1a1a25" stroke="#808080" stroke-width="2" transform="rotate(-30 240 207)"/>
  <!-- Mirror 7 (right side, additional) -->
  <rect x="425" y="275" width="18" height="30" fill="#1a1a25" stroke="#808080" stroke-width="2"/>
  
  <!-- Mirror reflections (infinite tunnel effect) -->
  <rect x="314" y="164" width="12" height="27" fill="#1e1e28" opacity="0.6"/>
  <rect x="394" y="194" width="12" height="27" fill="#1e1e28" opacity="0.55"/>
  <rect x="399" y="319" width="12" height="27" fill="#1e1e28" opacity="0.55"/>
  <rect x="314" y="389" width="12" height="27" fill="#1e1e28" opacity="0.6"/>
  <rect x="229" y="319" width="12" height="27" fill="#1e1e28" opacity="0.55"/>
  <rect x="234" y="194" width="12" height="27" fill="#1e1e28" opacity="0.55"/>
  <rect x="429" y="279" width="10" height="22" fill="#1e1e28" opacity="0.5"/>
  
  <!-- Reflection hints - figures in mirrors -->
  <circle cx="320" cy="175" r="3" fill="#ffffff" opacity="0.08"/>
  <circle cx="400" cy="205" r="3" fill="#ffffff" opacity="0.08"/>
  <circle cx="405" cy="330" r="3" fill="#ffffff" opacity="0.07"/>
  <circle cx="235" cy="330" r="3" fill="#ffffff" opacity="0.07"/>
  <circle cx="240" cy="205" r="3" fill="#ffffff" opacity="0.08"/>
  
  <!-- Layer 7: Key slot -->
  <rect x="560" y="320" width="30" height="20" fill="#151515" stroke="#404040" stroke-width="2"/>
  <rect x="568" y="324" width="14" height="12" fill="#0a0a10" stroke="#888840" stroke-width="1.5"/>
  <text x="575" y="350" text-anchor="middle" fill="#606060" font-size="7" font-family="monospace">KEY</text>
  
  <!-- Book slot -->
  <rect x="50" y="320" width="35" height="22" fill="#151515" stroke="#404040" stroke-width="2"/>
  <rect x="55" y="323" width="25" height="16" fill="#0a0a10"/>
  <text x="67" y="352" text-anchor="middle" fill="#606060" font-size="6" font-family="monospace">BOOK</text>
  
  <!-- Layer 8: Cold atmosphere -->
  <ellipse cx="320" cy="300" rx="120" ry="130" fill="#151520" opacity="0.15"/>
  <!-- White fire glow hint -->
  <circle cx="320" cy="300" r="50" fill="#ffffff" opacity="0.02"/>
</svg>