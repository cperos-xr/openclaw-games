<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <!-- Layer 1: Background -->
  <rect width="640" height="400" fill="#0a0a0f"/>
  
  <!-- Layer 2: Back wall -->
  <rect x="140" y="0" width="360" height="260" fill="#151520"/>
  
  <!-- Layer 3: Beds along left wall -->
  <!-- Bed frame 1 left -->
  <rect x="20" y="200" width="80" height="100" fill="none" stroke="#2a2a30" stroke-width="3"/>
  <line x1="30" y1="200" x2="30" y2="300" stroke="#2a2a30" stroke-width="3"/>
  <line x1="90" y1="200" x2="90" y2="300" stroke="#2a2a30" stroke-width="3"/>
  <!-- Rotted mattress -->
  <rect x="25" y="220" width="70" height="75" fill="#1a1a15" rx="2"/>
  <rect x="25" y="240" width="70" height="30" fill="#252520" rx="1"/>
  <!-- Rust stain on pillow -->
  <rect x="30" y="225" width="20" height="15" fill="#8B4513" opacity="0.6" rx="2"/>
  
  <!-- Bed frame 2 left -->
  <rect x="20" y="310" width="80" height="50" fill="none" stroke="#2a2a30" stroke-width="3"/>
  <rect x="25" y="320" width="70" height="35" fill="#151510" rx="2"/>
  
  <!-- Beds along right wall -->
  <rect x="540" y="180" width="80" height="120" fill="none" stroke="#2a2a30" stroke-width="3"/>
  <rect x="545" y="195" width="70" height="100" fill="#1a1a15" rx="2"/>
  <rect x="545" y="210" width="70" height="25" fill="#252520" rx="1"/>
  
  <!-- Layer 4: Large cracked mirror on far wall -->
  <rect x="240" y="40" width="160" height="190" fill="#1a1a25" stroke="#888840" stroke-width="4"/>
  <!-- Ornate frame corners -->
  <rect x="235" y="35" width="10" height="10" fill="#888840"/>
  <rect x="395" y="35" width="10" height="10" fill="#888840"/>
  <rect x="235" y="220" width="10" height="10" fill="#888840"/>
  <rect x="395" y="220" width="10" height="10" fill="#888840"/>
  <!-- Cracks in mirror -->
  <line x1="280" y1="80" x2="340" y2="180" stroke="#0a0a10" stroke-width="2"/>
  <line x1="300" y1="60" x2="300" y2="200" stroke="#0a0a10" stroke-width="1.5"/>
  <line x1="260" y1="140" x2="370" y2="160" stroke="#0a0a10" stroke-width="1.5"/>
  <line x1="320" y1="90" x2="290" y2="210" stroke="#0a0a10" stroke-width="1"/>
  <!-- Tarnish/darkness -->
  <rect x="260" y="100" width="100" height="110" fill="#1a0d0d" opacity="0.4" rx="5"/>
  <rect x="270" y="115" width="80" height="80" fill="#0d0505" opacity="0.3" rx="3"/>
  <!-- Reversed text hint (visible when close) -->
  <text x="320" y="200" text-anchor="middle" fill="#404040" font-size="10" font-family="monospace" transform="scale(-1,1) translate(-640,0)">LET US OUT</text>
  
  <!-- Layer 5: Small bedside mirror -->
  <rect x="160" y="280" width="50" height="60" fill="#1a1510"/>
  <!-- Small mirror glass -->
  <rect x="165" y="275" width="40" height="35" fill="#202028" stroke="#505050" stroke-width="2"/>
  <!-- Oily film on small mirror -->
  <rect x="167" y="277" width="36" height="31" fill="#151520" opacity="0.5"/>
  <!-- Bedside table drawer -->
  <rect x="162" y="318" width="46" height="20" fill="#1a1510" stroke="#0d0a05" stroke-width="1"/>
  <circle cx="185" cy="328" r="2" fill="#404040"/>
  
  <!-- Layer 6: Floor -->
  <rect x="0" y="300" width="640" height="100" fill="#121210"/>
  <line x1="0" y1="330" x2="640" y2="330" stroke="#0a0a08" stroke-width="1"/>
  <line x1="0" y1="360" x2="640" y2="360" stroke="#0a0a08" stroke-width="1"/>
  
  <!-- Layer 7: Atmosphere - sickly glow -->
  <ellipse cx="320" cy="140" rx="70" ry="80" fill="#006600" opacity="0.04"/>
  <!-- Shadow pools -->
  <ellipse cx="120" cy="370" rx="50" ry="10" fill="#000000" opacity="0.5"/>
  <ellipse cx="520" cy="360" rx="50" ry="10" fill="#000000" opacity="0.4"/>
  <!-- Brown residue stains on walls -->
  <rect x="200" y="180" width="30" height="40" fill="#5a2a1a" opacity="0.2" rx="2"/>
  <rect x="410" y="200" width="25" height="30" fill="#5a2a1a" opacity="0.15" rx="2"/>
</svg>