<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Funhouse Scene -->
  <!-- Background: Dark interior -->
  <rect width="640" height="400" fill="#000000"/>
  
  <!-- Floor -->
  <rect y="350" width="640" height="50" fill="#8B4513"/>
  
  <!-- Funhouse corridor walls -->
  <rect x="0" y="0" width="640" height="50" fill="#8B0000"/>
  <rect x="0" y="350" width="640" height="50" fill="#8B0000"/>
  <rect x="0" y="50" width="50" height="300" fill="#8B0000"/>
  <rect x="590" y="50" width="50" height="300" fill="#8B0000"/>
  
  <!-- Warped mirrors -->
  <rect x="100" y="80" width="40" height="200" fill="#ADD8E6" stroke="#000000" stroke-width="2"/>
  <rect x="160" y="60" width="40" height="240" fill="#ADD8E6" stroke="#000000" stroke-width="2"/>
  <rect x="220" y="100" width="40" height="160" fill="#ADD8E6" stroke="#000000" stroke-width="2"/>
  <rect x="280" y="80" width="40" height="200" fill="#ADD8E6" stroke="#000000" stroke-width="2"/>
  <rect x="340" y="60" width="40" height="240" fill="#ADD8E6" stroke="#000000" stroke-width="2"/>
  <rect x="400" y="100" width="40" height="160" fill="#ADD8E6" stroke="#000000" stroke-width="2"/>
  <rect x="460" y="80" width="40" height="200" fill="#ADD8E6" stroke="#000000" stroke-width="2"/>
  <rect x="520" y="60" width="40" height="240" fill="#ADD8E6" stroke="#000000" stroke-width="2"/>
  
  <!-- Control panel -->
  <rect x="120" y="280" width="100" height="50" fill="#696969" stroke="#000000" stroke-width="2"/>
  <rect x="130" y="290" width="20" height="10" fill="#FF0000"/>
  <rect x="160" y="290" width="20" height="10" fill="#00FF00"/>
  <rect x="190" y="290" width="20" height="10" fill="#0000FF"/>
  <line x1="170" y1="270" x2="170" y2="320" stroke="#000000" stroke-width="4"/>
  
  <!-- Silhouette mirror at end -->
  <rect x="540" y="100" width="80" height="180" fill="#000000" stroke="#000000" stroke-width="3"/>
  <rect x="550" y="120" width="60" height="20" fill="#8B0000"/>
  <line x1="580" y1="140" x2="600" y2="160" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="580" y1="160" x2="600" y2="140" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Floorboard lines -->
  <line x1="0" y1="360" x2="640" y2="360" stroke="#654321" stroke-width="1"/>
  <line x1="0" y1="370" x2="640" y2="370" stroke="#654321" stroke-width="1"/>
  <line x1="0" y1="380" x2="640" y2="380" stroke="#654321" stroke-width="1"/>
  <line x1="0" y1="390" x2="640" y2="390" stroke="#654321" stroke-width="1"/>
</svg>