<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Dark sky -->
  <rect width="640" height="400" fill="#000000"/>
  
  <!-- Ground -->
  <rect y="320" width="640" height="80" fill="#006600"/>
  
  <!-- Carousel platform -->
  <ellipse cx="320" cy="300" rx="200" ry="40" fill="#DAA520" stroke="#000000" stroke-width="3"/>
  
  <!-- Central pole -->
  <rect x="315" y="100" width="10" height="200" fill="#DAA520" stroke="#000000" stroke-width="2"/>
  
  <!-- Carousel roof -->
  <polygon points="320,50 400,150 240,150" fill="#8B0000" stroke="#000000" stroke-width="2"/>
  <polygon points="320,70 380,150 260,150" fill="#FF8C00" stroke="#000000" stroke-width="1"/>
  
  <!-- Horses -->
  <!-- Black stallion with wild eyes -->
  <path d="M200,280 Q210,260 230,260 Q240,260 250,270 Q260,280 250,300 Q240,310 230,310 Q220,310 210,300 Z" fill="#000000" stroke="#000000" stroke-width="2"/>
  <circle cx="220" cy="270" r="3" fill="#FFFFFF"/> <!-- Eye -->
  <rect x="230" y="260" width="20" height="10" fill="#000000"/> <!-- Mane -->
  <rect x="240" y="270" width="10" height="8" fill="#000000"/> <!-- Mouth open -->
  
  <!-- White horse -->
  <path d="M350,280 Q360,260 380,260 Q390,260 400,270 Q410,280 400,300 Q390,310 380,310 Q370,310 360,300 Z" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <circle cx="370" cy="270" r="3" fill="#000000"/> <!-- Eye -->
  <rect x="380" y="260" width="20" height="10" fill="#FFFFFF"/> <!-- Mane -->
  
  <!-- Red horse -->
  <path d="M280,280 Q290,260 310,260 Q320,260 330,270 Q340,280 330,300 Q320,310 310,310 Q300,310 290,300 Z" fill="#8B0000" stroke="#000000" stroke-width="2"/>
  <circle cx="300" cy="270" r="3" fill="#FFFFFF"/> <!-- Eye -->
  <rect x="310" y="260" width="20" height="10" fill="#8B0000"/> <!-- Mane -->
  
  <!-- Chariot -->
  <rect x="420" y="270" width="60" height="30" fill="#DAA520" stroke="#000000" stroke-width="2"/>
  <rect x="430" y="260" width="40" height="10" fill="#FF8C00" stroke="#000000" stroke-width="1"/>
  
  <!-- Calliope organ -->
  <rect x="300" y="220" width="40" height="40" fill="#8B4513" stroke="#000000" stroke-width="2"/>
  <rect x="305" y="225" width="30" height="10" fill="#FFFFFF"/> <!-- Keys -->
  <line x1="310" y1="235" x2="330" y2="235" stroke="#000000" stroke-width="1"/>
  <rect x="310" y="200" width="5" height="20" fill="#DAA520"/> <!-- Pipe -->
  <rect x="320" y="195" width="5" height="25" fill="#DAA520"/> <!-- Pipe -->
  <rect x="330" y="190" width="5" height="30" fill="#DAA520"/> <!-- Pipe -->
  
  <!-- Gear mechanism -->
  <circle cx="320" cy="340" r="20" fill="none" stroke="#000000" stroke-width="3"/>
  <line x1="320" y1="320" x2="320" y2="360" stroke="#000000" stroke-width="2"/>
  <line x1="300" y1="340" x2="340" y2="340" stroke="#000000" stroke-width="2"/>
  <rect x="350" y="335" width="20" height="10" fill="#696969" stroke="#000000" stroke-width="2"/> <!-- Socket -->
  
  <!-- Dead leaves and debris -->
  <ellipse cx="250" cy="340" rx="10" ry="5" fill="#654321"/>
  <ellipse cx="380" cy="345" rx="8" ry="4" fill="#654321"/>
  <ellipse cx="300" cy="350" rx="12" ry="6" fill="#654321"/>
  <rect x="400" y="340" width="15" height="5" fill="#654321"/> <!-- Broken glass -->
</svg>