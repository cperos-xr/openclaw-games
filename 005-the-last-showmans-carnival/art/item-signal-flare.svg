<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Signal Flare -->
  <!-- Flare gun body -->
  <rect x="16" y="30" width="32" height="16" fill="#696969" stroke="#000000" stroke-width="2"/>
  <!-- Barrel -->
  <rect x="40" y="24" width="16" height="12" fill="#696969" stroke="#000000" stroke-width="2"/>
  <!-- Handle -->
  <rect x="20" y="46" width="12" height="12" fill="#8B4513" stroke="#000000" stroke-width="2"/>
  <!-- Trigger -->
  <rect x="32" y="38" width="6" height="6" fill="#696969" stroke="#000000" stroke-width="1"/>
  <!-- Flare (red tip) -->
  <rect x="52" y="26" width="8" height="8" fill="#FF0000" stroke="#000000" stroke-width="2"/>
  <!-- Flare glow -->
  <circle cx="56" cy="30" r="8" fill="#FF0000" opacity="0.3"/>
  <circle cx="56" cy="30" r="4" fill="#FF4500" opacity="0.5"/>
  <!-- Sight -->
  <rect x="44" y="22" width="4" height="4" fill="#696969" stroke="#000000" stroke-width="1"/>
</svg>