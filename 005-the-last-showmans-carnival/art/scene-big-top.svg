<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark fabric texture for tent -->
    <pattern id="tent-texture" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#400"/>
      <line x1="0" y1="0" x2="20" y2="20" stroke="#300" stroke-width="1" opacity="0.3"/>
    </pattern>
    <!-- Muddy sawdust floor -->
    <pattern id="mud-texture" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#1a0d00"/>
      <circle cx="10" cy="10" r="1.5" fill="#000" opacity="0.5"/>
      <circle cx="30" cy="30" r="1" fill="#000" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Layer 1: Background - Deep Shadows -->
  <rect width="640" height="400" fill="#000000"/>
  
  <!-- Layer 2: Tent Ceiling & Walls -->
  <path d="M 0 0 L 320 60 L 640 0 L 640 180 L 320 220 L 0 180 Z" fill="url(#tent-texture)" stroke="#111" stroke-width="2"/>
  <path d="M 320 60 L 320 220" stroke="#000" stroke-width="2" opacity="0.5"/> <!-- Tent pole/seam -->
  <path d="M 160 30 L 160 200 M 480 30 L 480 200" stroke="#000" stroke-width="1" opacity="0.3"/>

  <!-- Layer 3: Ground (Mud and debris) -->
  <path d="M 0 320 Q 320 300 640 320 L 640 400 L 0 400 Z" fill="url(#mud-texture)"/>
  <ellipse cx="320" cy="340" rx="120" ry="40" fill="#000" opacity="0.4"/> <!-- Center ring depression -->

  <!-- Layer 4: Distant bleachers -->
  <g id="bleachers" stroke="#000" stroke-width="1.5">
    <rect x="40" y="240" width="120" height="15" fill="#3D2B1F" transform="skewX(-10)"/>
    <rect x="30" y="255" width="140" height="15" fill="#2D1B0F" transform="skewX(-10)"/>
    <rect x="480" y="240" width="120" height="15" fill="#3D2B1F" transform="skewX(10)"/>
    <rect x="470" y="255" width="140" height="15" fill="#2D1B0F" transform="skewX(10)"/>
  </g>

  <!-- Layer 5: The Center Ring & Stage -->
  <path d="M 240 330 L 400 330 L 420 370 L 220 370 Z" fill="#5A4A3A" stroke="#222"/> <!-- Stage platform -->
  <path d="M 240 330 L 400 330 L 400 340 L 240 340 Z" fill="#DAA520" opacity="0.7"/> <!-- Golden trim -->

  <!-- Layer 6: Key Objects -->
  <!-- Safe (Iron/Heavy) -->
  <g transform="translate(260, 280)">
    <rect width="50" height="50" fill="#333" stroke="#000" stroke-width="2"/>
    <circle cx="25" cy="25" r="12" fill="#222" stroke="#444" stroke-width="1.5"/> <!-- Dial -->
    <path d="M 25 15 L 25 18 M 35 25 L 32 25 M 25 35 L 25 32 M 15 25 L 18 25" stroke="#666" stroke-width="1"/>
    <!-- Ornate safe brand label graphic (no text) -->
    <path d="M 15 8 Q 25 2 35 8" fill="none" stroke="#DAA520" stroke-width="0.8"/>
  </g>

  <!-- Projector on Tripod -->
  <g transform="translate(360, 260)">
    <path d="M 0 0 L -15 30 M 0 0 L 15 30 M 0 0 L 0 35" stroke="#111" stroke-width="2"/> <!-- Tripod -->
    <rect x="-10" y="-15" width="30" height="20" fill="#222" stroke="#000" stroke-width="1.5"/> <!-- Body -->
    <circle cx="25" cy="-5" r="8" fill="#111" stroke="#333" stroke-width="1.5"/> <!-- Big Lens -->
    <rect x="5" y="-12" width="15" height="12" fill="#111" stroke="#000" stroke-width="1"/> <!-- Lens barrel -->
  </g>

  <!-- Trapdoor in floor -->
  <path d="M 280 375 L 360 375 L 370 395 L 270 395 Z" fill="#221100" stroke="#000" stroke-width="1.5"/>
  <circle cx="320" cy="385" r="4" fill="#666" stroke="#000" stroke-width="1"/> <!-- Iron ring handle -->

  <!-- Layer 7: Atmosphere -->
  <!-- Beams of dim light from above -->
  <path d="M 320 0 L 100 400 L 540 400 Z" fill="#ffffff" opacity="0.03"/>
  <!-- Dust motes -->
  <circle cx="200" cy="150" r="1.5" fill="#fff" opacity="0.2"/>
  <circle cx="400" cy="250" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="310" cy="80" r="1" fill="#fff" opacity="0.1"/>
</svg>
