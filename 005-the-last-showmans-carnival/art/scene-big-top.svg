<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Dark interior -->
  <rect width="640" height="400" fill="#000000"/>
  
  <!-- Ground (sawdust turned to black mud) -->
  <rect y="320" width="640" height="80" fill="#000000"/>
  
  <!-- Tent canvas ceiling -->
  <polygon points="320,20 640,150 640,50 320,80 0,50 0,150" fill="#8B0000" stroke="#000000" stroke-width="2"/>
  <line x1="320" y1="20" x2="0" y2="150" stroke="#000000" stroke-width="1"/>
  <line x1="320" y1="20" x2="640" y2="150" stroke="#000000" stroke-width="1"/>
  <line x1="320" y1="20" x2="320" y2="150" stroke="#000000" stroke-width="1"/>
  
  <!-- Bleachers -->
  <rect x="50" y="250" width="150" height="30" fill="#8B4513" stroke="#000000" stroke-width="2"/>
  <rect x="200" y="270" width="150" height="30" fill="#8B4513" stroke="#000000" stroke-width="2"/>
  <rect x="350" y="250" width="150" height="30" fill="#8B4513" stroke="#000000" stroke-width="2"/>
  <rect x="500" y="270" width="100" height="30" fill="#8B4513" stroke="#000000" stroke-width="2"/>
  
  <!-- Center ring -->
  <ellipse cx="320" cy="320" rx="80" ry="30" fill="#8B4513" stroke="#000000" stroke-width="2"/>
  
  <!-- Stage -->
  <rect x="250" y="150" width="140" height="40" fill="#DAA520" stroke="#000000" stroke-width="2"/>
  
  <!-- Safe -->
  <rect x="270" y="160" width="40" height="30" fill="#696969" stroke="#000000" stroke-width="2"/>
  <circle cx="290" cy="175" r="8" fill="#000000" stroke="#000000" stroke-width="1"/> <!-- Dial -->
  <text x="275" y="180" font-family="serif" font-size="8" fill="#000000">Blackwood</text>
  
  <!-- Projector -->
  <rect x="320" y="160" width="30" height="20" fill="#696969" stroke="#000000" stroke-width="2"/>
  <rect x="340" y="165" width="10" height="5" fill="#000000"/> <!-- Lens mount -->
  <line x1="335" y1="180" x2="335" y2="200" stroke="#000000" stroke-width="2"/> <!-- Tripod -->
  <line x1="325" y1="180" x2="320" y2="200" stroke="#000000" stroke-width="2"/>
  <line x1="345" y1="180" x2="350" y2="200" stroke="#000000" stroke-width="2"/>
  
  <!-- Costume rack -->
  <rect x="50" y="180" width="80" height="60" fill="#8B4513" stroke="#000000" stroke-width="2"/>
  <line x1="50" y1="190" x2="130" y2="190" stroke="#000000" stroke-width="2"/> <!-- Rack -->
  <!-- Sequined dresses -->
  <polygon points="60,190 70,210 80,190" fill="#FF8C00" stroke="#000000" stroke-width="1"/>
  <polygon points="90,190 100,210 110,190" fill="#0000FF" stroke="#000000" stroke-width="1"/>
  <!-- Clown suit -->
  <polygon points="120,190 130,220 140,190" fill="#FF0000" stroke="#000000" stroke-width="1"/>
  <circle cx="130" cy="185" r="5" fill="#FFFFFF"/> <!-- Grin -->
  
  <!-- Overturned spotlight -->
  <rect x="450" y="280" width="40" height="20" fill="#696969" stroke="#000000" stroke-width="2"/>
  <circle cx="470" cy="290" r="10" fill="#000000" stroke="#000000" stroke-width="2"/> <!-- Cracked lens -->
  <line x1="460" y1="290" x2="480" y2="290" stroke="#FFFFFF" stroke-width="1"/> <!-- Crack -->
  <line x1="470" y1="280" x2="470" y2="300" stroke="#FFFFFF" stroke-width="1"/> <!-- Crack -->
  
  <!-- Trapdoor -->
  <rect x="300" y="350" width="40" height="20" fill="#696969" stroke="#000000" stroke-width="2"/>
  <circle cx="320" cy="360" r="5" fill="#000000"/> <!-- Iron ring -->
</svg>