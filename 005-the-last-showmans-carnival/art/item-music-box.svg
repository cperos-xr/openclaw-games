<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Dark polished wood pattern -->
    <pattern id="wood-grain" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="#3D2B1F"/>
      <path d="M 0 5 Q 5 0 10 5" stroke="#2D1B0F" stroke-width="0.5" fill="none"/>
    </pattern>
  </defs>

  <!-- Shadow below -->
  <ellipse cx="32" cy="54" rx="20" ry="4" fill="#000000" opacity="0.4"/>

  <!-- Music Box Body (Main) -->
  <path d="M 12 24 L 52 24 L 52 48 L 12 48 Z" fill="url(#wood-grain)" stroke="#222" stroke-width="1"/>
  
  <!-- Lid (Slightly open look or ornate top) -->
  <path d="M 10 18 L 54 18 L 54 26 L 10 26 Z" fill="#5D3B2F" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Decorative trim on lid -->
  <path d="M 10 20 L 54 20" stroke="#DAA520" stroke-width="1.5" opacity="0.8"/>
  
  <!-- Brass winding key (The "Winding Key" look) -->
  <g transform="translate(50, 36) scale(0.6)">
    <!-- Shaft -->
    <rect x="-2" y="-1" width="12" height="3" fill="#DAA520" stroke="#8B6508" stroke-width="1"/>
    <!-- Handle (bow) -->
    <path d="M 10 -6 Q 16 -6 16 0 Q 16 6 10 6 Q 4 6 4 0 Q 4 -6 10 -6 M 10 -2 Q 13 -2 13 0 Q 13 2 10 2 Q 7 2 7 0 Q 7 -2 10 -2" fill="#DAA520" stroke="#8B6508" stroke-width="1"/>
  </g>

  <!-- Ornate Brass Corner Guards -->
  <path d="M 12 24 L 18 24 L 12 30 Z" fill="#DAA520"/>
  <path d="M 52 24 L 46 24 L 52 30 Z" fill="#DAA520"/>
  <path d="M 12 48 L 18 48 L 12 42 Z" fill="#DAA520"/>
  <path d="M 52 48 L 46 48 L 52 42 Z" fill="#DAA520"/>

  <!-- Front Clasp/Keyhole -->
  <circle cx="32" cy="36" r="4" fill="#DAA520" stroke="#8B6508" stroke-width="1"/>
  <path d="M 32 34 L 32 38 M 31 36 L 33 36" stroke="#000" stroke-width="1"/> <!-- Keyhole hint -->

  <!-- Atmospheric music notes floating out -->
  <g opacity="0.6" stroke="#fff" stroke-width="0.5" fill="#fff">
    <path d="M 50 15 L 50 5 Q 53 5 53 8 L 53 18" stroke-linecap="round" fill="none"/>
    <circle cx="48" cy="15" r="2"/>
    <path d="M 15 12 L 15 2 Q 18 2 18 5 L 18 15" stroke-linecap="round" fill="none"/>
    <circle cx="13" cy="12" r="2"/>
  </g>
</svg>
