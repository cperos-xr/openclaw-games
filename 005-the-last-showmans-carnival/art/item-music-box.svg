<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Music Box -->
  <!-- Main body -->
  <rect x="12" y="20" width="40" height="30" fill="#DAA520" stroke="#000000" stroke-width="2"/>
  <!-- Lid -->
  <rect x="14" y="16" width="36" height="8" fill="#DAA520" stroke="#000000" stroke-width="2"/>
  <line x1="14" y1="24" x2="50" y2="24" stroke="#000000" stroke-width="1"/> <!-- Lid seam -->
  <!-- Hinges -->
  <rect x="20" y="18" width="4" height="2" fill="#696969" stroke="#000000" stroke-width="1"/>
  <rect x="40" y="18" width="4" height="2" fill="#696969" stroke="#000000" stroke-width="1"/>
  <!-- Clasp -->
  <rect x="28" y="30" width="8" height="6" fill="#696969" stroke="#000000" stroke-width="1"/>
  <circle cx="32" cy="33" r="2" fill="#000000"/> <!-- Keyhole -->
  <!-- Decorative pattern -->
  <circle cx="32" cy="40" r="6" fill="none" stroke="#8B4513" stroke-width="1"/>
  <circle cx="32" cy="40" r="3" fill="#8B4513"/>
  <!-- Music notes (subtle) -->
  <text x="50" y="14" font-family="serif" font-size="8" fill="#FFFFFF">♪</text>
</svg>