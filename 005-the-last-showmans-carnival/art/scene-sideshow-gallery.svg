<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dusty glass texture -->
    <linearGradient id="glass-glint" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ADD8E6" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="0.3"/>
    </linearGradient>
    <!-- Dark red tent fabric -->
    <pattern id="tent-red" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#600"/>
      <path d="M 0 0 Q 20 10 40 0" fill="none" stroke="#400" stroke-width="2" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Layer 1: Background - Black -->
  <rect width="640" height="400" fill="#000000"/>
  
  <!-- Layer 2: Tent Walls & Floor -->
  <rect x="0" y="0" width="640" height="350" fill="url(#tent-red)"/>
  <rect x="0" y="350" width="640" height="50" fill="#0a1a0a"/> <!-- Dark muddy floor -->

  <!-- Layer 3: Display Cases (The Outsides) -->
  <g stroke="#222" stroke-width="2">
    <!-- Two-headed calf chamber -->
    <rect x="80" y="80" width="100" height="150" fill="#111"/>
    <!-- Mermaid's hand chamber -->
    <rect x="220" y="80" width="100" height="150" fill="#111"/>
    <!-- Skeleton chamber -->
    <rect x="360" y="80" width="100" height="150" fill="#111"/>
  </g>

  <!-- Layer 4: Disturbed Glass & Glints -->
  <g fill="url(#glass-glint)" opacity="0.6">
    <rect x="85" y="85" width="90" height="140"/>
    <rect x="225" y="85" width="90" height="140"/>
    <rect x="365" y="85" width="90" height="140"/>
  </g>

  <!-- Layer 5: Freak Show Curiosities (Visuals instead of labels) -->
  <!-- Two-headed calf silhouette -->
  <g transform="translate(100, 120)">
    <path d="M 0 40 Q 30 15 60 40 L 60 80 Q 30 90 0 80 Z" fill="#3D2B1F" opacity="0.8"/>
    <circle cx="10" cy="35" r="8" fill="#3D2B1F"/>
    <circle cx="50" cy="35" r="8" fill="#3D2B1F"/>
    <circle cx="8" cy="33" r="2" fill="#fff" opacity="0.3"/>
    <circle cx="48" cy="33" r="2" fill="#fff" opacity="0.3"/>
  </g>

  <!-- Mermaid silhouette/hand -->
  <g transform="translate(240, 110)">
    <path d="M 20 80 Q 0 50 10 20 Q 20 0 30 20 L 35 40 Q 50 100 20 120" fill="none" stroke="#2F4F4F" stroke-width="4" opacity="0.7"/>
    <path d="M 28 20 L 25 10 M 32 20 L 35 12 M 24 22 L 20 15" stroke="#2F4F4F" stroke-width="1.5"/> <!-- Webbed fingers -->
  </g>

  <!-- Skeleton -->
  <g transform="translate(385, 100)">
    <circle cx="25" cy="15" r="10" fill="#DDD" opacity="0.8"/> <!-- Skull -->
    <path d="M 25 25 L 25 100 M 5 40 L 45 40 M 10 50 L 40 50 M 12 60 L 38 60" stroke="#DDD" stroke-width="2" opacity="0.6"/> <!-- Ribs -->
  </g>

  <!-- Layer 6: The "Last Laugh" Shattered Display -->
  <g transform="translate(70, 260)">
    <rect width="110" height="90" fill="#000" stroke="#111" stroke-width="2"/>
    <!-- Shattered glass effect -->
    <path d="M 0 0 L 110 90 M 110 0 L 0 90 M 55 0 L 55 90" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
    <!-- The "Last Laugh" visual hint: A wide grinning red mouth icon (no text) -->
    <path d="M 30 40 Q 55 70 80 40 Q 55 80 30 40" fill="#800" opacity="0.7"/>
    <path d="M 35 45 L 75 45" stroke="#fff" stroke-width="1" opacity="0.5"/> <!-- Teeth lines -->
  </g>

  <!-- Layer 7: Grinning Man Stage Backdrop -->
  <g transform="translate(250, 240)">
    <!-- Ornate banner backdrop (no text) -->
    <path d="M 0 100 L 140 100 L 140 0 Q 70 30 0 0 Z" fill="#4B0082" stroke="#200" stroke-width="2"/>
    <path d="M 20 15 Q 70 50 120 15" fill="none" stroke="#DAA520" stroke-width="2" opacity="0.6"/>
    <!-- Stylized Grinning Man Icon -->
    <circle cx="70" cy="55" r="25" fill="#111" stroke="#DAA520" stroke-width="1.5"/>
    <path d="M 55 60 Q 70 75 85 60" fill="none" stroke="#fff" stroke-width="2"/> <!-- The Grin -->
  </g>

  <!-- Layer 8: Velvet Drapes & Lighting -->
  <path d="M 520 80 L 600 80 L 600 350 L 520 350 Z" fill="#800080" stroke="#200" stroke-width="2"/>
  <path d="M 520 100 Q 560 150 520 200" fill="none" stroke="#fff" stroke-width="2" opacity="0.1"/> <!-- Highlight -->

  <!-- Dusty atmosphere -->
  <rect width="640" height="400" fill="#000" opacity="0.2"/>
</svg>
