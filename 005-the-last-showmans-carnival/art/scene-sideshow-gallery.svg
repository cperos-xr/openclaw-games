<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Sideshow Gallery Scene -->
  <!-- Background: Dark interior -->
  <rect width="640" height="400" fill="#000000"/>
  
  <!-- Floor -->
  <rect y="350" width="640" height="50" fill="#006600"/>
  
  <!-- Tent walls -->
  <rect x="0" y="0" width="640" height="50" fill="#8B0000"/>
  <rect x="0" y="0" width="50" height="350" fill="#8B0000"/>
  <rect x="590" y="0" width="50" height="350" fill="#8B0000"/>
  
  <!-- Display cases -->
  <!-- Two-headed calf -->
  <rect x="100" y="100" width="80" height="120" fill="#ADD8E6" stroke="#000000" stroke-width="2"/>
  <rect x="110" y="110" width="60" height="30" fill="#8B4513" stroke="#000000" stroke-width="1"/>
  <circle cx="120" cy="125" r="8" fill="#8B4513" stroke="#000000" stroke-width="1"/>
  <circle cx="135" cy="125" r="8" fill="#8B4513" stroke="#000000" stroke-width="1"/>
  <circle cx="118" cy="125" r="3" fill="#FFFFFF"/>
  <circle cx="133" cy="125" r="3" fill="#FFFFFF"/>
  
  <!-- Mermaid's hand -->
  <rect x="250" y="100" width="80" height="120" fill="#ADD8E6" stroke="#000000" stroke-width="2"/>
  <path d="M280,180 Q290,160 300,180 Q310,160 320,180" fill="none" stroke="#8B4513" stroke-width="2"/>
  <text x="260" y="110" font-family="serif" font-size="8" fill="#000000">Mermaid</text>
  
  <!-- Skeleton -->
  <rect x="400" y="100" width="80" height="120" fill="#ADD8E6" stroke="#000000" stroke-width="2"/>
  <circle cx="440" cy="120" r="15" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <line x1="440" y1="135" x2="440" y2="200" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="420" y1="150" x2="460" y2="150" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="415" y1="160" x2="465" y2="160" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="418" y1="170" x2="462" y2="170" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="412" y1="180" x2="468" y2="180" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="416" y1="190" x2="464" y2="190" stroke="#FFFFFF" stroke-width="1"/>
  
  <!-- Shattered display case -->
  <rect x="50" y="250" width="100" height="80" fill="#ADD8E6" stroke="#000000" stroke-width="2"/>
  <line x1="60" y1="260" x2="140" y2="320" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="140" y1="260" x2="60" y2="320" stroke="#FFFFFF" stroke-width="2"/>
  <text x="60" y="280" font-family="serif" font-size="8" fill="#000000">Last Laugh</text>
  
  <!-- Grinning Man stage -->
  <rect x="300" y="250" width="140" height="100" fill="#8B0000" stroke="#000000" stroke-width="2"/>
  <path d="M300,250 Q320,280 340,250 Q360,220 380,250 Q400,280 420,250 Q440,220 440,250" fill="#8B0000" stroke="#000000" stroke-width="1"/>
  <text x="320" y="240" font-family="serif" font-size="10" fill="#FFFFFF">Grinning Man</text>
  
  <!-- Velvet drape -->
  <rect x="500" y="150" width="80" height="150" fill="#800080" stroke="#000000" stroke-width="2"/>
  <path d="M500,150 Q520,180 540,150 Q560,120 580,150" fill="#800080" stroke="#000000" stroke-width="1"/>
  <rect x="530" y="220" width="20" height="30" fill="#000000"/>
  
  <!-- Glass shards -->
  <polygon points="70,340 80,335 75,345" fill="#FFFFFF"/>
  <polygon points="120,345 130,340 125,350" fill="#FFFFFF"/>
  <polygon points="90,350 100,345 95,355" fill="#FFFFFF"/>
</svg>