<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Crystal Refraction Gradient -->
    <radialGradient id="crystal-refraction" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#E0FFFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ADD8E6" stop-opacity="0.8"/>
    </radialGradient>
    <!-- Dark polished metal for the rim -->
    <linearGradient id="rim-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DAA520"/>
      <stop offset="50%" stop-color="#8B6508"/>
      <stop offset="100%" stop-color="#3D2B1F"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: The Crystal Lens Body -->
  <g id="lens" transform="translate(32, 32)">
    <!-- Ornate Brass/Gold Frame -->
    <circle r="26" fill="url(#rim-gradient)" stroke="#111" stroke-width="1.5"/>
    
    <!-- The Glass/Crystal itself -->
    <circle r="22" fill="url(#crystal-refraction)" stroke="#B0E0E6" stroke-width="0.5"/>
    
    <!-- Facet details (High quality, hand-coded paths) -->
    <path d="M 0 -22 L 18 -10 L 0 5 L -18 -10 Z" fill="#fff" opacity="0.3"/>
    <path d="M 0 -22 L 5 -5 L -5 -5 Z" fill="#fff" opacity="0.4"/> <!-- Top central facet -->
    <path d="M -18 -10 L -22 0 L -10 10 L 0 5 Z" fill="#fff" opacity="0.1"/> <!-- Side facet -->
    <path d="M 18 -10 L 22 0 L 10 10 L 0 5 Z" fill="#fff" opacity="0.1"/> <!-- Side facet -->
    <path d="M 0 22 L 18 10 L 0 5 L -18 10 Z" fill="#333" opacity="0.1"/> <!-- Bottom shadow facet -->
    
    <!-- Lens Frame Engraving/Atmosphere -->
    <circle r="24" fill="none" stroke="#222" stroke-width="0.5" stroke-dasharray="2, 4"/>
  </g>

  <!-- Layer 2: Atmospheric Shine -->
  <circle cx="22" cy="22" r="5" fill="#fff" opacity="0.4"/>
  <circle cx="25" cy="25" r="2" fill="#fff" opacity="0.5"/>
</svg>
