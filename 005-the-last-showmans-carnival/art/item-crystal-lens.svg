<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Crystal Lens -->
  <!-- Lens shape -->
  <ellipse cx="32" cy="32" rx="20" ry="20" fill="#ADD8E6" stroke="#000000" stroke-width="2"/>
  <!-- Inner facets -->
  <polygon points="32,12 40,24 32,52 24,24" fill="#E0FFFF" stroke="#000000" stroke-width="1"/>
  <polygon points="32,12 52,32 40,24" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <polygon points="32,12 12,32 24,24" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <polygon points="12,32 24,40 32,52" fill="#E0FFFF" stroke="#000000" stroke-width="1"/>
  <polygon points="52,32 40,40 32,52" fill="#E0FFFF" stroke="#000000" stroke-width="1"/>
  <!-- Center highlight -->
  <circle cx="32" cy="32" r="4" fill="#FFFFFF"/>
  <!-- Light gathering effect -->
  <circle cx="32" cy="32" r="16" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  <!-- Frame/mount -->
  <rect x="28" y="8" width="8" height="4" fill="#8B4513" stroke="#000000" stroke-width="1"/>
  <rect x="28" y="52" width="8" height="4" fill="#8B4513" stroke="#000000" stroke-width="1"/>
</svg>