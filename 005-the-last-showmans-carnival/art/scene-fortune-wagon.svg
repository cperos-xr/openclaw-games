<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Dark interior -->
  <rect width="640" height="400" fill="#000000"/>
  
  <!-- Wagon walls -->
  <rect x="50" y="50" width="540" height="300" fill="#9400D3" stroke="#000000" stroke-width="3"/>
  
  <!-- Velvet drapes -->
  <rect x="60" y="60" width="520" height="20" fill="#8B0000" stroke="#000000" stroke-width="2"/>
  <path d="M60,80 Q100,120 140,80 Q180,40 220,80 Q260,120 300,80 Q340,40 380,80 Q420,120 460,80 Q500,40 540,80 L540,350 L60,350 Z" fill="#8B0000" stroke="#000000" stroke-width="1"/>
  
  <!-- Round table -->
  <ellipse cx="320" cy="250" rx="80" ry="30" fill="#9400D3" stroke="#000000" stroke-width="2"/>
  <rect x="240" y="280" width="160" height="40" fill="#9400D3" stroke="#000000" stroke-width="2"/> <!-- Table leg -->
  
  <!-- Purple silk tablecloth -->
  <ellipse cx="320" cy="250" rx="85" ry="35" fill="#9400D3" stroke="#000000" stroke-width="1"/>
  
  <!-- Crystal ball -->
  <circle cx="320" cy="220" r="30" fill="#ADD8E6" stroke="#000000" stroke-width="2"/>
  <circle cx="320" cy="220" r="20" fill="#E0FFFF" opacity="0.5"/> <!-- Glow -->
  <circle cx="320" cy="220" r="10" fill="#FFFFFF" opacity="0.3"/> <!-- Inner glow -->
  <rect x="290" y="250" width="60" height="10" fill="#DAA520" stroke="#000000" stroke-width="1"/> <!-- Base -->
  
  <!-- Tarot cards on table -->
  <rect x="250" y="240" width="20" height="30" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <rect x="280" y="235" width="20" height="30" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <rect x="310" y="240" width="20" height="30" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <text x="255" y="255" font-family="serif" font-size="6" fill="#000000">Tower</text>
  <text x="283" y="250" font-family="serif" font-size="6" fill="#000000">Hanged</text>
  <text x="315" y="255" font-family="serif" font-size="6" fill="#000000">Death</text>
  
  <!-- Shelves with jars -->
  <rect x="100" y="150" width="150" height="10" fill="#8B4513" stroke="#000000" stroke-width="2"/>
  <rect x="400" y="150" width="150" height="10" fill="#8B4513" stroke="#000000" stroke-width="2"/>
  
  <!-- Jars -->
  <rect x="110" y="120" width="20" height="30" fill="#ADD8E6" stroke="#000000" stroke-width="1"/>
  <rect x="140" y="125" width="20" height="25" fill="#ADD8E6" stroke="#000000" stroke-width="1"/>
  <rect x="170" y="120" width="20" height="30" fill="#ADD8E6" stroke="#000000" stroke-width="1"/>
  <rect x="410" y="120" width="20" height="30" fill="#ADD8E6" stroke="#000000" stroke-width="1"/>
  <rect x="440" y="125" width="20" height="25" fill="#ADD8E6" stroke="#000000" stroke-width="1"/>
  <rect x="470" y="120" width="20" height="30" fill="#ADD8E6" stroke="#000000" stroke-width="1"/>
  
  <!-- Poster of Madame Vesper -->
  <rect x="250" y="80" width="140" height="100" fill="#FF8C00" stroke="#000000" stroke-width="2"/>
  <circle cx="320" cy="110" r="20" fill="#FF8C00" stroke="#000000" stroke-width="2"/> <!-- Head -->
  <ellipse cx="320" cy="130" rx="25" ry="15" fill="#9400D3" stroke="#000000" stroke-width="1"/> <!-- Body -->
  <text x="270" y="165" font-family="serif" font-size="10" fill="#000000">See Your Fate - 25¢</text>
  
  <!-- Rabbit foot -->
  <ellipse cx="120" cy="135" rx="8" ry="5" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  
  <!-- Dried flowers -->
  <circle cx="150" cy="135" r="4" fill="#FF8C00"/>
  <circle cx="155" cy="130" r="4" fill="#FF8C00"/>
  <circle cx="145" cy="130" r="4" fill="#FF8C00"/>
  
  <!-- Animal bones -->
  <rect x="420" y="130" width="15" height="4" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <circle cx="420" cy="132" r="3" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <circle cx="435" cy="132" r="3" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
</svg>