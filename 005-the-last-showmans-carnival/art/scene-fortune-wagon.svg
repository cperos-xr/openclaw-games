<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Purple velvet texture -->
    <pattern id="velvet-texture" width="30" height="30" patternUnits="userSpaceOnUse">
      <rect width="30" height="30" fill="#4B0082"/>
      <path d="M 0 0 L 30 30" stroke="#310062" stroke-width="2" opacity="0.4"/>
    </pattern>
    <!-- Dark wood for wagon interior -->
    <pattern id="wagon-wood" width="50" height="10" patternUnits="userSpaceOnUse">
      <rect width="50" height="10" fill="#2D1B0F"/>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#1D0B00" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Layer 1: Background - Black Void -->
  <rect width="640" height="400" fill="#000000"/>
  
  <!-- Layer 2: Wagon Interior Walls -->
  <rect x="40" y="40" width="560" height="320" fill="url(#wagon-wood)" stroke="#111" stroke-width="2"/>

  <!-- Layer 3: Heavy Drapes -->
  <g id="drapes" fill="#600" stroke="#200" stroke-width="1.5">
    <path d="M 40 40 L 120 40 L 120 360 L 40 360 Z"/> <!-- Left drape -->
    <path d="M 520 40 L 600 40 L 600 360 L 520 360 Z"/> <!-- Right drape -->
    <path d="M 120 40 Q 320 120 520 40 L 520 80 Q 320 160 120 80 Z"/> <!-- Valance -->
  </g>

  <!-- Layer 4: Floating Atmosphere (Herbs/Smoke) -->
  <g opacity="0.3" fill="#fff">
    <circle cx="100" cy="100" r="1.5"/>
    <circle cx="540" cy="120" r="1"/>
    <path d="M 320 200 Q 330 180 320 160 Q 310 140 320 120" fill="none" stroke="#fff" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- Layer 5: Fortune Teller's Table -->
  <g id="table" transform="translate(320, 300)">
    <ellipse cx="0" cy="0" rx="100" ry="35" fill="url(#velvet-texture)" stroke="#2D0B40" stroke-width="2"/>
    <path d="M -80 15 Q -100 0 -80 -15" fill="none" stroke="#7B68EE" stroke-width="1.5" opacity="0.5"/> <!-- Tablecloth fold -->
  </g>

  <!-- Layer 6: Crystal Ball & Tarot -->
  <g id="crystal-ball" transform="translate(320, 260)">
    <!-- Ornate Gold Base -->
    <path d="M -25 25 L 25 25 L 30 35 L -30 35 Z" fill="#DAA520" stroke="#8B6508" stroke-width="1.5"/>
    <!-- The Ball -->
    <circle cx="0" cy="0" r="35" fill="#E0FFFF" stroke="#B0E0E6" stroke-width="1" opacity="0.8"/>
    <circle cx="0" cy="0" r="30" fill="#F0FFFF" opacity="0.4"/>
    <!-- Inner swirling mist (no text) -->
    <path d="M -15 -10 Q 0 0 15 -10 Q 0 10 -15 20" fill="none" stroke="#fff" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Tarot Cards (Visual icons, no text names anymore) -->
  <g id="tarot-spread" transform="translate(260, 280)">
    <rect x="0" y="0" width="22" height="35" rx="2" fill="#fff" stroke="#000" stroke-width="1" transform="rotate(-15)"/>
    <rect x="30" y="-10" width="22" height="35" rx="2" fill="#fff" stroke="#000" stroke-width="1"/>
    <rect x="65" y="0" width="22" height="35" rx="2" fill="#fff" stroke="#000" stroke-width="1" transform="rotate(15)"/>
    <!-- Abstract Tarot Art (Death/Hanged/Tower icons) -->
    <circle cx="41" cy="5" r="4" fill="#000" opacity="0.8"/> <!-- Skull-like for Death card -->
    <path d="M 6 10 L 16 10 L 11 25 Z" fill="#800" transform="rotate(-15)"/> <!-- Tower-like -->
    <path d="M 75 10 L 85 25" stroke="#008" stroke-width="2" transform="rotate(15)"/> <!-- Hanged-like -->
  </g>

  <!-- Layer 7: Poster (Madame Vesper's Silhouette) -->
  <g transform="translate(260, 60)">
    <rect width="120" height="90" fill="#EEDD82" stroke="#8B6508" stroke-width="2"/>
    <!-- The "See Your Fate" Poster Graphic -->
    <circle cx="60" cy="35" r="18" fill="none" stroke="#222" stroke-width="2"/> <!-- Moon border -->
    <path d="M 50 45 Q 60 25 70 45" fill="#222"/> <!-- Stylized silhouette head -->
    <path d="M 30 75 Q 60 70 90 75" fill="none" stroke="#222" stroke-width="1.5"/> <!-- Decorative line -->
    <path d="M 55 70 L 65 70 M 60 65 L 60 75" stroke="#222" stroke-width="1"/> <!-- A small star/cross icon -->
  </g>

  <!-- Layer 8: Final Polish - Shadows & Low Light -->
  <rect width="640" height="400" fill="#000" opacity="0.2"/>
  <radialGradient id="lamp-glow" cx="320" cy="260" r="200" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#ADD8E6" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0"/>
  </radialGradient>
  <rect width="640" height="400" fill="url(#lamp-glow)"/>
</svg>
