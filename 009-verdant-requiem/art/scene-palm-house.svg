<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: oppressive humid green -->
  <rect width="640" height="400" fill="#002200"/>
  
  <!-- Giant palm fronds -->
  <path d="M100,50 Q150,0 200,50 Q250,0 300,50 Q350,0 400,50 Q450,0 500,50 Q550,0 600,50" fill="none" stroke="#004400" stroke-width="5"/>
  <path d="M120,80 Q170,30 220,80 Q270,30 320,80 Q370,30 420,80 Q470,30 520,80 Q570,30 620,80" fill="none" stroke="#004400" stroke-width="5"/>
  <!-- Browned edges on fronds -->
  <path d="M100,50 Q150,0 200,50 Q250,0 300,50 Q350,0 400,50 Q450,0 500,50 Q550,0 600,50" fill="none" stroke="#663300" stroke-width="3"/>
  
  <!-- Dead fern barrier (north path) -->
  <rect x="280" y="100" width="80" height="200" fill="#332200" stroke="#000000" stroke-width="3"/>
  <!-- Fern texture -->
  <line x1="300" y1="120" x2="300" y2="280" stroke="#000000" stroke-width="1"/>
  <line x1="310" y1="130" x2="310" y2="270" stroke="#000000" stroke-width="1"/>
  
  <!-- Water drips -->
  <line x1="500" y1="20" x2="500" y2="30" stroke="#ffffff" stroke-width="2"/>
  <line x1="505" y1="40" x2="505" y2="50" stroke="#ffffff" stroke-width="2"/>
  <line x1="495" y1="60" x2="495" y2="70" stroke="#ffffff" stroke-width="2"/>
  
  <!-- Eastern opening blocked by vines -->
  <rect x="550" y="150" width="60" height="180" fill="#003300" stroke="#000000" stroke-width="3"/>
  <!-- Vines texture -->
  <path d="M550,150 Q580,180 610,150 Q580,120 550,150" fill="none" stroke="#005500" stroke-width="2"/>
  <path d="M550,250 Q580,280 610,250 Q580,220 550,250" fill="none" stroke="#005500" stroke-width="2"/>
  
  <!-- Ground -->
  <rect x="0" y="350" width="640" height="50" fill="#004400" stroke="#000000" stroke-width="2"/>
</svg>