<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: sterile, clinical -->
  <rect width="640" height="400" fill="#001100"/>
  
  <!-- Glass cases along walls -->
  <!-- Left wall cases -->
  <rect x="20" y="50" width="60" height="100" fill="#003300" stroke="#000000" stroke-width="2"/>
  <rect x="20" y="170" width="60" height="100" fill="#003300" stroke="#000000" stroke-width="2"/>
  <rect x="20" y="290" width="60" height="100" fill="#003300" stroke="#000000" stroke-width="2"/>
  
  <!-- Right wall cases -->
  <rect x="560" y="50" width="60" height="100" fill="#003300" stroke="#000000" stroke-width="2"/>
  <rect x="560" y="170" width="60" height="100" fill="#003300" stroke="#000000" stroke-width="2"/>
  <rect x="560" y="290" width="60" height="100" fill="#003300" stroke="#000000" stroke-width="2"/>
  
  <!-- Orchids in cases (subtle glow) -->
  <circle cx="50" cy="100" r="15" fill="#006600" opacity="0.6"/>
  <circle cx="50" cy="220" r="15" fill="#006600" opacity="0.6"/>
  <circle cx="50" cy="340" r="15" fill="#006600" opacity="0.6"/>
  <circle cx="590" cy="100" r="15" fill="#006600" opacity="0.6"/>
  <circle cx="590" cy="220" r="15" fill="#006600" opacity="0.6"/>
  <circle cx="590" cy="340" r="15" fill="#006600" opacity="0.6"/>
  
  <!-- Locked cabinet (far wall) -->
  <rect x="290" y="50" width="60" height="180" fill="#332200" stroke="#000000" stroke-width="3"/>
  <rect x="310" y="70" width="20" height="140" fill="#002200"/> <!-- glass doors -->
  <!-- Cabinet handle/lock -->
  <rect x="340" y="120" width="10" height="20" fill="#664400" stroke="#000000" stroke-width="2"/>
  
  <!-- Central table with journal -->
  <rect x="250" y="180" width="140" height="60" fill="#443300" stroke="#000000" stroke-width="3"/>
  <!-- Journal on table -->
  <rect x="280" y="190" width="80" height="40" fill="#221100" stroke="#000000" stroke-width="1"/>
  <!-- Journal details -->
  <line x1="290" y1="200" x2="340" y2="200" stroke="#000000" stroke-width="1"/>
  <line x1="290" y1="210" x2="330" y2="210" stroke="#000000" stroke-width="1"/>
  <line x1="290" y1="220" x2="320" y2="220" stroke="#000000" stroke-width="1"/>
  
  <!-- Southern iron gate -->
  <rect x="290" y="300" width="60" height="80" fill="#221100" stroke="#000000" stroke-width="3"/>
  <!-- Gate details -->
  <line x1="320" y1="300" x2="320" y2="380" stroke="#000000" stroke-width="2"/>
  <line x1="295" y1="320" x2="345" y2="320" stroke="#000000" stroke-width="1"/>
  <line x1="295" y1="340" x2="345" y2="340" stroke="#000000" stroke-width="1"/>
  <line x1="295" y1="360" x2="345" y2="360" stroke="#000000" stroke-width="1"/>
  
  <!-- Floor -->
  <rect x="0" y="380" width="640" height="20" fill="#002200" stroke="#000000" stroke-width="2"/>
</svg>