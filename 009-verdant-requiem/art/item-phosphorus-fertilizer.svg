  <!-- Glowing blue powder visible -->
  <circle cx="24" cy="30" r="3" fill="#00ffff" opacity="0.8"/>
  <circle cx="40" cy="30" r="3" fill="#00ffff" opacity="0.8"/>
  <circle cx="32" cy="40" r="3" fill="#00ffff" opacity="0.8"/>
  <circle cx="24" cy="40" r="2" fill="#00ffff" opacity="0.8"/>
  <circle cx="40" cy="40" r="2" fill="#00ffff" opacity="0.8"/>
  
  <!-- Pouch texture/stitching -->
  <line x1="20" y1="24" x2="20" y2="48" stroke="#000000" stroke-width="1"/>
  <line x1="44" y1="24" x2="44" y2="48" stroke="#000000" stroke-width="1"/>
  <line x1="16" y1="32" x2="48" y2="32" stroke="#000000" stroke-width="1"/>
