  <rect width="64" height="64" fill="#001100"/>
  
  <!-- Phosphorus fertilizer pouch -->
  <!-- Pouch outline -->
  <path d="M16,20 Q24,8 32,20 Q40,8 48,20 Q56,20 56,44 Q48,52 32,52 Q16,52 16,20 Z" fill="#221100" stroke="#000000" stroke-width="1"/>
