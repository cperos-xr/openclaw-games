<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: moist, spore-filled -->
  <rect width="640" height="400" fill="#002222"/>
  
  <!-- Giant ferns crowding space -->
  <!-- Left ferns -->
  <path d="M50,50 Q100,0 150,50 Q200,0 250,50 Q300,0 350,50" fill="none" stroke="#004400" stroke-width="4"/>
  <path d="M70,80 Q120,30 170,80 Q220,30 270,80 Q320,30 370,80" fill="none" stroke="#004400" stroke-width="4"/>
  <!-- Right ferns -->
  <path d="M400,50 Q450,0 500,50 Q550,0 600,50" fill="none" stroke="#004400" stroke-width="4"/>
  <path d="M420,80 Q470,30 520,80 Q570,30 620,80" fill="none" stroke="#004400" stroke-width="4"/>
  
  <!-- Ancient gnarled tree (center) -->
  <!-- Tree trunk -->
  <path d="M300,100 Q310,50 320,100 Q330,150 320,200 Q310,250 300,300 Q290,350 300,400" fill="#332200" stroke="#000000" stroke-width="3"/>
  <!-- Tree bark texture/symbols -->
  <line x1="305" y1="150" x2="315" y2="150" stroke="#000000" stroke-width="1"/>
  <line x1="305" y1="180" x2="315" y2="180" stroke="#000000" stroke-width="1"/>
  <line x1="295" y1="210" x2="305" y2="210" stroke="#000000" stroke-width="1"/>
  <line x1="295" y1="240" x2="305" y2="240" stroke="#000000" stroke-width="1"/>
  <line x1="300" y1="270" x2="310" y2="270" stroke="#000000" stroke-width="1"/>
  <line x1="290" y1="300" x2="300" y2="300" stroke="#000000" stroke-width="1"/>
  
  <!-- Stone buttons at tree base -->
  <circle cx="280" cy="380" r="12" fill="#666666" stroke="#000000" stroke-width="2"/>
  <!-- Spiral glyph -->
  <path d="M280,370 Q275,365 275,360 Q280,355 285,355 Q290,360 290,365 Q285,370 280,370" fill="none" stroke="#000000" stroke-width="1"/>
  
  <circle cx="320" cy="380" r="12" fill="#666666" stroke="#000000" stroke-width="2"/>
  <!-- Triangle glyph -->
  <path d="M310,370 L330,370 L320,350 Z" fill="none" stroke="#000000" stroke-width="1"/>
  
  <circle cx="360" cy="380" r="12" fill="#666666" stroke="#000000" stroke-width="2"/>
  <!-- Crescent glyph -->
  <path d="M350,370 Q345,360 350,350 Q355,360 360,370" fill="none" stroke="#000000" stroke-width="1"/>
  
  <circle cx="280" cy="340" r="12" fill="#666666" stroke="#000000" stroke-width="2"/>
  <!-- Star glyph (simple) -->
  <path d="M275,335 L285,335 L282,325 L288,315 L278,320 L268,315 L274,325 Z" fill="none" stroke="#000000" stroke-width="1"/>
  
  <circle cx="360" cy="340" r="12" fill="#666666" stroke="#000000" stroke-width="2"/>
  <!-- Circle glyph -->
  <circle cx="360" cy="340" r="8" fill="none" stroke="#000000" stroke-width="2"/>
  
  <!-- Thick roots blocking north -->
  <path d="M200,50 Q250,0 300,50 Q350,0 400,50 Q450,0 500,50" fill="none" stroke="#332200" stroke-width="6"/>
  <path d="M210,80 Q260,30 310,80 Q360,30 410,80 Q460,30 510,80" fill="none" stroke="#332200" stroke-width="6"/>
  
  <!-- Pulsing effect on roots -->
  <circle cx="250" cy="30" r="20" fill="#006600" opacity="0.2"/>
  <circle cx="350" cy="30" r="20" fill="#006600" opacity="0.2"/>
  <circle cx="450" cy="30" r="20" fill="#006600" opacity="0.2"/>
  
  <!-- Ground -->
  <rect x="0" y="380" width="640" height="20" fill="#003300" stroke="#000000" stroke-width="2"/>
</svg>