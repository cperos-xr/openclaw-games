<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: dry, chalky -->
  <rect width="640" height="400" fill="#333300"/>
  
  <!-- Rows of cacti -->
  <!-- First row -->
  <rect x="50" y="50" width="30" height="100" fill="#005500" stroke="#000000" stroke-width="3"/>
  <rect x="120" y="30" width="25" height="130" fill="#005500" stroke="#000000" stroke-width="3"/>
  <rect x="200" y="50" width="30" height="100" fill="#005500" stroke="#000000" stroke-width="3"/>
  <rect x="280" y="20" width="25" height="150" fill="#005500" stroke="#000000" stroke-width="3"/>
  
  <!-- Second row -->
  <rect x="400" y="80" width="30" height="80" fill="#005500" stroke="#000000" stroke-width="3"/>
  <rect x="480" y="60" width="25" height="120" fill="#005500" stroke="#000000" stroke-width="3"/>
  <rect x="560" y="90" width="30" height="70" fill="#005500" stroke="#000000" stroke-width="3"/>
  
  <!-- Withered cactus (large, collapsed) -->
  <path d="M320,50 Q350,0 380,50 Q410,0 440,50 Q440,200 400,220 Q360,240 320,200 Q280,240 240,220 Q200,240 160,200 Q120,240 80,220 Q40,200 0,180 Q40,160 80,140 Q120,120 160,100 Q200,80 240,60 Q280,40 320,20" fill="#663300" stroke="#000000" stroke-width="3"/>
  <!-- Crack in withered cactus -->
  <line x1="380" y1="80" x2="380" y2="180" stroke="#000000" stroke-width="2"/>
  
  <!-- Stone bench -->
  <rect x="100" y="280" width="120" height="20" fill="#666666" stroke="#000000" stroke-width="2"/>
  <!-- Watering can on bench -->
  <rect x="140" y="250" width="20" height="40" fill="#664400" stroke="#000000" stroke-width="2"/>
  <rect x="135" y="245" width="30" height="10" fill="#664400" stroke="#000000" stroke-width="2"/>
  
  <!-- Eastern wooden door -->
  <rect x="550" y="150" width="60" height="180" fill="#442200" stroke="#000000" stroke-width="3"/>
  <!-- Door frame -->
  <rect x="545" y="145" width="70" height="190" fill="none" stroke="#000000" stroke-width="3"/>
  <!-- Iron fittings (rusted) -->
  <circle cx="580" cy="200" r="8" fill="#663300"/>
  <circle cx="580" cy="250" r="8" fill="#663300"/>
  
  <!-- Ground -->
  <rect x="0" y="350" width="640" height="50" fill="#222200" stroke="#000000" stroke-width="2"/>
  <!-- Chalky texture -->
  <rect x="0" y="350" width="640" height="10" fill="#444400" opacity="0.3"/>
</svg>