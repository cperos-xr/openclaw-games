<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0a1a2a"/>
  <!-- underwater cavern -->
  <rect x="0" y="0" width="640" height="250" fill="#1a2a3a"/>
  <rect x="0" y="250" width="640" height="150" fill="#0d1a2a"/>
  <!-- stalactites -->
  <g fill="#2a3a4a">
    <polygon points="100,0 110,80 120,0"/>
    <polygon points="300,0 315,100 330,0"/>
    <polygon points="500,0 515,80 530,0"/>
  </g>
  <!-- railing with fish motifs -->
  <g transform="translate(200,200)" stroke="#d4af37" stroke-width="2">
    <line x1="0" y1="0" x2="200" y2="0"/>
    <circle cx="50" cy="0" r="5"/>
    <circle cx="100" cy="0" r="5"/>
    <circle cx="150" cy="0" r="5"/>
  </g>
  <!-- crystal lantern on rock -->
  <g transform="translate(150,250)">
    <rect x="0" y="0" width="20" height="20" fill="#4a5a7a" stroke="#0f0" stroke-width="2"/>
    <ellipse cx="10" cy="10" rx="5" ry="3" fill="#0ff"/>
  </g>
  <!-- exits -->
  <rect x="400" y="150" width="100" height="80" fill="#1a2a3a" stroke="#0f0" stroke-width="4"/>
  <text x="450" y="195" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">CHOIR</text>
  <rect x="200" y="300" width="80" height="60" fill="#0d1a2a" stroke="#0f0" stroke-width="4"/>
  <text x="240" y="335" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">DEPTHS</text>
</svg>
