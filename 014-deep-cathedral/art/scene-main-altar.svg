<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0a1a2a"/>
  <!-- dome with glowing plankton -->
  <ellipse cx="320" cy="120" rx="200" ry="80" fill="#1a3a2a" stroke="#0f0" stroke-width="2"/>
  <g opacity="0.7">
    <circle cx="300" cy="100" r="5" fill="#ff0"/>
    <circle cx="340" cy="110" r="3" fill="#0ff"/>
    <circle cx="320" cy="130" r="4" fill="#ff0"/>
  </g>
  <!-- altar -->
  <g transform="translate(260,220)">
    <rect x="0" y="0" width="120" height="60" fill="#2a3a4a" stroke="#d4af37" stroke-width="4"/>
    <!-- keystone in compartment -->
    <g transform="translate(40,20)">
      <rect x="0" y="0" width="40" height="20" fill="#3a4a5a" stroke="#d4af37" stroke-width="2"/>
      <text x="20" y="12" font-family="monospace" font-size="6" fill="#d4af37" text-anchor="middle">KEY</text>
    </g>
    <!-- sacred charm floating -->
    <g transform="translate(70,10)">
      <ellipse cx="10" cy="10" rx="8" ry="6" fill="#ffd700" stroke="#0f0" stroke-width="1"/>
    </g>
  </g>
  <!-- mosaics on walls -->
  <g fill="#4a5a6a">
    <polygon points="100,200 120,250 140,200"/>
    <polygon points="500,200 520,250 540,200"/>
  </g>
  <!-- exits -->
  <rect x="200" y="320" width="80" height="60" fill="#0a1a2a" stroke="#0f0" stroke-width="4"/>
  <text x="240" y="355" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">SACR</text>
  <rect x="300" y="320" width="80" height="60" fill="#0a1a2a" stroke="#0f0" stroke-width="4"/>
  <text x="340" y="355" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">DEPTHS</text>
</svg>
