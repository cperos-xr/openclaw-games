<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0a1a2a"/>
  <!-- night sky -->
  <rect x="0" y="0" width="640" height="200" fill="#000"/>
  <!-- stars -->
  <g fill="#fff">
    <circle cx="100" cy="50" r="2"/>
    <circle cx="200" cy="80" r="1.5"/>
    <circle cx="300" cy="30" r="2"/>
    <circle cx="400" cy="70" r="1"/>
    <circle cx="500" cy="40" r="2"/>
    <circle cx="600" cy="90" r="1.5"/>
  </g>
  <!-- ocean surface -->
  <rect x="0" y="200" width="640" height="200" fill="#0a1a2a"/>
  <!-- waves -->
  <g fill="#1a2a3a">
    <path d="M0,220 Q100,200 200,220 T400,220 T600,220 T800,220" stroke="#0f0" stroke-width="2" fill="none"/>
  </g>
  <!-- cathedral sinking -->
  <g transform="translate(400,250)">
    <polygon points="0,80 40,0 80,80" fill="#2a3a4a"/>
  </g>
</svg>
