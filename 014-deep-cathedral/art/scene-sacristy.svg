<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
<rect width="640" height="400" fill="#08080f"/>
<!-- Sacristy - side room, smaller and more intimate -->
<rect x="80" y="40" width="480" height="360" fill="#0e0c16" rx="4"/>
<!-- Stone arch doorway on left -->
<path d="M60 180 Q60 120 80 120 L100 120 Q120 120 120 180 L120 400 L60 400Z" fill="#06060c"/>
<!-- Wooden cabinet / vestry locker -->
<rect x="160" y="120" width="140" height="200" fill="#1a1510" rx="4"/>
<rect x="170" y="130" width="120" height="90" fill="#1e1814" rx="2"/>
<rect x="170" y="225" width="120" height="90" fill="#1e1814" rx="2"/>
<!-- Brass handles on cabinet -->
<circle cx="230" cy="175" r="3" fill="#cc8833" opacity="0.6"/>
<circle cx="230" cy="270" r="3" fill="#cc8833" opacity="0.6"/>
<!-- Religious vestments hanging -->
<rect x="340" y="100" width="40" height="80" fill="#442233" rx="4"/>
<rect x="390" y="100" width="40" height="80" fill="#223344" rx="4"/>
<!-- Hook on wall -->
<line x1="360" y1="95" x2="360" y2="100" stroke="#333344" stroke-width="2"/>
<line x1="410" y1="95" x2="410" y2="100" stroke="#333344" stroke-width="2"/>
<!-- Stone basin / font -->
<rect x="440" y="280" width="80" height="40" fill="#1a1530" rx="4"/>
<ellipse cx="480" cy="280" rx="35" ry="8" fill="#121020"/>
<!-- Water shimmer in basin -->
<ellipse cx="480" cy="279" rx="30" ry="5" fill="#1a2535" opacity="0.5"/>
<!-- Stone floor -->
<rect x="80" y="360" width="480" height="40" fill="#0c0a14"/>
<line x1="80" y1="375" x2="560" y2="375" stroke="#121018" stroke-width="1"/>
<!-- Small window high on wall -->
<rect x="280" y="50" width="40" height="50" fill="#0a0a16" rx="20"/>
<rect x="285" y="55" width="30" height="40" fill="#151028" rx="15"/>
<!-- Candlelight -->
<circle cx="500" cy="150" r="6" fill="#cc8833" opacity="0.7"/>
<circle cx="500" cy="150" r="3" fill="#ffaa55"/>
</svg>