<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0a1a2a"/>
  <!-- dais -->
  <rect x="200" y="150" width="240" height="100" fill="#2a3a4a" stroke="#d4af37" stroke-width="4"/>
  <!-- Abbot's chair -->
  <g transform="translate(300,170)">
    <rect x="0" y="0" width="40" height="50" fill="#1a2a3a" stroke="#d4af37" stroke-width="2"/>
    <circle cx="20" cy="15" r="8" fill="#d4af37"/>
  </g>
  <!-- large bell above -->
  <g transform="translate(310,80)">
    <ellipse cx="15" cy="20" rx="20" ry="15" fill="#bc8f8f" stroke="#d4af37" stroke-width="3"/>
    <text x="15" y="25" font-family="monospace" font-size="8" fill="#d4af37" text-anchor="middle">BELL</text>
  </g>
  <!-- glow in bell crack -->
  <circle cx="305" cy="85" r="3" fill="#f00"/>
  <!-- east rune door -->
  <rect x="500" y="200" width="80" height="100" fill="#1a2a3a" stroke="#0f0" stroke-width="4"/>
  <text x="540" y="250" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">RUNES</text>
  <!-- exits -->
  <rect x="260" y="320" width="80" height="60" fill="#0a1a2a" stroke="#0f0" stroke-width="4"/>
  <text x="300" y="355" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">CHOIR</text>
  <rect x="100" y="200" width="80" height="60" fill="#0a1a2a" stroke="#0f0" stroke-width="4"/>
  <text x="140" y="235" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">SACRISTY</text>
</svg>
