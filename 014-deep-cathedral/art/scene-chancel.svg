<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
<rect width="640" height="400" fill="#08080c"/>
<!-- Choir area - apse semicircle background -->
<path d="M160 200 Q320 80 480 200 L480 400 L160 400Z" fill="#0e0c18"/>
<!-- Stone floor -->
<rect x="0" y="340" width="640" height="60" fill="#0c0a14"/>
<!-- Steps ascending to altar area -->
<rect x="200" y="300" width="240" height="40" fill="#12101a"/>
<rect x="220" y="260" width="200" height="40" fill="#14121c"/>
<!-- Central stone altar -->
<rect x="260" y="200" width="120" height="60" fill="#1a1828" rx="4"/>
<rect x="270" y="190" width="100" height="15" fill="#1c1a30" rx="2"/>
<!-- Cross on wall behind altar -->
<rect x="315" y="100" width="10" height="60" fill="#1a1520"/>
<rect x="295" y="115" width="50" height="10" fill="#1a1520"/>
<!-- Rows of empty choir benches -->
<rect x="160" y="240" width="100" height="15" fill="#15131e" rx="2"/>
<rect x="380" y="240" width="100" height="15" fill="#15131e" rx="2"/>
<rect x="140" y="270" width="120" height="15" fill="#15131e" rx="2"/>
<rect x="380" y="270" width="120" height="15" fill="#15131e" rx="2"/>
<!-- Candles on altar -->
<rect x="275" y="175" width="4" height="15" fill="#ddd8c0"/>
<circle cx="277" cy="174" r="4" fill="#ffaa44" opacity="0.8"/>
<rect x="360" y="175" width="4" height="15" fill="#ddd8c0"/>
<circle cx="362" cy="174" r="4" fill="#ffaa44" opacity="0.8"/>
<!-- Candelabra on floor left -->
<rect x="170" y="200" width="3" height="100" fill="#222233"/>
<rect x="155" y="205" width="15" height="3" fill="#222233"/>
<circle cx="155" cy="203" r="3" fill="#ffaa44" opacity="0.6"/>
<circle cx="172" cy="200" r="3" fill="#ffaa44" opacity="0.8"/>
<!-- Candelabra on floor right -->
<rect x="467" y="200" width="3" height="100" fill="#222233"/>
<rect x="467" y="205" width="15" height="3" fill="#222233"/>
<circle cx="467" cy="203" r="3" fill="#ffaa44" opacity="0.8"/>
<circle cx="482" cy="200" r="3" fill="#ffaa44" opacity="0.6"/>
<!-- Deep shadow above -->
<path d="M160 200 Q320 80 480 200" fill="none" stroke="#0a0a14" stroke-width="2"/>
</svg>