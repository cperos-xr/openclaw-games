<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <pattern id="stone-block" width="30" height="15" patternUnits="userSpaceOnUse">
      <rect width="30" height="15" fill="#1a1a1a"/>
      <rect x="1" y="1" width="28" height="13" fill="#222" stroke="#000" stroke-width="0.5"/>
    </pattern>
  </defs>
  
  <!-- Layer 1: Background - circular chamber walls -->
  <rect width="640" height="400" fill="#0a0a0a"/>
  <!-- Curved walls suggestion -->
  <rect x="0" y="0" width="640" height="340" fill="#111111"/>
  <path d="M 0 0 Q 320 40 640 0 L 640 340 Q 320 300 0 340 Z" fill="#151515" opacity="0.6"/>
  
  <!-- Layer 2: Floor -->
  <rect x="0" y="340" width="640" height="60" fill="#1a1a1a"/>
  <ellipse cx="320" cy="350" rx="200" ry="30" fill="#222" opacity="0.5"/>
  
  <!-- Layer 3: Six sarcophagi set into walls -->
  <!-- Sarcophagus 1 (top left) -->
  <rect x="30" y="40" width="120" height="45" fill="#222" stroke="#444" stroke-width="3" rx="5"/>
  <rect x="35" y="45" width="110" height="35" fill="#000" stroke="#333" stroke-width="1"/>
  <!-- Scratch marks inside -->
  <line x1="45" y1="50" x2="55" y2="70" stroke="#333" stroke-width="1.5"/>
  <line x1="55" y1="50" x2="60" y2="65" stroke="#333" stroke-width="1.5"/>
  <line x1="65" y1="52" x2="70" y2="72" stroke="#333" stroke-width="1.5"/>
  <line x1="75" y1="50" x2="78" y2="68" stroke="#333" stroke-width="1.5"/>
  
  <!-- Sarcophagus 2 (top right) -->
  <rect x="490" y="40" width="120" height="45" fill="#222" stroke="#444" stroke-width="3" rx="5"/>
  <rect x="495" y="45" width="110" height="35" fill="#000" stroke="#333" stroke-width="1"/>
  <line x1="505" y1="50" x2="515" y2="70" stroke="#333" stroke-width="1.5"/>
  <line x1="520" y1="48" x2="525" y2="68" stroke="#333" stroke-width="1.5"/>
  <line x1="530" y1="52" x2="538" y2="72" stroke="#333" stroke-width="1.5"/>
  <line x1="545" y1="50" x2="550" y2="70" stroke="#333" stroke-width="1.5"/>
  
  <!-- Sarcophagus 3 (mid left) -->
  <rect x="30" y="150" width="120" height="45" fill="#222" stroke="#444" stroke-width="3" rx="5"/>
  <rect x="35" y="155" width="110" height="35" fill="#000" stroke="#333" stroke-width="1"/>
  <line x1="45" y1="160" x2="55" y2="180" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="158" x2="65" y2="178" stroke="#333" stroke-width="1.5"/>
  <line x1="70" y1="162" x2="78" y2="182" stroke="#333" stroke-width="1.5"/>
  <line x1="85" y1="160" x2="90" y2="180" stroke="#333" stroke-width="1.5"/>
  
  <!-- Sarcophagus 4 (mid right) -->
  <rect x="490" y="150" width="120" height="45" fill="#222" stroke="#444" stroke-width="3" rx="5"/>
  <rect x="495" y="155" width="110" height="35" fill="#000" stroke="#333" stroke-width="1"/>
  <line x1="505" y1="160" x2="515" y2="180" stroke="#333" stroke-width="1.5"/>
  <line x1="520" y1="158" x2="528" y2="178" stroke="#333" stroke-width="1.5"/>
  <line x1="535" y1="162" x2="540" y2="182" stroke="#333" stroke-width="1.5"/>
  <line x1="550" y1="160" x2="558" y2="180" stroke="#333" stroke-width="1.5"/>
  
  <!-- Sarcophagus 5 (bottom left) -->
  <rect x="30" y="260" width="120" height="45" fill="#222" stroke="#444" stroke-width="3" rx="5"/>
  <rect x="35" y="265" width="110" height="35" fill="#000" stroke="#333" stroke-width="1"/>
  <line x1="45" y1="270" x2="55" y2="290" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="268" x2="68" y2="288" stroke="#333" stroke-width="1.5"/>
  <line x1="75" y1="272" x2="80" y2="292" stroke="#333" stroke-width="1.5"/>
  <line x1="90" y1="270" x2="95" y2="290" stroke="#333" stroke-width="1.5"/>
  
  <!-- Sarcophagus 6 (bottom right) -->
  <rect x="490" y="260" width="120" height="45" fill="#222" stroke="#444" stroke-width="3" rx="5"/>
  <rect x="495" y="265" width="110" height="35" fill="#000" stroke="#333" stroke-width="1"/>
  <line x1="505" y1="270" x2="515" y2="290" stroke="#333" stroke-width="1.5"/>
  <line x1="520" y1="268" x2="528" y2="288" stroke="#333" stroke-width="1.5"/>
  <line x1="535" y1="272" x2="545" y2="292" stroke="#333" stroke-width="1.5"/>
  <line x1="555" y1="270" x2="560" y2="290" stroke="#333" stroke-width="1.5"/>
  
  <!-- Layer 4: Stone altar (center) -->
  <rect x="250" y="280" width="140" height="60" fill="#222222" stroke="#444" stroke-width="3" rx="3"/>
  <rect x="260" y="275" width="120" height="10" fill="#2a2a2a" stroke="#444" stroke-width="2" rx="2"/>
  <!-- Recessed slot for glyph tablet -->
  <rect x="295" y="270" width="50" height="8" fill="#111" stroke="#333" stroke-width="2" rx="1"/>
  <!-- Three symbols carved around edge -->
  <!-- Raven symbol -->
  <circle cx="265" cy="255" r="8" fill="#333" stroke="#555" stroke-width="1.5"/>
  <ellipse cx="265" cy="254" rx="5" ry="3" fill="#222"/>
  <!-- Serpent symbol -->
  <path d="M 315 250 Q 325 255 315 260 Q 305 255 315 250" fill="#333" stroke="#555" stroke-width="1.5"/>
  <!-- Skull symbol -->
  <circle cx="375" cy="255" r="8" fill="#333" stroke="#555" stroke-width="1.5"/>
  <circle cx="372" cy="253" r="2" fill="#111"/>
  <circle cx="378" cy="253" r="2" fill="#111"/>
  <rect x="374" y="256" width="2" height="4" fill="#111"/>
  
  <!-- Layer 5: Glyph tablet on altar (interactive item) -->
  <rect x="297" y="268" width="46" height="6" fill="#444" stroke="#666" stroke-width="1" rx="1"/>
  <!-- Three glyphs on tablet -->
  <circle cx="310" cy="271" r="2" fill="#000088"/>
  <path d="M 318 269 Q 321 271 318 273" fill="none" stroke="#000088" stroke-width="1"/>
  <circle cx="330" cy="271" r="2" fill="#000088"/>
  <!-- Slight glow/vibration -->
  <rect x="295" y="266" width="50" height="10" fill="#0000FF" opacity="0.05"/>
  
  <!-- Layer 6: Northern door (massive, sealed) -->
  <rect x="240" y="50" width="160" height="180" fill="#111" stroke="#444" stroke-width="4"/>
  <!-- Three symbols on door -->
  <!-- Raven -->
  <circle cx="300" cy="100" r="15" fill="#222" stroke="#555" stroke-width="2"/>
  <path d="M 292 98 L 300 92 L 308 98 L 300 108 Z" fill="#333"/>
  <ellipse cx="300" cy="102" rx="8" ry="5" fill="#222"/>
  <!-- Serpent -->
  <circle cx="320" cy="135" r="15" fill="#222" stroke="#555" stroke-width="2"/>
  <path d="M 310 130 Q 315 140 320 130 Q 325 140 330 130" fill="none" stroke="#444" stroke-width="2"/>
  <!-- Skull -->
  <circle cx="340" cy="170" r="15" fill="#222" stroke="#555" stroke-width="2"/>
  <circle cx="336" cy="168" r="3" fill="#111"/>
  <circle cx="344" cy="168" r="3" fill="#111"/>
  <rect x="338" y="172" width="4" height="6" fill="#111"/>
  <!-- Slot beneath symbols -->
  <rect x="295" y="200" width="50" height="10" fill="#111" stroke="#333" stroke-width="2" rx="2"/>
  
  <!-- Layer 7: Frigid atmosphere - visible breath -->
  <ellipse cx="200" cy="320" rx="30" ry="10" fill="#AAAAAA" opacity="0.15"/>
  <ellipse cx="220" cy="315" rx="20" ry="8" fill="#AAAAAA" opacity="0.1"/>
  <ellipse cx="440" cy="320" rx="30" ry="10" fill="#AAAAAA" opacity="0.15"/>
  
  <!-- Layer 8: Cold blue ambient tone -->
  <rect x="0" y="0" width="640" height="400" fill="#000088" opacity="0.08"/>
  
  <!-- Shadow pools on floor -->
  <ellipse cx="160" cy="375" rx="70" ry="15" fill="#000000" opacity="0.5"/>
  <ellipse cx="480" cy="375" rx="70" ry="15" fill="#000000" opacity="0.5"/>
</svg>
