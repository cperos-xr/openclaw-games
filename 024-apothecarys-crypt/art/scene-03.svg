  <!-- Displaced from wall - shows gap behind -->
  <rect x="0" y="20" width="10" height="280" fill="#000000"/>
  <!-- Books on shelves -->
  <!-- Black book (raven) -->
  <rect x="15" y="35" width="12" height="40" fill="#000000" stroke="#333" stroke-width="1"/>
  <rect x="28" y="35" width="8" height="40" fill="#1a0d00"/>
  <rect x="37" y="35" width="10" height="40" fill="#222222"/>
