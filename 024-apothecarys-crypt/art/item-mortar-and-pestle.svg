<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Mortar (bowl) -->
  <ellipse cx="28" cy="40" rx="20" ry="10" fill="#333333" stroke="#555" stroke-width="2"/>
  <ellipse cx="28" cy="38" rx="18" ry="8" fill="#444444"/>
  <ellipse cx="28" cy="36" rx="18" ry="5" fill="#555555" opacity="0.3"/>
  <!-- Basin inside -->
  <ellipse cx="28" cy="36" rx="14" ry="6" fill="#3a3a3a"/>
  
  <!-- Pestle (grinding tool) -->
  <rect x="40" y="18" width="6" height="18" fill="#333333" stroke="#555" stroke-width="1"/>
  <!-- Pestle handle -->
  <ellipse cx="43" cy="16" rx="5" ry="6" fill="#444444" stroke="#555" stroke-width="1"/>
  <!-- Pestle bottom -->
  <ellipse cx="43" cy="36" rx="4" ry="3" fill="#444444"/>
  
  <!-- Residue stains (bitter almond smell indicator) -->
  <rect x="22" y="34" width="6" height="3" fill="#CC5500" opacity="0.4"/>
  <rect x="32" y="33" width="5" height="2" fill="#CC5500" opacity="0.3"/>
  <rect x="25" y="32" width="4" height="2" fill="#CC5500" opacity="0.35"/>
  
  <!-- Rim highlights -->
  <ellipse cx="28" cy="40" rx="20" ry="10" fill="none" stroke="#666" stroke-width="1" opacity="0.5"/>
  
  <!-- Shadow base -->
  <ellipse cx="30" cy="50" rx="18" ry="5" fill="#000000" opacity="0.25"/>
</svg>
