<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <pattern id="wood" width="80" height="20" patternUnits="userSpaceOnUse">
      <rect width="80" height="20" fill="#1a0d00"/>
      <line x1="0" y1="0" x2="80" y2="0" stroke="#0d0600" stroke-width="1"/>
      <rect x="5" y="2" width="70" height="16" fill="#1f1200" opacity="0.8"/>
    </pattern>
    <pattern id="checker" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="2" height="2" fill="#000000"/>
      <rect x="2" y="2" width="2" height="2" fill="#000000"/>
    </pattern>
  </defs>
  
  <!-- Layer 1: Chamber background - stone walls -->
  <rect width="640" height="400" fill="#111111"/>
  <rect x="0" y="0" width="640" height="320" fill="#1a1a1a"/>
  <rect x="0" y="320" width="640" height="80" fill="#1a0d00"/>
  
  <!-- Layer 2: Copper embalming slab (center) -->
  <rect x="160" y="260" width="320" height="40" fill="#665533" stroke="#333" stroke-width="3" rx="3"/>
  <rect x="170" y="265" width="300" height="30" fill="#776644" rx="2"/>
  <!-- Drain channels -->
  <line x1="180" y1="295" x2="320" y2="295" stroke="#444" stroke-width="2"/>
  <line x1="460" y1="295" x2="320" y2="295" stroke="#444" stroke-width="2"/>
  <!-- Central pipe -->
  <circle cx="320" cy="295" r="5" fill="#333"/>
  <!-- Brown stains -->
  <rect x="200" y="270" width="40" height="15" fill="#331100" opacity="0.6"/>
  <rect x="350" y="268" width="50" height="18" fill="#331100" opacity="0.5"/>
  <rect x="280" y="272" width="30" height="12" fill="#331100" opacity="0.4"/>
  
  <!-- Layer 3: Surgical tools on wall hooks -->
  <line x1="50" y1="140" x2="590" y2="140" stroke="#555" stroke-width="2"/>
  <!-- Scalpel hook 1 -->
  <circle cx="80" cy="140" r="3" fill="#FF8800"/>
  <line x1="80" y1="143" x2="80" y2="170" stroke="#AAA" stroke-width="2"/>
  <polygon points="75,170 85,170 80,185" fill="#AAA"/>
  <rect x="70" y="150" width="20" height="8" fill="#333" opacity="0.8" rx="1"/>
  <!-- Forceps hook 2 -->
  <circle cx="150" cy="140" r="3" fill="#FF8800"/>
  <line x1="145" y1="143" x2="145" y2="175" stroke="#AAA" stroke-width="2"/>
  <line x1="155" y1="143" x2="155" y2="175" stroke="#AAA" stroke-width="2"/>
  <line x1="145" y1="173" x2="155" y2="173" stroke="#AAA" stroke-width="2"/>
  <rect x="140" y="150" width="20" height="8" fill="#333" opacity="0.8" rx="1"/>
  <!-- Bone saw hook 3 -->
  <circle cx="220" cy="140" r="3" fill="#FF8800"/>
  <line x1="220" y1="143" x2="220" y2="172" stroke="#AAA" stroke-width="2"/>
  <rect x="210" y="172" width="20" height="6" fill="#AAA"/>
  <circle cx="215" cy="171" r="2" fill="#999"/>
  <circle cx="225" cy="171" r="2" fill="#999"/>
  <rect x="210" y="150" width="20" height="8" fill="#333" opacity="0.8" rx="1"/>
  <!-- More tools -->
  <circle cx="300" cy="140" r="3" fill="#FF8800"/>
  <line x1="300" y1="143" x2="300" y2="170" stroke="#AAA" stroke-width="2"/>
  <polygon points="295,170 305,170 300,185" fill="#AAA"/>
  <rect x="290" y="150" width="20" height="8" fill="#333" opacity="0.8" rx="1"/>
  <circle cx="380" cy="140" r="3" fill="#FF8800"/>
  <line x1="378" y1="143" x2="378" y2="175" stroke="#AAA" stroke-width="1.5"/>
  <line x1="382" y1="143" x2="382" y2="175" stroke="#AAA" stroke-width="1.5"/>
  <line x1="378" y1="173" x2="382" y2="173" stroke="#AAA" stroke-width="1.5"/>
  <rect x="370" y="150" width="20" height="8" fill="#333" opacity="0.8" rx="1"/>
  
  <!-- Layer 4: Chained door (south) -->
  <rect x="270" y="340" width="100" height="60" fill="#000" stroke="#555" stroke-width="3"/>
  <!-- Chains -->
  <line x1="275" y1="350" x2="275" y2="390" stroke="#665544" stroke-width="4"/>
  <line x1="365" y1="350" x2="365" y2="390" stroke="#665544" stroke-width="4"/>
  <line x1="280" y1="355" x2="360" y2="355" stroke="#665544" stroke-width="3"/>
  <line x1="280" y1="370" x2="360" y2="370" stroke="#665544" stroke-width="3"/>
  <line x1="280" y1="385" x2="360" y2="385" stroke="#665544" stroke-width="3"/>
  <!-- Rusted through sections -->
  <rect x="278" y="365" width="4" height="8" fill="#CC5500" opacity="0.7"/>
  <rect x="355" y="375" width="5" height="10" fill="#CC5500" opacity="0.6"/>
  
  <!-- Layer 5: Side table with bone crowbar -->
  <rect x="480" y="270" width="80" height="30" fill="#1a0d00" stroke="#333" stroke-width="2"/>
  <rect x="485" y="300" width="70" height="20" fill="url(#wood)"/>
  <!-- Tray -->
  <rect x="490" y="265" width="60" height="8" fill="#666" stroke="#444" stroke-width="1" rx="1"/>
  <!-- Bone crowbar on tray -->
  <rect x="495" y="258" width="50" height="3" fill="#f0f0f0" stroke="#CCC" stroke-width="1" rx="1"/>
  <rect x="493" y="259" width="8" height="5" fill="#f0f0f0" stroke="#CCC" stroke-width="1" rx="1"/>
  <!-- Dark stain at tip -->
  <rect x="538" y="258" width="8" height="3" fill="#331100" opacity="0.7"/>
  
  <!-- Layer 6: Ledger on side table -->
  <rect x="50" y="310" width="60" height="40" fill="#d4c5a0" stroke="#333" stroke-width="1"/>
  <line x1="55" y1="320" x2="105" y2="320" stroke="#333" stroke-width="0.5"/>
  <line x1="55" y1="325" x2="100" y2="325" stroke="#333" stroke-width="0.5"/>
  <line x1="55" y1="330" x2="95" y2="330" stroke="#333" stroke-width="0.5"/>
  <line x1="55" y1="335" x2="90" y2="335" stroke="#333" stroke-width="0.5"/>
  <line x1="55" y1="340" x2="85" y2="340" stroke="#333" stroke-width="0.5"/>
  
  <!-- Layer 7: Candles (flickering, tallow smell) -->
  <rect x="110" y="175" width="6" height="25" fill="#f0e0c0"/>
  <ellipse cx="113" cy="173" rx="3" ry="5" fill="#FF8800"/>
  <ellipse cx="113" cy="174" rx="2" ry="3" fill="#FFFF00"/>
  <!-- Candle glow -->
  <ellipse cx="113" cy="180" rx="20" ry="30" fill="#FF8800" opacity="0.08"/>
  
  <rect x="500" y="175" width="6" height="25" fill="#f0e0c0"/>
  <ellipse cx="503" cy="173" rx="3" ry="5" fill="#FF8800"/>
  <ellipse cx="503" cy="174" rx="2" ry="3" fill="#FFFF00"/>
  <ellipse cx="503" cy="180" rx="20" ry="30" fill="#FF8800" opacity="0.08"/>
  
  <!-- Layer 8: Atmospheric shadows -->
  <ellipse cx="320" cy="355" rx="100" ry="25" fill="#000000" opacity="0.5"/>
  <ellipse cx="160" cy="310" rx="50" ry="15" fill="#000000" opacity="0.4"/>
  <ellipse cx="480" cy="310" rx="50" ry="15" fill="#000000" opacity="0.4"/>
</svg>
