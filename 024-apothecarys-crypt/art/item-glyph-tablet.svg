<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Stone tablet (flat, rectangular) -->
  <rect x="8" y="16" width="48" height="32" fill="#555555" stroke="#777" stroke-width="2" rx="2"/>
  
  <!-- Stone texture -->
  <rect x="12" y="20" width="8" height="4" fill="#666" opacity="0.4"/>
  <rect x="28" y="22" width="10" height="3" fill="#666" opacity="0.3"/>
  <rect x="14" y="32" width="6" height="4" fill="#666" opacity="0.35"/>
  <rect x="40" y="30" width="8" height="4" fill="#666" opacity="0.3"/>
  <rect x="22" y="40" width="9" height="3" fill="#666" opacity="0.4"/>
  
  <!-- Three glyphs carved into tablet -->
  
  <!-- Glyph 1: Raven (top left) -->
  <circle cx="20" cy="28" r="6" fill="#000088" opacity="0.8" stroke="#0000AA" stroke-width="1"/>
  <path d="M 16 26 L 20 23 L 24 26 L 20 33 Z" fill="#000066"/>
  <ellipse cx="20" cy="29" rx="4" ry="2" fill="#000088"/>
  
  <!-- Glyph 2: Serpent (center) -->
  <circle cx="32" cy="28" r="6" fill="#006600" opacity="0.8" stroke="#008800" stroke-width="1"/>
  <path d="M 27 26 Q 30 31 32 26 Q 34 31 37 26" fill="none" stroke="#004400" stroke-width="2"/>
  
  <!-- Glyph 3: Skull (top right) -->
  <circle cx="44" cy="28" r="6" fill="#666666" opacity="0.8" stroke="#888888" stroke-width="1"/>
  <circle cx="42" cy="26" r="1.5" fill="#333"/>
  <circle cx="46" cy="26" r="1.5" fill="#333"/>
  <rect x="43" y="28" width="2" height="4" fill="#333"/>
  
  <!-- Indecipherable symbols at bottom -->
  <path d="M 14 38 Q 17 36 20 38 Q 17 40 14 38" fill="#000088" opacity="0.6"/>
  <rect x="24" y="36" width="8" height="4" fill="#006600" opacity="0.6" rx="1"/>
  <circle cx="40" cy="38" r="3" fill="#666" opacity="0.6"/>
  <path d="M 46 36 L 50 36 L 48 40 Z" fill="#AA00FF" opacity="0.6"/>
  
  <!-- Faint vibration glow -->
  <rect x="6" y="14" width="52" height="36" fill="#0000FF" opacity="0.04"/>
  
  <!-- Shadow -->
  <ellipse cx="32" cy="54" rx="24" ry="5" fill="#000000" opacity="0.25"/>
</svg>
