<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Glass jar body -->
  <rect x="18" y="18" width="28" height="32" fill="#444444" stroke="#666" stroke-width="1.5" rx="3"/>
  <rect x="20" y="20" width="24" height="28" fill="#555555" opacity="0.6"/>
  
  <!-- Cloudy fluid inside -->
  <ellipse cx="32" cy="40" rx="12" ry="12" fill="#889888" opacity="0.4"/>
  
  <!-- Suspended object (something inside) -->
  <ellipse cx="32" cy="38" rx="8" ry="6" fill="#667766" opacity="0.5"/>
  <circle cx="30" cy="36" r="2" fill="#556655" opacity="0.6"/>
  <circle cx="34" cy="40" r="1.5" fill="#556655" opacity="0.6"/>
  
  <!-- Jar neck -->
  <rect x="25" y="12" width="14" height="8" fill="#666666" stroke="#777" stroke-width="1"/>
  
  <!-- Sealing wax stopper -->
  <ellipse cx="32" cy="12" rx="10" ry="4" fill="#CC5500" stroke="#AA4400" stroke-width="1.5"/>
  <ellipse cx="32" cy="10" rx="8" ry="3" fill="#DD6600"/>
  <ellipse cx="32" cy="9" rx="6" ry="2" fill="#EE7700" opacity="0.7"/>
  
  <!-- Label: A. Vane -->
  <rect x="22" y="44" width="20" height="8" fill="#d4c5a0" stroke="#333" stroke-width="0.5"/>
  <line x1="24" y1="47" x2="40" y2="47" stroke="#333" stroke-width="0.8"/>
  <line x1="26" y1="49" x2="38" y2="49" stroke="#333" stroke-width="0.8"/>
  
  <!-- Jar rim highlight -->
  <ellipse cx="32" cy="18" rx="14" ry="2" fill="#888" opacity="0.3"/>
  
  <!-- Subtle movement glow -->
  <ellipse cx="32" cy="38" rx="10" ry="10" fill="#AAAAAA" opacity="0.1"/>
  
  <!-- Shadow -->
  <ellipse cx="32" cy="55" rx="16" ry="4" fill="#000000" opacity="0.25"/>
</svg>
