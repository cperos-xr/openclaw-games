<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <pattern id="fresco-frame" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#1a1a1a"/>
      <rect x="0" y="0" width="3" height="3" fill="#222"/>
      <line x1="0" y1="2" x2="4" y2="2" stroke="#111" stroke-width="0.5"/>
    </pattern>
  </defs>
  
  <!-- Layer 1: Background - domed chamber with oculus -->
  <rect width="640" height="400" fill="#0a0a0a"/>
  
  <!-- Layer 2: Domed ceiling -->
  <ellipse cx="320" cy="0" rx="320" ry="180" fill="#000088" opacity="0.15"/>
  <!-- High oculus (opening) - moonlight source -->
  <ellipse cx="320" cy="30" rx="30" ry="20" fill="#AAAAAA" opacity="0.4"/>
  <ellipse cx="320" cy="30" rx="25" ry="16" fill="#CCCCCC" opacity="0.3"/>
  
  <!-- Layer 3: Moonlight beam through oculus -->
  <path d="M 300 45 L 280 400 L 360 400 L 340 45 Z" fill="#AAAAAA" opacity="0.06"/>
  <path d="M 305 45 L 290 400 L 350 400 L 335 45 Z" fill="#CCCCCC" opacity="0.04"/>
  
  <!-- Layer 4: Chamber walls with frescoes -->
  <rect x="0" y="0" width="640" height="400" fill="url(#fresco-frame)" opacity="0.3"/>
  
  <!-- Fresco frames on walls -->
  <!-- Fresco 1 - experiment 1 -->
  <rect x="30" y="60" width="120" height="100" fill="#1a1a1a" stroke="#555" stroke-width="3"/>
  <rect x="35" y="65" width="110" height="90" fill="#222222"/>
  <!-- Fresco painting - preserved body figure -->
  <rect x="60" y="80" width="20" height="40" fill="#665544"/>
  <circle cx="70" cy="72" r="8" fill="#998877"/>
  <!-- Apparatus around body -->
  <line x1="50" y1="85" x2="60" y2="85" stroke="#888" stroke-width="1.5"/>
  <line x1="80" y1="85" x2="90" y2="85" stroke="#888" stroke-width="1.5"/>
  <line x1="50" y1="100" x2="60" y2="100" stroke="#888" stroke-width="1.5"/>
  <line x1="80" y1="100" x2="90" y2="100" stroke="#888" stroke-width="1.5"/>
  <!-- Label -->
  <rect x="40" y="135" width="100" height="15" fill="#d4c5a0" opacity="0.6"/>
  <line x1="45" y1="140" x2="130" y2="140" stroke="#666" stroke-width="0.8"/>
  <line x1="45" y1="144" x2="120" y2="144" stroke="#666" stroke-width="0.8"/>
  
  <!-- Fresco 2 - experiment 2 -->
  <rect x="170" y="60" width="120" height="100" fill="#1a1a1a" stroke="#555" stroke-width="3"/>
  <rect x="175" y="65" width="110" height="90" fill="#222222"/>
  <rect x="200" y="80" width="20" height="40" fill="#776655"/>
  <circle cx="210" cy="72" r="8" fill="#AABBAA"/>
  <circle cx="190" cy="90" r="6" fill="#666" stroke="#888" stroke-width="1"/>
  <circle cx="230" cy="90" r="6" fill="#666" stroke="#888" stroke-width="1"/>
  <rect x="180" y="135" width="100" height="15" fill="#d4c5a0" opacity="0.6"/>
  <line x1="185" y1="140" x2="265" y2="140" stroke="#666" stroke-width="0.8"/>
  <line x1="185" y1="144" x2="255" y2="144" stroke="#666" stroke-width="0.8"/>
  
  <!-- Fresco 3 - experiment 3 -->
  <rect x="350" y="60" width="120" height="100" fill="#1a1a1a" stroke="#555" stroke-width="3"/>
  <rect x="355" y="65" width="110" height="90" fill="#222222"/>
  <rect x="380" y="78" width="20" height="45" fill="#887766"/>
  <circle cx="390" cy="70" r="8" fill="#CCBBAA"/>
  <path d="M 370 85 L 380 85 M 400 85 L 410 85" stroke="#888" stroke-width="1.5"/>
  <path d="M 370 95 L 380 95 M 400 95 L 410 95" stroke="#888" stroke-width="1.5"/>
  <rect x="360" y="135" width="100" height="15" fill="#d4c5a0" opacity="0.6"/>
  <line x1="365" y1="140" x2="445" y2="140" stroke="#666" stroke-width="0.8"/>
  <line x1="365" y1="144" x2="435" y2="144" stroke="#666" stroke-width="0.8"/>
  
  <!-- Fresco 4 - experiment 4 -->
  <rect x="490" y="60" width="120" height="100" fill="#1a1a1a" stroke="#555" stroke-width="3"/>
  <rect x="495" y="65" width="110" height="90" fill="#222222"/>
  <rect x="520" y="80" width="22" height="38" fill="#998877"/>
  <circle cx="531" cy="72" r="9" fill="#DDCCBB"/>
  <rect x="510" y="85" width="8" height="15" fill="#666" stroke="#888" stroke-width="1"/>
  <rect x="544" y="85" width="8" height="15" fill="#666" stroke="#888" stroke-width="1"/>
  <rect x="500" y="135" width="100" height="15" fill="#d4c5a0" opacity="0.6"/>
  <line x1="505" y1="140" x2="585" y2="140" stroke="#666" stroke-width="0.8"/>
  <line x1="505" y1="144" x2="575" y2="144" stroke="#666" stroke-width="0.8"/>
  
  <!-- Blank frame (last frame, waiting for name) -->
  <rect x="260" y="180" width="120" height="80" fill="#1a1a1a" stroke="#FF8800" stroke-width="3"/>
  <rect x="265" y="185" width="110" height="70" fill="#222222"/>
  <!-- Empty - waiting -->
  <rect x="270" y="240" width="100" height="15" fill="#d4c5a0" opacity="0.4"/>
  <!-- No lines - blank label -->
  
  <!-- Layer 5: Black stone pedestal (center) -->
  <rect x="250" y="320" width="140" height="60" fill="#111111" stroke="#333" stroke-width="2"/>
  <polygon points="250,320 390,320 370,330 270,330" fill="#1a1a1a"/>
  <!-- Mirror finish effect -->
  <rect x="260" y="322" width="120" height="3" fill="#222" opacity="0.5"/>
  
  <!-- Layer 6: Silver Chalice of St. Jude (on pedestal) -->
  <g transform="translate(320, 300)">
    <!-- Base -->
    <ellipse cx="0" cy="25" rx="25" ry="6" fill="#CCCCCC" stroke="#AAA" stroke-width="1.5"/>
    <ellipse cx="0" cy="24" rx="22" ry="5" fill="#DDDDDD"/>
    <!-- Stem -->
    <rect x="-5" y="10" width="10" height="18" fill="#CCCCCC" stroke="#AAA" stroke-width="1"/>
    <!-- Cup -->
    <ellipse cx="0" cy="5" rx="20" ry="12" fill="#DDD" stroke="#AAA" stroke-width="2"/>
    <ellipse cx="0" cy="3" rx="18" ry="10" fill="#CCCCCC"/>
    <!-- Inner rim -->
    <ellipse cx="0" cy="2" rx="16" ry="9" fill="#BBB" opacity="0.5"/>
    <!-- Seal of St. Jude inscribed -->
    <circle cx="0" cy="12" r="6" fill="none" stroke="#999" stroke-width="1.5"/>
    <path d="M -4 10 L 0 6 L 4 10" fill="none" stroke="#999" stroke-width="1"/>
    <line x1="0" y1="6" x2="0" y2="16" stroke="#999" stroke-width="1"/>
    <!-- Inner light/glow -->
    <ellipse cx="0" cy="5" rx="22" ry="14" fill="#FFFF00" opacity="0.08"/>
    <ellipse cx="0" cy="5" rx="28" ry="18" fill="#AAAAAA" opacity="0.05"/>
  </g>
  
  <!-- Three silver claws gripping chalice -->
  <path d="M 295 310 Q 300 305 305 310" fill="none" stroke="#AAA" stroke-width="2"/>
  <path d="M 320 312 Q 320 307 320 312" fill="none" stroke="#AAA" stroke-width="2.5"/>
  <path d="M 335 310 Q 340 305 345 310" fill="none" stroke="#AAA" stroke-width="2"/>
  
  <!-- Layer 7: Frescoes below (preserved bodies sequence) -->
  <!-- Lower fresco row -->
  <rect x="30" y="180" width="100" height="90" fill="#1a1a1a" stroke="#555" stroke-width="2"/>
  <rect x="35" y="185" width="90" height="80" fill="#222222"/>
  <rect x="55" y="200" width="18" height="35" fill="#776655"/>
  <circle cx="64" cy="193" r="7" fill="#AABBAA"/>
  <rect x="40" y="250" width="80" height="12" fill="#d4c5a0" opacity="0.5"/>
  <line x1="45" y1="255" x2="110" y2="255" stroke="#666" stroke-width="0.7"/>
  
  <rect x="150" y="180" width="100" height="90" fill="#1a1a1a" stroke="#555" stroke-width="2"/>
  <rect x="155" y="185" width="90" height="80" fill="#222222"/>
  <rect x="175" y="198" width="20" height="37" fill="#887766"/>
  <circle cx="185" cy="191" r="7" fill="#CCBBAA"/>
  <rect x="160" y="250" width="80" height="12" fill="#d4c5a0" opacity="0.5"/>
  <line x1="165" y1="255" x2="230" y2="255" stroke="#666" stroke-width="0.7"/>
  
  <rect x="510" y="180" width="100" height="90" fill="#1a1a1a" stroke="#555" stroke-width="2"/>
  <rect x="515" y="185" width="90" height="80" fill="#222222"/>
  <rect x="535" y="200" width="18" height="35" fill="#998877"/>
  <circle cx="544" cy="193" r="7" fill="#DDCCBB"/>
  <rect x="520" y="250" width="80" height="12" fill="#d4c5a0" opacity="0.5"/>
  <line x1="525" y1="255" x2="590" y2="255" stroke="#666" stroke-width="0.7"/>
  
  <!-- Layer 8: Atmospheric moonlight pools -->
  <ellipse cx="320" cy="340" rx="80" ry="20" fill="#AAAAAA" opacity="0.08"/>
  <ellipse cx="320" cy="360" rx="60" ry="15" fill="#AAAAAA" opacity="0.05"/>
  
  <!-- Dark corner shadows -->
  <ellipse cx="80" cy="370" rx="70" ry="20" fill="#000000" opacity="0.5"/>
  <ellipse cx="560" cy="370" rx="70" ry="20" fill="#000000" opacity="0.5"/>
  
  <!-- Dust motes in moonlight -->
  <circle cx="310" cy="200" r="1" fill="#FFFFFF" opacity="0.2"/>
  <circle cx="315" cy="180" r="1" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="325" cy="220" r="1" fill="#FFFFFF" opacity="0.18"/>
  <circle cx="318" cy="240" r="1" fill="#FFFFFF" opacity="0.12"/>
  <circle cx="322" cy="260" r="1" fill="#FFFFFF" opacity="0.1"/>
  
  <!-- Chalice humming - subtle energy lines -->
  <ellipse cx="320" cy="300" rx="40" ry="40" fill="#AAAAAA" opacity="0.03"/>
  <circle cx="300" cy="285" r="1" fill="#DDD" opacity="0.2"/>
  <circle cx="340" cy="290" r="1" fill="#DDD" opacity="0.15"/>
  <circle cx="315" cy="310" r="1" fill="#DDD" opacity="0.18"/>
</svg>
