<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Wide base -->
  <ellipse cx="32" cy="52" rx="20" ry="5" fill="#CCCCCC" stroke="#AAA" stroke-width="1.5"/>
  <ellipse cx="32" cy="51" rx="18" ry="4" fill="#DDDDDD"/>
  
  <!-- Stem -->
  <rect x="29" y="40" width="6" height="14" fill="#CCCCCC" stroke="#AAA" stroke-width="1"/>
  
  <!-- Cup body -->
  <ellipse cx="32" cy="30" rx="16" ry="10" fill="#DDD" stroke="#AAA" stroke-width="2"/>
  <ellipse cx="32" cy="28" rx="14" ry="8" fill="#CCCCCC"/>
  
  <!-- Inner rim -->
  <ellipse cx="32" cy="26" rx="13" ry="7" fill="#BBB" opacity="0.4"/>
  
  <!-- Seal of St. Jude inscribed on cup -->
  <circle cx="32" cy="30" r="4" fill="none" stroke="#999" stroke-width="1.5"/>
  <!-- Cross pattern -->
  <line x1="32" y1="27" x2="32" y2="33" stroke="#999" stroke-width="1"/>
  <line x1="29" y1="30" x2="35" y2="30" stroke="#999" stroke-width="1"/>
  <!-- Decorative elements -->
  <circle cx="32" cy="27" r="1.5" fill="#999" opacity="0.6"/>
  
  <!-- Ornate details on base -->
  <ellipse cx="32" cy="40" rx="8" ry="2" fill="#BBB" opacity="0.5"/>
  <line x1="26" y1="45" x2="38" y2="45" stroke="#AAA" stroke-width="0.5"/>
  
  <!-- Inner light/glow (humming energy) -->
  <ellipse cx="32" cy="30" rx="18" ry="12" fill="#FFFF00" opacity="0.1"/>
  <ellipse cx="32" cy="30" rx="22" ry="14" fill="#AAAAAA" opacity="0.06"/>
  <ellipse cx="32" cy="30" rx="26" ry="16" fill="#CCCCCC" opacity="0.03"/>
  
  <!-- Energy particles (humming) -->
  <circle cx="22" cy="22" r="1" fill="#DDD" opacity="0.3"/>
  <circle cx="42" cy="25" r="1" fill="#DDD" opacity="0.25"/>
  <circle cx="26" cy="35" r="1" fill="#DDD" opacity="0.28"/>
  <circle cx="38" cy="33" r="1" fill="#DDD" opacity="0.22"/>
  
  <!-- Cold appearance (blue tint overlay) -->
  <ellipse cx="32" cy="30" rx="16" ry="10" fill="#000088" opacity="0.05"/>
  
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="18" ry="3" fill="#000000" opacity="0.25"/>
</svg>
