<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Crowbar handle (carved from bone) -->
  <rect x="8" y="28" width="45" height="6" fill="#f0f0f0" stroke="#e0e0e0" stroke-width="1" rx="2"/>
  
  <!-- Curved end (top) -->
  <path d="M 52 31 Q 58 31 58 25 Q 58 20 52 20" fill="none" stroke="#f0f0f0" stroke-width="5" stroke-linecap="round"/>
  <path d="M 52 31 Q 56 31 56 25 Q 56 21 52 21" fill="none" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Flat end (bottom) -->
  <rect x="8" y="29" width="8" height="8" fill="#f0f0f0" stroke="#e0e0e0" stroke-width="1" rx="1"/>
  <rect x="6" y="33" width="10" height="3" fill="#f0f0f0" stroke="#e0e0e0" stroke-width="1"/>
  
  <!-- Polished bone texture lines -->
  <line x1="14" y1="30" x2="14" y2="32" stroke="#ddd" stroke-width="0.5"/>
  <line x1="22" y1="30" x2="22" y2="32" stroke="#ddd" stroke-width="0.5"/>
  <line x1="30" y1="30" x2="30" y2="32" stroke="#ddd" stroke-width="0.5"/>
  <line x1="38" y1="30" x2="38" y2="32" stroke="#ddd" stroke-width="0.5"/>
  <line x1="46" y1="30" x2="46" y2="32" stroke="#ddd" stroke-width="0.5"/>
  
  <!-- Dark stain at tip (from use) -->
  <rect x="8" y="33" width="6" height="3" fill="#331100" opacity="0.7"/>
  <rect x="6" y="34" width="4" height="2" fill="#331100" opacity="0.6"/>
  
  <!-- Shadow -->
  <ellipse cx="32" cy="42" rx="25" ry="5" fill="#000000" opacity="0.2"/>
</svg>
