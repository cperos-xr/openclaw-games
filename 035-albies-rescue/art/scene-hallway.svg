<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Retro Apple II style Hallway -->
  <rect width="640" height="400" fill="#000" />
  
  <!-- Floor -->
  <path d="M0 400 L240 280 L400 280 L640 400 Z" fill="#222" stroke="#444" stroke-width="2"/>
  
  <!-- Walls -->
  <path d="M0 0 L240 0 L240 280 L0 400 Z" fill="#111" stroke="#333" stroke-width="2"/>
  <path d="M640 0 L400 0 L400 280 L640 400 Z" fill="#111" stroke="#333" stroke-width="2"/>
  <rect x="240" y="0" width="160" height="280" fill="#050505" stroke="#333" stroke-width="1"/>
  
  <!-- Doors -->
  <!-- Left door (Bathroom) -->
  <path d="M40 80 L180 120 L180 340 L40 380 Z" fill="#080808" stroke="#333" stroke-width="2"/>
  
  <!-- Right door (Closet) -->
  <path d="M600 80 L460 120 L460 340 L600 380 Z" fill="#080808" stroke="#333" stroke-width="2"/>
  
  <!-- End door (Bedroom) -->
  <rect x="280" y="80" width="80" height="180" fill="#0a0a0a" stroke="#444" stroke-width="1"/>
  <rect x="280" y="255" width="80" height="5" fill="#f00" filter="blur(2px)"/> <!-- Light bleeding -->
  
  <!-- Grit/Deteoriation -->
  <path d="M240 50 Q 200 60 180 100" stroke="#222" fill="none" stroke-width="3"/>
  <path d="M400 70 Q 440 80 460 120" stroke="#222" fill="none" stroke-width="3"/>

  <text x="320" y="360" text-anchor="middle" fill="#0f0" font-family="monospace" font-size="20">THE HALLWAY</text>
</svg>