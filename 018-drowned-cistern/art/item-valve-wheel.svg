<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Brass Valve Wheel - cast brass, heavy and cold, five spokes -->
  <!-- Outer rim -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#cc3333" stroke-width="3.5"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#cc3333" stroke-width="2" opacity="0.7"/>
  <!-- Central hub -->
  <circle cx="32" cy="32" r="8" fill="#cc3333" stroke="#000" stroke-width="2"/>
  <!-- Hub center socket -->
  <circle cx="32" cy="32" r="4" fill="#0a0a12" stroke="#334466" stroke-width="1.5"/>
  <!-- Five spokes radiating from center -->
  <!-- Spoke 1: up -->
  <line x1="32" y1="24" x2="32" y2="10" stroke="#cc3333" stroke-width="3"/>
  <!-- Spoke 2: up-right -->
  <line x1="38" y1="26" x2="48" y2="14" stroke="#cc3333" stroke-width="3"/>
  <!-- Spoke 3: down-right -->
  <line x1="40" y1="35" x2="50" y2="44" stroke="#cc3333" stroke-width="3"/>
  <!-- Spoke 4: down-left -->
  <line x1="24" y1="35" x2="14" y2="44" stroke="#cc3333" stroke-width="3"/>
  <!-- Spoke 5: up-left -->
  <line x1="26" y1="26" x2="16" y2="14" stroke="#cc3333" stroke-width="3"/>
  <!-- Brass highlight (cold, polished) -->
  <circle cx="32" cy="32" r="10" fill="#aa9988" opacity="0.1"/>
  <circle cx="32" cy="32" r="6" fill="#aa9988" opacity="0.15"/>
  <!-- Cold metal glint -->
  <rect x="28" y="18" width="4" height="3" fill="#aa9988" opacity="0.3" rx="1"/>
</svg>
