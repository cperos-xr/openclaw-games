<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Blown Fuse - ceramic cartridge, contacts blackened and corroded -->
  <!-- Ceramic body -->
  <rect x="14" y="22" width="36" height="18" fill="#334466" stroke="#000" stroke-width="2" rx="2"/>
  <!-- Ceramic highlight -->
  <rect x="16" y="24" width="32" height="2" fill="#aa9988" opacity="0.2"/>
  <!-- Ends (metal caps) -->
  <rect x="10" y="23" width="6" height="16" fill="#334466" stroke="#000" stroke-width="1.5" rx="1"/>
  <rect x="48" y="23" width="6" height="16" fill="#334466" stroke="#000" stroke-width="1.5" rx="1"/>
  <!-- Blackened contacts (burned out) -->
  <rect x="8" y="22" width="4" height="18" fill="#000" rx="1"/>
  <rect x="52" y="22" width="4" height="18" fill="#000" rx="1"/>
  <!-- Burn/char marks near contacts -->
  <rect x="14" y="24" width="6" height="4" fill="#000" opacity="0.5"/>
  <rect x="44" y="24" width="6" height="4" fill="#000" opacity="0.5"/>
  <rect x="14" y="34" width="5" height="3" fill="#000" opacity="0.4"/>
  <rect x="45" y="34" width="5" height="3" fill="#000" opacity="0.4"/>
  <!-- Corrosion spots -->
  <circle cx="20" cy="30" r="2" fill="#000" opacity="0.3"/>
  <circle cx="44" cy="31" r="1.5" fill="#000" opacity="0.35"/>
</svg>
