<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Oil Can - dented tin can, half-full, dark petroleum -->
  <!-- Can body -->
  <rect x="18" y="24" width="28" height="26" fill="#cc3333" stroke="#000" stroke-width="2" rx="3"/>
  <!-- Dents in can -->
  <rect x="20" y="28" width="6" height="4" fill="#993333" opacity="0.5" rx="1"/>
  <rect x="36" y="34" width="5" height="5" fill="#993333" opacity="0.4" rx="1"/>
  <!-- Can top/lid -->
  <rect x="16" y="20" width="32" height="6" fill="#cc3333" stroke="#000" stroke-width="2" rx="2"/>
  <!-- Pouring spout (angled) -->
  <line x1="46" y1="22" x2="56" y2="16" stroke="#cc3333" stroke-width="3" stroke-linecap="round"/>
  <circle cx="57" cy="15" r="2" fill="#cc3333" stroke="#000" stroke-width="1"/>
  <!-- Handle -->
  <path d="M 46 22 Q 52 18 56 20 Q 58 24 54 26" fill="none" stroke="#cc3333" stroke-width="2"/>
  <!-- Dark oil inside (half-full indication) -->
  <rect x="19" y="32" width="26" height="17" fill="#0a0a12" opacity="0.3" rx="2"/>
  <!-- Oil level line -->
  <line x1="19" y1="33" x2="45" y2="33" stroke="#664433" stroke-width="1.5" opacity="0.4"/>
  <!-- Metallic highlight -->
  <rect x="20" y="22" width="8" height="2" fill="#aa9988" opacity="0.25"/>
</svg>
