<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <pattern id="brick" width="40" height="20" patternUnits="userSpaceOnUse">
      <rect width="40" height="20" fill="#0a0a12"/>
      <rect x="1" y="1" width="38" height="18" fill="#1a1420" stroke="#000" stroke-width="1"/>
      <rect x="20" y="0" width="18" height="8" fill="#151018" stroke="#000" stroke-width="0.5"/>
    </pattern>
    <pattern id="hatch-water" width="8" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="2" x2="8" y2="2" stroke="#334466" stroke-width="1" opacity="0.5"/>
    </pattern>
  </defs>
  <!-- Layer 1: Dark background -->
  <rect width="640" height="400" fill="#08080f"/>
  <!-- Layer 2: Stone/brick walls -->
  <rect x="0" y="0" width="640" height="280" fill="#0a0a12" stroke="#1a1420" stroke-width="3"/>
  <rect x="0" y="0" width="640" height="280" fill="url(#brick)" opacity="0.7"/>
  <!-- Layer 3: Water floor -->
  <rect x="0" y="280" width="640" height="120" fill="#0a0e18"/>
  <rect x="0" y="280" width="640" height="120" fill="url(#hatch-water)"/>
  <!-- Water surface line -->
  <line x1="0" y1="280" x2="640" y2="280" stroke="#334466" stroke-width="2"/>
  <!-- Layer 4: Ladder (left side, going up into darkness) -->
  <g fill="none" stroke="#cc3333" stroke-width="3">
    <line x1="80" y1="0" x2="80" y2="280"/>
    <line x1="110" y1="0" x2="110" y2="280"/>
    <line x1="80" y1="40" x2="110" y2="40"/>
    <line x1="80" y1="80" x2="110" y2="80"/>
    <line x1="80" y1="120" x2="110" y2="120"/>
    <line x1="80" y1="160" x2="110" y2="160"/>
    <line x1="80" y1="200" x2="110" y2="200"/>
    <line x1="80" y1="240" x2="110" y2="240"/>
  </g>
  <!-- Layer 5: Rusted grate (center-north, blocking passage) -->
  <g fill="none" stroke="#cc3333" stroke-width="4">
    <rect x="260" y="120" width="120" height="140"/>
    <line x1="280" y1="120" x2="280" y2="260"/>
    <line x1="300" y1="120" x2="300" y2="260"/>
    <line x1="320" y1="120" x2="320" y2="260"/>
    <line x1="340" y1="120" x2="340" y2="260"/>
    <line x1="360" y1="120" x2="360" y2="260"/>
    <line x1="260" y1="160" x2="380" y2="160"/>
    <line x1="260" y1="200" x2="380" y2="200"/>
    <line x1="260" y1="240" x2="380" y2="240"/>
  </g>
  <!-- Rust flakes on grate -->
  <rect x="270" y="125" width="6" height="4" fill="#cc3333" opacity="0.5"/>
  <rect x="310" y="195" width="5" height="3" fill="#cc3333" opacity="0.4"/>
  <rect x="350" y="230" width="4" height="5" fill="#cc3333" opacity="0.6"/>
  <!-- Layer 6: Wrench in muck (near ladder base, half submerged) -->
  <g fill="#cc3333" opacity="0.8">
    <!-- Wrench head -->
    <rect x="180" y="310" width="24" height="30" rx="2"/>
    <!-- Jaw opening -->
    <rect x="186" y="316" width="12" height="18" fill="#0a0e18"/>
    <!-- Shaft -->
    <rect x="204" y="316" width="30" height="18" rx="1"/>
  </g>
  <!-- Layer 7: Darkness beyond grate (darker area behind) -->
  <rect x="260" y="120" width="120" height="140" fill="#000" opacity="0.5"/>
  <!-- Layer 8: Atmospheric ripples in water -->
  <ellipse cx="320" cy="340" rx="40" ry="8" fill="#334466" opacity="0.2"/>
  <ellipse cx="400" cy="360" rx="25" ry="5" fill="#334466" opacity="0.15"/>
  <!-- Layer 9: Damp wall stains -->
  <rect x="20" y="200" width="80" height="60" fill="#336633" opacity="0.15"/>
  <rect x="540" y="180" width="90" height="80" fill="#336633" opacity="0.12"/>
</svg>
