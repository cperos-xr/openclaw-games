<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <pattern id="wet-brick" width="32" height="16" patternUnits="userSpaceOnUse">
      <rect width="32" height="16" fill="#0a0a12"/>
      <rect x="1" y="1" width="30" height="14" fill="#151210" stroke="#000" stroke-width="0.5"/>
      <rect x="16" y="0" width="14" height="7" fill="#121010" stroke="#000" stroke-width="0.3"/>
    </pattern>
    <pattern id="condensation" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1" fill="#334466" opacity="0.15"/>
    </pattern>
  </defs>
  <!-- Layer 1: Dark tunnel background -->
  <rect width="640" height="400" fill="#08080f"/>
  <!-- Layer 2: Brick walls converging to center -->
  <!-- Left wall -->
  <polygon points="0,0 280,120 280,280 0,400" fill="#0a0a10"/>
  <polygon points="0,0 280,120 280,280 0,400" fill="url(#wet-brick)" opacity="0.5"/>
  <polygon points="0,0 280,120 280,280 0,400" fill="url(#condensation)" opacity="0.3"/>
  <!-- Right wall -->
  <polygon points="640,0 360,120 360,280 640,400" fill="#0a0a10"/>
  <polygon points="640,0 360,120 360,280 640,400" fill="url(#wet-brick)" opacity="0.5"/>
  <polygon points="640,0 360,120 360,280 640,400" fill="url(#condensation)" opacity="0.3"/>
  <!-- Ceiling -->
  <polygon points="0,0 280,120 360,120 640,0" fill="#0a0a0f"/>
  <!-- Floor -->
  <polygon points="0,400 280,280 360,280 640,400" fill="#121010"/>
  <!-- Layer 3: Pipes along ceiling and floor -->
  <!-- Ceiling pipes (converging) -->
  <g fill="#0a0a12" stroke="#334466" stroke-width="3">
    <line x1="40" y1="25" x2="290" y2="130" stroke-width="4"/>
    <line x1="600" y1="25" x2="350" y2="130" stroke-width="4"/>
    <line x1="120" y1="15" x2="300" y2="125" stroke-width="3"/>
    <line x1="520" y1="15" x2="340" y2="125" stroke-width="3"/>
  </g>
  <!-- Floor pipes -->
  <g fill="#0a0a12" stroke="#336633" stroke-width="3">
    <line x1="40" y1="375" x2="290" y2="275" stroke-width="4"/>
    <line x1="600" y1="375" x2="350" y2="275" stroke-width="4"/>
    <line x1="100" y1="390" x2="300" y2="280" stroke-width="3"/>
    <line x1="540" y1="390" x2="340" y2="280" stroke-width="3"/>
  </g>
  <!-- Layer 4: Brass valve wheel (on left wall bracket, polished) -->
  <g>
    <!-- Bracket mounting plate -->
    <rect x="30" y="160" width="40" height="50" fill="#334466" stroke="#000" stroke-width="2" rx="2"/>
    <!-- Valve wheel - 5 spokes -->
    <circle cx="70" cy="185" r="35" fill="none" stroke="#cc3333" stroke-width="3"/>
    <circle cx="70" cy="185" r="10" fill="#cc3333" opacity="0.5"/>
    <!-- Five spokes radiating from center -->
    <line x1="70" y1="150" x2="70" y2="162" stroke="#cc3333" stroke-width="3"/>
    <line x1="70" y1="208" x2="70" y2="220" stroke="#cc3333" stroke-width="3"/>
    <line x1="35" y1="185" x2="47" y2="185" stroke="#cc3333" stroke-width="3"/>
    <line x1="93" y1="185" x2="105" y2="185" stroke="#cc3333" stroke-width="3"/>
    <!-- Diagonal spoke -->
    <line x1="45" y1="160" x2="53" y2="168" stroke="#cc3333" stroke-width="3"/>
    <line x1="87" y1="202" x2="95" y2="210" stroke="#cc3333" stroke-width="3"/>
    <!-- Polished highlight (unusually clean) -->
    <rect x="55" y="170" width="8" height="4" fill="#aa9988" opacity="0.4"/>
    <circle cx="70" cy="185" r="4" fill="#aa9988" opacity="0.3"/>
  </g>
  <!-- Layer 5: Maintenance alcoves (empty) -->
  <rect x="400" y="140" width="60" height="80" fill="#050508" stroke="#1a1a18" stroke-width="2"/>
  <rect x="500" y="160" width="50" height="60" fill="#050508" stroke="#1a1a18" stroke-width="2"/>
  <!-- Layer 6: Convergence point - dark opening ahead -->
  <rect x="280" y="130" width="80" height="140" fill="#000" opacity="0.6"/>
  <!-- Hum/energy glow from convergence -->
  <ellipse cx="320" y="200" rx="60" ry="100" fill="#336633" opacity="0.04"/>
  <!-- Layer 7: Condensation drips on walls -->
  <circle cx="150" cy="200" r="2" fill="#334466" opacity="0.3"/>
  <circle cx="170" cy="230" r="3" fill="#334466" opacity="0.25"/>
  <circle cx="490" cy="210" r="2" fill="#334466" opacity="0.3"/>
  <circle cx="470" cy="250" r="3" fill="#334466" opacity="0.2"/>
  <!-- Layer 8: Atmospheric shadow pools -->
  <ellipse cx="160" cy="380" rx="80" ry="12" fill="#000" opacity="0.5"/>
  <ellipse cx="480" cy="380" rx="80" ry="12" fill="#000" opacity="0.5"/>
</svg>
