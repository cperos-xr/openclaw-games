<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <pattern id="algae" width="5" height="5" patternUnits="userSpaceOnUse">
      <rect width="5" height="5" fill="#0a0a10"/>
      <circle cx="2" cy="2" r="1.5" fill="#336633" opacity="0.15"/>
    </pattern>
    <pattern id="spiral-drain" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="2" fill="#334466" opacity="0.2"/>
      <circle cx="4" cy="4" r="1" fill="#000" opacity="0.4"/>
    </pattern>
  </defs>
  <!-- Layer 1: Pipe descent darkness -->
  <rect width="640" height="400" fill="#050508"/>
  <!-- Layer 2: Semi-circular brick ceiling arch -->
  <ellipse cx="320" cy="50" rx="310" ry="80" fill="#0a0a10" stroke="#1a1a18" stroke-width="3"/>
  <!-- Layer 3: Algae-covered walls -->
  <rect x="0" y="50" width="640" height="350" fill="#0a0a10"/>
  <rect x="0" y="50" width="640" height="350" fill="url(#algae)" opacity="0.5"/>
  <!-- Algae word-shapes (unreadable patterns) -->
  <g fill="#336633" opacity="0.12">
    <rect x="40" y="100" width="60" height="8" rx="2"/>
    <rect x="120" y="120" width="40" height="6" rx="2"/>
    <rect x="500" y="110" width="70" height="7" rx="2"/>
    <rect x="50" y="200" width="50" height="5" rx="2"/>
    <rect x="540" y="190" width="45" height="6" rx="2"/>
    <rect x="100" y="320" width="55" height="7" rx="2"/>
  </g>
  <!-- Layer 4: Clear, cold water floor -->
  <rect x="0" y="300" width="640" height="100" fill="#0a0e1a"/>
  <line x1="0" y1="300" x2="640" y2="300" stroke="#334466" stroke-width="2"/>
  <!-- Water clarity - slight gradient illusion -->
  <rect x="0" y="300" width="640" height="30" fill="#334466" opacity="0.15"/>
  <!-- Layer 5: Central spiraling drain -->
  <g>
    <!-- Outer drain ring -->
    <ellipse cx="320" cy="350" rx="60" ry="20" fill="none" stroke="#334466" stroke-width="4"/>
    <ellipse cx="320" cy="350" rx="45" ry="15" fill="none" stroke="#334466" stroke-width="3"/>
    <!-- Spiral grate pattern -->
    <ellipse cx="320" cy="350" rx="25" ry="10" fill="none" stroke="#000" stroke-width="2"/>
    <!-- Spiral lines -->
    <ellipse cx="320" cy="350" rx="55" ry="18" fill="none" stroke="#334466" stroke-width="1" opacity="0.5" stroke-dasharray="4,3"/>
    <ellipse cx="320" cy="350" rx="35" ry="13" fill="none" stroke="#334466" stroke-width="1" opacity="0.5" stroke-dasharray="3,2"/>
    <!-- Drain into absolute blackness -->
    <ellipse cx="320" cy="350" rx="15" ry="7" fill="#000"/>
    <!-- Water flowing toward drain -->
    <line x1="200" y1="340" x2="280" y2="348" stroke="#334466" stroke-width="1" opacity="0.3"/>
    <line x1="440" y1="340" x2="360" y2="348" stroke="#334466" stroke-width="1" opacity="0.3"/>
    <line x1="150" y1="355" x2="260" y2="352" stroke="#334466" stroke-width="1" opacity="0.2"/>
    <line x1="490" y1="355" x2="380" y2="352" stroke="#334466" stroke-width="1" opacity="0.2"/>
  </g>
  <!-- Layer 6: T-socket in floor (beside drain, warm iron) -->
  <g>
    <!-- Socket base -->
    <circle cx="420" cy="350" r="18" fill="#664433" stroke="#000" stroke-width="3"/>
    <!-- T-shaped slot -->
    <rect x="414" y="340" width="12" height="4" fill="#0a0a08" stroke="#000" stroke-width="1"/>
    <rect x="418" y="340" width="4" height="16" fill="#0a0a08" stroke="#000" stroke-width="1"/>
    <!-- Warm iron glow -->
    <circle cx="420" cy="350" r="15" fill="#aa5533" opacity="0.15"/>
    <!-- Patient/waiting suggestion -->
    <rect x="416" y="346" width="2" height="2" fill="#aa5533" opacity="0.3"/>
  </g>
  <!-- Layer 7: Stairs/pipe descent (top of scene, darkness above) -->
  <!-- The pipe you descended from -->
  <ellipse cx="100" cy="40" rx="50" ry="30" fill="#000" opacity="0.6" stroke="#1a1a18" stroke-width="2"/>
  <ellipse cx="100" cy="40" rx="35" ry="20" fill="#050508" opacity="0.4"/>
  <!-- Layer 8: Atmospheric stillness (no hum, no drip) -->
  <!-- Subtle glow around drain center (something stirring below) -->
  <ellipse cx="320" cy="365" rx="40" ry="12" fill="#334466" opacity="0.08"/>
  <!-- Layer 9: Shadow pools -->
  <ellipse cx="100" cy="370" rx="70" ry="10" fill="#000" opacity="0.5"/>
  <ellipse cx="540" cy="370" rx="70" ry="10" fill="#000" opacity="0.5"/>
  <!-- Layer 10: Cold water at ankles -->
  <line x1="150" y1="310" x2="500" y2="305" stroke="#334466" stroke-width="1" opacity="0.2"/>
</svg>
