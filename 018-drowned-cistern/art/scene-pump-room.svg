<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <pattern id="metal-plate" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#121018"/>
      <line x1="0" y1="0" x2="20" y2="20" stroke="#1a1820" stroke-width="0.5"/>
    </pattern>
  </defs>
  <!-- Layer 1: Dark background -->
  <rect width="640" height="400" fill="#08080f"/>
  <!-- Layer 2: Industrial walls -->
  <rect x="0" y="0" width="640" height="320" fill="#0a0a14"/>
  <rect x="0" y="0" width="640" height="320" fill="url(#metal-plate)" opacity="0.4"/>
  <!-- Floor -->
  <rect x="0" y="320" width="640" height="80" fill="#121018"/>
  <line x1="0" y1="320" x2="640" y2="320" stroke="#1a1820" stroke-width="2"/>
  <!-- Layer 3: Victorian pump (center, dominant) -->
  <g>
    <!-- Pump body -->
    <rect x="200" y="120" width="160" height="180" fill="#334466" stroke="#000" stroke-width="3" rx="4"/>
    <!-- Pump base -->
    <rect x="180" y="300" width="200" height="20" fill="#664433" rx="2" stroke="#000" stroke-width="2"/>
    <!-- Flywheel (frozen, left side) -->
    <circle cx="180" cy="210" r="50" fill="none" stroke="#cc3333" stroke-width="4"/>
    <circle cx="180" cy="210" r="40" fill="none" stroke="#cc3333" stroke-width="2"/>
    <circle cx="180" cy="210" r="8" fill="#334466"/>
    <!-- Spokes -->
    <line x1="180" y1="170" x2="180" y2="178" stroke="#cc3333" stroke-width="3"/>
    <line x1="180" y1="242" x2="180" y2="250" stroke="#cc3333" stroke-width="3"/>
    <line x1="140" y1="210" x2="148" y2="210" stroke="#cc3333" stroke-width="3"/>
    <line x1="212" y1="210" x2="220" y2="210" stroke="#cc3333" stroke-width="3"/>
    <!-- Claw marks on flywheel (three parallel grooves) -->
    <line x1="155" y1="185" x2="165" y2="195" stroke="#000" stroke-width="2"/>
    <line x1="160" y1="182" x2="170" y2="192" stroke="#000" stroke-width="2"/>
    <line x1="165" y1="179" x2="175" y2="189" stroke="#000" stroke-width="2"/>
    <!-- Rotted belt threads -->
    <line x1="180" y1="160" x2="180" y2="145" stroke="#336633" stroke-width="2" opacity="0.4"/>
    <line x1="185" y1="158" x2="190" y2="140" stroke="#336633" stroke-width="1" opacity="0.3"/>
    <!-- Brass fittings -->
    <circle cx="230" cy="160" r="8" fill="none" stroke="#cc3333" stroke-width="2"/>
    <circle cx="290" cy="180" r="6" fill="none" stroke="#cc3333" stroke-width="2"/>
    <!-- Pipe outlets -->
    <rect x="340" y="140" width="30" height="20" fill="#334466" stroke="#000" stroke-width="2" rx="3"/>
    <rect x="340" y="240" width="30" height="20" fill="#334466" stroke="#000" stroke-width="2" rx="3"/>
  </g>
  <!-- Layer 4: Electrical panel (far wall, cracked glass) -->
  <g>
    <rect x="480" y="60" width="120" height="100" fill="#121018" stroke="#334466" stroke-width="3" rx="2"/>
    <!-- Cracked glass -->
    <rect x="485" y="65" width="110" height="90" fill="#0a0a14" opacity="0.7"/>
    <!-- Crack lines -->
    <line x1="500" y1="75" x2="570" y2="130" stroke="#cc3333" stroke-width="1" opacity="0.4"/>
    <line x1="530" y1="70" x2="550" y2="140" stroke="#cc3333" stroke-width="1" opacity="0.3"/>
    <line x1="490" y1="100" x2="580" y2="90" stroke="#cc3333" stroke-width="1" opacity="0.35"/>
    <!-- Empty fuse slots -->
    <rect x="500" y="75" width="20" height="8" fill="#000" stroke="#336633" stroke-width="1"/>
    <rect x="530" y="75" width="20" height="8" fill="#000" stroke="#336633" stroke-width="1"/>
    <rect x="560" y="75" width="20" height="8" fill="#000" stroke="#336633" stroke-width="1"/>
    <!-- Labels -->
    <rect x="505" y="88" width="10" height="3" fill="#336633" opacity="0.5"/>
    <rect x="535" y="88" width="10" height="3" fill="#336633" opacity="0.5"/>
    <rect x="565" y="88" width="10" height="3" fill="#336633" opacity="0.5"/>
  </g>
  <!-- Layer 5: Workbench with oil can (right wall) -->
  <g>
    <!-- Bench top -->
    <rect x="460" y="250" width="140" height="10" fill="#664433" stroke="#000" stroke-width="2"/>
    <!-- Legs -->
    <line x1="470" y1="260" x2="470" y2="320" stroke="#334466" stroke-width="3"/>
    <line x1="590" y1="260" x2="590" y2="320" stroke="#334466" stroke-width="3"/>
    <!-- Oil can on bench -->
    <g>
      <rect x="510" y="232" width="18" height="24" fill="#cc3333" rx="2" stroke="#000" stroke-width="1.5"/>
      <!-- Spout -->
      <line x1="528" y1="238" x2="540" y2="232" stroke="#cc3333" stroke-width="2"/>
      <circle cx="542" cy="231" r="2" fill="#cc3333"/>
    </g>
    <!-- Rusted rag -->
    <rect x="475" y="242" width="20" height="8" fill="#664433" rx="2" opacity="0.6"/>
  </g>
  <!-- Layer 6: Eastern hatch (circular iron door, sealed) -->
  <circle cx="100" cy="220" r="50" fill="#0a0a14" stroke="#334466" stroke-width="4"/>
  <circle cx="100" cy="220" r="40" fill="none" stroke="#1a1820" stroke-width="2"/>
  <!-- Bolts around hatch -->
  <circle cx="65" cy="220" r="4" fill="#664433"/>
  <circle cx="135" cy="220" r="4" fill="#664433"/>
  <circle cx="100" cy="185" r="4" fill="#664433"/>
  <circle cx="100" cy="255" r="4" fill="#664433"/>
  <!-- Layer 7: Ozone/static atmosphere -->
  <circle cx="320" cy="200" r="80" fill="#336633" opacity="0.03"/>
  <!-- Flicker effect lines -->
  <line x1="300" y1="100" x2="310" y2="120" stroke="#336633" stroke-width="1" opacity="0.2"/>
  <line x1="340" y1="90" x2="335" y2="110" stroke="#336633" stroke-width="1" opacity="0.15"/>
</svg>
