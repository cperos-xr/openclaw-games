      "id": "cistern-entrance",
      "name": "Cistern Entrance",
      "prose": "The ladder ends in ankle-deep water. Your boots splash as you step off the last rung, and the sound echoes in the darkness like something waking up. The air here is thick—wet stone, iron, and beneath it all, the sweet rot of stagnant water that has forgotten the sun.\n\nA rusted grate blocks the northern passage, its bars thick with orange corrosion. Beyond it, you can make out the suggestion of a larger chamber, the water still and black as oil. The grate looks like it hasn't moved in decades. To the south, the ladder you descended vanishes into blackness above.\n\nSomething scrapes in the water. Not loud—just enough that you feel it in your teeth. You shine your lamp down and see only ripples, spreading from no visible source.\n\nNear the base of the ladder, half-submerged in the muck, something metal catches the light. A wrench. Heavy, rusted, but intact. The kind of tool a worker would need. The kind of tool that was left here intentionally.\n\nThe walls press close. Victorian brick, sweating, the mortar crumbling into the water like wet sugar. Above you, somewhere, London carries on in ignorance. Down here, the water has its own gravity. Its own hunger.",

      "id": "overflow-chamber",
      "name": "Overflow Chamber",
      "prose": "The northern grate groans open under pressure, and you slip through into a space that was not meant for human scale. The overflow chamber yawns wide—twenty feet across, the ceiling lost in shadow. Stagnant water fills the floor to your knees, warm in a way that makes your skin crawl.\n\nOld overflow pipes line the far wall, their mouths gaping like the throats of fish. They drip with a sound that is almost rhythmic, almost a pattern, and you catch yourself listening for meaning in it. Don't.\n\nThe southern passage—the one you entered through—is blocked by an iron grate-door, sealed with a lock that gleams brass-bright against the rust. A keyhole, small and precise, waits in its center. The lock is dry. Everything else here is wet.\n\nFloating in the water near the eastern wall, bobbing gently as if stirred by a breath, is a ceramic object. A fuse. Its contacts are blackened, burned out. Someone tried to power something down here once. It didn't go well.\n\nThe water around your legs moves. Not from the pipes—from beneath you. Slow circles, widening. You keep your lamp pointed forward. You tell yourself it's just the settling of ancient water. You tell yourself many things.",

      "id": "pump-room",

      "prose": "The iron door unlocks with a wet click, and you push through into a room that still remembers its purpose. The pump dominates the space—a monstrous thing of brass and riveted iron, its flywheel frozen mid-rotation, the belt that once drove it rotting away to black threads. The pump room is smaller than the chamber beyond, cramped and industrial, built for function, not for comfort.\n\nAn electrical panel hangs on the far wall, its glass door spiderwebbed with cracks. Inside, fuse slots gape empty. Without power, the eastern hatch remains sealed. You can see its outline—a circular iron door, bolted from this side, sealed tight.\n\nOn a workbench bolted to the wall, a tin oil can sits beside a rusted rag. The oil inside is thick, almost gelatinous, but usable. Someone was working here when whatever happened, happened. They left their tools. They didn't leave alive.\n\nThe air here tastes of ozone and wet copper. Your lamp flickers—not from the bulb, but from something in the air itself. Static. The kind that builds before a storm, except storms don't reach this deep.\n\nThe pump's flywheel bears scratches. Not tool marks—claw marks. Three parallel gouges in the brass, deep enough to show the iron beneath. You count them. Three. You try not to imagine the hand that made them.",

      "prose": "The descent into the drain chamber is not a staircase. It is a pipe, wide enough to crawl through, its walls slick with algae and something you refuse to identify. You slide down it, feet first, your lamp clutched in your teeth, and the darkness takes you for three seconds before your boots hit standing water.\n\nThe drain chamber is the lowest point of the cistern. The ceiling arches overhead, a perfect semi-circle of Victorian brick, and the water here is different. Clear. Cold. Moving, draining slowly through a central grate that spirals into absolute blackness. This is the city's wound. Its hidden throat. The place where everything unwanted flows, and flows away, and is forgotten.\n\nIn the center of the room, protruding from the stone floor beside the drain, is a T-shaped socket. Iron. Waiting. You hold the handle you found above. It fits. You know it fits. The handle is the key, and the drain is the lock, and turning it will release everything the cistern has held for a century.\n\nThe water laps at your ankles. It is so cold it burns. Behind you, the pipe you descended is dark. There is no sound. No hum from the pipes. No dripping. The cistern holds its breath.\n\nYou place the handle in the socket. It seats perfectly, as if cast for this moment, for your hands. The iron is warm. Waiting. Below you, in the drain's black throat, something stirs. Something that has been waiting longer than the handle. Longer than the cistern. Longer than the city above.\n\nThe choice is yours. Turn the handle. Complete the job. Or leave it. Walk back up through the dark. Climb the ladder. Pretend you never heard the water whisper your name.",
