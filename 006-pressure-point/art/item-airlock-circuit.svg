<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Airlock Circuit -->
  <rect x="8" y="16" width="48" height="32" fill="#006400" stroke="#000000" stroke-width="2"/>
  <!-- Circuit traces -->
  <line x1="12" y1="20" x2="20" y2="20" stroke="#FFD700" stroke-width="2"/>
  <line x1="20" y1="20" x2="20" y2="30" stroke="#FFD700" stroke-width="2"/>
  <line x1="20" y1="30" x2="30" y2="30" stroke="#FFD700" stroke-width="2"/>
  <line x1="30" y1="30" x2="30" y2="40" stroke="#FFD700" stroke-width="2"/>
  <line x1="30" y1="40" x2="40" y2="40" stroke="#FFD700" stroke-width="2"/>
  <line x1="40" y1="40" x2="40" y2="20" stroke="#FFD700" stroke-width="2"/>
  <line x1="40" y1="20" x2="52" y2="20" stroke="#FFD700" stroke-width="2"/>
  <!-- Components -->
  <rect x="22" y="22" width="8" height="6" fill="#000000" stroke="#000000" stroke-width="1"/>
  <rect x="32" y="32" width="8" height="6" fill="#000000" stroke="#000000" stroke-width="1"/>
  <circle cx="44" cy="30" r="4" fill="#000000" stroke="#000000" stroke-width="1"/>
  <!-- Unstable power glow -->
  <circle cx="32" cy="32" r="15" fill="#00FF00" opacity="0.1"/>
  <circle cx="32" cy="32" r="10" fill="#00FF00" opacity="0.05"/>
  <!-- Edge connectors -->
  <rect x="10" y="46" width="6" height="4" fill="#FFD700" stroke="#000000" stroke-width="1"/>
  <rect x="20" y="46" width="6" height="4" fill="#FFD700" stroke="#000000" stroke-width="1"/>
  <rect x="30" y="46" width="6" height="4" fill="#FFD700" stroke="#000000" stroke-width="1"/>
  <rect x="40" y="46" width="6" height="4" fill="#FFD700" stroke="#000000" stroke-width="1"/>
</svg>