<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- item-airlock-circuit.svg: Deep Sea Industrial Horror Style -->
  <rect x="8" y="14" width="48" height="36" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <rect x="10" y="16" width="44" height="32" fill="#003300" stroke="#000" stroke-width="1"/>
  
  <!-- Traces and Components -->
  <path d="M12 20 H24 V30 H36 V40 H52" fill="none" stroke="#66ff66" stroke-width="1" stroke-dasharray="2 1"/>
  <path d="M15 40 H28 V25 H45 V35" fill="none" stroke="#228822" stroke-width="1"/>
  
  <!-- "Chips" -->
  <rect x="22" y="28" width="8" height="6" fill="#111" stroke="#444" stroke-width="1"/>
  <rect x="38" y="32" width="6" height="8" fill="#111" stroke="#444" stroke-width="1"/>
  <circle cx="45" cy="22" r="3" fill="#000" stroke="#888" stroke-width="1"/>
  
  <!-- Corroded Connectors -->
  <g fill="#8B4513">
    <rect x="12" y="48" width="4" height="4" opacity="0.8"/>
    <rect x="20" y="48" width="4" height="4" opacity="0.6"/>
    <rect x="28" y="48" width="4" height="4" opacity="0.9"/>
    <rect x="36" y="48" width="4" height="4" opacity="0.7"/>
    <rect x="44" y="48" width="4" height="4" opacity="0.8"/>
  </g>
  
  <!-- Warning LED/Glow -->
  <circle cx="15" cy="25" r="2" fill="#ff3333">
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>