<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- item-restricted-keycard.svg: Deep Sea Industrial Horror Style -->
  <!-- Keycard - Darker, industrial blue -->
  <rect x="8" y="16" width="48" height="32" rx="2" ry="2" fill="#001F3F" stroke="#000" stroke-width="2"/>
  
  <!-- "Bio-Lab" and "Access L3" - Replaced with indicator LEDs and icons -->
  <!-- Three vertical LED indicators (status lights) -->
  <circle cx="15" cy="22" r="2.5" fill="#33ff33" />
  <circle cx="15" cy="28" r="2.5" fill="#33ff33" />
  <circle cx="15" cy="34" r="2.5" fill="#33ff33" />
  <circle cx="15" cy="40" r="2.5" fill="#ff0000" opacity="0.3" />
  
  <!-- Biohazard icon - simplified as a set of triangles/lines -->
  <g transform="translate(42, 28) scale(0.6)">
    <circle cx="0" cy="0" r="10" fill="none" stroke="#666" stroke-width="2"/>
    <path d="M-8,0 H8 M0,-8 V8" fill="none" stroke="#666" stroke-width="2"/>
  </g>
  
  <!-- Restricted L3 icon - Replaced with lines and a block -->
  <rect x="22" y="24" width="12" height="16" fill="#000" stroke="#333" stroke-width="1"/>
  <rect x="24" y="27" width="8" height="3" fill="#ffcc00" />
  <rect x="24" y="32" width="8" height="3" fill="#ffcc00" />
  <rect x="24" y="37" width="8" height="3" fill="#ffcc00" />
  
  <!-- Magnetic stripe - Industrial/heavy duty looking -->
  <rect x="8" y="44" width="48" height="4" fill="#000" stroke="#111" stroke-width="1"/>
  <path d="M12 46 H20 M30 46 H40" fill="none" stroke="#333" stroke-width="1"/>
  
  <!-- Cracks/Smudges -->
  <path d="M10 20 L25 18" stroke="#ffffff" stroke-width="0.5" opacity="0.1" />
  <path d="M50 40 L40 45" stroke="#ffffff" stroke-width="0.5" opacity="0.1" />
</svg>