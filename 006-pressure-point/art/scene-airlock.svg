<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Deep, dark underwater chamber -->
  <rect width="640" height="400" fill="#00000a"/>
  
  <!-- Curved/Industrial Airlock structure -->
  <path d="M0 0 Q320 60 640 0 L640 400 Q320 340 0 400 Z" fill="#0c121e" stroke="#2c3e50" stroke-width="4"/>
  <!-- Rivets along the curve -->
  <g fill="#2c3e50">
    <circle cx="50" cy="30" r="3"/><circle cx="150" cy="45" r="3"/><circle cx="250" cy="55" r="3"/>
    <circle cx="350" cy="55" r="3"/><circle cx="450" cy="45" r="3"/><circle cx="550" cy="30" r="3"/>
    <circle cx="50" cy="370" r="3"/><circle cx="150" cy="355" r="3"/><circle cx="250" cy="345" r="3"/>
    <circle cx="350" cy="345" r="3"/><circle cx="450" cy="355" r="3"/><circle cx="550" cy="370" r="3"/>
  </g>
  
  <!-- Inner side hatch - Deep sea technology -->
  <rect x="280" y="340" width="80" height="60" rx="10" ry="10" fill="#0f1926" stroke="#1c2833" stroke-width="3"/>
  <!-- Replaced "INNER" text with a red warning symbol (triangle and line) -->
  <path d="M312 360 L328 360 L320 345 Z" fill="#E74C3C" />
  <rect x="319" y="365" width="2" height="10" fill="#E74C3C" />
  <!-- Heavy circular locking wheel -->
  <circle cx="320" cy="375" r="15" fill="#1c2833" stroke="#2c3e50" stroke-width="2"/>
  <path d="M305 375 H335 M320 360 V390" stroke="#2c3e50" stroke-width="3"/>

  <!-- Industrial Control console -->
  <path d="M180 200 L460 200 L440 300 L200 300 Z" fill="#17202a" stroke="#2c3e50" stroke-width="3"/>
  
  <!-- Replaced "CIRCUIT" text with component indicator (lines and dots) -->
  <rect x="230" y="240" width="60" height="20" fill="#000" stroke="#229954" stroke-width="1.5"/>
  <path d="M235 250 H285" stroke="#2ecc71" stroke-width="1" stroke-dasharray="2 1" />
  <circle cx="240" cy="250" r="2" fill="#2ecc71" />
  <circle cx="260" cy="250" r="2" fill="#2ecc71" />
  <circle cx="280" cy="250" r="2" fill="#ff4444" opacity="0.4" />
  
  <!-- Replaced "O2" text with Oxygen Gauge indicator -->
  <rect x="340" y="240" width="50" height="25" fill="#000" stroke="#229954" stroke-width="1.5"/>
  <circle cx="365" cy="252" r="8" fill="#000" stroke="#2ecc71" stroke-width="1"/>
  <path d="M365 252 L360 248" stroke="#ff4444" stroke-width="1.5" /> <!-- Needle at low -->

  <!-- Side lockers - Heavy-duty, dark blue/gray -->
  <rect x="20" y="80" width="80" height="180" fill="#17202a" stroke="#2c3e50" stroke-width="3"/>
  <path d="M20 140 H100 M20 200 H100" stroke="#2c3e50" stroke-width="1.5"/>
  
  <rect x="540" y="80" width="80" height="180" fill="#17202a" stroke="#2c3e50" stroke-width="3"/>
  <path d="M540 140 H620 M540 200 H620" stroke="#2c3e50" stroke-width="1.5"/>

  <!-- Torn suit/Atmospheric horror detail -->
  <g transform="translate(60, 310) scale(0.8)">
    <path d="M0 0 Q20 -30 40 0 Q45 40 20 60 Q-5 40 0 0" fill="#1b2631" stroke="#2c3e50" stroke-width="2"/>
    <path d="M10 15 L30 35" stroke="#922b21" stroke-width="3" opacity="0.6" />
    <path d="M5 25 L25 5" stroke="#922b21" stroke-width="2" opacity="0.5" />
  </g>

  <!-- Outer Main Hatch/Viewport -->
  <!-- Heavy reinforced frame -->
  <circle cx="320" cy="110" r="85" fill="#1c2833" stroke="#2c3e50" stroke-width="5"/>
  <!-- Dark abyss window -->
  <circle cx="320" cy="110" r="70" fill="#00000a" stroke="#1c2833" stroke-width="2"/>
  
  <!-- Underwater bioluminescence indicators -->
  <g opacity="0.4">
    <circle cx="280" cy="100" r="4" fill="#58d68d">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="360" cy="130" r="3" fill="#58d68d">
       <animate attributeName="opacity" values="0.1;0.6;0.1" dur="3s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Distant massive presence pressing against the frame -->
  <path d="M260 110 Q280 80 320 110 Q360 140 340 160" fill="none" stroke="#2ecc71" stroke-width="1.5" opacity="0.15">
    <animate attributeName="opacity" values="0.05;0.2;0.05" dur="10s" repeatCount="indefinite" />
  </path>
</svg>