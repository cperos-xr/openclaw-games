<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Cylindrical chamber -->
  <rect width="640" height="400" fill="#000011"/>
  
  <!-- Curved walls of airlock -->
  <path d="M0,0 Q320,50 640,0 L640,400 Q320,350 0,400 Z" fill="#000022" stroke="#003366" stroke-width="2"/>
  
  <!-- Inner hatch (behind) -->
  <rect x="280" y="350" width="80" height="50" fill="#000022" stroke="#222222" stroke-width="2"/>
  <circle cx="320" cy="375" r="15" fill="#000000" stroke="#222222" stroke-width="2"/>
  <text x="290" y="395" font-family="monospace" font-size="6" fill="#222222">INNER</text>
  
  <!-- Control console -->
  <rect x="200" y="200" width="240" height="80" fill="#000022" stroke="#003366" stroke-width="2"/>
  <rect x="210" y="210" width="220" height="60" fill="#000011"/>
  
  <!-- Dark screens -->
  <rect x="220" y="220" width="80" height="40" fill="#000000" stroke="#003366" stroke-width="1"/>
  <rect x="320" y="220" width="80" height="40" fill="#000000" stroke="#003366" stroke-width="1"/>
  
  <!-- Circuit board slot -->
  <rect x="230" y="250" width="60" height="15" fill="#000000" stroke="#00FF00" stroke-width="1"/>
  <text x="235" y="260" font-family="monospace" font-size="5" fill="#00FF00">CIRCUIT</text>
  
  <!-- Oxygen canister receptacle -->
  <rect x="340" y="250" width="50" height="20" fill="#000000" stroke="#00FF00" stroke-width="1"/>
  <text x="345" y="263" font-family="monospace" font-size="5" fill="#00FF00">O2</text>
  
  <!-- Lockers -->
  <rect x="20" y="100" width="80" height="150" fill="#000022" stroke="#003366" stroke-width="2"/>
  <line x1="20" y1="150" x2="100" y2="150" stroke="#003366" stroke-width="1"/>
  <line x1="20" y1="200" x2="100" y2="200" stroke="#003366" stroke-width="1"/>
  <rect x="30" y="110" width="60" height="30" fill="#000011"/>
  <rect x="30" y="160" width="60" height="30" fill="#000011"/>
  <rect x="30" y="210" width="60" height="30" fill="#000011"/>
  
  <rect x="540" y="100" width="80" height="150" fill="#000022" stroke="#003366" stroke-width="2"/>
  <line x1="540" y1="150" x2="620" y2="150" stroke="#003366" stroke-width="1"/>
  <line x1="540" y1="200" x2="620" y2="200" stroke="#003366" stroke-width="1"/>
  <rect x="550" y="110" width="60" height="30" fill="#000011"/>
  <rect x="550" y="160" width="60" height="30" fill="#000011"/>
  <rect x="550" y="210" width="60" height="30" fill="#000011"/>
  
  <!-- Torn emergency suit -->
  <path d="M50,300 Q60,280 70,300 Q80,320 70,340 Q60,360 50,340 Q40,320 50,300" fill="#000022" stroke="#003366" stroke-width="1"/>
  <line x1="55" y1="310" x2="65" y2="330" stroke="#FF0000" stroke-width="2"/>
  
  <!-- Outer hatch (main viewport) -->
  <circle cx="320" cy="120" r="80" fill="#000000" stroke="#003366" stroke-width="4"/>
  <circle cx="320" cy="120" r="70" fill="#000000"/>
  
  <!-- Bioluminescence outside -->
  <circle cx="280" cy="100" r="5" fill="#00FF00" opacity="0.3"/>
  <circle cx="350" cy="130" r="3" fill="#00FF00" opacity="0.2"/>
  <circle cx="300" cy="150" r="4" fill="#00FF00" opacity="0.4"/>
  <circle cx="340" cy="80" r="2" fill="#00FF00" opacity="0.2"/>
  
  <!-- Shape pressing against glass -->
  <path d="M250,120 Q270,100 290,120 Q310,140 290,160 Q270,180 250,160 Q230,140 250,120" fill="#001100" opacity="0.5"/>
  
  <!-- Floor details -->
  <rect x="0" y="380" width="640" height="20" fill="#000011"/>
</svg>