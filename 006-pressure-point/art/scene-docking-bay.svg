<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Deep sea dark blue - Docking Bay -->
  <rect width="640" height="400" fill="#00001a"/>
  
  <!-- Murky flood water with sediment/particles -->
  <rect x="0" y="200" width="640" height="200" fill="#001a33" opacity="0.4"/>
  <path d="M0 200 Q160 190 320 200 T640 200 L640 400 L0 400 Z" fill="#001a33" opacity="0.2" />
  
  <!-- Emergency lights - Strobe effect indicators -->
  <g>
    <rect x="50" y="30" width="25" height="40" fill="#1a0000" stroke="#c0392b" stroke-width="2"/>
    <circle cx="62.5" cy="50" r="8" fill="#e74c3c" opacity="0.3">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="1s" repeatCount="indefinite" />
    </circle>
    
    <rect x="565" y="30" width="25" height="40" fill="#1a0000" stroke="#c0392b" stroke-width="2"/>
    <circle cx="577.5" cy="50" r="8" fill="#e74c3c" opacity="0.3">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="1.2s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Ceiling Industrial Girders -->
  <path d="M0 20 H640 V40 H0 Z" fill="#0c121e" stroke="#1c2833" stroke-width="1" />
  <path d="M100 0 L120 20 M200 0 L220 20 M300 0 L320 20" stroke="#1c2833" stroke-width="2" />
  
  <!-- Maintenance Locker - Heavy industrial hatch -->
  <rect x="40" y="100" width="100" height="150" fill="#17202a" stroke="#2c3e50" stroke-width="3"/>
  <path d="M40 175 H140" stroke="#2c3e50" stroke-width="2" />
  <!-- Locking mechanism symbol -->
  <circle cx="90" cy="140" r="10" fill="none" stroke="#2c3e50" stroke-width="2"/>
  <path d="M85 140 H95 M90 135 V145" stroke="#2c3e50" stroke-width="2"/>

  <!-- Crew Quarters Sign - Replaced with icons -->
  <rect x="420" y="80" width="80" height="25" fill="#1c2833" stroke="#2c3e50" stroke-width="2"/>
  <!-- Bed/Human symbol icon -->
  <path d="M430 98 H450 M430 93 V98" stroke="#33ff33" stroke-width="1.5" opacity="0.7" />
  <path d="M460 92 Q470 92 470 98" stroke="#33ff33" stroke-width="1.5" />

  <!-- Bio-Lab door - Heavy hazard indicators -->
  <rect x="520" y="140" width="80" height="120" fill="#1a1a1a" stroke="#c0392b" stroke-width="3"/>
  <!-- Hazard triangles symbol -->
  <path d="M550 180 L570 180 L560 165 Z" fill="#e74c3c" opacity="0.8">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2s" repeatCount="indefinite" />
  </path>
  <rect x="559" y="185" width="2" height="15" fill="#e74c3c" opacity="0.6" />

  <!-- Water ripples and debris -->
  <g stroke="#3498db" stroke-width="1" fill="none" opacity="0.4">
    <circle cx="200" cy="250" r="10" />
    <circle cx="450" cy="320" r="15" />
    <path d="M250 210 Q280 205 310 210" />
  </g>
  
  <!-- Rusted Crowbar submerged in murky water -->
  <g transform="translate(180, 260) rotate(20) scale(0.6)">
    <path d="M0 0 L50 0 Q60 -10 55 -20" fill="none" stroke="#8B4513" stroke-width="4" opacity="0.6" />
  </g>

  <!-- Heavy rust deposits -->
  <path d="M40 240 Q60 250 80 240" fill="none" stroke="#8B4513" stroke-width="3" opacity="0.3" />
</svg>