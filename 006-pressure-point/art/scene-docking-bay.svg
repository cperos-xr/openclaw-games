<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Deep sea dark blue -->
  <rect width="640" height="400" fill="#000033"/>
  
  <!-- Water level -->
  <rect x="0" y="200" width="640" height="200" fill="#000066" opacity="0.3"/>
  
  <!-- Water details -->
  <path d="M0,200 Q160,180 320,200 T640,200" stroke="#003366" stroke-width="1" fill="none"/>
  
  <!-- Emergency lights (red strobes) -->
  <rect x="50" y="50" width="20" height="80" fill="#8B0000"/>
  <rect x="200" y="30" width="20" height="100" fill="#8B0000"/>
  <rect x="350" y="70" width="20" height="60" fill="#8B0000"/>
  <rect x="500" y="40" width="20" height="90" fill="#8B0000"/>
  
  <!-- Ceiling details -->
  <rect x="0" y="0" width="640" height="20" fill="#000011"/>
  <line x1="0" y1="10" x2="640" y2="10" stroke="#000022" stroke-width="1"/>
  
  <!-- Left wall - maintenance locker -->
  <rect x="50" y="150" width="100" height="100" fill="#000022" stroke="#003366" stroke-width="2"/>
  <line x1="50" y1="180" x2="150" y2="180" stroke="#003366" stroke-width="1"/>
  <line x1="50" y1="210" x2="150" y2="210" stroke="#003366" stroke-width="1"/>
  
  <!-- Scattered tools -->
  <rect x="70" y="220" width="20" height="5" fill="#666666"/>
  <rect x="90" y="200" width="5" height="25" fill="#666666"/>
  <rect x="110" y="210" width="15" height="3" fill="#666666"/>
  
  <!-- Crowbar in water -->
  <rect x="120" y="230" width="30" height="4" fill="#8B8B83"/>
  <rect x="145" y="225" width="4" height="10" fill="#8B8B83"/>
  
  <!-- Right side - Crew Quarters sign -->
  <rect x="400" y="100" width="80" height="20" fill="#000022" stroke="#003366" stroke-width="2"/>
  <text x="410" y="115" font-family="monospace" font-size="8" fill="#00FF00">CREW</text>
  <text x="410" y="125" font-family="monospace" font-size="8" fill="#00FF00">QUARTERS</text>
  
  <!-- Bio-Lab door -->
  <rect x="500" y="150" width="60" height="100" fill="#000011" stroke="#FF0000" stroke-width="2"/>
  <rect x="520" y="180" width="20" height="20" fill="#FF0000"/>
  <text x="525" y="195" font-family="monospace" font-size="6" fill="#000000">RESTRICTED</text>
  
  <!-- Water ripples -->
  <circle cx="200" cy="250" radius="10" fill="none" stroke="#0066CC" stroke-width="1"/>
  <circle cx="400" cy="300" radius="15" fill="none" stroke="#0066CC" stroke-width="1"/>
  
  <!-- Floor details -->
  <rect x="0" y="380" width="640" height="20" fill="#000011"/>
</svg>