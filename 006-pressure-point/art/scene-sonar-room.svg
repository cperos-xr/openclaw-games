<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Dark electronics room -->
  <rect width="640" height="400" fill="#000000"/>
  
  <!-- Ceiling -->
  <rect x="0" y="0" width="640" height="20" fill="#000011"/>
  
  <!-- Left wall - Monitor bank -->
  <rect x="20" y="50" width="120" height="80" fill="#000000" stroke="#003366" stroke-width="2"/>
  <rect x="25" y="55" width="110" height="70" fill="#000022"/>
  <line x1="30" y1="60" x2="130" y2="60" stroke="#00FF00" stroke-width="1" opacity="0.3"/>
  <line x1="30" y1="70" x2="130" y2="70" stroke="#00FF00" stroke-width="1" opacity="0.3"/>
  <line x1="30" y1="80" x2="130" y2="80" stroke="#00FF00" stroke-width="1" opacity="0.3"/>
  <line x1="30" y1="90" x2="130" y2="90" stroke="#00FF00" stroke-width="1" opacity="0.3"/>
  <line x1="30" y1="100" x2="130" y2="100" stroke="#00FF00" stroke-width="1" opacity="0.3"/>
  <line x1="30" y1="110" x2="130" y2="110" stroke="#00FF00" stroke-width="1" opacity="0.3"/>
  <line x1="30" y1="120" x2="130" y2="120" stroke="#00FF00" stroke-width="1" opacity="0.3"/>
  
  <rect x="20" y="150" width="120" height="80" fill="#000000" stroke="#003366" stroke-width="2"/>
  <rect x="25" y="155" width="110" height="70" fill="#000022"/>
  <circle cx="80" cy="190" r="20" fill="#00FF00" opacity="0.1"/>
  <line x1="60" y1="190" x2="100" y2="190" stroke="#00FF00" stroke-width="2"/>
  
  <!-- Center - Console -->
  <rect x="200" y="200" width="240" height="100" fill="#000022" stroke="#003366" stroke-width="2"/>
  <rect x="210" y="210" width="220" height="80" fill="#000011"/>
  
  <!-- Console dials and switches -->
  <circle cx="240" cy="250" r="15" fill="#000000" stroke="#003366" stroke-width="2"/>
  <circle cx="280" cy="250" r="15" fill="#000000" stroke="#003366" stroke-width="2"/>
  <circle cx="320" cy="250" r="15" fill="#000000" stroke="#003366" stroke-width="2"/>
  <rect x="350" y="240" width="30" height="20" fill="#000000" stroke="#003366" stroke-width="1"/>
  <rect x="390" y="240" width="30" height="20" fill="#000000" stroke="#003366" stroke-width="1"/>
  
  <!-- Open panel with wires -->
  <rect x="210" y="280" width="80" height="20" fill="#000000" stroke="#003366" stroke-width="1"/>
  <line x1="220" y1="285" x2="220" y2="295" stroke="#FF0000" stroke-width="2"/>
  <line x1="240" y1="285" x2="240" y2="295" stroke="#00FF00" stroke-width="2"/>
  <line x1="260" y1="285" x2="260" y2="295" stroke="#0000FF" stroke-width="2"/>
  <line x1="280" y1="285" x2="280" y2="295" stroke="#FFFF00" stroke-width="2"/>
  
  <!-- Large sonar screen -->
  <rect x="450" y="50" width="160" height="120" fill="#000000" stroke="#003366" stroke-width="3"/>
  <rect x="455" y="55" width="150" height="110" fill="#000022"/>
  <circle cx="530" cy="110" r="40" fill="none" stroke="#00FF00" stroke-width="1" opacity="0.3"/>
  <circle cx="530" cy="110" r="30" fill="none" stroke="#00FF00" stroke-width="1" opacity="0.3"/>
  <circle cx="530" cy="110" r="20" fill="none" stroke="#00FF00" stroke-width="1" opacity="0.3"/>
  <circle cx="530" cy="110" r="10" fill="#00FF00" opacity="0.5"/>
  
  <!-- Shadow on sonar -->
  <path d="M500,80 Q520,60 540,80 Q560,100 540,120 Q520,140 500,120 Q480,100 500,80" fill="#000000" opacity="0.7"/>
  
  <!-- Clipboard -->
  <rect x="480" y="200" width="40" height="60" fill="#000022" stroke="#220000" stroke-width="2"/>
  <line x1="485" y1="210" x2="515" y2="210" stroke="#00FF00" stroke-width="1"/>
  <line x1="485" y1="220" x2="515" y2="220" stroke="#00FF00" stroke-width="1"/>
  <line x1="485" y1="230" x2="515" y2="230" stroke="#00FF00" stroke-width="1"/>
  
  <!-- Engineering door -->
  <rect x="500" y="300" width="60" height="80" fill="#000022" stroke="#FF0000" stroke-width="3"/>
  <rect x="520" y="320" width="20" height="20" fill="#FF0000" opacity="0.5"/>
  <text x="510" y="355" font-family="monospace" font-size="6" fill="#FF0000">ENGINEERING</text>
  
  <!-- Floor details -->
  <rect x="0" y="380" width="640" height="20" fill="#000011"/>
</svg>