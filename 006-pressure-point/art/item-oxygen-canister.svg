<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- item-oxygen-canister.svg: Deep Sea Industrial Horror Style -->
  <!-- Heavy steel/reinforced canister - Cylinder shape -->
  <rect x="20" y="8" width="24" height="48" rx="6" ry="6" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <rect x="23" y="12" width="18" height="40" rx="3" ry="3" fill="#222" stroke="#111" stroke-width="1"/>
  
  <!-- Gauge - Low indicator, industrial -->
  <circle cx="32" cy="24" r="7" fill="#000" stroke="#444" stroke-width="2"/>
  <circle cx="32" cy="24" r="5" fill="#000" />
  <!-- Red needle (empty/low) instead of simple path -->
  <path d="M32 24 L28 20" fill="none" stroke="#ff3333" stroke-width="1.5" />
  
  <!-- "Oxygen/O2" icon - Replaced with a symbol: Two linked circles -->
  <g transform="translate(32, 40) scale(0.6)">
    <circle cx="-5" cy="0" r="6" fill="none" stroke="#33ff33" stroke-width="2" />
    <circle cx="5" cy="0" r="6" fill="none" stroke="#33ff33" stroke-width="2" />
  </g>
  
  <!-- Heavy Valve - Industrial/Rust -->
  <rect x="26" y="2" width="12" height="6" fill="#333" stroke="#000" stroke-width="2"/>
  <rect x="22" y="1" width="20" height="3" fill="#8B4513" stroke="#000" stroke-width="1"/>
  
  <!-- Steam/Hissing - Atmospheric vector indicator -->
  <path d="M22 6 L18 2" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="1s" repeatCount="indefinite" />
  </path>
  <path d="M42 6 L46 2" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="1.2s" repeatCount="indefinite" />
  </path>
  
  <!-- Industrial Warning lines - Yellow/Black -->
  <g stroke-width="1" stroke="#ffcc00">
    <path d="M20 50 H44" stroke-dasharray="2 2" />
  </g>
</svg>