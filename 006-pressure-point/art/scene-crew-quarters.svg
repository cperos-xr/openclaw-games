<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Warmer, sickly tones -->
  <rect width="640" height="400" fill="#110000"/>
  
  <!-- Ceiling with flickering light -->
  <rect x="0" y="0" width="640" height="30" fill="#000000"/>
  <circle cx="320" cy="15" width="40" height="20" fill="#FFFF00" opacity="0.7"/>
  <line x1="0" y1="30" x2="640" y2="30" stroke="#220000" stroke-width="1"/>
  
  <!-- Left wall - bunks and lockers -->
  <rect x="20" y="50" width="100" height="60" fill="#000011" stroke="#220000" stroke-width="2"/>
  <rect x="20" y="120" width="100" height="60" fill="#000011" stroke="#220000" stroke-width="2"/>
  <line x1="20" y1="80" x2="120" y2="80" stroke="#220000" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="20" y1="100" x2="120" y2="100" stroke="#220000" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="20" y1="150" x2="120" y2="150" stroke="#220000" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="20" y1="170" x2="120" y2="170" stroke="#220000" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Scattered items on floor -->
  <rect x="30" y="180" width="20" height="5" fill="#666666"/>
  <rect x="60" y="170" width="15" height="3" fill="#666666"/>
  <rect x="80" y="190" width="10" height="2" fill="#666666"/>
  
  <!-- Right side - Locked cabinet -->
  <rect x="480" y="80" width="80" height="120" fill="#000022" stroke="#220000" stroke-width="3"/>
  <rect x="500" y="100" width="40" height="20" fill="#4A4A4A"/>
  <rect x="520" y="130" width="20" height="10" fill="#8B0000"/>
  <line x1="480" y1="140" x2="560" y2="140" stroke="#220000" stroke-width="2"/>
  <text x="490" y="155" font-family="monospace" font-size="6" fill="#00FF00">RESTRICTED</text>
  <text x="490" y="165" font-family="monospace" font-size="6" fill="#00FF00">EQUIPMENT</text>
  
  <!-- Desk and terminal -->
  <rect x="200" y="200" width="180" height="20" fill="#000011" stroke="#220000" stroke-width="2"/>
  <rect x="210" y="210" width="160" height="10" fill="#000000"/>
  <text x="220" y="218" font-family="monospace" font-size="6" fill="#00FF00">...</text>
  <text x="220" y="226" font-family="monospace" font-size="6" fill="#00FF00">BREACH</text>
  <text x="220" y="234" font-family="monospace" font-size="6" fill="#00FF00">THORNE</text>
  
  <!-- Porthole -->
  <circle cx="550" cy="300" radius="40" fill="#000022" stroke="#220000" stroke-width="3"/>
  <circle cx="550" cy="300" radius="30" fill="#000000"/>
  <path d="M550,260 Q570,280 550,300 Q530,280 550,260 Z" fill="#001100" opacity="0.5"/>
  
  <!-- Shadows in corners -->
  <rect x="0" y="350" width="60" height="50" fill="#000000" opacity="0.5"/>
  <rect x="580" y="350" width="60" height="50" fill="#000000" opacity="0.5"/>
  
  <!-- Floor details -->
  <rect x="0" y="380" width="640" height="20" fill="#000011"/>
  
  <!-- Mold details on desk -->
  <ellipse cx="250" cy="205" radius="8" radiusY="3" fill="#006600" opacity="0.3"/>
  <ellipse cx="270" cy="205" radius="6" radiusY="2" fill="#006600" opacity="0.3"/>
</svg>