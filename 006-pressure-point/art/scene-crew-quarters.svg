<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Warmer, sickly tones - Crew Quarters -->
  <rect width="640" height="400" fill="#0d0505"/>
  
  <!-- Ceiling with flickering light -->
  <rect x="0" y="0" width="640" height="40" fill="#000"/>
  <rect x="300" y="5" width="40" height="10" fill="#333" stroke="#555" stroke-width="2"/>
  <circle cx="320" cy="15" r="15" fill="#f1c40f" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.4;0.2" dur="0.1s" repeatCount="indefinite" />
  </circle>
  
  <!-- Bunks and lockers - Heavy industrial steel, rusted -->
  <rect x="20" y="60" width="120" height="70" fill="#1c2833" stroke="#2c3e50" stroke-width="2"/>
  <rect x="20" y="140" width="120" height="70" fill="#17202a" stroke="#2c3e50" stroke-width="2"/>
  <!-- Dithered bedding -->
  <path d="M22 100 H138 V128 H22 Z" fill="#2c3e50" stroke-width="0" opacity="0.5" />
  <path d="M22 180 H138 V208 H22 Z" fill="#2c3e50" stroke-width="0" opacity="0.5" />
  
  <!-- Cabinet - Restricted Equipment -->
  <rect x="480" y="80" width="100" height="140" fill="#17202a" stroke="#2c3e50" stroke-width="3"/>
  <!-- Replaced "RESTRICTED" text with warning lines and lock icon -->
  <rect x="490" y="90" width="80" height="15" fill="#f39c12" stroke="#000" stroke-width="1.5"/>
  <path d="M495 97 H565" stroke="#000" stroke-width="3" stroke-dasharray="2 4" />
  
  <!-- Lock icon -->
  <g transform="translate(530, 160) scale(0.7)">
    <rect x="-10" y="0" width="20" height="15" fill="#000" stroke="#333" stroke-width="2"/>
    <path d="M-7 0 V-8 Q0 -15 7 -8 V0" fill="none" stroke="#333" stroke-width="2" />
  </g>

  <!-- Desk and terminal -->
  <path d="M200 240 L400 240 L380 270 L220 270 Z" fill="#1c2833" stroke="#2c3e50" stroke-width="3"/>
  <rect x="240" y="180" width="100" height="60" rx="3" ry="3" fill="#000" stroke="#2c3e50" stroke-width="2"/>
  <!-- Replaced "BREACH" text with green phosphor static/logs -->
  <path d="M250 195 H330 M250 205 H310 M250 215 H320" stroke="#2ecc71" stroke-width="1" opacity="0.6" />
  <circle cx="260" cy="195" r="1.5" fill="#2ecc71" opacity="0.8">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- Porthole window -->
  <circle cx="550" cy="300" r="45" fill="#1c2833" stroke="#2c3e50" stroke-width="4"/>
  <circle cx="550" cy="300" r="35" fill="#000"/>
  <!-- Dark sea green shape pressing glass -->
  <path d="M530 280 Q550 260 570 300 Q550 340 530 320" fill="#145a32" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="5s" repeatCount="indefinite" />
  </path>
  
  <!-- Floor details - Industrial plating -->
  <path d="M0 370 H640 V400 H0 Z" fill="#0a0a0a" stroke="#1c2833" stroke-width="1" />
  <line x1="160" y1="370" x2="160" y2="400" stroke="#1c2833" stroke-width="1" />
  <line x1="320" y1="370" x2="320" y2="400" stroke="#1c2833" stroke-width="1" />
  <line x1="480" y1="370" x2="480" y2="400" stroke="#1c2833" stroke-width="1" />

  <!-- Rust/Growth in the corners -->
  <path d="M200 245 Q210 240 220 250" fill="none" stroke="#1d8348" stroke-width="2" opacity="0.4" />
</svg>