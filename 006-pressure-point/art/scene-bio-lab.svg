<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Bio-Lab - Cold, industrial-horror laboratory -->
  <rect width="640" height="400" fill="#00001a"/>
  
  <!-- Ceiling structures with dripping condensation indicators -->
  <path d="M0 0 H640 V40 H0 Z" fill="#0a0a0a" stroke="#1c2833" stroke-width="2" />
  <g stroke="#3498db" stroke-width="1.5" opacity="0.3">
    <line x1="100" y1="40" x2="100" y2="60">
      <animate attributeName="y2" values="60;80;60" dur="2s" repeatCount="indefinite" />
    </line>
    <line x1="320" y1="40" x2="320" y2="70">
      <animate attributeName="y2" values="70;90;70" dur="2.5s" repeatCount="indefinite" />
    </line>
    <line x1="540" y1="40" x2="540" y2="55">
      <animate attributeName="y2" values="55;75;55" dur="1.8s" repeatCount="indefinite" />
    </line>
  </g>

  <!-- Specimen Tanks - Heavy reinforced glass with bioluminescent contents -->
  <g transform="translate(40, 60)">
    <rect width="60" height="130" rx="5" ry="5" fill="#17202a" stroke="#2c3e50" stroke-width="3"/>
    <rect x="5" y="10" width="50" height="110" fill="#001a33" stroke="#1c2833" stroke-width="1"/>
    <!-- Specimen silhouette -->
    <path d="M15 40 Q30 20 45 40 T45 80 Q30 100 15 80 Z" fill="#2ecc71" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" repeatCount="indefinite" />
    </path>
  </g>
  
  <g transform="translate(120, 60)">
    <rect width="60" height="130" rx="5" ry="5" fill="#17202a" stroke="#2c3e50" stroke-width="3"/>
    <rect x="5" y="10" width="50" height="110" fill="#001a33" stroke="#1c2833" stroke-width="1"/>
    <circle cx="30" cy="65" r="15" fill="#58d68d" opacity="0.15">
      <animate attributeName="r" values="12;18;12" dur="5s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Central Cracked Tank - Main atmospheric focal point -->
  <g transform="translate(240, 80)">
    <rect width="160" height="110" rx="3" ry="3" fill="#17202a" stroke="#c0392b" stroke-width="4"/>
    <rect x="10" y="10" width="140" height="90" fill="#000" stroke="#1c2833" stroke-width="1"/>
    <!-- Large cracks replaced by paths -->
    <path d="M30 10 L50 40 L40 100 M80 10 L70 60 L90 100" fill="none" stroke="#2980b9" stroke-width="2.5" opacity="0.6" />
    <!-- Bio-fluid leak indicators -->
    <path d="M40 100 Q80 120 120 100" fill="none" stroke="#2ecc71" stroke-width="3" opacity="0.4" />
  </g>

  <!-- Industrial Workstations -->
  <path d="M80 230 L220 230 L210 280 L90 280 Z" fill="#1c2833" stroke="#2c3e50" stroke-width="3"/>
  <!-- Scientific tool silhouettes -->
  <g transform="translate(140, 210)">
    <path d="M0 20 L20 20 L10 0 Z" fill="#444" stroke="#111" stroke-width="1" />
    <rect x="5" y="15" width="10" height="15" fill="#333" />
  </g>

  <!-- Sonar Ping Device silhouette on workstation -->
  <rect x="250" y="245" width="45" height="25" rx="2" ry="2" fill="#2a2a2a" stroke="#111" stroke-width="1.5"/>
  <circle cx="272" cy="257" r="5" fill="#2ecc71" opacity="0.4">
    <animate attributeName="opacity" values="0.1;0.6;0.1" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- Restricted Door Panel - Replaced text with symbols -->
  <rect x="520" y="240" width="80" height="50" rx="3" ry="3" fill="#1a1a1a" stroke="#c0392b" stroke-width="3"/>
  <!-- Biohazard symbol icon (simplified) -->
  <g transform="translate(560, 265) scale(0.6)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#e74c3c" stroke-width="2.5" />
    <path d="M0 -15 V15 M-15 0 H15" stroke="#e74c3c" stroke-width="2" />
  </g>

  <!-- Floor details - Spilled bio-luminescent fluid -->
  <path d="M0 380 H640 V400 H0 Z" fill="#0a0a0a" stroke="#1c2833" stroke-width="1" />
  <ellipse cx="320" cy="385" rx="100" ry="10" fill="#2ecc71" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="6s" repeatCount="indefinite" />
  </ellipse>
</svg>