<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Industrial mechanical space -->
  <rect width="640" height="400" fill="#000011"/>
  
  <!-- Ceiling with pipes -->
  <rect x="0" y="0" width="640" height="30" fill="#000000"/>
  <rect x="0" y="30" width="640" height="5" fill="#222222"/>
  <rect x="0" y="35" width="640" height="3" fill="#333333"/>
  <rect x="0" y="38" width="640" height="2" fill="#444444"/>
  
  <!-- Steam/steam tendrils -->
  <path d="M100,40 Q110,80 100,120 Q90,160 100,200" stroke="#666666" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M200,40 Q210,70 200,100 Q190,130 200,160" stroke="#666666" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M400,40 Q410,90 400,140 Q390,190 400,240" stroke="#666666" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M500,40 Q510,60 500,80 Q490,100 500,120" stroke="#666666" stroke-width="1" fill="none" opacity="0.3"/>
  
  <!-- Central pressure valve -->
  <circle cx="320" cy="200" r="60" fill="#000022" stroke="#222222" stroke-width="4"/>
  <circle cx="320" cy="200" r="50" fill="#000011" stroke="#333333" stroke-width="2"/>
  <line x1="320" y1="150" x2="320" y2="250" stroke="#333333" stroke-width="4"/>
  <line x1="270" y1="200" x2="370" y2="200" stroke="#333333" stroke-width="4"/>
  <rect x="310" y="140" width="20" height="20" fill="#4A4A4A"/>
  
  <!-- Oxygen canister -->
  <rect x="500" y="150" width="40" height="100" fill="#000022" stroke="#222222" stroke-width="2"/>
  <rect x="510" y="160" width="20" height="10" fill="#00FF00" opacity="0.5"/>
  <line x1="500" y1="200" x2="540" y2="200" stroke="#222222" stroke-width="1"/>
  <line x1="500" y1="220" x2="540" y2="220" stroke="#222222" stroke-width="1"/>
  <rect x="515" y="250" width="10" height="5" fill="#00FF00"/>
  
  <!-- Workbench -->
  <rect x="100" y="280" width="180" height="60" fill="#000022" stroke="#222222" stroke-width="2"/>
  <rect x="110" y="290" width="160" height="40" fill="#000011"/>
  
  <!-- Tools and components on workbench -->
  <rect x="120" y="295" width="15" height="5" fill="#666666"/>
  <rect x="140" y="295" width="10" height="8" fill="#666666"/>
  <rect x="160" y="295" width="20" height="5" fill="#4A4A4A"/>
  <rect x="190" y="295" width="15" height="10" fill="#000022" stroke="#222222" stroke-width="1"/>
  <rect x="220" y="295" width="10" height="5" fill="#666666"/>
  <rect x="240" y="295" width="20" height="10" fill="#000022" stroke="#222222" stroke-width="1"/>
  
  <!-- Generator casings -->
  <rect x="20" y="100" width="80" height="120" fill="#000022" stroke="#222222" stroke-width="2"/>
  <rect x="30" y="110" width="60" height="20" fill="#000011"/>
  <rect x="30" y="140" width="60" height="20" fill="#000011"/>
  <rect x="30" y="170" width="60" height="20" fill="#000011"/>
  
  <rect x="540" y="100" width="80" height="120" fill="#000022" stroke="#222222" stroke-width="2"/>
  <rect x="550" y="110" width="60" height="20" fill="#000011"/>
  <rect x="550" y="140" width="60" height="20" fill="#000011"/>
  <rect x="550" y="170" width="60" height="20" fill="#000011"/>
  
  <!-- Viewport to abyss -->
  <rect x="350" y="100" width="120" height="80" fill="#000000" stroke="#222222" stroke-width="3"/>
  <rect x="355" y="105" width="110" height="70" fill="#000000"/>
  <path d="M380,140 Q400,120 420,140 Q440,160 420,180 Q400,200 380,180 Q360,160 380,140" fill="#001100" opacity="0.5"/>
  
  <!-- Airlock hatch -->
  <rect x="20" y="320" width="60" height="60" fill="#000022" stroke="#FF0000" stroke-width="3"/>
  <circle cx="50" cy="350" r="15" fill="#000000" stroke="#FF0000" stroke-width="2"/>
  <text x="30" y="395" font-family="monospace" font-size="6" fill="#FF0000">AIRLOCK</text>
  
  <!-- Floor details -->
  <rect x="0" y="380" width="640" height="20" fill="#000011"/>
</svg>