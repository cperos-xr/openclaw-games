<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Engineering Bay - Industrial mechanical space -->
  <rect width="640" height="400" fill="#0c0c12"/>
  
  <!-- Piping and Ceiling structures -->
  <g stroke="#1c2833" stroke-width="4">
    <path d="M0 40 H640" />
    <path d="M0 60 H640" />
    <path d="M100 0 V40 M250 0 V60 M400 0 V40 M550 0 V60" stroke-width="6" />
  </g>
  
  <!-- Steam vents - Hand-coded atmospheric vector Indicators -->
  <g stroke="#ffffff" stroke-width="1.5" opacity="0.15">
    <path d="M100 65 Q115 100 100 135" >
      <animate attributeName="opacity" values="0.05;0.3;0.05" dur="3s" repeatCount="indefinite" />
    </path>
    <path d="M400 65 Q385 100 400 135" >
      <animate attributeName="opacity" values="0.05;0.3;0.05" dur="3.5s" repeatCount="indefinite" />
    </path>
  </g>
  
  <!-- Central Heavy Pressure Valve - Main focal point -->
  <circle cx="320" cy="200" r="70" fill="#17202a" stroke="#2c3e50" stroke-width="5"/>
  <circle cx="320" cy="200" r="55" fill="#1c2833" stroke="#2c3e50" stroke-width="2"/>
  <g stroke="#2c3e50" stroke-width="6" stroke-linecap="round">
    <line x1="320" y1="145" x2="320" y2="255" />
    <line x1="265" y1="200" x2="375" y2="200" />
  </g>
  <!-- Pressure indicator gauge icon -->
  <circle cx="280" cy="160" r="12" fill="#000" stroke="#2ecc71" stroke-width="1.5"/>
  <path d="M280 160 L288 152" stroke="#ff4444" stroke-width="2" />

  <!-- Oxygen Storage/Canister Rack -->
  <rect x="500" y="150" width="60" height="120" fill="#17202a" stroke="#2c3e50" stroke-width="2"/>
  <rect x="515" y="165" width="30" height="90" rx="5" ry="5" fill="#0b5345" stroke="#145a32" stroke-width="2" opacity="0.8"/>
  <path d="M515 210 H545" stroke="#145a32" stroke-width="1.5" />

  <!-- Heavy Workbench -->
  <path d="M100 280 L280 280 L270 340 L110 340 Z" fill="#1c2833" stroke="#2c3e50" stroke-width="3"/>
  <!-- Components/Tools - Replaced placeholders with silhouettes -->
  <rect x="130" y="285" width="20" height="4" fill="#333" />
  <path d="M160 285 L180 285 L185 295 L155 295 Z" fill="#444" stroke="#111" stroke-width="1" />
  <circle cx="210" cy="290" r="3" fill="#8B4513" opacity="0.6" />

  <!-- Viewport to the dark abyss -->
  <rect x="350" y="100" width="120" height="85" fill="#000" stroke="#1c2833" stroke-width="4"/>
  <path d="M370 120 Q410 100 450 120" stroke="#2ecc71" stroke-width="1.5" opacity="0.1" />

  <!-- Airlock hatch - Bottom left -->
  <rect x="25" y="325" width="50" height="50" rx="5" ry="5" fill="#1a1a1a" stroke="#c0392b" stroke-width="2.5"/>
  <circle cx="50" cy="350" r="12" fill="none" stroke="#e74c3c" stroke-width="2" opacity="0.5"/>
  <!-- Red arrow indicator -->
  <path d="M50 340 V360 M45 355 L50 360 L55 355" stroke="#e74c3c" stroke-width="2" />

  <!-- Floor details -->
  <path d="M0 380 H640 V400 H0 Z" fill="#0a0a0a" stroke="#1c2833" stroke-width="1" />
  <line x1="320" y1="380" x2="320" y2="400" stroke="#1c2833" stroke-width="1" />
</svg>