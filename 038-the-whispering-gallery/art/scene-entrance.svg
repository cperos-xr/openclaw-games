<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <!-- Marble Floor Pattern -->
    <pattern id="marble-floor" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="#f0f0f0"/>
      <path d="M 0 0 L 100 100 M 50 0 L 100 50 M 0 50 L 50 100" stroke="#ccc" stroke-width="0.5"/>
    </pattern>
    <!-- Moonlight Shaft Pattern -->
    <linearGradient id="moonlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000088;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#000088;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <!-- Layer 1: Background - Dark Museum Hall -->
  <rect width="640" height="400" fill="#050505"/>
  <rect x="0" y="300" width="640" height="100" fill="url(#marble-floor)"/>
  
  <!-- Layer 2: Architecture - Arched Entrance -->
  <g id="arched-entrance" transform="translate(170, 50)">
    <path fill="#1a1a1a" stroke="#444" stroke-width="4" d="m208.7 22.36 22.4 77.23c8.9-1.66 18.1-2.49 27.6-2.49 8.5 0 16.8.68 24.9 2.02l22.2-76.76zm103.1 46.26-10 34.78c15.2 4.8 29.1 12.3 40.8 22.7l25.5-23.8c-16-14.79-35.1-26.35-56.3-33.68zm-108.9.86c-21 7.67-39.9 19.61-55.6 34.72l25.5 23.8c.1-.1.2-.3.4-.4 11.4-10.6 24.9-18.3 39.8-23.4zM97.56 83.35 59.71 139l86.09 30.1c3.7-10 8.6-19.1 14.5-27.1zm318.24 0-60.3 56.35c6.4 8.2 11.7 17.6 15.7 28.1l82.4-28.8zM268 116v317.5h93.4V218.6c0-35.3-11.5-60.4-29.8-77.3-16.2-15-38.3-23.6-63.6-25.3zm-18.6 0c-25.2 1.7-47.3 10.3-63.6 25.3-18.2 16.8-29.7 42-29.7 77.3v214.9h93.3z"/>
    <!-- Darkness beyond entrance -->
    <rect x="180" y="120" width="140" height="200" fill="#000"/>
  </g>

  <!-- Layer 3: Central Statue - Weeping Angel -->
  <g id="weeping-angel" transform="translate(250, 150) scale(0.6)">
    <!-- Angel Statue (Reference Colombian Statue path + wings-ish geometry) -->
    <path fill="#aaa" stroke="#000" stroke-width="2" d="M256 25c-62.125 0-111.195 19.114-145.31 57.02C77.922 118.427 58.765 173.19 57.286 247h53.91c.117-9.742.472-20.34 1.42-31.37-.22-.238-.444-.467-.66-.714-7.73-8.838-10.903-21.857-8.908-39.705.84-10.634 6.332-19.899 14.892-23.652 3.153-1.383 6.422-2.13 9.801-2.399a154.227 154.227 0 0 1 4.21-9.185 126.923 126.923 0 0 1 3.048-5.707V103h25.105C181.958 83.704 213.081 71 256 71s74.042 12.704 95.895 32H377v31.268a126.923 126.923 0 0 1 3.049 5.707 154.227 154.227 0 0 1 4.209 9.185c3.379.27 6.648 1.016 9.8 2.399 8.56 3.753 14.054 13.018 14.893 23.652 1.995 17.848-1.178 30.867-8.908 39.705-.216.247-.44.476-.66.715.948 11.029 1.303 21.627 1.42 31.369h53.91c-1.479-73.81-20.636-128.573-53.402-164.98C367.195 44.114 318.125 25 256 25zm-103 96v14h206v-14H153zm0 32v62h14v-24.896c-.358-1.28-.005-2.142 0-2.633V153h-14zm32 0v7.38c3.425-3 7.44-5.664 12.074-7.38H185zm243.954 100.312L333.7 272.975l11.297 11.298v60.725h-43.123l-28.098-14.049-8.779 8.778v35.275h120.055l5.873-70.482-12.95-64.752z"/>
    <!-- Tuning Fork (Interactive in statue hand) -->
    <g transform="translate(140, 240) scale(0.4)">
       <path fill="#FF8800" stroke="#000" stroke-width="4" d="M255.438 19.938c-12.487-.094-24.863 14.058-28.188 39.968-2.188 17.047 4.64 28.972 14.25 35.125-3.243-4.602-5.02-10.922-4.03-18.81 2.216-17.69 10.448-27.712 18.75-27.814 7.796-.096 15.655 8.56 18.655 27.813 1.305 8.378.14 14.725-2.438 19.218 8.516-5.808 13.958-17.446 11-35.532-4.45-27.22-16.27-39.88-28-39.968zm256.843 83.97l-7.906 29c-4.147-.583-8.29-1.915-12.438-4.25v110.56h38.813V108.72c-3.604 1.357-7.21 2.523-10.813 3.343l-7.656-28.094z"/>
    </g>
  </g>

  <!-- Layer 4: Moonlight Shafts -->
  <path d="M 0 0 L 150 0 L 300 300 L 100 300 Z" fill="url(#moonlight)" opacity="0.4"/>
  <path d="M 400 0 L 550 0 L 640 200 L 500 200 Z" fill="url(#moonlight)" opacity="0.3"/>

  <!-- Layer 5: Dust Motes / Atmosphere -->
  <circle cx="200" cy="100" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="450" cy="250" r="1.5" fill="#fff" opacity="0.3"/>
  <circle cx="100" cy="350" r="1" fill="#fff" opacity="0.2"/>
</svg>