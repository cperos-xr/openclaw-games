<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <!-- Lead-Lined Walls Pattern -->
    <pattern id="lead-walls" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="#222"/>
      <line x1="10" y1="0" x2="10" y2="100" stroke="#000" stroke-width="2"/>
      <line x1="0" y1="10" x2="100" y2="10" stroke="#000" stroke-width="2"/>
      <!-- Tally marks -->
      <line x1="20" y1="20" x2="20" y2="30" stroke="#333" stroke-width="1"/>
      <line x1="25" y1="20" x2="25" y2="30" stroke="#333" stroke-width="1"/>
      <line x1="30" y1="20" x2="30" y2="30" stroke="#333" stroke-width="1"/>
      <line x1="35" y1="20" x2="35" y2="30" stroke="#333" stroke-width="1"/>
      <line x1="18" y1="25" x2="37" y2="25" stroke="#333" stroke-width="1" transform="rotate(20, 27, 25)"/>
    </pattern>
    <!-- Stone Texture with Tallies -->
    <pattern id="stone-tally" width="200" height="150" patternUnits="userSpaceOnUse">
      <rect width="200" height="150" fill="#151515"/>
      <path d="M 10 10 L 10 30 M 15 10 L 15 30 M 20 10 L 20 30 M 25 10 L 25 30 M 5 20 L 30 20" fill="none" stroke="#444" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Layer 1: Background - Cold Stone Womb -->
  <rect width="640" height="400" fill="#050505"/>
  <rect x="50" y="0" width="540" height="300" fill="url(#lead-walls)"/>
  
  <!-- Layer 2: Stone Floor (Static and Cold) -->
  <rect x="0" y="300" width="640" height="100" fill="#0a0a0a" stroke="#000" stroke-width="2"/>
  
  <!-- Layer 3: Central Brass-Bound Chest (Opened) -->
  <g id="vault-chest" transform="translate(250, 180)">
    <!-- Chest (Reference Chest Template) -->
    <path fill="#2a1d08" stroke="#000" stroke-width="3" d="M121 17v30h270V17H121zm16 48v46h30V65h-30zm208 0v46h30V65h-30zm-224 64v30h270v-30H121zm16 48v46h30v-46h-30zm208 0v46h30v-46h-30zm-224 64v30h270v-30H121zm16 48v46h30v-46h-30zm208 0v46h30v-46h-30z"/>
    <!-- Lid (Opened back) -->
    <rect x="0" y="-40" width="140" height="40" fill="#1a1208" stroke="#000" stroke-width="2"/>
    <!-- Interior -->
    <rect x="10" y="10" width="120" height="100" fill="#0d0d0d"/>
  </g>

  <!-- Layer 4: Interactive Item - Spectral Lens -->
  <g id="spectral-lens" transform="translate(280, 220) scale(0.4)">
    <!-- Lens Silhouette (Ref bits from circuitry or tube templates) -->
    <circle cx="50" cy="50" r="30" fill="#AA00FF" opacity="0.6" stroke="#444" stroke-width="4"/>
    <path d="M 20 50 Q 0 50 0 100 M 80 50 Q 100 50 100 100" fill="none" stroke="#555" stroke-width="6"/> <!-- Leather frame legs -->
    <!-- Light drawing -->
    <path d="M 50 50 L -200 -200 M 50 50 L 300 -200" fill="none" stroke="#FFFFFF" opacity="0.05" stroke-width="2"/>
  </g>

  <!-- Layer 5: Atmosphere - Absolute Silence -->
  <!-- Deafening blue-black gradient feel -->
  <rect width="640" height="400" fill="#000088" opacity="0.03"/>
  
  <!-- Layer 6: Iron Dust Stains on floor -->
  <ellipse cx="320" cy="350" rx="150" ry="10" fill="#0d0d0d" opacity="0.8"/>
  <ellipse cx="280" cy="340" rx="50" ry="5" fill="#331100" opacity="0.2"/> <!-- Rust staining -->
</svg>