<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <!-- Acoustic-reflective Stone Pattern -->
    <pattern id="acoustic-stone" width="200" height="200" patternUnits="userSpaceOnUse">
      <rect width="200" height="200" fill="#0d0d0d"/>
      <path d="M 0 0 Q 100 50 200 0 T 0 200 Q 100 150 200 200" stroke="#1a1a1a" stroke-width="3" fill="none"/>
    </pattern>
    <!-- Screaming Soundwaves Pattern -->
    <pattern id="sound-waves" width="40" height="400" patternUnits="userSpaceOnUse">
      <path d="M 0 0 Q 20 200 0 400 M 10 0 Q 30 200 10 400 M 20 0 Q 40 200 20 400 M 30 0 Q 50 200 30 400 M 40 0 Q 60 200 40 400" fill="none" stroke="#600" stroke-width="1" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Layer 1: Background - Perfect Circular Room -->
  <rect width="640" height="400" fill="#000000"/>
  <!-- Curved Walls of reflective stone -->
  <ellipse cx="320" cy="200" rx="350" ry="250" fill="url(#acoustic-stone)" stroke="#333" stroke-width="10"/>

  <!-- Layer 2: Soundwave Atmospheric Force -->
  <rect width="640" height="400" fill="url(#sound-waves)" opacity="0.7"/>
  <rect width="640" height="400" fill="url(#sound-waves)" opacity="0.4" transform="rotate(180, 320, 200)"/>

  <!-- Layer 3: Central Pedestal (Interactive/Solitary) -->
  <g id="central-pedestal" transform="translate(250, 180)">
    <!-- Pedestal Frame (Reference Archery Target bits / column) -->
    <path fill="#222" stroke="#444" stroke-width="4" d="m208.7 22.36 22.4 77.23c8.9-1.66 18.1-2.49 27.6-2.49 8.5 0 16.8.68 24.9 2.02l22.2-76.76z"/>
    <!-- Body -->
    <rect x="30" y="80" width="80" height="150" fill="#151515" stroke="#333" stroke-width="4"/>
    <ellipse cx="70" cy="80" rx="60" ry="20" fill="#1a1a1a" stroke="#444" stroke-width="4"/>
    <!-- Mounting Plate -->
    <rect x="40" y="70" width="60" height="10" fill="#000" stroke="#FFD700" stroke-width="2"/>
  </g>

  <!-- Layer 4: Atmosphere - Fever Pitch Screaming -->
  <rect width="640" height="400" fill="#FF0000" opacity="0.05"/>
  <rect width="640" height="400" fill="#AA00FF" opacity="0.05"/>
  
  <!-- Layer 5: Shadow and Floor Static -->
  <ellipse cx="320" cy="380" rx="200" ry="30" fill="#000" opacity="0.8"/>
  <ellipse cx="320" cy="385" rx="100" ry="10" fill="#200" opacity="0.3"/> <!-- Blood-like resonance shadow -->
</svg>