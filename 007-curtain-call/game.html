  "auditorium": "<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">\n  <!-- Background: Velvet darkness -->\n  <rect width="640" height="400" fill="#0A0008"/>\n  \n  <!-- Auditorium floor -->\n  <rect x="0" y="300" width="640" height="100" fill="#050004"/>\n  \n  <!-- Seats (geometric rows) -->\n  <rect x="50" y="200" width="540" height="80" fill="#1A0015"/>\n  <!-- Seat rows -->\n  <rect x="60" y="210" width="20" height="10" fill="#2B001E"/>\n  <rect x="90" y="210" width="20" height="10" fill="#2B001E"/>\n  <rect x="120" y="210" width="20" height="10" fill="#2B001E"/>\n  <rect x="150" y="210" width="20" height="10" fill="#2B001E"/>\n  <rect x="180" y="210" width="20" height="10" fill="#2B001E"/>\n  <rect x="210" y="210" width="20" height="10" fill="#2B001E"/>\n  <rect x="240" y="210" width="20" height="10" fill="#2B001E"/>\n  <rect x="270" y="210" width="20" height="10" fill="#2B001E"/>\n  <rect x="300" y="210" width="20" height="10" fill="#2B001E"/>\n  <rect x="330" y="210" width="20" height="10" fill="#2B001E"/>\n  <rect x="360" y="210" width="20" height="10" fill="#2B001E"/>\n  <rect x="390" y="210" width="20" height="10" fill="#2B001E"/>\n  <rect x="420" y="210" width="20" height="10" fill="#2B001E"/>\n  <rect x="450" y="210" width="20" height="10" fill="#2B001E"/>\n  <rect x="480" y="210" width="20" height="10" fill="#2B001E"/>\n  <rect x="510" y="210" width="20" height="10" fill="#2B001E"/>\n  <rect x="540" y="210" width="20" height="10" fill="#2B001E"/>\n  <rect x="570" y="210" width="20" height="10" fill="#2B001E"/>\n  \n  <!-- Stage -->\n  <rect x="100" y="100" width="440" height="150" fill="#1A0015" stroke="#4A0035" stroke-width="3"/>\n  <!-- Stage boards -->\n  <line x1="100" y1="150" x2="540" y2="150" stroke="#330028" stroke-width="1"/>\n  <line x1="100" y1="200" x2="540" y2="200" stroke="#330028" stroke-width="1"/>\n  \n  <!-- Curtain (half-raised) -->\n  <rect x="250" y="50" width="140" height="100" fill="#4A0035"/>\n  <rect x="250" y="50" width="10" height="100" fill="#2B001E"/> <!-- Left curtain fold -->\n  <rect x="380" y="50" width="10" height="100" fill="#2B001E"/> <!-- Right curtain fold -->\n  \n  <!-- Ghost light (center stage) -->\n  <rect x="310" y="180" width="20" height="40" fill="#0A0008" stroke="#FFFF00" stroke-width="2"/>\n  <rect x="300" y="210" width="40" height="10" fill="#0A0008" stroke="#FFFF00" stroke-width="2"/>\n  <circle cx="320" cy="190" r="8" fill="#FFFF00"/> <!-- Bulb glow -->\n  \n  <!-- Proscenium arch -->\n  <rect x="80" y="80" width="480" height="20" fill="#0A0008" stroke="#4A0035" stroke-width="3"/>\n  <rect x="100" y="60" width="440" height="20" fill="#0A0008" stroke="#4A0035" stroke-width="3"/>\n  \n  <!-- White rose (on stage) -->\n  <circle cx="320" cy="220" r="5" fill="#FFFFFF"/>\n  <path d="M320,210 Q315,205 320,200 Q325,205 320,210" fill="#FFFFFF"/>\n  \n  <!-- Backstage door (east exit) -->\n  <rect x="520" y="150" width="60" height="100" fill="#0A0008" stroke="#4A0035" stroke-width="2"/>\n  <rect x="530" y="160" width="40" height="20" fill="#1A0015"/> <!-- Door details -->\n  <rect x="530" y="190" width="40" height="20" fill="#1A0015"/>\n  <rect x="540" y="180" width="20" height="10" fill="#4A0035"/> <!-- Push bar -->\n  \n  <!-- Dust/motes -->\n  <circle cx="150" cy="120" r="1" fill="#FFFFFF"/>\n  <circle cx="450" cy="180" r="1" fill="#FFFFFF"/>\n  <circle cx="300" cy="80" r="1" fill="#FFFFFF"/>\n</svg>",
  "backstage": "<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">\n  <!-- Background: Dusty backstage -->\n  <rect width="640" height="400" fill="#1A0015"/>\n  \n  <!-- Floor -->\n  <rect x="0" y="350" width="640" height="50" fill="#0A0008"/>\n  \n  <!-- Walls -->\n  <rect x="0" y="0" width="640" height="50" fill="#0A0008"/>\n  <rect x="0" y="0" width="50" height="350" fill="#0A0008"/>\n  <rect x="590" y="0" width="50" height="350" fill="#0A0008"/>\n  \n  <!-- Cracked mirror (on west wall) -->\n  <rect x="100" y="100" width="120" height="200" fill="#330028" stroke="#4A0035" stroke-width="2"/>\n  <!-- Cracks -->\n  <line x1="120" y1="100" x2="160" y2="180" stroke="#FFFFFF" stroke-width="1"/>\n  <line x1="160" y1="100" x2="180" y2="150" stroke="#FFFFFF" stroke-width="1"/>\n  <line x1="140" y1="150" x2="160" y2="200" stroke="#FFFFFF" stroke-width="1"/>\n  <line x1="110" y1="120" x2="130" y2="170" stroke="#FFFFFF" stroke-width="1"/>\n  \n  <!-- Wooden flats (leaning against walls) -->\n  <rect x="20" y="200" width="80" height="100" fill="#330028" stroke="#4A0035" stroke-width="2"/> <!-- Painted forest -->\n  <rect x="100" y="200" width="100" height="80" fill="#4A0035" stroke="#5B004A" stroke-width="2"/> <!-- Castle turrets -->\n  <rect x="220" y="200" width="80" height="120" fill="#330028" stroke="#4A0035" stroke-width="2"/> <!-- Interior walls -->\n  <rect x="540" y="200" width="80" height="100" fill="#4A0035" stroke="#5B004A" stroke-width="2"/> <!-- More flats -->\n  \n  <!-- Ladder (south, broken) -->\n  <rect x="300" y="200" width="20" height="100" fill="#330028" stroke="#4A0035" stroke-width="2"/>\n  <rect x="290" y="210" width="40" height="10" fill="#330028" stroke="#4A0035" stroke-width="1"/> <!-- Bottom rung -->\n  <rect x="290" y="240" width="40" height="10" fill="#330028" stroke="#4A0035" stroke-width="1"/> <!-- Second rung -->\n  <line x1="290" y1="270" x2="330" y2="270" stroke="#FFFFFF" stroke-width="1"/> <!-- Missing rung (gap) -->\n  <line x1="290" y1="300" x2="330" y2="300" stroke="#FFFFFF" stroke-width="1"/> <!-- Missing rung (gap) -->\n  <rect x="290" y="330" width="40" height="10" fill="#330028" stroke="#4A0035" stroke-width="1"/> <!-- Top rung -->\n  \n  <!-- Workbench -->\n  <rect x="400" y="250" width="150" height="80" fill="#2B001E" stroke="#4A0035" stroke-width="2"/>\n  <rect x="410" y="260" width="20" height="10" fill="#330028"/> <!-- Screwdriver -->\n  <rect x="440" y="260" width="10" height="20" fill="#330028"/> <!-- Coil of rope -->\n  <rect x="470" y="260" width="30" height="15" fill="#8B0000"/> <!-- Tin of stage blood -->\n  \n  <!-- Ropes -->\n  <line x1="100" y1="50" x2="80" y2="150" stroke="#330028" stroke-width="3"/>\n  <line x1="120" y1="60" x2="100" y2="160" stroke="#330028" stroke-width="3"/>\n  <line x1="580" y1="50" x2="560" y2="150" stroke="#330028" stroke-width="3"/>\n  <line x1="560" y1="60" x2="580" y2="160" stroke="#330028" stroke-width="3"/>\n  \n  <!-- Hallway to dressing rooms (south exit) -->\n  <rect x="290" y="340" width="60" height="10" fill="#0A0008"/>\n  <rect x="295" y="340" width="50" height="5" fill="#1A0015"/>\n  \n  <!-- Ladder up to catwalk (exit up) -->\n  <rect x="300" y="50" width="20" height="30" fill="#330028" stroke="#4A0035" stroke-width="2"/>\n</svg>",
  "dressing-rooms": "<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">\n  <!-- Background: Cold hallway -->\n  <rect width="640" height="400" fill="#0A0008"/>\n  \n  <!-- Floor -->\n  <rect x="0" y="350" width="640" height="50" fill="#050004"/>\n  \n  <!-- Hallway walls -->\n  <rect x="0" y="0" width="50" height="400" fill="#0A0008"/>\n  <rect x="590" y="0" width="50" height="400" fill="#0A0008"/>\n  \n  <!-- Dressing room doors -->\n  <rect x="100" y="50" width="60" height="100" fill="#1A0015" stroke="#4A0035" stroke-width="2"/>\n  <rect x="100" y="50" width="10" height="100" fill="#2B001E"/> <!-- Door frame -->\n  <rect x="150" y="50" width="10" height="100" fill="#2B001E"/> <!-- Door frame -->\n  <line x1="130" y1="50" x2="130" y2="150" stroke="#4A0035" stroke-width="1"/> <!-- Star -->\n  \n  <rect x="200" y="50" width="60" height="100" fill="#1A0015" stroke="#4A0035" stroke-width="2"/>\n  <rect x="200" y="50" width="10" height="100" fill="#2B001E"/>\n  <rect x="250" y="50" width="10" height="100" fill="#2B001E"/>\n  <line x1="230" y1="50" x2="230" y2="150" stroke="#4A0035" stroke-width="1"/>\n  \n  <rect x="300" y="50" width="60" height="100" fill="#1A0015" stroke="#4A0035" stroke-width="2"/>\n  <rect x="300" y="50" width="10" height="100" fill="#2B001E"/>\n  <rect x="350" y="50" width="10" height="100" fill="#2B001E"/>\n  <line x1="330" y1="50" x2="330" y2="150" stroke="#4A0035" stroke-width="1"/>\n  \n  <rect x="400" y="50" width="60" height="100" fill="#1A0015" stroke="#4A0035" stroke-width="2"/>\n  <rect x="400" y="50" width="10" height="100" fill="#2B001E"/>\n  <rect x="450" y="50" width="10" height="100" fill="#2B001E"/>\n  <line x1="430" y1="50" x2="430" y2="150" stroke="#4A0035" stroke-width="1"/>\n  \n  <rect x="500" y="50" width="60" height="100" fill="#1A0015" stroke="#4A0035" stroke-width="2"/>\n  <rect x="500" y="50" width="10" height="100" fill="#2B001E"/>\n  <rect x="550" y="50" width="10" height="100" fill="#2B001E"/>\n  <line x1="530" y1="50" x2="530" y2="150" stroke="#4A0035" stroke-width="1"/>\n  \n  <!-- Open dressing room (slightly open door) -->\n  <rect x="180" y="180" width="80" height="120" fill="#0A0008" stroke="#4A0035" stroke-width="2"/>\n  <rect x="180" y="180" width="10" height="120" fill="#2B001E"/> <!-- Door frame -->\n  <rect x="250" y="180" width="10" height="120" fill="#2B001E"/> <!-- Door frame -->\n  \n  <!-- Vanity table (inside open room) -->\n  <rect x="200" y="220" width="100" height="60" fill="#1A0015" stroke="#4A0035" stroke-width="2"/>\n  <rect x="220" y="240" width="60" height="20" fill="#330028"/> <!-- Mirror -->\n  <rect x="230" y="200" width="40" height="10" fill="#4A0035"/> <!-- Lipstick stain -->\n  <rect x="210" y="260" width="20" height="10" fill="#FF8800"/> <!-- Powder puff -->\n  <rect x="240" y="260" width="20" height="10" fill="#FFFF00"/> <!-- Rouge -->\n  <rect x="270" y="260" width="20" height="10" fill="#FF0000"/> <!-- More rouge -->\n  \n  <!-- Makeup kit (on vanity) -->\n  <rect x="250" y="230" width="40" height="30" fill="#8B004B" stroke="#AA00FF" stroke-width="2"/>\n  <rect x="260" y="240" width="20" height="10" fill="#FFFFFF"/> <!-- Mirror inside -->\n  \n  <!-- Costume rack -->\n  <rect x="350" y="150" width="20" height="180" fill="#2B001E" stroke="#4A0035" stroke-width="2"/>\n  <line x1="360" y1="160" x2="360" y2="300" stroke="#4A0035" stroke-width="1"/> <!-- Hangers -->\n  <line x1="360" y1="190" x2="360" y2="300" stroke="#4A0035" stroke-width="1"/>\n  <line x1="360" y1="220" x2="360" y2="300" stroke="#4A0035" stroke-width="1"/>\n  <line x1="360" y1="250" x2="360" y2="300" stroke="#4A0035" stroke-width="1"/>\n  \n  <!-- Sequined dress (on rack) -->\n  <rect x="300" y="200" width="100" height="80" fill="#AA00FF"/>\n  <circle cx="320" cy="210" r="2" fill="#FFFFFF"/> <!-- Sequins -->\n  <circle cx="340" cy="220" r="2" fill="#FFFFFF"/>\n  <circle cx="310" cy="230" r="2" fill="#FFFFFF"/>\n  <circle cx="350" cy="210" r="2" fill="#FFFFFF"/>\n  \n  <!-- Moth-eaten tuxedo (on rack) -->\n  <rect x="300" y="290" width="100" height="60" fill="#1A0015"/>\n  <rect x="310" y="300" width="20" height="10" fill="#FFFFFF"/> <!-- Moth holes -->\n  <rect x="340" y="310" width="20" height="10" fill="#FFFFFF"/>\n  <rect x="320" y="320" width="20" height="10" fill="#FFFFFF"/>\n  \n  <!-- Silver hairbrush (on vanity) -->\n  <rect x="270" y="220" width="15" height="30" fill="#C0C0C0" stroke="#FFFFFF" stroke-width="1"/>\n  <rect x="272" y="222" width="11" height="5" fill="#8B004B"/> <!-- Bristles -->\n  \n  <!-- Humming sound waves (from mirror) -->\n  <path d="M250,180 Q260,160 270,180" stroke="#FFFFFF" stroke-width="1" fill="none"/>\n  <path d="M260,180 Q270,160 280,180" stroke="#FFFFFF" stroke-width="1" fill="none"/>\n  <path d="M270,180 Q280,160 290,180" stroke="#FFFFFF" stroke-width="1" fill="none"/>\n  \n  <!-- Bricked-up archway (end of hallway) -->\n  <rect x="290" y="0" width="60" height="400" fill="#2B001E"/>\n  <rect x="300" y="0" width="40" height="400" fill="#1A0015"/>\n  <rect x="310" y="0" width="20" height="50" fill="#2B001E"/>\n  <rect x="310" y="100" width="20" height="50" fill="#2B001E"/>\n  <rect x="310" y="200" width="20" height="50" fill="#2B001E"/>\n  <rect x="310" y="300" width="20" height="50" fill="#2B001E"/>\n</svg>",
  "catwalk": "<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">\n  <!-- Background: Dark gridwalk -->\n  <rect width="640" height="400" fill="#0A0008"/>\n  \n  <!-- Catwalk grid (metal walkway) -->\n  <rect x="20" y="150" width="600" height="20" fill="#1A0015" stroke="#4A0035" stroke-width="2"/>\n  <rect x="20" y="200" width="600" height="20" fill="#1A0015" stroke="#4A0035" stroke-width="2"/>\n  <rect x="20" y="250" width="600" height="20" fill="#1A0015" stroke="#4A0035" stroke-width="2"/>\n  \n  <!-- Grid supports -->\n  <rect x="40" y="150" width="10" height="100" fill="#330028" stroke="#4A0035" stroke-width="1"/>\n  <rect x="120" y="150" width="10" height="100" fill="#330028" stroke="#4A0035" stroke-width="1"/>\n  <rect x="200" y="150" width="10" height="100" fill="#330028" stroke="#4A0035" stroke-width="1"/>\n  <rect x="280" y="150" width="10" height="100" fill="#330028" stroke="#4A0035" stroke-width="1"/>\n  <rect x="360" y="150" width="10" height="100" fill="#330028" stroke="#4A0035" stroke-width="1"/>\n  <rect x="440" y="150" width="10" height="100" fill="#330028" stroke="#4A0035" stroke-width="1"/>\n  <rect x="520" y="150" width="10" height="100" fill="#330028" stroke="#4A0035" stroke-width="1"/>\n  <rect x="600" y="150" width="10" height="100" fill="#330028" stroke="#4A0035" stroke-width="1"/>\n  \n  <!-- Lighting control board -->\n  <rect x="50" y="100" width="100" height="80" fill="#1A0015" stroke="#4A0035" stroke-width="2"/>\n  <rect x="60" y="110" width="20" height="10" fill="#330028"/> <!-- Dead indicators -->\n  <rect x="60" y="130" width="20" height="10" fill="#330028"/>\n  <rect x="90" y="110" width="20" height="10" fill="#330028"/>\n  <rect x="90" y="130" width="20" height="10" fill="#FF0000"/> <!-- Few LEDs flickering weakly -->\n  <rect x="60" y="150" width="20" height="10" fill="#330028"/>\n  <rect x="90" y="150" width="20" height="10" fill="#00FF00"/> <!-- Few LEDs flickering weakly -->\n  \n  <!-- Cue she * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            line-height: 1.6;
            padding: 12px;
            max-width: 720px;
            margin: 0 auto;
        }

        header { text-align: center; margin-bottom: 8px; }

        h1 {
            font-size: 14px;
            color: #0f0;
            text-shadow: 0 0 6px #0f0;
            margin-bottom: 4px;
        }

        h2 { font-size: 10px; color: #080; margin-bottom: 6px; }

        #scene-name {
            font-size: 14px;
            text-align: center;
            margin-bottom: 8px;
            color: #0f0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 4px #0f0;
        }

        /* --- Art panel: full width, 16:9 ratio --- */
        .art-panel {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: 2px solid #0f0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin-bottom: 8px;
        }

        #art-display {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #art-display img,
        #art-display svg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* --- Text panel --- */
        .text-panel {
            border: 2px solid #0f0;
            background-color: #000;
            padding: 12px;
            margin-bottom: 8px;
        }

        #text-display {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #033;
            scrollbar-width: thin;
            scrollbar-color: #0f0 #000;
        }

        #text-display::-webkit-scrollbar { width: 4px; }
        #text-display::-webkit-scrollbar-track { background: #000; }
        #text-display::-webkit-scrollbar-thumb { background: #0f0; }

        #text-display p { margin-bottom: 8px; color: #0f0; }
        #text-display .system { color: #0a0; font-style: italic; }
        #text-display .success { color: #0f0; font-weight: bold; animation: itemGlow 1s infinite alternate; }
        #text-display .locked { color: #f00; font-weight: bold; }
        #text-display .error { color: #f00; }
        #text-display .hint { color: #FFAA00; font-style: italic; }

        .hint-toggle {
            background-color: #000;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 2px 6px;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            cursor: pointer;
            margin-top: 4px;
        }
        .hint-toggle:hover { background-color: #0f0; color: #000; }

        /* --- Command buttons: equal-width row --- */
        .command-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .cmd-btn {
            background-color: #000;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 6px 10px;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            min-width: 60px;
            text-align: center;
        }
        .cmd-btn:hover, .cmd-btn.active { background-color: #0f0; color: #000; }

        /* --- Inventory + Exits: 2-col on tablet+, stacked on mobile --- */
        .panels-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 8px;
        }

        @media (max-width: 480px) {
            .panels-row { grid-template-columns: 1fr; }
            h1 { font-size: 12px; }
            .cmd-btn { font-size: 9px; padding: 5px 6px; }
        }

        .inventory-panel, .exits-panel {
            border: 2px solid #0f0;
            background-color: #000;
            padding: 10px;
        }

        .inventory-panel h3, .exits-panel h3 {
            font-size: 10px;
            margin-bottom: 6px;
            color: #0f0;
            border-bottom: 1px solid #033;
            padding-bottom: 4px;
        }

        #inventory-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            min-height: 20px;
        }

        .inv-item {
            border: 1px solid #0f0;
            padding: 3px 6px;
            font-size: 9px;
            cursor: pointer;
            background-color: #000;
            color: #0f0;
        }
        .inv-item.selected { background-color: #0f0; color: #000; }

        #exits-bar { display: flex; flex-wrap: wrap; gap: 6px; }

        .exit-btn {
            background-color: #000;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 5px 8px;
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            cursor: pointer;
        }
        .exit-btn.available:hover { background-color: #0f0; color: #000; }

        .look-target { color: #0af; text-decoration: underline; cursor: pointer; }
        .look-target:hover { color: #0ff; }

        /* --- Animations --- */
        @keyframes puzzle-solved {
            0% { filter: brightness(1); }
            50% { filter: brightness(2); }
            100% { filter: brightness(1); }
        }

        @keyframes itemGlow {
            0% { text-shadow: 0 0 5px #0f0; }
            100% { text-shadow: 0 0 15px #0f0; }
        }

        .puzzle-solved { animation: puzzle-solved 0.6s ease-in-out; }

        footer {
            margin-top: 12px;
            text-align: center;
            font-size: 8px;
            color: #080;
            padding: 8px 0;
        }
    </style>
</head>

// ---- Game State ----
const state = {
  currentScene: 'midway',
  inventory: [],
  solvedPuzzles: [],
  visitedScenes: ['midway'],
  activeCommand: null,
  selectedItem: null,
  won: false,
  hintsEnabled: true,
  hintTimer: null,
  hintIndex: 0
};

// ---- DOM References ----
const artDisplay = document.getElementById('art-display');
const sceneName = document.getElementById('scene-name');
const textDisplay = document.getElementById('text-display');
const invBar = document.getElementById('inventory-bar');
const exitsBar = document.getElementById('exits-bar');

// ---- Helper: Get items available in a scene (not yet picked up) ----
function getAvailableItems(sceneId) {
  const scene = GAME_DATA.scenes.find(s => s.id === sceneId);
  if (!scene) return [];
  return (scene.items || []).filter(id => !state.inventory.includes(id));
}

// ---- Helper: Get puzzles in a scene that aren't solved ----
function getUnsolvedPuzzles(sceneId) {
  return GAME_DATA.puzzles.filter(p =>
    p.scene === sceneId && !state.solvedPuzzles.includes(p.id)
  );
}

// ---- Check if an exit is blocked by an unsolved puzzle ----
function isExitBlocked(sceneId, direction) {
  const blocker = GAME_DATA.puzzles.find(p =>
    p.blocksExit &&
    p.blocksExit.scene === sceneId &&
    p.blocksExit.direction === direction &&
    !state.solvedPuzzles.includes(p.id)
  );
  return blocker || null;
}

// ---- Display Functions ----
function addText(text, cls = '') {
  const p = document.createElement('p');
  p.className = cls;
  p.innerHTML = text;
  textDisplay.appendChild(p);
  textDisplay.scrollTop = textDisplay.scrollHeight;
}

function clearText() { textDisplay.innerHTML = ''; }

// ---- Puzzle Solved Visual Effect ----
function showPuzzleSolvedEffect() {
  if (artDisplay) {
    artDisplay.classList.add('puzzle-solved');
    setTimeout(() => artDisplay.classList.remove('puzzle-solved'), 600);
  }
}

// ---- Item Glow Effect ----
function showItemGlow() {
  // Highlight newest inventory item
  const items = invBar.querySelectorAll('.inv-item');
  if (items.length > 0) {
    const lastItem = items[items.length - 1];
    lastItem.classList.add('item-new');
    setTimeout(() => lastItem.classList.remove('item-new'), 2000);
  }
}

// ---- Hint System ----
function clearHintTimer() {
  if (state.hintTimer) {
    clearTimeout(state.hintTimer);
    state.hintTimer = null;
  }
  state.hintIndex = 0;
}

function startHintTimer(sceneId) {
  clearHintTimer();
  if (!state.hintsEnabled || !GAME_DATA.hints || !GAME_DATA.hints[sceneId]) return;
  const hints = GAME_DATA.hints[sceneId];
  if (hints.length === 0) return;
  state.hintTimer = setTimeout(() => showHint(sceneId, 0), hints[0].delay * 1000);
}

function showHint(sceneId, index) {
  if (!state.hintsEnabled || !GAME_DATA.hints || !GAME_DATA.hints[sceneId]) return;
  const hints = GAME_DATA.hints[sceneId];
  if (index >= hints.length) return;
  const hint = hints[index];
  addText(`🤔 HINT: ${hint.text}`, 'hint');
  state.hintIndex = index + 1;
  if (state.hintIndex < hints.length) {
    state.hintTimer = setTimeout(() => showHint(sceneId, state.hintIndex), hints[state.hintIndex].delay * 1000);
  }
}

// ---- Render Scene ----
function renderScene(sceneId) {
  const scene = GAME_DATA.scenes.find(s => s.id === sceneId);
  if (!scene) {
    addText('ERROR: Scene not found!', 'error');
    return;
  }

  clearHintTimer();
  state.currentScene = sceneId;
  if (!state.visitedScenes.includes(sceneId)) {
    state.visitedScenes.push(sceneId);
  }

  // Update scene name
  sceneName.textContent = scene.name.toUpperCase();

  // Update art display
  const artKey = sceneId;
  let artHtml = null;
  if (typeof GAME_ART !== 'undefined' && GAME_ART[artKey]) { artHtml = GAME_ART[artKey]; }
  else if (window.GAME_ART && window.GAME_ART[artKey]) { artHtml = window.GAME_ART[artKey]; }
  
  if (artHtml) { artDisplay.innerHTML = artHtml; } else {
    artDisplay.innerHTML = '<span class="no-art">[ ' + scene.name.toUpperCase() + ' ]</span>';
  }

  // Display scene prose
  clearText();
  addText(scene.prose);

  // Show available items in scene
  const availableItems = getAvailableItems(sceneId);
  if (availableItems.length > 0) {
    const itemNames = availableItems.map(id => {
      const item = GAME_DATA.items.find(i => i.id === id);
      return item ? `<span class="look-target" data-look="${id}" data-type="item-pickup">${item.name}</span>` : id;
    });
    addText('You notice: ' + itemNames.join(', '), 'system');
  }

  // Check if funhouse door is locked
  const funhouseBlock = isExitBlocked('midway', 'funhouse_door');
  if (sceneId === 'midway' && funhouseBlock) {
    addText('[The funhouse door is secured by a heavy padlock and chain.]', 'locked');
  }

  // Show unsolved puzzle hints
  const unsolved = getUnsolvedPuzzles(sceneId);
  unsolved.forEach(puzzle => {
    if (puzzle.requires.length > 0 && puzzle.id !== 'funhouse_padlock') {
      const hasReqs = puzzle.requires.every(r => state.inventory.includes(r));
      if (hasReqs) {
        addText(`You have everything you need to deal with the ${puzzle.action.toLowerCase().split(' ').slice(-2).join(' ')}...`, 'system');
      }
    }
  });

  // Render exits
  renderExits(scene.exits || {});

  // Render inventory
  renderInventory();

  // Check win condition
  checkWin();

  // Start hint timer for this scene
  startHintTimer(sceneId);

  // Save state
  saveState();
}

// ---- Render Exits ----
function renderExits(exits) {
  exitsBar.innerHTML = '';

  // Display name mappings for special exits
  const exitLabels = {
    'north': 'NORTH',
    'south': 'SOUTH',
    'east': 'EAST',
    'west': 'WEST',
    'funhouse_door': 'FUNHOUSE'
  };

  // Standard directions
  const directions = ['north', 'south', 'east', 'west', 'funhouse_door'];

  directions.forEach(dir => {
    if (!exits[dir]) return; // No exit in this direction

    // Check if blocked
    const blocker = isExitBlocked(state.currentScene, dir);
    const isBlocked = blocker !== null;

    const btn = document.createElement('button');
    btn.className = 'exit-btn';
    btn.textContent = exitLabels[dir] || dir.toUpperCase();

    if (isBlocked) {
      btn.classList.add('blocked');
      btn.title = blocker.blockedMessage || 'This way is blocked.';
      btn.onclick = () => {
        addText(`[${blocker.blockedMessage || 'Something prevents you from going that way.'}]`, 'locked');
      };
    } else {
      btn.classList.add('available');
      btn.onclick = () => go(exits[dir]);
    }

    exitsBar.appendChild(btn);
  });
}

// ---- Render Inventory ----
function renderInventory() {
  // Remove existing items
  const existingItems = invBar.querySelectorAll('.inv-item');
  existingItems.forEach(el => el.remove());

  let empty = document.getElementById('inv-empty');
  if (!empty) {
    empty = document.createElement('span');
    empty.id = 'inv-empty';
    empty.style.color = '#226622';
    empty.textContent = '[ empty ]';
    invBar.appendChild(empty);
  }

  if (state.inventory.length === 0) {
    empty.style.display = '';
  } else {
    empty.style.display = 'none';
    state.inventory.forEach(itemId => {
      const item = GAME_DATA.items.find(i => i.id === itemId);
      if (!item) return;
      const el = document.createElement('span');
      el.className = 'inv-item' + (state.selectedItem === itemId ? ' selected' : '');
      el.textContent = item.name;
      el.dataset.itemId = itemId;
      el.onclick = () => selectItem(itemId);
      invBar.appendChild(el);
    });
  }
}

// ---- Select Item ----
function selectItem(itemId) {
  if (state.selectedItem === itemId) {
    state.selectedItem = null;
    addText('Item deselected.', 'system');
  } else {
    state.selectedItem = itemId;
    const item = GAME_DATA.items.find(i => i.id === itemId);
    addText(`Selected: <strong>${item.name}</strong>. Now click on something to use it on.`, 'system');
  }
  renderInventory();
}

// ---- Set Active Command ----
function setCommand(cmd) {
  // Toggle off if same command clicked
  if (state.activeCommand === cmd) {
    state.activeCommand = null;
    document.querySelectorAll('.cmd-btn').forEach(b => b.classList.remove('active'));
    return;
  }

  state.activeCommand = cmd;
  document.querySelectorAll('.cmd-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cmd === cmd);
  });

  if (cmd === 'look') {
    const scene = GAME_DATA.scenes.find(s => s.id === state.currentScene);
    if (scene && scene.lookDescriptions) {
      const targets = Object.keys(scene.lookDescriptions);
      if (targets.length > 0) {
        addText('You can examine: ' + targets.map(t =>
          `<span class="look-target" data-look="${t}" data-type="look">${formatTargetName(t)}</span>`
        ).join(', '), 'system');
      }
    } else {
      addText('Nothing special to examine here.', 'system');
    }
  } else if (cmd === 'take') {
    const available = getAvailableItems(state.currentScene);
    if (available.length > 0) {
      addText('Click an item to pick it up.', 'system');
    } else {
      addText('Nothing here to take.', 'system');
    }
  } else if (cmd === 'use') {
    if (state.inventory.length > 0) {
      addText('Select an item from your inventory, then click a target to use it on.', 'system');
    } else {
      addText('You have nothing to use.', 'system');
    }
  } else if (cmd === 'examine') {
    const scene = GAME_DATA.scenes.find(s => s.id === state.currentScene);
    if (scene && scene.lookDescriptions) {
      const targets = Object.keys(scene.lookDescriptions);
      if (targets.length > 0) {
        addText('Click something to examine it: ' + targets.map(t =>
          `<span class="look-target" data-look="${t}" data-type="examine">${formatTargetName(t)}</span>`
        ).join(', '), 'system');
      }
    }
  }
}

// ---- Format target names for display ----
function formatTargetName(id) {
  return id.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

// ---- Look at something ----
function lookAt(target) {
  const scene = GAME_DATA.scenes.find(s => s.id === state.currentScene);

  // Check scene look descriptions
  if (scene && scene.lookDescriptions && scene.lookDescriptions[target]) {
    addText(scene.lookDescriptions[target]);
    return;
  }

  // Check if it's an item in inventory or scene
  const item = GAME_DATA.items.find(i => i.id === target);
  if (item) {
    addText(item.description);
    return;
  }

  addText("You don't see anything special about that.", 'system');
}

// ---- Pick up an item ----
function takeItem(itemId) {
  if (state.inventory.includes(itemId)) {
    addText("You already have that.", 'system');
    return;
  }

  const item = GAME_DATA.items.find(i => i.id === itemId);
  if (!item) return;

  const scene = GAME_DATA.scenes.find(s => s.id === state.currentScene);
  if (!scene || !(scene.items || []).includes(itemId)) {
    addText("You can't take that.", 'system');
    return;
  }

  state.inventory.push(itemId);
  addText(`You picked up: <strong>${item.name}</strong> — ${item.description}`, 'success');
  renderInventory();
  saveState();
}

// ---- Use item on target ----
function useItemOn(itemId, targetId) {
  if (!state.inventory.includes(itemId)) {
    addText("You don't have that item.", 'error');
    return;
  }

  const item = GAME_DATA.items.find(i => i.id === itemId);
  if (!item) return;

  // Check if this item solves a puzzle in the current scene
  const puzzle = GAME_DATA.puzzles.find(p =>
    p.scene === state.currentScene &&
    p.requires.includes(itemId) &&
    !state.solvedPuzzles.includes(p.id)
  );

  // Also check if target matches puzzle's useOn or action
  const targetMatch = targetId === item.usedOn ||
                       targetId === puzzle?.id ||
                       formatTargetName(targetId).toLowerCase().includes(item.usedOn?.replace(/_/g, ' ').split(' ')[0] || '');

  if (puzzle && (targetMatch || state.activeCommand === 'use')) {
    // Check all requirements are met
    const hasAllReqs = puzzle.requires.every(req => state.inventory.includes(req));
    if (hasAllReqs) {
      // Solve the puzzle!
      state.solvedPuzzles.push(puzzle.id);

      // Visual effect
      showPuzzleSolvedEffect();

      addText(puzzle.result, 'success');

      // Remove used item if it was consumed (key opens door = consumed)
      if (puzzle.id === 'funhouse_padlock') {
        const keyIdx = state.inventory.indexOf('rusty_key');
        if (keyIdx !== -1) state.inventory.splice(keyIdx, 1);
        addText('<em>The rusty key crumbles to dust after use.</em>', 'system');
      }

      // Reveal new items
      (puzzle.reveals || []).forEach(revealId => {
        const revealItem = GAME_DATA.items.find(i => i.id === revealId);
        if (revealItem) {
          // Item is added to scene, player must pick it up
          addText(`Something has appeared: <span class="look-target" data-look="${revealId}" data-type="item-pickup">${revealItem.name}</span>`, 'success');
        }
      });

      renderInventory();
      checkWin();
      saveState();
      return;
    }
  }

  // Try generic match
  if (puzzle && puzzle.requires.includes(itemId)) {
    state.solvedPuzzles.push(puzzle.id);
    showPuzzleSolvedEffect();
    addText(puzzle.result, 'success');

    (puzzle.reveals || []).forEach(revealId => {
      const revealItem = GAME_DATA.items.find(i => i.id === revealId);
      if (revealItem) {
        addText(`Something has appeared: <span class="look-target" data-look="${revealId}" data-type="item-pickup">${revealItem.name}</span>`, 'success');
      }
    });

    renderInventory();
    checkWin();
    saveState();
    return;
  }

  addText("That doesn't seem to work here.", 'system');
}

// ---- Try to solve any scene puzzle (for safe/code puzzles) ----
function tryScenePuzzle() {
  const unsolved = getUnsolvedPuzzles(state.currentScene);

  for (const puzzle of unsolved) {
    // Puzzles with no requirements (like entering a code)
    if (puzzle.requires.length === 0) {
      state.solvedPuzzles.push(puzzle.id);
      showPuzzleSolvedEffect();
      addText(puzzle.result, 'success');

      (puzzle.reveals || []).forEach(revealId => {
        const revealItem = GAME_DATA.items.find(i => i.id === revealId);
        if (revealItem) {
          addText(`You found: <strong>${revealItem.name}</strong>!`, 'success');
          // Auto-add to inventory for safe reward
          if (!state.inventory.includes(revealId)) {
            state.inventory.push(revealId);
          }
        }
      });

      renderInventory();
      checkWin();
      saveState();
      return true;
    }

    // Puzzles where all requirements are already in inventory
    const hasAllReqs = puzzle.requires.every(req => state.inventory.includes(req));
    if (hasAllReqs) {
      state.solvedPuzzles.push(puzzle.id);
      showPuzzleSolvedEffect();
      addText(puzzle.result, 'success');

      (puzzle.reveals || []).forEach(revealId => {
        const revealItem = GAME_DATA.items.find(i => i.id === revealId);
        if (revealItem) {
          addText(`You found: <strong>${revealItem.name}</strong>!`, 'success');
          if (!state.inventory.includes(revealId)) {
            state.inventory.push(revealId);
          }
        }
      });

      renderInventory();
      checkWin();
      saveState();
      return true;
    }
  }

  return false;
}

// ---- Move to another scene ----
function go(sceneId) {
  addText('---', 'system');
  renderScene(sceneId);
}

// ---- Check Win Condition ----
function checkWin() {
  if (state.won) return;

  const wc = GAME_DATA.winCondition;
  if (!wc) return;

  if (state.currentScene === wc.scene) {
    // Check if player has signal flare and can fire it
    if (state.inventory.includes('signal_flare') && !state.solvedPuzzles.includes('finale_flare')) {
      addText('<em>You could fire the signal flare here...</em>', 'system');
    }

    if (state.solvedPuzzles.includes('finale_flare')) {
      state.won = true;
      addText('', '');
      addText('═══════════════════════════════════════', 'success');
      addText('*** ' + wc.description + ' ***', 'success');
      addText('═══════════════════════════════════════', 'success');
      addText('', '');
      addText('🎉 CONGRATULATIONS! YOU HAVE COMPLETED THE GAME! 🎉', 'success');
      addText('', '');
      addText('The carnival fades behind you as rescue lights approach.', 'system');
      addText('The Last Showman\'s Carnival claims no more victims tonight.', 'system');
      addText('', '');
      addText('Refresh the page to play again.', 'system');
    }
  }
}

// ---- Persistence ----
function saveState() {
  try {
    localStorage.setItem('game-' + GAME_DATA.slug, JSON.stringify(state));
  } catch(e) {}
}

function loadState() {
  try {
    const saved = localStorage.getItem('game-' + GAME_DATA.slug);
    if (saved) {
      const s = JSON.parse(saved);
      Object.assign(state, s);
      return true;
    }
  } catch(e) {}
  return false;
}

// ---- Event Listeners ----
document.querySelectorAll('.cmd-btn').forEach(btn => {
  btn.onclick = () => setCommand(btn.dataset.cmd);
});

document.addEventListener('click', (e) => {
  const target = e.target.closest('.look-target');
  if (!target) return;

  const targetId = target.dataset.look;
  const targetType = target.dataset.type;

  // Item pickup
  if (targetType === 'item-pickup') {
    takeItem(targetId);
    return;
  }

  // If using an item
  if (state.activeCommand === 'use' && state.selectedItem) {
    useItemOn(state.selectedItem, targetId);
    state.selectedItem = null;
    renderInventory();
    return;
  }

  // Look/examine
  lookAt(targetId);
});

// ---- Special: handle "use" on scene elements ----
document.addEventListener('click', (e) => {
  if (state.activeCommand === 'use' && !state.selectedItem) {
    // Check if user clicked on a puzzle target while in USE mode
    // Try to auto-solve if player has right items
    if (tryScenePuzzle()) {
      // Puzzle was solved
    }
  }
});

// ---- Initialize Game ----
function init() {
  addText('═══════════════════════════════════════', 'success');
  addText('  THE LAST SHOWMAN\'S CARNIVAL', 'success');
  addText('═══════════════════════════════════════', 'success');
  addText('', '');
  addText(GAME_DATA.setting, 'system');
  addText('', '');
  addText('Commands: <strong>LOOK</strong> | <strong>TAKE</strong> | <strong>USE</strong> | <strong>EXAMINE</strong>', 'system');
  addText('Click exits to move. Click highlighted items to interact.', 'system');
  addText('---', 'system');

  if (!loadState()) {
    renderScene('midway');
  } else {
    renderScene(state.currentScene);
    addText('[Game restored from save]', 'system');
  }

  // Update hint toggle button
  const hintToggle = document.getElementById('hint-toggle');
  if (hintToggle) {
    hintToggle.textContent = state.hintsEnabled ? 'HINTS: ON' : 'HINTS: OFF';
    hintToggle.addEventListener('click', () => {
      state.hintsEnabled = !state.hintsEnabled;
      hintToggle.textContent = state.hintsEnabled ? 'HINTS: ON' : 'HINTS: OFF';
      if (!state.hintsEnabled) {
        clearHintTimer();
      } else {
        startHintTimer(state.currentScene);
      }
      saveState();
    });
  }
}

// Start the game
init();
</script></body>
