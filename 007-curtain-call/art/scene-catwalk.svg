<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <!-- Pattern for Metal Mesh Walkway -->
    <pattern id="walkway-mesh" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 0 0 L 20 20 M 20 0 L 0 20" stroke="#4A0035" stroke-width="2"/>
    </pattern>
    <!-- Distant Lights Pattern -->
    <pattern id="distant-lights" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="3" fill="#8B0000" opacity="0.4"/>
      <circle cx="70" cy="50" r="2" fill="#33FF33" opacity="0.4"/>
    </pattern>
  </defs>
  <!-- Background: Deep Void of the Fly Lofts (Upward View) -->
  <rect width="640" height="400" fill="#0A0008"/>
  <rect width="640" height="400" fill="url(#distant-lights)"/>

  <!-- Catwalk Lattice (Structure/Midground) -->
  <g id="catwalk-structure" transform="translate(20, 150)">
    <path d="M 0 0 L 600 0 L 600 80 L 0 80 Z" fill="#1A0015" stroke="#4A0035" stroke-width="4"/>
    <!-- Mesh Flooring (Walking Surface) -->
    <rect width="600" height="20" fill="url(#walkway-mesh)"/>
    <!-- Guard Railing -->
    <path d="M 0 -60 L 600 -60 M 0 -30 L 600 -30" stroke="#4A0035" stroke-width="3" opacity="0.8"/>
    <path d="M 40 -60 L 40 80 M 160 -60 L 160 80 M 280 -60 L 280 80 M 400 -60 L 400 80 M 520 -60 L 520 80" stroke="#4A0035" stroke-width="2"/>
  </g>

  <!-- Lighting Rack (Upper Foreground) -->
  <g id="lighting-rack" transform="translate(100, 20)">
    <path d="M 0 0 L 440 0 L 440 20 L 0 20 Z" fill="#1A0015" stroke="#4A0035" stroke-width="3"/>
    <!-- Hanging Spotlights (Silhouettes) -->
    <path d="M 40 20 L 70 20 L 55 50 Z" fill="#330028" stroke="#4A0035" stroke-width="2"/>
    <path d="M 160 20 L 190 20 L 175 50 Z" fill="#330028" stroke="#4A0035" stroke-width="2"/>
    <path d="M 280 20 L 310 20 L 295 50 Z" fill="#330028" stroke="#4A0035" stroke-width="2"/>
    <path d="M 400 20 L 430 20 L 415 50 Z" fill="#8B0000" stroke="#4A0035" stroke-width="2"/> <!-- Glowing Red Danger Light -->
  </g>

  <!-- Atmosheric Indicator: Catwalk Safety Sign -->
  <g id="safety-sign" transform="translate(60, 170)">
     <path d="M 0 0 L 40 0 L 40 40 L 0 40 Z" fill="#FFFF00" stroke="#000000" stroke-width="2"/>
     <!-- Exclamation Symbol (Stencil/Safety) -->
     <path d="M 20 8 L 20 25 M 20 30 L 20 34" fill="none" stroke="#000000" stroke-width="4"/>
  </g>

  <!-- Grounding the View: View Down to Stage Far Below -->
  <g id="distant-stage" transform="translate(320, 320)">
     <path d="M -150 0 L 150 0 L 100 80 L -100 80 Z" fill="#1A0015" opacity="0.3"/>
     <path d="M -80 20 L 80 20" stroke="#FF8800" stroke-width="2" opacity="0.2"/>
  </g>
</svg>