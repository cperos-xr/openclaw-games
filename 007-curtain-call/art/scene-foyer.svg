<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Deep burgundy/velvet black -->
  <rect width="640" height="400" fill="#2B001E"/>
  
  <!-- Marble floor (geometric pattern) -->
  <rect x="0" y="300" width="640" height="100" fill="#1A0015"/>
  <rect x="20" y="320" width="120" height="20" fill="#330028"/>
  <rect x="160" y="320" width="120" height="20" fill="#330028"/>
  <rect x="300" y="320" width="120" height="20" fill="#330028"/>
  <rect x="440" y="320" width="120" height="20" fill="#330028"/>
  <rect x="20" y="350" width="120" height="20" fill="#330028"/>
  <rect x="160" y="350" width="120" height="20" fill="#330028"/>
  <rect x="300" y="350" width="120" height="20" fill="#330028"/>
  <rect x="440" y="350" width="120" height="20" fill="#330028"/>
  
  <!-- Chandelier (central geometric fixture) -->
  <circle cx="320" cy="100" r="30" fill="#4A0035" stroke="#8B004B" stroke-width="4"/>
  <rect x="300" y="80" width="40" height="10" fill="#8B004B"/>
  <rect x="310" y="70" width="20" height="20" fill="#8B004B"/>
  <line x1="320" y1="90" x2="320" y2="130" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="320" cy="130" r="8" fill="#FFFF00"/>
  
  <!-- Ticket booth (shattered glass effect) -->
  <rect x="100" y="150" width="80" height="60" fill="#1A0015" stroke="#4A0035" stroke-width="3"/>
  <line x1="100" y1="180" x2="180" y2="180" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="140" y1="150" x2="140" y2="210" stroke="#FFFFFF" stroke-width="1"/>
  <rect x="130" y="170" width="20" height="20" fill="#FF8800"/> <!-- Brass key -->
  
  <!-- Ornate doors (north exit) -->
  <rect x="270" y="50" width="100" height="150" fill="#0A0008" stroke="#4A0035" stroke-width="3"/>
  <rect x="290" y="70" width="60" height="20" fill="#1A0015"/>
  <rect x="290" y="100" width="60" height="20" fill="#1A0015"/>
  <rect x="290" y="130" width="60" height="20" fill="#1A0015"/>
  <rect x="280" y="60" width="80" height="10" fill="#4A0035"/> <!-- Chain -->
  <rect x="310" y="50" width="20" height="20" fill="#8B004B"/> <!-- Padlock -->
  
  <!-- Staircase (east, blocked) -->
  <rect x="500" y="200" width="40" height="150" fill="#0A0008" stroke="#4A0035" stroke-width="2"/>
  <rect x="480" y="220" width="80" height="20" fill="#1A0015"/> <!-- Fallen scenery -->
  <rect x="460" y="240" width="120" height="20" fill="#1A0015"/>
  <rect x="440" y="260" width="160" height="20" fill="#1A0015"/>
  
  <!-- Dust motes (small white dots) -->
  <circle cx="200" cy="100" r="1" fill="#FFFFFF"/>
  <circle cx="400" cy="150" r="1" fill="#FFFFFF"/>
  <circle cx="100" cy="200" r="1" fill="#FFFFFF"/>
  <circle cx="500" cy="100" r="1" fill="#FFFFFF"/>
</svg>