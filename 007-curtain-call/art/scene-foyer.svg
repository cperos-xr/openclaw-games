<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <!-- Pattern for Floor Tiles -->
    <pattern id="floor-tiles" width="80" height="40" patternUnits="userSpaceOnUse">
      <path d="M 0 0 L 80 0 L 80 40 L 0 40 Z" fill="#1A0015" stroke="#330028" stroke-width="2"/>
    </pattern>
  </defs>
  <!-- Background: Deep Walls -->
  <rect width="640" height="400" fill="#2B001E"/>

  <!-- Ornate Carpeted Passage Floor -->
  <rect x="0" y="300" width="640" height="100" fill="url(#floor-tiles)"/>

  <!-- Ticket Booth / Grand Entrance (Midground) -->
  <g id="entrance-booth" transform="translate(220, 50)">
    <path d="M 0 0 L 200 0 L 200 250 L 0 250 Z" fill="#0A0008" stroke="#4A0035" stroke-width="5"/>
    <!-- Padlock (Atmospheric) -->
    <path d="M 80 50 L 120 50 L 120 90 L 80 90 Z" fill="#8B004B" stroke="#000000" stroke-width="2"/>
    <path d="M 85 50 C 85 30 115 30 115 50" fill="none" stroke="#8B004B" stroke-width="4"/>
    <!-- Chains -->
    <path d="M 0 60 L 200 60 M 0 80 L 200 80" stroke="#4A0035" stroke-width="3" opacity="0.6"/>
  </g>

  <!-- Brass Display Case (Prop Closet/Info) -->
  <g id="display-case" transform="translate(60, 150)">
    <path d="M 0 0 L 100 0 L 100 120 L 0 120 Z" fill="#1A0015" stroke="#4A0035" stroke-width="3"/>
    <!-- Silhouette: Ornate Key Hook -->
    <path d="M 30 20 L 70 20 L 70 60 L 30 60 Z" fill="#8B0000" opacity="0.4"/>
    <path d="M 50 30 C 60 30 60 50 50 50 C 40 50 40 30 50 30" fill="none" stroke="#FF8800" stroke-width="2"/>
  </g>

  <!-- Fallen Scenery / Debris -->
  <g id="debris" transform="translate(480, 220)">
    <path d="M -80 0 L 80 0 L 40 100 L -40 100 Z" fill="#1A0015" stroke="#4A0035" stroke-width="3"/>
    <path d="M -40 20 L 60 20 M -20 40 L 40 40" stroke="#0A0008" stroke-width="2"/>
  </g>

  <!-- Light Source: Wall Sconce -->
  <g id="wall-sconce" transform="translate(320, 30)">
     <path d="M -15 0 L 15 0 L 0 50 Z" fill="#8B004B" />
     <circle cx="0" cy="0" r="20" fill="#FF8800" opacity="0.1"/>
     <circle cx="0" cy="0" r="5" fill="#FFFF00"/>
  </g>
</svg>