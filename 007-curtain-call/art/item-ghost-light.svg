<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Clear -->
  <rect width="64" height="64" fill="none"/>
  
  <!-- Metal stand -->
  <rect x="28" y="20" width="8" height="24" fill="#330028" stroke="#4A0035" stroke-width="1"/>
  
  <!-- Bulb base -->
  <rect x="24" y="44" width="16" height="8" fill="#330028" stroke="#4A0035" stroke-width="1"/>
  
  <!-- Glass bulb -->
  <circle cx="32" cy="24" r="10" fill="#1A0015" stroke="#FFFF00" stroke-width="2"/>
  
  <!-- Filament -->
  <line x1="22" y1="24" x2="42" y2="24" stroke="#FFFF00" stroke-width="1"/>
  <line x1="32" y1="14" x2="32" y2="34" stroke="#FFFF00" stroke-width="1"/>
  
  <!-- Glow effect -->
  <circle cx="32" cy="24" r="12" fill="#FFFF00" opacity="0.2"/>
  <circle cx="32" cy="24" r="8" fill="#FFFF00" opacity="0.1"/>
</svg>