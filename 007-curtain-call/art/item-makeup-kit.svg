<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Clear -->
  <rect width="64" height="64" fill="none"/>
  
  <!-- Makeup tin -->
  <rect x="16" y="20" width="32" height="24" fill="#8B004B" stroke="#AA00FF" stroke-width="2"/>
  
  <!-- Hinge -->
  <rect x="14" y="28" width="4" height="8" fill="#AA00FF"/>
  
  <!-- Compartments -->
  <rect x="20" y="24" width="8" height="8" fill="#FF0000"/> <!-- Rouge -->
  <rect x="36" y="24" width="8" height="8" fill="#FFFF00"/> <!-- Yellow powder -->
  <rect x="20" y="36" width="8" height="8" fill="#FFFFFF"/> <!-- White powder -->
  <rect x="36" y="36" width="8" height="8" fill="#FF8800"/> <!-- Bronzer -->
  
  <!-- Mirror inside -->
  <rect x="24" y="28" width="16" height="16" fill="#1A0015" stroke="#FFFFFF" stroke-width="1"/>
  
  <!-- Crack in mirror -->
  <line x1="24" y1="28" x2="40" y2="44" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="40" y1="28" x2="24" y2="44" stroke="#FFFFFF" stroke-width="1"/>
</svg>