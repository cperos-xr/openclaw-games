<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Clear -->
  <rect width="64" height="64" fill="none"/>
  
  <!-- Ebony baton -->
  <rect x="28" y="16" width="8" height="32" fill="#0A0008" stroke="#4A0035" stroke-width="2"/>
  
  <!-- Silver tip -->
  <rect x="24" y="46" width="16" height="4" fill="#C0C0C0" stroke="#FFFFFF" stroke-width="1"/>
  
  <!-- Wood grain texture -->
  <line x1="28" y1="20" x2="36" y2="20" stroke="#1A0015" stroke-width="1"/>
  <line x1="28" y1="24" x2="36" y2="24" stroke="#1A0015" stroke-width="1"/>
  <line x1="28" y1="28" x2="36" y2="28" stroke="#1A0015" stroke-width="1"/>
  <line x1="28" y1="32" x2="36" y2="32" stroke="#1A0015" stroke-width="1"/>
  <line x1="28" y1="36" x2="36" y2="36" stroke="#1A0015" stroke-width="1"/>
  <line x1="28" y1="40" x2="36" y2="40" stroke="#1A0015" stroke-width="1"/>
  
  <!-- Subtle glow (uncanny coldness) -->
  <rect x="26" y="14" width="12" height="4" fill="#8B004B" opacity="0.2"/>
</svg>