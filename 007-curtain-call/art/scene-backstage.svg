<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <!-- Heavy Velvet Texture/Hatch -->
    <pattern id="velvet" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 0 5 L 10 5" stroke="#2B001E" stroke-width="2" />
    </pattern>
  </defs>
  <!-- Background: Deep Void -->
  <rect width="640" height="400" fill="#0A0008"/>
  
  <!-- Backstage Area (Midground) -->
  <g id="backstage-depth">
    <path d="M 50 350 L 590 350 L 590 50 L 50 50 Z" fill="#1A0015" stroke="#4A0035" stroke-width="4"/>
    <path d="M 120 180 L 120 350 M 520 180 L 520 350" stroke="#4A0035" stroke-width="6" opacity="0.6"/>
  </g>

  <!-- Heavy Theater Flats (Side Wings) -->
  <g id="scenery-flats">
    <!-- Painted Landscape Flat -->
    <path d="M 20 100 L 100 100 L 100 350 L 20 350 Z" fill="url(#velvet)" />
    <path d="M 20 100 L 100 100 L 100 350" fill="none" stroke="#4A0035" stroke-width="2"/>
    <!-- Castle Turret Flat -->
    <path d="M 540 80 L 620 80 L 620 350 L 540 350 Z" fill="#330028" stroke="#5B004A" stroke-width="3"/>
  </g>

  <!-- Prop Storage/Table -->
  <g id="prop-table" transform="translate(400, 250)">
    <path d="M 0 0 L 180 0 L 180 100 L 0 100 Z" fill="#2B001E" stroke="#4A0035" stroke-width="3"/>
    <!-- Prop Silhouettes (Hand Coded) -->
    <path d="M 20 10 L 40 10 C 40 40 20 40 20 10" fill="#8B0000"/> <!-- Blood bucket -->
    <path d="M 60 40 L 100 20 L 140 40" fill="none" stroke="#C0C0C0" stroke-width="4"/> <!-- Coil of rope -->
  </g>

  <!-- Atmospheric Indicator: Exit Light -->
  <g id="exit-indicator" transform="translate(560, 60)">
    <circle cx="20" cy="20" r="15" fill="#FF0000" opacity="0.3"/>
    <circle cx="20" cy="20" r="8" fill="#FF0000"/>
    <!-- Directional arrow (Stage Marker Style) -->
    <path d="M 10 20 L 30 20 M 24 14 L 30 20 L 24 26" fill="none" stroke="#FFFFFF" stroke-width="3"/>
  </g>

  <!-- Floor/Foreground -->
  <rect x="0" y="350" width="640" height="50" fill="#0A0008"/>
  <path d="M 0 350 L 640 350" stroke="#4A0035" stroke-width="2"/>
</svg>