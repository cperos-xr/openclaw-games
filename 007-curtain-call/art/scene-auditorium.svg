<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Velvet darkness -->
  <rect width="640" height="400" fill="#0A0008"/>
  
  <!-- Auditorium floor -->
  <rect x="0" y="300" width="640" height="100" fill="#050004"/>
  
  <!-- Seats (geometric rows) -->
  <rect x="50" y="200" width="540" height="80" fill="#1A0015"/>
  <!-- Seat rows -->
  <rect x="60" y="210" width="20" height="10" fill="#2B001E"/>
  <rect x="90" y="210" width="20" height="10" fill="#2B001E"/>
  <rect x="120" y="210" width="20" height="10" fill="#2B001E"/>
  <rect x="150" y="210" width="20" height="10" fill="#2B001E"/>
  <rect x="180" y="210" width="20" height="10" fill="#2B001E"/>
  <rect x="210" y="210" width="20" height="10" fill="#2B001E"/>
  <rect x="240" y="210" width="20" height="10" fill="#2B001E"/>
  <rect x="270" y="210" width="20" height="10" fill="#2B001E"/>
  <rect x="300" y="210" width="20" height="10" fill="#2B001E"/>
  <rect x="330" y="210" width="20" height="10" fill="#2B001E"/>
  <rect x="360" y="210" width="20" height="10" fill="#2B001E"/>
  <rect x="390" y="210" width="20" height="10" fill="#2B001E"/>
  <rect x="420" y="210" width="20" height="10" fill="#2B001E"/>
  <rect x="450" y="210" width="20" height="10" fill="#2B001E"/>
  <rect x="480" y="210" width="20" height="10" fill="#2B001E"/>
  <rect x="510" y="210" width="20" height="10" fill="#2B001E"/>
  <rect x="540" y="210" width="20" height="10" fill="#2B001E"/>
  <rect x="570" y="210" width="20" height="10" fill="#2B001E"/>
  
  <!-- Stage -->
  <rect x="100" y="100" width="440" height="150" fill="#1A0015" stroke="#4A0035" stroke-width="3"/>
  <!-- Stage boards -->
  <line x1="100" y1="150" x2="540" y2="150" stroke="#330028" stroke-width="1"/>
  <line x1="100" y1="200" x2="540" y2="200" stroke="#330028" stroke-width="1"/>
  
  <!-- Curtain (half-raised) -->
  <rect x="250" y="50" width="140" height="100" fill="#4A0035"/>
  <rect x="250" y="50" width="10" height="100" fill="#2B001E"/> <!-- Left curtain fold -->
  <rect x="380" y="50" width="10" height="100" fill="#2B001E"/> <!-- Right curtain fold -->
  
  <!-- Ghost light (center stage) -->
  <rect x="310" y="180" width="20" height="40" fill="#0A0008" stroke="#FFFF00" stroke-width="2"/>
  <rect x="300" y="210" width="40" height="10" fill="#0A0008" stroke="#FFFF00" stroke-width="2"/>
  <circle cx="320" cy="190" r="8" fill="#FFFF00"/> <!-- Bulb glow -->
  
  <!-- Proscenium arch -->
  <rect x="80" y="80" width="480" height="20" fill="#0A0008" stroke="#4A0035" stroke-width="3"/>
  <rect x="100" y="60" width="440" height="20" fill="#0A0008" stroke="#4A0035" stroke-width="3"/>
  
  <!-- White rose (on stage) -->
  <circle cx="320" cy="220" r="5" fill="#FFFFFF"/>
  <path d="M320,210 Q315,205 320,200 Q325,205 320,210" fill="#FFFFFF"/>
  
  <!-- Backstage door (east exit) -->
  <rect x="520" y="150" width="60" height="100" fill="#0A0008" stroke="#4A0035" stroke-width="2"/>
  <rect x="530" y="160" width="40" height="20" fill="#1A0015"/> <!-- Door details -->
  <rect x="530" y="190" width="40" height="20" fill="#1A0015"/>
  <rect x="540" y="180" width="20" height="10" fill="#4A0035"/> <!-- Push bar -->
  
  <!-- Dust/motes -->
  <circle cx="150" cy="120" r="1" fill="#FFFFFF"/>
  <circle cx="450" cy="180" r="1" fill="#FFFFFF"/>
  <circle cx="300" cy="80" r="1" fill="#FFFFFF"/>
</svg>