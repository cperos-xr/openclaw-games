<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <!-- Pattern for Seat Backs -->
    <pattern id="seat-pattern" width="60" height="40" patternUnits="userSpaceOnUse">
      <path d="M 10 10 Q 30 0 50 10 L 50 30 Q 30 40 10 30 Z" fill="#2B001E" stroke="#1A0015" stroke-width="2"/>
    </pattern>
    <!-- Dusty Floor Hatch -->
    <pattern id="dust-pattern" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#FFFFFF" opacity="0.1"/>
    </pattern>
  </defs>
  <!-- Background: Deep Void of the Auditorium -->
  <rect width="640" height="400" fill="#0A0008"/>

  <!-- Auditorium Floor / Raked Seating Base -->
  <path d="M 0 300 L 640 300 L 640 400 L 0 400 Z" fill="#050004" stroke="#1A0015" stroke-width="2"/>
  <rect x="0" y="300" width="640" height="100" fill="url(#dust-pattern)"/>

  <!-- Row of Seats (Silhouettes in Midground) -->
  <g id="audience-seating" transform="translate(50, 180)">
    <rect width="540" height="120" fill="url(#seat-pattern)"/>
    <path d="M 0 120 L 540 120" stroke="#4A0035" stroke-width="3"/>
  </g>

  <!-- Heavy Proscenium Arch (Framing the Stage) -->
  <g id="proscenium-arch">
    <path d="M 80 80 L 560 80 L 560 300 L 80 300 Z" fill="none" stroke="#4A0035" stroke-width="12" stroke-linejoin="round"/>
    <path d="M 60 60 L 580 60 L 580 320 L 60 320 Z" fill="none" stroke="#2B001E" stroke-width="4"/>
  </g>

  <!-- Closed Stage Curtains (Ornate Velvet) -->
  <g id="stage-curtains" transform="translate(100, 90)">
    <rect width="440" height="210" fill="#420030" stroke="#1A0015" stroke-width="2"/>
    <!-- Fold Lines -->
    <path d="M 40 0 L 40 210 M 80 0 L 80 210 M 120 0 L 120 210 M 160 0 L 160 210 M 200 0 L 200 210 M 240 0 L 240 210 M 280 0 L 280 210 M 320 0 L 320 210 M 360 0 L 360 210 M 400 0 L 400 210" stroke="#2B001E" stroke-width="4" opacity="0.6"/>
    <!-- Ornate Valance (Top) -->
    <path d="M -20 -10 L 460 -10 L 460 30 Q 220 50 -20 30 Z" fill="#5B0047" stroke="#8B004B" stroke-width="3"/>
  </g>

  <!-- Exit Indicator: Emergency Light (Foreground Right) -->
  <g id="emergency-exit-glow" transform="translate(560, 260)">
    <rect x="-10" y="-10" width="50" height="30" fill="#FF0000" opacity="0.2"/>
    <rect x="0" y="0" width="30" height="15" fill="#FF0000" stroke="#000000" stroke-width="2"/>
    <!-- Glowing Red Exit Symbol (Simplified) -->
    <path d="M 5 7 L 25 7 M 15 3 L 15 12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  </g>
</svg>