<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Clear -->
  <rect width="64" height="64" fill="none"/>
  
  <!-- Makeup kit mirror base -->
  <rect x="20" y="20" width="24" height="20" fill="#8B004B" stroke="#AA00FF" stroke-width="2"/>
  
  <!-- Mirror surface -->
  <rect x="24" y="24" width="16" height="12" fill="#1A0015" stroke="#FFFFFF" stroke-width="1"/>
  
  <!-- Crack in mirror -->
  <line x1="24" y1="24" x2="40" y2="36" stroke="#FFFFFF" stroke-width="1"/>
  
  <!-- Focused beam of light -->
  <rect x="32" y="16" width="4" height="8" fill="#FFFF00"/>
  <rect x="30" y="12" width="8" height="4" fill="#FFFF00"/>
  <rect x="28" y="8" width="12" height="4" fill="#FFFF00"/>
  <rect x="26" y="4" width="16" height="4" fill="#FFFF00"/>
  
  <!-- Glow effect -->
  <circle cx="32" cy="20" r="6" fill="#FFFF00" opacity="0.3"/>
  <circle cx="32" cy="20" r="4" fill="#FFFF00" opacity="0.2"/>
  
  <!-- Humming sound waves -->
  <path d="M20,28 Q24,24 28,28" stroke="#FFFFFF" stroke-width="1" fill="none"/>
  <path d="M28,28 Q32,24 36,28" stroke="#FFFFFF" stroke-width="1" fill="none"/>
</svg>