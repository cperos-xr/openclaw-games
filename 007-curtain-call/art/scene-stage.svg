<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <!-- Heavy Theater Curtain Texture -->
    <pattern id="curtain-folds" width="40" height="400" patternUnits="userSpaceOnUse">
      <path d="M 0 0 L 0 400 M 20 0 L 20 400 M 40 0 L 40 400" stroke="#2B001E" stroke-width="4" opacity="0.6"/>
    </pattern>
  </defs>
  <!-- Background: Deep Stage Backing -->
  <rect width="640" height="400" fill="#0A0008"/>

  <!-- Main Stage Floor (Polished Wood Effect) -->
  <path d="M 0 320 L 640 320 L 640 400 L 0 400 Z" fill="#1A0015" stroke="#4A0035" stroke-width="3"/>

  <!-- Ornate Gilded Mirror (Prop) Center Stage -->
  <g id="mirror-prop" transform="translate(250, 80)">
    <path d="M 0 0 L 140 0 L 140 220 L 0 220 Z" fill="#4A0035" stroke="#FF8800" stroke-width="5"/>
    <path d="M 10 10 L 130 10 L 130 210 L 10 210 Z" fill="#330028" stroke="#AA00FF" stroke-width="2"/>
    <!-- Cracked Glass (Horror Detail) -->
    <path d="M 20 20 L 60 100 M 120 40 L 80 120 M 60 100 L 40 180" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Side Curtains (Wings) -->
  <rect x="0" y="0" width="100" height="400" fill="#420030" stroke="#000000" stroke-width="2"/>
  <rect x="0" y="0" width="100" height="400" fill="url(#curtain-folds)"/>
  <rect x="540" y="0" width="100" height="400" fill="#420030" stroke="#000000" stroke-width="2"/>
  <rect x="540" y="0" width="100" height="400" fill="url(#curtain-folds)"/>

  <!-- Atmosphere: Ghost Light (Floor) -->
  <g id="ghost-light-glow" transform="translate(140, 340)">
     <circle cx="0" cy="0" r="40" fill="#FFFF00" opacity="0.1"/>
     <circle cx="0" cy="0" r="10" fill="#FFFF00" opacity="0.6"/>
  </g>

  <!-- Stage Direction Marker (Downstage) -->
  <g id="stage-direction" transform="translate(320, 370)">
     <path d="M -20 0 L 20 0 M 0 -20 L 0 20" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.5"/>
     <path d="M 2 10 L 10 2 L 18 10" fill="none" stroke="#FFFFFF" stroke-width="3" transform="rotate(180, 10, 6)"/>
  </g>
</svg>