<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Dark velvet stage -->
  <rect width="640" height="400" fill="#0A0008"/>
  
  <!-- Stage floor -->
  <rect x="0" y="350" width="640" height="50" fill="#050004"/>
  
  <!-- Dead spotlight -->
  <rect x="300" y="50" width="40" height="40" fill="#1A0015" stroke="#4A0035" stroke-width="2"/>
  <rect x="310" y="60" width="20" height="20" fill="#330028"/> <!-- Cracked lens -->
  <line x1="320" y1="100" x2="320" y2="350" stroke="#4A0035" stroke-width="2"/> <!-- Beam down -->
  
  <!-- Curtain ropes (dangling like nooses) -->
  <rect x="200" y="50" width="10" height="100" fill="#1A0015" stroke="#4A0035" stroke-width="2"/>
  <rect x="420" y="50" width="10" height="100" fill="#1A0015" stroke="#4A0035" stroke-width="2"/>
  <!-- Knots in ropes -->
  <path d="M205,80 Q200,90 210,90 Q220,90 215,80" fill="#330028"/>
  <path d="M425,80 Q420,90 430,90 Q440,90 435,80" fill="#330028"/>
  
  <!-- Ornate mirror (upstage) -->
  <rect x="250" y="80" width="140" height="200" fill="#1A0015" stroke="#FF8800" stroke-width="3"/> <!-- Gilded frame -->
  <rect x="260" y="90" width="120" height="180" fill="#330028"/> <!-- Clouded glass -->
  <!-- Something moving in depths -->
  <circle cx="300" cy="150" r="8" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="320" cy="180" r="6" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="290" cy="200" r="10" fill="#FFFFFF" opacity="0.2"/>
  
  <!-- Music stand (center stage) -->
  <rect x="300" y="180" width="20" height="100" fill="#0A0008" stroke="#4A0035" stroke-width="2"/> <!-- Black metal stand -->
  <rect x="280" y="170" width="60" height="10" fill="#0A0008" stroke="#4A0035" stroke-width="2"/> <!-- Sheet music base -->
  <rect x="290" y="160" width="40" height="20" fill="#1A0015"/> <!-- Scorched score -->
  <line x1="290" y1="165" x2="310" y2="165" stroke="#FF0000" stroke-width="1"/> <!-- Blurred notes -->
  <line x1="295" y1="170" x2="305" y2="170" stroke="#FF0000" stroke-width="1"/>
  <line x1="300" y1="175" x2="320" y2="175" stroke="#FF0000" stroke-width="1"/>
  <line x1="295" y1="180" x2="305" y2="180" stroke="#FF0000" stroke-width="1"/>
  
  <!-- Proscenium arch -->
  <rect x="80" y="50" width="480" height="20" fill="#0A0008" stroke="#4A0035" stroke-width="3"/>
  
  <!-- Stage details -->
  <rect x="100" y="300" width="440" height="20" fill="#1A0015"/> <!-- Stage edge -->
  
  <!-- Subtle details -->
  <circle cx="150" cy="320" r="1" fill="#FFFFFF"/> <!-- Dust mote -->
  <circle cx="500" cy="320" r="1" fill="#FFFFFF"/> <!-- Dust mote -->
  <circle cx="320" cy="100" r="1" fill="#FFFFFF"/> <!-- Dust mote in spotlight -->
</svg>