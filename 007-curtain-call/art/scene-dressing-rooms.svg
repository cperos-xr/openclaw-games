<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Cold hallway -->
  <rect width="640" height="400" fill="#0A0008"/>
  
  <!-- Floor -->
  <rect x="0" y="350" width="640" height="50" fill="#050004"/>
  
  <!-- Hallway walls -->
  <rect x="0" y="0" width="50" height="400" fill="#0A0008"/>
  <rect x="590" y="0" width="50" height="400" fill="#0A0008"/>
  
  <!-- Dressing room doors -->
  <rect x="100" y="50" width="60" height="100" fill="#1A0015" stroke="#4A0035" stroke-width="2"/>
  <rect x="100" y="50" width="10" height="100" fill="#2B001E"/> <!-- Door frame -->
  <rect x="150" y="50" width="10" height="100" fill="#2B001E"/> <!-- Door frame -->
  <line x1="130" y1="50" x2="130" y2="150" stroke="#4A0035" stroke-width="1"/> <!-- Star -->
  
  <rect x="200" y="50" width="60" height="100" fill="#1A0015" stroke="#4A0035" stroke-width="2"/>
  <rect x="200" y="50" width="10" height="100" fill="#2B001E"/>
  <rect x="250" y="50" width="10" height="100" fill="#2B001E"/>
  <line x1="230" y1="50" x2="230" y2="150" stroke="#4A0035" stroke-width="1"/>
  
  <rect x="300" y="50" width="60" height="100" fill="#1A0015" stroke="#4A0035" stroke-width="2"/>
  <rect x="300" y="50" width="10" height="100" fill="#2B001E"/>
  <rect x="350" y="50" width="10" height="100" fill="#2B001E"/>
  <line x1="330" y1="50" x2="330" y2="150" stroke="#4A0035" stroke-width="1"/>
  
  <rect x="400" y="50" width="60" height="100" fill="#1A0015" stroke="#4A0035" stroke-width="2"/>
  <rect x="400" y="50" width="10" height="100" fill="#2B001E"/>
  <rect x="450" y="50" width="10" height="100" fill="#2B001E"/>
  <line x1="430" y1="50" x2="430" y2="150" stroke="#4A0035" stroke-width="1"/>
  
  <rect x="500" y="50" width="60" height="100" fill="#1A0015" stroke="#4A0035" stroke-width="2"/>
  <rect x="500" y="50" width="10" height="100" fill="#2B001E"/>
  <rect x="550" y="50" width="10" height="100" fill="#2B001E"/>
  <line x1="530" y1="50" x2="530" y2="150" stroke="#4A0035" stroke-width="1"/>
  
  <!-- Open dressing room (slightly open door) -->
  <rect x="180" y="180" width="80" height="120" fill="#0A0008" stroke="#4A0035" stroke-width="2"/>
  <rect x="180" y="180" width="10" height="120" fill="#2B001E"/> <!-- Door frame -->
  <rect x="250" y="180" width="10" height="120" fill="#2B001E"/> <!-- Door frame -->
  
  <!-- Vanity table (inside open room) -->
  <rect x="200" y="220" width="100" height="60" fill="#1A0015" stroke="#4A0035" stroke-width="2"/>
  <rect x="220" y="240" width="60" height="20" fill="#330028"/> <!-- Mirror -->
  <rect x="230" y="200" width="40" height="10" fill="#4A0035"/> <!-- Lipstick stain -->
  <rect x="210" y="260" width="20" height="10" fill="#FF8800"/> <!-- Powder puff -->
  <rect x="240" y="260" width="20" height="10" fill="#FFFF00"/> <!-- Rouge -->
  <rect x="270" y="260" width="20" height="10" fill="#FF0000"/> <!-- More rouge -->
  
  <!-- Makeup kit (on vanity) -->
  <rect x="250" y="230" width="40" height="30" fill="#8B004B" stroke="#AA00FF" stroke-width="2"/>
  <rect x="260" y="240" width="20" height="10" fill="#FFFFFF"/> <!-- Mirror inside -->
  
  <!-- Costume rack -->
  <rect x="350" y="150" width="20" height="180" fill="#2B001E" stroke="#4A0035" stroke-width="2"/>
  <line x1="360" y1="160" x2="360" y2="300" stroke="#4A0035" stroke-width="1"/> <!-- Hangers -->
  <line x1="360" y1="190" x2="360" y2="300" stroke="#4A0035" stroke-width="1"/>
  <line x1="360" y1="220" x2="360" y2="300" stroke="#4A0035" stroke-width="1"/>
  <line x1="360" y1="250" x2="360" y2="300" stroke="#4A0035" stroke-width="1"/>
  
  <!-- Sequined dress (on rack) -->
  <rect x="300" y="200" width="100" height="80" fill="#AA00FF"/>
  <circle cx="320" cy="210" r="2" fill="#FFFFFF"/> <!-- Sequins -->
  <circle cx="340" cy="220" r="2" fill="#FFFFFF"/>
  <circle cx="310" cy="230" r="2" fill="#FFFFFF"/>
  <circle cx="350" cy="210" r="2" fill="#FFFFFF"/>
  
  <!-- Moth-eaten tuxedo (on rack) -->
  <rect x="300" y="290" width="100" height="60" fill="#1A0015"/>
  <rect x="310" y="300" width="20" height="10" fill="#FFFFFF"/> <!-- Moth holes -->
  <rect x="340" y="310" width="20" height="10" fill="#FFFFFF"/>
  <rect x="320" y="320" width="20" height="10" fill="#FFFFFF"/>
  
  <!-- Silver hairbrush (on vanity) -->
  <rect x="270" y="220" width="15" height="30" fill="#C0C0C0" stroke="#FFFFFF" stroke-width="1"/>
  <rect x="272" y="222" width="11" height="5" fill="#8B004B"/> <!-- Bristles -->
  
  <!-- Humming sound waves (from mirror) -->
  <path d="M250,180 Q260,160 270,180" stroke="#FFFFFF" stroke-width="1" fill="none"/>
  <path d="M260,180 Q270,160 280,180" stroke="#FFFFFF" stroke-width="1" fill="none"/>
  <path d="M270,180 Q280,160 290,180" stroke="#FFFFFF" stroke-width="1" fill="none"/>
  
  <!-- Bricked-up archway (end of hallway) -->
  <rect x="290" y="0" width="60" height="400" fill="#2B001E"/>
  <rect x="300" y="0" width="40" height="400" fill="#1A0015"/>
  <rect x="310" y="0" width="20" height="50" fill="#2B001E"/>
  <rect x="310" y="100" width="20" height="50" fill="#2B001E"/>
  <rect x="310" y="200" width="20" height="50" fill="#2B001E"/>
  <rect x="310" y="300" width="20" height="50" fill="#2B001E"/>
</svg>