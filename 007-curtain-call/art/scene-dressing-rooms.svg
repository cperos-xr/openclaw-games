<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <!-- Pattern for Mirror Bullbs (Repeating Light) -->
    <pattern id="bulb-pattern" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="4" fill="#FFFF00" stroke="#FF8800" stroke-width="1"/>
    </pattern>
    <!-- Dusty Wallpaper Hatch -->
    <pattern id="wallpaper" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 0 10 L 10 0 L 20 10 L 10 20 Z" fill="none" stroke="#2B001E" stroke-width="1" opacity="0.3"/>
    </pattern>
  </defs>
  <!-- Background: Padded/Wallpapered Walls -->
  <rect width="640" height="400" fill="#0A0008"/>
  <rect width="640" height="400" fill="url(#wallpaper)"/>

  <!-- Row of Dressing Room Doors (Silhouettes/Midground) -->
  <g id="doorway-row" transform="translate(100, 50)">
    <!-- Door 1 -->
    <path d="M 0 0 L 60 0 L 60 180 L 0 180 Z" fill="#1A0015" stroke="#4A0035" stroke-width="4"/>
    <path d="M 10 10 L 50 10 L 50 170 L 10 170 Z" fill="#0A0008" stroke="#330028" stroke-width="2"/>
    <!-- Door 2 -->
    <path d="M 100 0 L 160 0 L 160 180 L 100 180 Z" fill="#1A0015" stroke="#4A0035" stroke-width="4"/>
    <path d="M 110 10 L 150 10 L 150 170 L 110 170 Z" fill="#0A0008" stroke="#330028" stroke-width="2"/>
    <!-- Door 3 (Half Open - Horror Detail) -->
    <path d="M 200 0 L 260 0 L 260 180 L 200 180 Z" fill="#1A0015" stroke="#4A0035" stroke-width="4"/>
    <path d="M 210 10 L 230 10 L 230 170 L 210 170 Z" fill="#0A0008" stroke="#330028" stroke-width="2"/>
    <!-- Door 4 -->
    <path d="M 300 0 L 360 0 L 360 180 L 300 180 Z" fill="#1A0015" stroke="#4A0035" stroke-width="4"/>
    <path d="M 310 10 L 350 10 L 350 170 L 310 170 Z" fill="#0A0008" stroke="#330028" stroke-width="2"/>
    <!-- Door 5 -->
    <path d="M 400 0 L 460 0 L 460 180 L 400 180 Z" fill="#1A0015" stroke="#4A0035" stroke-width="4"/>
    <path d="M 410 10 L 450 10 L 450 170 L 410 170 Z" fill="#0A0008" stroke="#330028" stroke-width="2"/>
  </g>

  <!-- Principal Dressing Table / Vanity (Foreground Focus) -->
  <g id="vanity-focus" transform="translate(180, 240)">
     <path d="M 0 0 L 280 0 L 280 110 L 0 110 Z" fill="#1A0015" stroke="#4A0035" stroke-width="5"/>
     <!-- Illuminated Mirror -->
     <g id="vanity-mirror" transform="translate(60, -100)">
        <path d="M 0 0 L 160 0 L 160 120 L 0 120 Z" fill="#330028" stroke="#AA00FF" stroke-width="3"/>
        <rect width="160" height="20" fill="url(#bulb-pattern)"/>
        <rect x="0" y="100" width="160" height="20" fill="url(#bulb-pattern)"/>
        <!-- Cracked Reflection Silhouette -->
        <path d="M 20 20 L 140 100 M 120 20 L 40 100" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>
     </g>
     <!-- Makeup clutter -->
     <path d="M 20 10 L 50 10 L 50 30 L 20 30 Z" fill="#FF0000" stroke="#000000"/> <!-- Rouge -->
     <path d="M 70 10 L 90 10 L 90 40 L 70 40 Z" fill="#8B004B" stroke="#AA00FF"/> <!-- Brush -->
  </g>

  <!-- Atmospheric Indicator: Dressing Room Door Label -->
  <g id="door-label" transform="translate(430, 100)">
     <path d="M 0 0 L 40 0 L 40 20 L 0 20 Z" fill="#FF8800" stroke="#000000" stroke-width="2"/>
     <!-- Hieroglyphic/Stencil style numeral "1" -->
     <path d="M 20 5 L 20 15 M 15 5 L 20 5" fill="none" stroke="#000000" stroke-width="2"/>
  </g>
</svg>