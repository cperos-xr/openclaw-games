<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Clear -->
  <rect width="64" height="64" fill="none"/>
  
  <!-- Paper -->
  <rect x="12" y="12" width="40" height="40" fill="#1A0015" stroke="#4A0035" stroke-width="2"/>
  
  <!-- Push pin -->
  <circle cx="32" cy="8" r="4" fill="#8B0000"/>
  <rect x="30" y="8" width="4" height="4" fill="#8B0000"/>
  
  <!-- Symbols -->
  <!-- Circle -->
  <circle cx="24" cy="24" r="6" fill="#FFFFFF" stroke="#4A0035" stroke-width="1"/>
  
  <!-- Triangle -->
  <polygon points="40,18 48,30 32,30" fill="#FFFFFF" stroke="#4A0035" stroke-width="1"/>
  
  <!-- Square -->
  <rect x="20" y="36" width="12" height="12" fill="#FFFFFF" stroke="#4A0035" stroke-width="1"/>
  
  <!-- Cross -->
  <rect x="36" y="36" width="4" height="12" fill="#FFFFFF" stroke="#4A0035" stroke-width="1"/>
  <rect x="32" y="40" width="12" height="4" fill="#FFFFFF" stroke="#4A0035" stroke-width="1"/>
  
  <!-- Sequence arrow -->
  <line x1="24" y1="24" x2="28" y2="20" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="28" y1="20" x2="32" y2="24" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="32" y1="24" x2="36" y2="20" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="36" y1="20" x2="40" y2="24" stroke="#FFFFFF" stroke-width="1"/>
  
  <!-- Handwritten notes effect -->
  <circle cx="16" y="16" r="1" fill="#FFFFFF"/>
  <circle cx="48" y="48" r="1" fill="#FFFFFF"/>
</svg>