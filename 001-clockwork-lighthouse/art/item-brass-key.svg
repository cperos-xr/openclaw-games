<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <pattern id="hatch-dark" width="2" height="2" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="2" y2="0" stroke="#000000" stroke-width="1"/>
    </pattern>
  </defs>
  <!-- Background glow -->
  <circle cx="32" cy="32" r="28" fill="#FF8800" opacity="0.2"/>
  
  <!-- Key Bow (Clockwork style) -->
  <circle cx="16" cy="32" r="10" fill="none" stroke="#FF8800" stroke-width="4"/>
  <circle cx="16" cy="32" r="5" fill="none" stroke="#FF8800" stroke-width="2"/>
  
  <!-- Key Shaft -->
  <rect x="24" y="30" width="26" height="4" fill="#FF8800"/>
  
  <!-- Key Teeth (Binary/Clockwork pattern) -->
  <rect x="42" y="34" width="4" height="6" fill="#FF8800"/>
  <rect x="48" y="34" width="4" height="4" fill="#FF8800"/>
  
  <!-- Temporal Energy / Shine -->
  <rect x="25" y="31" width="10" height="2" fill="#FFFFFF" opacity="0.4"/>
  <rect x="43" y="35" width="2" height="2" fill="#FFFFFF" opacity="0.4"/>
</svg>