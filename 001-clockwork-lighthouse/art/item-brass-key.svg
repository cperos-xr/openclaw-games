<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <!-- Brass Pattern -->
    <pattern id="brassPattern" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#FF8800"/>
      <path d="M0 0L8 8M8 0L0 8" stroke="#AA00FF" stroke-width="1"/>
    </pattern>
    
    <!-- Engraving Pattern -->
    <pattern id="engravingPattern" patternUnits="userSpaceOnUse" width="4" height="4">
      <circle cx="1" cy="1" r="0.5" fill="#000000"/>
    </pattern>
  </defs>
  
  <!-- Key Blade -->
  <rect x="200" y="150" width="200" height="40" fill="url(#brassPattern)" stroke="#000000" stroke-width="3"/>
  
  <!-- Key Handle -->
  <circle cx="440" cy="170" r="30" fill="url(#brassPattern)" stroke="#000000" stroke-width="3"/>
  
  <!-- Key Shaft Details -->
  <rect x="220" y="160" width="20" height="20" fill="url(#engravingPattern)" stroke="none"/>
  <rect x="260" y="160" width="20" height="20" fill="url(#engravingPattern)" stroke="none"/>
  <rect x="300" y="160" width="20" height="20" fill="url(#engravingPattern)" stroke="none"/>
  
  <!-- Key Teeth -->
  <rect x="340" y="150" width="10" height="10" fill="#000000"/>
  <rect x="350" y="160" width="10" height="10" fill="#000000"/>
  <rect x="360" y="170" width="10" height="10" fill="#000000"/>
  
  <!-- Handle Details -->
  <circle cx="440" cy="170" r="15" fill="none" stroke="#000000" stroke-width="2"/>
  <circle cx="440" cy="170" r="8" fill="url(#engravingPattern)" stroke="none"/>
</svg>