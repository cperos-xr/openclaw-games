     <use href="#big-gear"/>
  </g>
  <g transform="translate(350, 180) rotate(-15) scale(0.6)" fill="#AA00FF">
     <use href="#big-gear"/>
  </g>
  <g transform="translate(180, 310) rotate(45) scale(0.4)" fill="#AA00FF">
     <use href="#big-gear"/>
  </g>

  <!-- Walkway & Iron Grating -->
  <rect x="0" y="240" width="640" height="20" fill="#555555"/>
  <rect x="0" y="240" width="640" height="20" fill="url(#checker)"/>
  <rect x="0" y="240" width="640" height="5" fill="#000000"/>
  <rect x="0" y="255" width="640" height="5" fill="#000000"/>

  <!-- Railing -->
  <line x1="0" y1="200" x2="640" y2="200" stroke="#000000" stroke-width="3"/>
  <line x1="50" y1="200" x2="50" y2="240" stroke="#000000" stroke-width="2"/>
  <line x1="150" y1="200" x2="150" y2="240" stroke="#000000" stroke-width="2"/>
