  <rect x="10" y="210" width="100" height="70" fill="#FF8800" stroke="#000000" stroke-width="3"/>
  <rect x="25" y="235" width="20" height="30" fill="#000000"/> <!-- Slot -->
  <rect x="60" y="225" width="15" height="15" fill="#33FF33" rx="2"/> <!-- Dials -->
  <rect x="60" y="250" width="15" height="15" fill="#FF0000" rx="2"/>

  <!-- Lighting & Atmosphere (Cobalt pulses) -->
  <rect width="640" height="100" fill="#000088" opacity="0.1"/>
  <ellipse cx="320" cy="0" rx="400" ry="100" fill="#0000FF" opacity="0.1"/>

  <!-- Scanlines effect -->
  <rect width="640" height="400" fill="none" stroke="#000000" stroke-width="1" pointer-events="none"/>
