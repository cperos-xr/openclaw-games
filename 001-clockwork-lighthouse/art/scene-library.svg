  <!-- Background: Night Sky Dome -->
  <rect width="640" height="400" fill="#000000"/>
  <ellipse cx="320" cy="50" rx="400" ry="250" fill="#000088" stroke="#000000" stroke-width="4"/>
  
  <!-- Constellations (The Jaw, Orion) -->
  <g fill="#FFFFFF" opacity="0.8">
    <circle cx="320" cy="50" r="2"/> <!-- Center point -->
    <circle cx="280" cy="70" r="1.5"/>
    <circle cx="360" cy="70" r="1.5"/>
    <circle cx="320" cy="110" r="1.5"/>
    <line x1="280" y1="70" x2="360" y2="70" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="320" y1="50" x2="320" y2="110" stroke="#FFFFFF" stroke-width="0.5"/>
  </g>
  
  <!-- Spiral Dither on Dome edge -->
  <rect x="0" y="0" width="640" height="200" fill="url(#hatch-dark)" opacity="0.3"/>

  <!-- Walls -->
  <path d="M 0 50 L 150 150 L 150 280 L 0 350 Z" fill="#1a0d00" stroke="#000000" stroke-width="3"/>
  <path d="M 640 50 L 490 150 L 490 280 L 640 350 Z" fill="#1a0d00" stroke="#000000" stroke-width="3"/>

  <!-- Bookshelves -->
  <use href="#bookshelf" x="20" y="160" transform="scale(0.25)" fill="#FF8800" />
  <use href="#bookshelf" x="550" y="160" transform="scale(0.25)" fill="#FF8800" />

  <!-- Floor -->
  <rect x="0" y="280" width="640" height="120" fill="#1a0d00"/>
  <rect x="0" y="280" width="640" height="20" fill="url(#checker)" opacity="0.4"/>

  <!-- Pedestal -->
  <rect x="290" y="260" width="60" height="80" fill="#FF8800" stroke="#000000" stroke-width="2"/>
  <rect x="280" y="250" width="80" height="10" fill="#FF8800" stroke="#000000" stroke-width="2"/>
  
  <!-- Chronometer (Organic heartbeat vibe) -->
  <circle cx="320" cy="235" r="15" fill="#33FF33" stroke="#000000" stroke-width="2"/>
  <circle cx="320" cy="235" r="8" fill="url(#checker)" opacity="0.3"/>

  <!-- Telescope -->
  <use href="#telescope" x="180" y="180" transform="rotate(-45, 200, 200) scale(0.3)" fill="#AA00FF" />

  <!-- Dithering and Scanlines -->
  <rect width="640" height="400" fill="none" stroke="#000000" stroke-width="1" pointer-events="none"/>
  <g opacity="0.05">
    <line x1="0" y1="4" x2="640" y2="4" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="0" y1="8" x2="640" y2="8" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="0" y1="12" x2="640" y2="12" stroke="#FFFFFF" stroke-width="1"/>
  </g>
</svg>