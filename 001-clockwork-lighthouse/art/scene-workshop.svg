<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <pattern id="hatch-dark" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#000000" stroke-width="1"/>
    </pattern>
    <pattern id="checker" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="2" height="2" fill="#000000"/>
      <rect x="2" y="2" width="2" height="2" fill="#000000"/>
    </pattern>
    <g id="wrench">
      <!-- Extraction of /workspace/art_templates/game-icons/wrench.svg path -->
      <path d="M224 57.06c-38.3 12.3-66 48.5-66 91.13a94.06 94.06 0 0 0 4.19 28.02l-123.6 123.6c-11.4 11.4-11.4 30 0 41.4l41.4 41.4c11.4 11.4 30 11.4 41.4 0L245 259.08a94.06 94.06 0 0 0 28.02 4.19c42.6 0 78.8-27.7 91.1-66l-102.1-102.1L224 57.06zm132 101.44 19.3-19.3c11.4-11.4 11.4-30 0-41.4l-41.4-41.4c-11.4-11.4-30-11.4-41.4 0l-19.3 19.3 82.8 82.8z" fill="currentColor"/>
    </g>
    <g id="broken-gear">
       <path d="M128 32c-53 0-96 43-96 96s43 96 96 96s96-43 96-96s-43-96-96-96zm0 25c39 0 71 32 71 71s-32 71-71 71s-71-32-71-71s32-71 71-71zm0 30c-23 0-41 18-41 41s18 41 41 41s41-18 41-41s-18-41-41-41z M128 32 L 80 0 M128 32 L 176 0" stroke="#000000" stroke-width="4" fill="none"/>
       <line x1="80" y1="128" x2="176" y2="128" stroke="#000000" stroke-width="8"/> <!-- The Crack -->
    </g>
  </defs>

  <!-- Background: Workshop interior -->
  <rect width="640" height="400" fill="#000000"/>
  <rect x="0" y="0" width="640" height="300" fill="#1a0d00"/>
  <rect x="0" y="0" width="640" height="300" fill="url(#hatch-dark)" opacity="0.3"/>

  <!-- Workbenches -->
  <rect x="20" y="180" width="220" height="100" fill="#AA00FF" stroke="#000000" stroke-width="3"/>
  <rect x="400" y="180" width="220" height="100" fill="#AA00FF" stroke="#000000" stroke-width="3"/>
  <!-- Workbench clutter (tools/gears) -->
  <rect x="40" y="170" width="30" height="10" fill="#FF8800" rx="2"/>
  <rect x="80" y="175" width="20" height="15" fill="#555555" rx="1"/>
  <rect x="150" y="172" width="10" height="25" fill="#33FF33" rx="2"/>
  
  <!-- Floor -->
  <rect x="0" y="280" width="640" height="120" fill="#1a0d00"/>
  <rect x="0" y="280" width="640" height="120" fill="url(#checker)" opacity="0.2"/>

  <!-- Broken Mechanism with Brass Key -->
  <g transform="translate(250, 150) scale(0.6)">
     <use href="#broken-gear" fill="#FF8800"/>
     <circle cx="128" cy="128" r="8" fill="#FFFF00" stroke="#000000" stroke-width="1"/> <!-- The glinting key -->
  </g>

  <!-- Dark Smear Logic -->
  <path d="M 320 250 Q 400 300 500 380" stroke="#000000" stroke-width="12" fill="none" opacity="0.8"/>

  <!-- Wrench on Floor -->
  <g transform="translate(50, 320) rotate(-30, 25, 25) scale(0.1)" fill="#888888">
     <use href="#wrench"/>
  </g>
  
  <!-- Stool (Overturned) -->
  <rect x="500" y="320" width="40" height="10" fill="#FF8800" transform="rotate(70, 520, 325)"/>
  <line x1="510" y1="330" x2="490" y2="360" stroke="#FF8800" stroke-width="4"/>

  <!-- Floor Glow (Phosphor) -->
  <rect x="0" y="360" width="640" height="40" fill="#006600" opacity="0.3"/>

  <!-- Wall area (Key outline) -->
  <rect x="550" y="100" width="40" height="60" fill="#000000" opacity="0.4" stroke="#555" stroke-width="2"/>

  <!-- Scanlines & Atmosphere -->
  <rect width="640" height="400" fill="none" stroke="#000000" stroke-width="1" pointer-events="none"/>
</svg>