<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <!-- Brass Base -->
    <pattern id="brassBase" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#FF8800"/>
      <path d="M0 4L4 0L8 4L4 8Z" fill="#AA00FF" fill-opacity="0.3"/>
    </pattern>
    
    <!-- Gear Pattern -->
    <pattern id="gearPattern" patternUnits="userSpaceOnUse" width="10" height="10">
      <circle cx="5" cy="5" r="4" fill="none" stroke="#000000" stroke-width="1"/>
      <rect x="4" y="0" width="2" height="3" fill="#000000"/>
      <rect x="4" y="7" width="2" height="3" fill="#000000"/>
      <rect x="0" y="4" width="3" height="2" fill="#000000"/>
      <rect x="7" y="4" width="3" height="2" fill="#000000"/>
    </pattern>
    
    <!-- Temporal Energy -->
    <radialGradient id="temporalGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0000FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0000FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Chronometer Base -->
  <rect x="170" y="100" width="300" height="200" rx="20" ry="20" fill="url(#brassBase)" stroke="#000000" stroke-width="4"/>
  
  <!-- Temporal Energy Glow -->
  <circle cx="320" cy="200" r="80" fill="url(#temporalGlow)"/>
  
  <!-- Main Dial -->
  <circle cx="320" cy="200" r="60" fill="#FFFFFF" stroke="#000000" stroke-width="3"/>
  <circle cx="320" cy="200" r="55" fill="none" stroke="#000000" stroke-width="1"/>
  
  <!-- Hour Markings -->
  <line x1="320" y1="145" x2="320" y2="155" stroke="#000000" stroke-width="2"/>
  <line x1="375" y1="200" x2="365" y2="200" stroke="#000000" stroke-width="2"/>
  <line x1="320" y1="255" x2="320" y2="245" stroke="#000000" stroke-width="2"/>
  <line x1="265" y1="200" x2="275" y2="200" stroke="#000000" stroke-width="2"/>
  
  <!-- Sub-Dials -->
  <circle cx="270" cy="160" r="25" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  <circle cx="370" cy="160" r="25" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  
  <!-- Gear Details -->
  <rect x="200" y="240" width="40" height="40" fill="url(#gearPattern)" stroke="#000000" stroke-width="2"/>
  <rect x="400" y="240" width="40" height="40" fill="url(#gearPattern)" stroke="#000000" stroke-width="2"/>
  
  <!-- Control Knobs -->
  <circle cx="220" cy="130" r="10" fill="#FF8800" stroke="#000000" stroke-width="2"/>
  <circle cx="420" cy="130" r="10" fill="#FF8800" stroke="#000000" stroke-width="2"/>
  
  <!-- Central Hand -->
  <line x1="320" y1="200" x2="350" y2="180" stroke="#000000" stroke-width="3"/>
</svg>