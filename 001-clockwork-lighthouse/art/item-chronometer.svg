<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <pattern id="checker" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="2" height="2" fill="#000000"/>
      <rect x="2" y="2" width="2" height="2" fill="#000000"/>
    </pattern>
  </defs>
  <!-- Background circle/glow -->
  <circle cx="32" cy="32" r="28" fill="#33FF33" opacity="0.2"/>
  
  <!-- Chronometer Case -->
  <circle cx="32" cy="32" r="22" fill="#FF8800" stroke="#000000" stroke-width="2"/>
  <circle cx="32" cy="32" r="18" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  
  <!-- Hands and Dials -->
  <line x1="32" y1="32" x2="32" y2="18" stroke="#000000" stroke-width="2"/>
  <line x1="32" y1="32" x2="42" y2="38" stroke="#000000" stroke-width="1.5"/>
  
  <!-- Temporal Pulse Glow -->
  <circle cx="32" cy="32" r="10" fill="#33FF33" opacity="0.3"/>
  <rect x="22" y="22" width="20" height="20" fill="url(#checker)" opacity="0.1" pointer-events="none"/>
</svg>