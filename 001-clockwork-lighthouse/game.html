                        "prose": "The storm claws at the cliffside, a howling beast of wind and salt. Rain is hurled, needle-sharp, lashing your face. Below, the black Atlantic churns, waves exploding against jagged teeth of rock. And above it all, the Clockwork Lighthouse rises.\n\nIt is a wrong thing. Not merely old, but *other*. Its skeleton is brass and copper, gleaming with a sickly, rain-slick sheen. Gargoyles of intricate gearwork perch along its circumference, their blank, cogwheel eyes watching you. From the lantern room at its peak, a faint blue light pulses—a slow, arrhythmic heartbeat that seems to sync with the thunder, then fight against it.\n\nThe door is a slab of burnished brass, taller than two men, etched with spirals that make your eyes ache. It stands slightly ajar, revealing a sliver of deeper black within. A broken wooden sign hangs crooked beside it, swinging madly in the gale. You can just make out the carved letters: **ALISTAIR CHRONOS — KEEPER OF TIME**. The last word is split by a crack, as if time itself has fractured here.\n\nYou hear it before you see it: a deep, grinding rumble from within the tower's guts. Not the thunder—this is mechanical, a sound of immense weights turning, of pistons driving against resistance. It rises and falls, a metallic breath beneath the storm's roar. The smell hits you next—ozone and hot oil, the scent of a machine that should not be alive.\n\nYour goal is simple: enter. The door beckons, that sliver of darkness promising shelter from the tempest. But every instinct screams that the true storm is inside, waiting in the ticking dark. The wrongness is not in the wind or the waves. It is in the light that pulses against nature, in the gears that grind beneath stone, in the silence behind that heavy, slightly open door.\n\nThe lighthouse does not want you. But it will take you anyway.",

                        "id": "workshop",

                        "prose": "The door groans open on rusted hinges, and the smell hits you like a fist — iron filings, hot oil, and underneath it all, something sharp and electric, like the air before a lightning strike that never comes. You step inside and the floor vibrates beneath your boots. Not a tremor. A *pulse*. The grinding gears below are louder now, louder than any machine should be, and they don't sound like they're working. They sound like they're *chewing*.\n\nThe workshop is a catastrophe of interrupted genius. Two workbenches flank the room, drowning in brass gears, coiled springs, and fittings that look more like surgical instruments than clockwork. A wrench lies on the floor beside an overturned stool, as if someone dropped it mid-repair and simply... left. No. Not left. A smear of something dark trails from the center mechanism toward the far wall, too thin to be blood, too deliberate to be oil.\n\nAt the room's heart sits the broken gear mechanism — a beautiful, terrible thing the size of a wagon wheel, its interlocking teeth frozen mid-rotation. One gear is cracked clean through. Another has slipped its housing entirely. You can see deep inside it, into the guts of the machine, where something metallic catches the gaslight. A glint of brass that shouldn't be there.\n\nAgainst the back wall, a spiral staircase winds upward, choked with fallen timbers and shattered glass. Not usable yet. Not safely.\n\nPages flutter near your feet — torn from a leather journal, handwriting cramped and urgent. The first line reads: *\"If you're reading this, don't trust the sound. It learns.\"*\n\nOn the wall above the mechanism, a rectangle of clean paint. Something hung here for years. A key, you realize. A key that now lives inside the broken machine.\n\nThe grinding shifts pitch. Just slightly. Just enough.\n\nYou are not alone in this room. You never were.",

                        "id": "gear-chamber",
                        "name": "Gear Chamber",
                        "prose": "The floor falls away.\n\nNot literally — iron grating holds beneath your feet, rusted and trembling with the vibration of something *enormous* — but the space above and below is so vast, so vertiginously deep, that your hindbrain screams you're standing on nothing. You are inside a throat. A mechanical throat lined with teeth the size of coffins.\n\nGears. Everywhere, gears. They fill the vertical shaft like the rings of some impossible tree, each one interlocking with its neighbors in a pattern that hurts to follow — forward, backward, sideways through grooves that shouldn't exist. Cartwheels of brass mesh with giants taller than you, and together they turn with a sound that isn't quite a sound. It's a pressure. A weight behind your eardrums. The kind of grinding that makes your fillings ache and your thoughts skip like a scratched record.\n\nBlue light from the lantern room above slices down through the gaps, painting the mechanism in fractured cobalt. It makes the gears look wet. Alive. They *breathe* — you're sure of it — each rotation accompanied by a faint exhalation of hot air that smells of ozone and old pennies and the moment just before a sneeze. Temporal static. You don't know how you know that, but you know it in your *teeth*.\n\nThe iron walkway shudders as you edge along it. Below, the pit drops into nothing — a throat without a bottom. Above, the gears climb into darkness, and somewhere past them, a passage leads up. Locked. The gears themselves are the lock, their alignment holding a door shut the way a held breath holds back a scream.\n\nTo your left, a control panel. Brass dials. A slot — rectangular, precise, the exact dimensions of the chronometer in your pocket. Behind you, wedged between two grinding teeth where no hand should have reached: a journal page, ink frantic, edges singed.\n\nThe mechanism wants feeding. You can feel it watching.",

                        "id": "living-quarters",

                        "prose": "The cot is made so perfectly you could bounce a sovereign off it. The sheets are tucked at corners sharp enough to cut — hospital corners, the kind you learn in the navy or the asylum. The pillow holds no indentation. No one has slept here in a long time. Or someone sleeps here every night and the pillow simply refuses to remember.\n\nThe writing desk faces the window. Cobalt light pools across its surface like something poured. A cup of tea sits half-finished, and when you pass your hand near it, warmth rises — not from the cup, but from the desk itself, as though the wood remembers the heat and refuses to let it go. Beside the cup, a leather journal lies open. The handwriting inside begins precise and controlled, each letter drawn with the care of a cartographer. By the final page, the letters crawl. Words overlap. Sentences abandon themselves halfway through and begin again in the margin, desperate, circling. *I have folded the lens three times now and each fold shows me the same thing — a room exactly like this one, but the cot is not empty.* The last line is a single word, written so hard the pen tore through the page: *LISTEN.*\n\nYou do not want to look in the mirror, so of course you do. Your reflection arrives a half-breath late — you've already turned away by the time it lifts its head. In the silver glass, the room behind your reflection is darker. And there is something on the cot.\n\nThe pocket watch on the nightstand reads 3:17. It has read 3:17 since you entered. It read 3:17 before you existed.\n\nThe wardrobe door sticks, then yields. Inside: a greatcoat, wool, moth-eaten at the shoulders. And behind it, wrapped in velvet the color of dried blood — a crystal the size of a fist. It catches the cobalt light and does something wrong with it. The light comes out the other side older.\n\nA narrow staircase spirals up through the ceiling, toward the Lantern Room. Each step groans under your weight like it has been waiting                         "id": "lantern-room",
                        "name": "Lighthouse Lantern Room",
                        "prose": "The circular room is not a room. It is a wound.\n\nGlass walls curve around you like the ribs of something enormous, and through them the storm repeats — not *rages*, repeats. The same bolt of lightning splits the same seam of sky. The same wave hammers the same rock. You have seen this before. You have always been seeing this. The storm is a scar that will not heal, and you are standing in the place where the blade went in.\n\nThe beacon dominates everything. Brass and crystal, mechanical and organic, it rises from the center of the floor like a spine that remembers being a tower. Its lens housing gapes open — six crystal facets arranged in a ring, one socket empty, yawning, obscene. Blue light pulses from the beacon's heart. Not steady. Never steady. A heartbeat searching for its rhythm. *Thu-thump. Thu-thu-thump. Thu-thump.*\n\nBelow you, through the iron floor, the gears grind. You can feel them in your teeth. But the sound has changed. It is not the mechanical clatter of the Gear Chamber. It is *breathing*. Deep, patient, tidal. The lighthouse breathes, and something breathes with it.\n\nA shadow in the corner.\n\nYou look directly at it and it is only a shadow — the projection of the beacon housing against curved glass. But when you glance away, it shifts. When you blink, it is closer. It has no face, but it has a shape, and the shape is wrong in the way a person is wrong when they are standing in a place a person should not be standing. You feel it watching. You feel it *recognizing*.\n\nThe Lens Crystal in your hand pulses in time with the beacon. Older light leaks from its facets. It wants to go home. The empty socket wants to receive it. The mechanism wants to complete.\n\nYou know now what Alistair did. He folded time like cloth, pressed moment against moment until something slipped through the crease. The beacon is not a lighthouse. It is a lock — and the storm is the key turned halfway, frozen, the door open just enough for whatever waits in the fold to press its face against the gap and breathe into your world for a century.\n\nThe shadow moves again. Closer.\n\nYour hand trembles above the lens housing. The crystal hums. The gears below shift from breathing to *anticipation* — a held breath, a waiting.\n\nInstall the crystal. Light the beacon. Break the loop.\n\nBut the light will shine both ways.\n\nThe shadow tilts its head — a gesture so human it stops your heart — and you realize it is not Alistair. It is not anything that was ever human. It is the thing that answered when Alistair knocked. The thing that has been learning the sound. The thing that was always here.\n\n*Thu-thu-thump.*\n\nYou slot the crystal into the empty socket.\n\nThe world does not explode. It *unfolds*.\n\nBlue-white light erupts from the beacon like a scream made visible, piercing the glass walls, lancing through the storm. The repeating bolt of lightning fractures — splits — *stops*. The wave freezes mid-crash, then dissolves into mist. The storm that has held this place captive begins to tear itself apart, pulling away like a curtain, and behind it — behind it is not darkness.\n\nIt is dawn.\n\nPale gold light spills across a sea that has never seen it. The gears below you shudder, slow, and fall silent — not the silence of death, but the silence of rest. The lighthouse exhales one final time and is still.\n\nThe shadow is gone.\n\nBut as the beacon's blue light fades — as the last pulse of that arrhythmic heartbeat winds down to nothing — you see something in the dying glow. A shape. Standing at the edge of the light where it meets the dawn. Watching. Not moving toward you. Not moving away.\n\n*Learning.*\n\nThe storm breaks. The loop ends. Dawn comes to a sea that has waited a hundred years.\n\nSomething watches from the light as it fades.\n\nYou are free. You are *seen*. And the door, at last, is shut.",

e=\"#FFFFFF\" stroke-width=\"2\"/>\n  <line x1=\"470\" y1=\"130\" x2=\"510\" y2=\"170\" stroke=\"#FFFFFF\" stroke-width=\"2\"/>\n  <line x1=\"170\" y1=\"170\" x2=\"170\" y2=\"230\" stroke=\"#FFFFFF\" stroke-width=\"2\"/>\n  <line x1=\"510\" y1=\"170\" x2=\"510\" y2=\"230\" stroke=\"#FFFFFF\" stroke-width=\"2\"/>\n  <line x1=\"170\" y1=\"230\" x2=\"130\" y2=\"270\" stroke=\"#FFFFFF\" stroke-width=\"2\"/>\n  <line x1=\"510\" y1=\"230\" x2=\"470\" y2=\"270\" stroke=\"#FFFFFF\" stroke-width=\"2\"/>\n  <line x1=\"130\" y1=\"270\" x2=\"130\" y2=\"310\" stroke=\"#FFFFFF\" stroke-width=\"2\"/>\n  <line x1=\"470\" y1=\"270\" x2=\"470\" y2=\"310\" stroke=\"#FFFFFF\" stroke-width=\"2\"/>\n  <line x1=\"130\" y1=\"310\" x2=\"170\" y2=\"350\" stroke=\"#FFFFFF\" stroke-width=\"2\"/>\n  <line x1=\"470\" y1=\"310\" x2=\"510\" y2=\"350\" stroke=\"#FFFFFF\" stroke-width=\"2\"/>\n  <line x1=\"170\" y1=\"350\" x2=\"170\" y2=\"390\" stroke=\"#FFFFFF\" stroke-width=\"2\"/>\n  <line x1=\"510\" y1=\"350\" x2=\"510\" y2=\"390\" stroke=\"#FFFFFF\" stroke-width=\"2\"/>\n  <line x1=\"170\" y1=\"390\" x2=\"130\" y2=\"430\" stroke=\"#FFFFFF\" stroke-width=\"2\"/>\n  <line x1=\"510\" y1=\"390\" x2=\"470\" y2=\"430\" stroke=\"#FFFFFF\" stroke-width=\"2\"/>\n</svg>"

    <script>
        // Embedded game logic
        // ============================================================
// CLOCKWORK LIGHTHOUSE - Game Logic
// ============================================================

// Game data will be embedded here by the Game Assembler
// Game data already loaded in window.GAME_DATA

// ---- Game State ----
const state = {
  currentScene: 'exterior',
  inventory: [],
  solvedPuzzles: [],
  visitedScenes: ['exterior'],
  activeCommand: null,
  selectedItem: null,
  won: false,
  hintsEnabled: true,
  hintTimeouts: []
};

// ---- DOM References ----
const artDisplay = document.getElementById('art-display');
const sceneName = document.getElementById('scene-name');
const textDisplay = document.getElementById('text-display');
const invBar = document.getElementById('inventory-bar');
const exitsBar = document.getElementById('exits-bar');

// ---- Hint System ----
function clearHintTimers() {
  state.hintTimeouts.forEach(timeout => clearTimeout(timeout));
  state.hintTimeouts = [];
}

function showHint(sceneId, index) {
  if (!state.hintsEnabled) return;
  const hints = GAME_DATA.hints && GAME_DATA.hints[sceneId];
  if (!hints || index >= hints.length) return;
  const hint = hints[index];
  addText(hint.text, 'hint');
}

function startHintTimer(sceneId) {
  clearHintTimers();
  const hints = GAME_DATA.hints && GAME_DATA.hints[sceneId];
  if (!hints || !state.hintsEnabled) return;
  hints.forEach((hint, idx) => {
    const timeout = setTimeout(() => showHint(sceneId, idx), hint.delay * 1000);
    state.hintTimeouts.push(timeout);
  });
}

function toggleHints() {
  state.hintsEnabled = !state.hintsEnabled;
  const btn = document.getElementById('hint-toggle');
  if (btn) btn.textContent = state.hintsEnabled ? 'HINTS: ON' : 'HINTS: OFF';
  if (!state.hintsEnabled) {
    clearHintTimers();
  } else {
    startHintTimer(state.currentScene);
  }
}

// ---- Display Functions ----
function addText(text, cls = '') {
  const p = document.createElement('p');
  p.className = cls;
  p.innerHTML = text;
  textDisplay.appendChild(p);
  textDisplay.scrollTop = textDisplay.scrollHeight;
}

function clearText() { textDisplay.innerHTML = ''; }

function renderScene(sceneId) {
  const scene = GAME_DATA.scenes.find(s => s.id === sceneId);
  if (!scene) { addText('ERROR: Scene not found!', 'error'); return; }

  state.currentScene = sceneId;
  if (!state.visitedScenes.includes(sceneId)) state.visitedScenes.push(sceneId);

  // Hint timer
  clearHintTimers();
  startHintTimer(sceneId);

  // Update scene name
  sceneName.textContent = scene.name.toUpperCase();

  // Update art
  const artKey = 'scene-' + sceneId.replace('scene-', '');
  if (window.GAME_ART && window.GAME_ART[artKey]) {
    artDisplay.innerHTML = window.GAME_ART[artKey];
  } else {
    artDisplay.innerHTML = '<span class="no-art">[ ' + scene.name.toUpperCase() + ' ]</span>';
  }

  // Display prose
  clearText();
  addText(scene.prose);

  // Show available items (not yet taken)
  const availableItems = (scene.items || []).filter(itemId =>
    !state.inventory.includes(itemId)
  );
  if (availableItems.length > 0) {
    const itemNames = availableItems.map(id => {
      const item = GAME_DATA.items.find(i => i.id === id);
      return item ? `<span class="look-target" data-look="${id}">${item.name}</span>` : id;
    });
    addText('You notice: ' + itemNames.join(', '), 'system');
  }

  // Show unsolved puzzles
  const scenePuzzles = (scene.puzzles || []).filter(pid =>
    !state.solvedPuzzles.includes(pid)
  );
  scenePuzzles.forEach(pid => {
    const puzzle = GAME_DATA.puzzles.find(p => p.id === pid);
    if (puzzle) {
      addText('There is something here that catches your attention...', 'system');
    }
  });

  // Render exits
  renderExits(scene.exits || {});

  // Render inventory
  renderInventory();

  // Check win condition
  checkWin();

  // Save state
  saveState();
}

function renderExits(exits) {
  exitsBar.innerHTML = '';
  const directions = ['north', 'south', 'east', 'west', 'up', 'down'];
  directions.forEach(dir => {
    const btn = document.createElement('button');
    btn.className = 'exit-btn' + (exits[dir] ? ' available' : '');
    btn.textContent = dir.toUpperCase();
    btn.disabled = !exits[dir];
    if (exits[dir]) {
      btn.onclick = () => go(exits[dir]);
    }
    exitsBar.appendChild(btn);
  });
}

function renderInventory() {
  const items = invBar.querySelectorAll('.inv-item');
  items.forEach(el => el.remove());
  const empty = document.getElementById('inv-empty');

  if (state.inventory.length === 0) {
    empty.style.display = '';
  } else {
    empty.style.display = 'none';
    state.inventory.forEach(itemId => {
      const item = GAME_DATA.items.find(i => i.id === itemId);
      if (!item) return;
      const el = document.createElement('span');
      el.className = 'inv-item' + (state.selectedItem === itemId ? ' selected' : '');
      el.textContent = item.name;
      el.onclick = () => selectItem(itemId);
      invBar.appendChild(el);
    });
  }
}

// ---- Command Handlers ----
function setCommand(cmd) {
  state.activeCommand = cmd;
  document.querySelectorAll('.cmd-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cmd === cmd);
  });
  if (cmd === 'look') {
    const scene = GAME_DATA.scenes.find(s => s.id === state.currentScene);
    if (scene && scene.lookDescriptions) {
      const targets = Object.keys(scene.lookDescriptions);
      if (targets.length > 0) {
        addText('You can examine: ' + targets.map(t =>
          `<span class="look-target" data-look="${t}">${t}</span>`
        ).join(', '), 'system');
      }
    }
  } else if (cmd === 'use') {
    if (state.inventory.length > 0) {
      addText('Select an item from your inventory, then click what to use it on.', 'system');
    } else {
      addText('You have nothing to use.', 'system');
    }
  } else if (cmd === 'take') {
    const scene = GAME_DATA.scenes.find(s => s.id === state.currentScene);
    const available = (scene.items || []).filter(id => !state.inventory.includes(id));
    if (available.length > 0) {
      available.forEach(id => takeItem(id));
    } else {
      addText('Nothing here to take.', 'system');
    }
  }
}

function selectItem(itemId) {
  state.selectedItem = state.selectedItem === itemId ? null : itemId;
  renderInventory();
  if (state.selectedItem) {
    const item = GAME_DATA.items.find(i => i.id === itemId);
    addText(`Selected: ${item.name}. Click USE, then a target.`, 'system');
  }
}

function takeItem(itemId) {
  if (state.inventory.includes(itemId)) return;
  const item = GAME_DATA.items.find(i => i.id === itemId);
  const scene = GAME_DATA.scenes.find(s => s.id === state.currentScene);
  if (!scene || !(scene.items || []).includes(itemId)) return;

  state.inventory.push(itemId);
  if (item) {
    addText(`You picked up: ${item.name} — ${item.description}`, 'success');
  } else {
    // Handle items referenced in scenes but not defined in items array
    addText(`You picked up: ${itemId.replace('-', ' ')}`, 'success');
  }
  renderInventory();
  saveState();
}

function lookAt(target) {
  const scene = GAME_DATA.scenes.find(s => s.id === state.currentScene);
  if (scene && scene.lookDescriptions && scene.lookDescriptions[target]) {
    addText(scene.lookDescriptions[target]);
  } else {
    // Check if it's an item
    const item = GAME_DATA.items.find(i => i.id === target);
    if (item) {
      addText(item.description);
    } else if (target.startsWith('alistairs-journal')) {
      // Handle journal entries not in items array
      addText('A page from Alistair\'s journal, filled with frantic handwriting about time loops and mechanisms.', 'system');
    } else if (target === 'gear-sequence') {
      addText('A sequence of gear positions needed to align the central mechanism in the Gear Chamber.', 'system');
    } else if (target === 'win') {
      addText('The win condition for the game.', 'system');
    } else {
      addText('Nothing interesting about that.', 'system');
    }
  }
}

function useItemOn(itemId, targetId) {
  const puzzle = GAME_DATA.puzzles.find(p =>
    p.scene === state.currentScene &&
    p.requires.includes(itemId) &&
    p.id === targetId &&
    !state.solvedPuzzles.includes(p.id)
  );

  if (puzzle && puzzle.requires.every(req => state.inventory.includes(req))) {
    state.solvedPuzzles.push(puzzle.id);
    addText(puzzle.result, 'success');
    // Handle puzzle reveals
    (puzzle.reveals || []).forEach(revealId => {
      // Check if revealId is an item
      const revealItem = GAME_DATA.items.find(i => i.id === revealId);
      if (revealItem) {
        if (!state.inventory.includes(revealId)) {
          state.inventory.push(revealId);
          addText(`You found: ${revealItem.name}!`, 'success');
        }
      } else if (revealId === 'win') {
        // Special case: win condition revealed
        checkWin();
      } else {
        // Could be a scene or other reveal - handle as needed
        addText(`Something has been revealed: ${revealId}`, 'system');
      }
    });
    renderInventory();
    checkWin();
    saveState();
  } else {
    addText("That doesn't seem to work.", 'system');
  }
}

function go(sceneId) {
  addText('---', 'system');
  renderScene(sceneId);
}

function checkWin() {
  if (state.won) return;
  const wc = GAME_DATA.winCondition;
  if (!wc) return;
  if (state.currentScene === wc.scene && 
      wc.requires.every(req => state.inventory.includes(req))) {
    state.won = true;
    addText('', '');
    addText('*** ' + wc.description + ' ***', 'success');
    addText('', '');
    addText('CONGRATULATIONS! YOU HAVE COMPLETED THE GAME!', 'success');
    addText('Type /restart to play again.', 'system');
  }
}

// ---- Persistence ----
function saveState() {
  try {
    localStorage.setItem('game-' + GAME_DATA.slug, JSON.stringify(state));
  } catch(e) {}
}

function loadState() {
  try {
    const saved = localStorage.getItem('game-' + GAME_DATA.slug);
    if (saved) {
      const s = JSON.parse(saved);
      Object.assign(state, s);
      return true;
    }
  } catch(e) {}
  return false;
}

// ---- Event Listeners ----
document.querySelectorAll('.cmd-btn').forEach(btn => {
  btn.onclick = () => setCommand(btn.dataset.cmd);
});

document.addEventListener('click', (e) => {
  if (e.target.classList.contains('look-target')) {
    const target = e.target.dataset.look;
    if (state.activeCommand === 'use' && state.selectedItem) {
      useItemOn(state.selectedItem, target);
    } else {
      lookAt(target);
    }
  }
});

document.getElementById('hint-toggle').addEventListener('click', toggleHints);

// ---- Initialize ----
function init() {
  if (Object.keys(GAME_DATA).length === 0) {
    addText('ERROR: No game data loaded. This is a template file.', 'error');
    addText('The Gameplay Coder will embed game data here.', 'system');
    return;
  }

  addText('=== ' + GAME_DATA.title.toUpperCase() + ' ===', 'success');
  addText(GAME_DATA.setting, 'system');
  addText('', '');
  addText('Commands: LOOK | TAKE | USE | EXAMINE', 'system');
  addText('Click exits to move between rooms.', 'system');
  addText('---', 'system');

  if (!loadState()) {
    renderScene('exterior');
  } else {
    renderScene(state.currentScene);
    addText('[Game restored from save]', 'system');
  }
}

init();
    </script>
