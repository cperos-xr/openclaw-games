<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0d0d1a"/>
  <!-- walls -->
  <rect x="0" y="0" width="640" height="250" fill="#16213e"/>
  <!-- floor -->
  <rect x="0" y="250" width="640" height="150" fill="#1a1a2e"/>
  <!-- control panel -->
  <rect x="300" y="100" width="100" height="80" fill="#2a2a4a" stroke="#0f0" stroke-width="4"/>
  <circle cx="340" cy="130" r="10" fill="#333" stroke="#0f0" stroke-width="2"/>
  <!-- fuse box -->
  <rect x="50" y="120" width="80" height="60" fill="#2a2a4a" stroke="#0f0" stroke-width="4"/>
  <g fill="none" stroke="#f00" stroke-width="2">
    <rect x="60" y="130" width="15" height="20"/>
    <rect x="85" y="130" width="15" height="20"/>
  </g>
  <!-- spare parts -->
  <g transform="translate(500,200)">
    <rect x="0" y="0" width="40" height="20" fill="#4a4a6a" stroke="#0f0" stroke-width="2"/>
    <text x="20" y="12" font-family="monospace" font-size="6" fill="#0f0" text-anchor="middle">FUSE</text>
  </g>
  <g transform="translate(530,200)">
    <rect x="0" y="0" width="30" height="15" fill="#2a4a2a" stroke="#0f0" stroke-width="2"/>
    <text x="15" y="9" font-family="monospace" font-size="5" fill="#0f0" text-anchor="middle">CELL</text>
  </g>
  <!-- exit down -->
  <rect x="300" y="350" width="80" height="40" fill="#1a1a2e" stroke="#0f0" stroke-width="4"/>
  <text x="340" y="372" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">DOWN</text>
</svg>
