<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#1a1a2e"/>
  <!-- floor -->
  <rect x="0" y="280" width="640" height="120" fill="#2a2a4a"/>
  <!-- bed -->
  <rect x="50" y="220" width="120" height="60" fill="#3a3a5a" stroke="#0f0" stroke-width="4"/>
  <!-- curtains -->
  <rect x="500" y="200" width="30" height="100" fill="#4a4a6a" stroke="#0f0" stroke-width="2"/>
  <!-- writing desk -->
  <rect x="300" y="200" width="150" height="80" fill="#2a2a4a" stroke="#0f0" stroke-width="4"/>
  <!-- logbook on desk -->
  <rect x="320" y="220" width="60" height="40" fill="#5a3a1a" stroke="#ffd700" stroke-width="2"/>
  <text x="350" y="245" font-family="monospace" font-size="8" fill="#ffd700" text-anchor="middle">LOG</text>
  <!-- elevator door south -->
  <rect x="280" y="320" width="80" height="60" fill="#1a1a2e" stroke="#0f0" stroke-width="4"/>
  <text x="320" y="355" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">ELEVATOR</text>
</svg>
