<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#1a1a2e"/>
  <!-- steam pipes -->
  <rect x="100" y="100" width="40" height="200" fill="#2a2a4a" stroke="#0f0" stroke-width="4"/>
  <rect x="500" y="120" width="40" height="180" fill="#2a2a4a" stroke="#0f0" stroke-width="4"/>
  <!-- boiler -->
  <ellipse cx="320" cy="250" rx="120" ry="60" fill="#2a2a4a" stroke="#ff4500" stroke-width="6"/>
  <text x="320" y="255" font-family="monospace" font-size="14" fill="#ff4500" text-anchor="middle">BOILER</text>
  <!-- chains -->
  <g stroke="#888" stroke-width="4">
    <line x1="180" y1="120" x2="180" y2="200"/>
    <line x1="460" y1="120" x2="460" y2="200"/>
  </g>
  <!-- override hook -->
  <g transform="translate(300,80)">
    <path d="M0,0 Q10,-20 20,0" fill="none" stroke="#ffd700" stroke-width="4"/>
    <circle cx="10" cy="-25" r="5" fill="#ffd700"/>
  </g>
  <!-- elevator key hanging -->
  <g transform="translate(310,100)">
    <rect x="0" y="0" width="25" height="8" fill="#ffd700" stroke="#0f0" stroke-width="2"/>
    <circle cx="12" cy="4" r="3" fill="#ffd700"/>
  </g>
  <!-- door north -->
  <rect x="280" y="40" width="80" height="60" fill="#1a1a2e" stroke="#0f0" stroke-width="4"/>
  <text x="320" y="72" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">BALLROOM</text>
</svg>
