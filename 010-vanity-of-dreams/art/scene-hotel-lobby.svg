<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#1a1a2e"/>
  <!-- floor -->
  <rect x="0" y="300" width="640" height="100" fill="#16213e"/>
  <!-- walls -->
  <rect x="0" y="0" width="640" height="300" fill="#0f3460"/>
  <!-- chandelier -->
  <g stroke="#e94560" stroke-width="3" fill="none">
    <circle cx="320" cy="80" r="30"/>
    <line x1="320" y1="110" x2="320" y2="150"/>
    <line x1="290" y1="110" x2="350" y2="110"/>
    <line x1="280" y1="140" x2="360" y2="140"/>
  </g>
  <!-- reception desk -->
  <rect x="100" y="250" width="150" height="50" fill="#2a2a4a" stroke="#0f0" stroke-width="4"/>
  <!-- mirror on wall -->
  <rect x="400" y="100" width="120" height="150" fill="#4a4a6a" stroke="#e94560" stroke-width="4"/>
  <text x="460" y="180" font-family="monospace" font-size="12" fill="#e94560" text-anchor="middle">MIRROR</text>
  <!-- door north -->
  <rect x="300" y="50" width="80" height="100" fill="#2a2a4a" stroke="#0f0" stroke-width="4"/>
  <text x="340" y="105" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">EXIT</text>
  <!-- shards on floor -->
  <g fill="#a0a0c0">
    <polygon points="150,320 160,310 170,320"/>
    <polygon points="180,330 190,315 200,330"/>
  </g>
</svg>
