<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0d0d1a"/>
  <!-- dance floor -->
  <ellipse cx="320" cy="220" rx="250" ry="120" fill="#2a2a4a" stroke="#0f0" stroke-width="4"/>
  <!-- chandeliers -->
  <g fill="#e94560">
    <circle cx="150" cy="80" r="25" stroke="#0f0" stroke-width="2" fill="none"/>
    <circle cx="490" cy="80" r="25" stroke="#0f0" stroke-width="2" fill="none"/>
  </g>
  <!-- large mirror on wall -->
  <rect x="200" y="40" width="240" height="120" fill="#4a4a6a" stroke="#e94560" stroke-width="6"/>
  <text x="320" y="105" font-family="monospace" font-size="12" fill="#e94560" text-anchor="middle">THE REFLECTION</text>
  <!-- ghostly silhouettes -->
  <g fill="#666" opacity="0.5">
    <ellipse cx="260" cy="200" rx="15" ry="25"/>
    <ellipse cx="300" cy="200" rx="15" ry="25"/>
    <ellipse cx="340" cy="200" rx="15" ry="25"/>
  </g>
</svg>
