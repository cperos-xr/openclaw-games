<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" fill="#000005" opacity="0.3" rx="2"/>
  
  <!-- Obsidian Lens - dark crystalline lens, astronomical precision cut -->
  <!-- Outer housing/ring -->
  <circle cx="32" cy="32" r="24" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  
  <!-- Metal ring setting -->
  <circle cx="32" cy="32" r="20" fill="#222" stroke="#555" stroke-width="1.5"/>
  
  <!-- The dark crystal lens itself -->
  <circle cx="32" cy="32" r="16" fill="#000022" stroke="#333" stroke-width="1"/>
  
  <!-- Astronomical precision cut facets -->
  <!-- Facet lines radiating from center -->
  <line x1="32" y1="16" x2="32" y2="20" stroke="#333" stroke-width="1"/>
  <line x1="32" y1="44" x2="32" y2="48" stroke="#333" stroke-width="1"/>
  <line x1="16" y1="32" x2="20" y2="32" stroke="#333" stroke-width="1"/>
  <line x1="44" y1="32" x2="48" y2="32" stroke="#333" stroke-width="1"/>
  <line x1="20.7" y1="20.7" x2="23.5" y2="23.5" stroke="#333" stroke-width="1"/>
  <line x1="40.5" y1="40.5" x2="43.3" y2="43.3" stroke="#333" stroke-width="1"/>
  <line x1="43.3" y1="20.7" x2="40.5" y2="23.5" stroke="#333" stroke-width="1"/>
  <line x1="23.5" y1="40.5" x2="20.7" y2="43.3" stroke="#333" stroke-width="1"/>
  
  <!-- Inner rings showing lens curvature -->
  <circle cx="32" cy="32" r="12" fill="none" stroke="#000033" stroke-width="0.5"/>
  <circle cx="32" cy="32" r="8" fill="none" stroke="#000044" stroke-width="0.5"/>
  <circle cx="32" cy="32" r="4" fill="none" stroke="#000055" stroke-width="0.5"/>
  
  <!-- The lens drinks light - dark center -->
  <circle cx="32" cy="32" r="3" fill="#000011"/>
  
  <!-- Subtle light being absorbed at edges -->
  <path d="M20 28 Q22 26 24 28" fill="none" stroke="#222244" stroke-width="1" opacity="0.5"/>
  <path d="M40 36 Q42 38 44 36" fill="none" stroke="#222244" stroke-width="1" opacity="0.4"/>
  
  <!-- Glass/metal setting details -->
  <!-- Screws on housing -->
  <circle cx="20" cy="20" r="1.5" fill="#444" stroke="#555" stroke-width="0.5"/>
  <circle cx="44" cy="20" r="1.5" fill="#444" stroke="#555" stroke-width="0.5"/>
  <circle cx="20" cy="44" r="1.5" fill="#444" stroke="#555" stroke-width="0.5"/>
  <circle cx="44" cy="44" r="1.5" fill="#444" stroke="#555" stroke-width="0.5"/>
  
  <!-- Screw crosses -->
  <line x1="19" y1="20" x2="21" y2="20" stroke="#666" stroke-width="0.5"/>
  <line x1="20" y1="19" x2="20" y2="21" stroke="#666" stroke-width="0.5"/>
  <line x1="43" y1="20" x2="45" y2="20" stroke="#666" stroke-width="0.5"/>
  <line x1="44" y1="19" x2="44" y2="21" stroke="#666" stroke-width="0.5"/>
  <line x1="19" y1="44" x2="21" y2="44" stroke="#666" stroke-width="0.5"/>
  <line x1="20" y1="43" x2="20" y2="45" stroke="#666" stroke-width="0.5"/>
  <line x1="43" y1="44" x2="45" y2="44" stroke="#666" stroke-width="0.5"/>
  <line x1="44" y1="43" x2="44" y2="45" stroke="#666" stroke-width="0.5"/>
  
  <!-- Faint eerie glow from the dark crystal -->
  <circle cx="32" cy="32" r="22" fill="#000033" opacity="0.08"/>
  
  <!-- Edge reflection showing precision cut -->
  <path d="M16 30 Q16 28 18 27" fill="none" stroke="#555" stroke-width="0.8" opacity="0.4"/>
  <path d="M46 34 Q48 36 48 38" fill="none" stroke="#555" stroke-width="0.8" opacity="0.3"/>
</svg>
