<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="brass-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background for clarity -->
  <rect width="64" height="64" fill="#0a0a00" opacity="0.3" rx="2"/>
  
  <!-- Brass Key with clock gear teeth on bow -->
  <!-- Key bow (ornate with gear teeth pattern) -->
  <circle cx="18" cy="20" r="12" fill="none" stroke="#FF8800" stroke-width="3"/>
  <circle cx="18" cy="20" r="6" fill="none" stroke="#FFAA00" stroke-width="2"/>
  <!-- Gear teeth on bow edge -->
  <line x1="18" y1="8" x2="18" y2="5" stroke="#FF8800" stroke-width="2"/>
  <line x1="25" y1="11" x2="28" y2="9" stroke="#FF8800" stroke-width="2"/>
  <line x1="29" y1="18" x2="32" y2="18" stroke="#FF8800" stroke-width="2"/>
  <line x1="28" y1="26" x2="30" y2="29" stroke="#FF8800" stroke-width="2"/>
  <line x1="22" y1="30" x2="22" y2="33" stroke="#FF8800" stroke-width="2"/>
  <line x1="14" y1="30" x2="14" y2="33" stroke="#FF8800" stroke-width="2"/>
  <line x1="8" y1="26" x2="6" y2="29" stroke="#FF8800" stroke-width="2"/>
  <line x1="7" y1="18" x2="4" y2="18" stroke="#FF8800" stroke-width="2"/>
  <line x1="11" y1="11" x2="8" y2="9" stroke="#FF8800" stroke-width="2"/>
  
  <!-- Key shaft -->
  <rect x="28" y="18" width="26" height="5" fill="#FF8800" rx="1"/>
  <rect x="30" y="19" width="22" height="3" fill="#CC7700" opacity="0.7"/>
  
  <!-- Key teeth (ornate gear-like) -->
  <rect x="46" y="23" width="4" height="7" fill="#FF8800"/>
  <rect x="50" y="23" width="3" height="5" fill="#FF8800"/>
  <rect x="52" y="23" width="2" height="3" fill="#FF8800"/>
  
  <!-- Ornate cold gleam -->
  <rect x="32" y="19" width="4" height="1" fill="#FFDD00" opacity="0.5"/>
  <rect x="38" y="19" width="3" height="1" fill="#FFDD00" opacity="0.4"/>
  
  <!-- Rust/age spots -->
  <circle cx="22" cy="22" r="1" fill="#AA5500" opacity="0.5"/>
  <circle cx="35" cy="20" r="0.8" fill="#AA5500" opacity="0.4"/>
</svg>
