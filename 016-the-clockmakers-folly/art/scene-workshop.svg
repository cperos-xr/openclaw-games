<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <defs>
    <pattern id="wall-grimy" width="40" height="20" patternUnits="userSpaceOnUse">
      <rect width="40" height="20" fill="#0d0d0d"/>
      <rect x="2" y="2" width="36" height="16" fill="#111" stroke="#0a0a0a" stroke-width="1"/>
      <rect x="10" y="5" width="5" height="3" fill="#1a1a00" opacity="0.3"/>
      <rect x="25" y="12" width="4" height="2" fill="#1a1a00" opacity="0.2"/>
    </pattern>
    <pattern id="workbench-top" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#1a0d00"/>
      <rect x="0" y="0" width="19" height="2" fill="#0d0600" opacity="0.5"/>
      <rect x="5" y="4" width="10" height="1" fill="#0d0600" opacity="0.3"/>
      <rect x="2" y="8" width="15" height="1" fill="#0d0600" opacity="0.3"/>
      <rect x="8" y="12" width="8" height="1" fill="#0d0600" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Layer 1: Background walls -->
  <rect width="640" height="400" fill="#050500"/>
  <rect x="0" y="0" width="640" height="260" fill="url(#wall-grimy)"/>
  
  <!-- Layer 2: Floor -->
  <rect x="0" y="260" width="640" height="140" fill="#0d0600"/>
  <!-- Floor boards -->
  <line x1="0" y1="280" x2="640" y2="280" stroke="#050500" stroke-width="2"/>
  <line x1="0" y1="310" x2="640" y2="310" stroke="#050500" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="340" x2="640" y2="340" stroke="#050500" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="370" x2="640" y2="370" stroke="#050500" stroke-width="1" opacity="0.5"/>
  
  <!-- Layer 3: Grimy windows (top) -->
  <rect x="80" y="20" width="60" height="80" fill="#222" stroke="#333" stroke-width="2"/>
  <rect x="220" y="20" width="60" height="80" fill="#222" stroke="#333" stroke-width="2"/>
  <rect x="360" y="20" width="60" height="80" fill="#222" stroke="#333" stroke-width="2"/>
  <rect x="500" y="20" width="60" height="80" fill="#222" stroke="#333" stroke-width="2"/>
  <!-- Window panes -->
  <line x1="110" y1="20" x2="110" y2="100" stroke="#333" stroke-width="2"/>
  <line x1="80" y1="60" x2="140" y2="60" stroke="#333" stroke-width="2"/>
  <line x1="250" y1="20" x2="250" y2="100" stroke="#333" stroke-width="2"/>
  <line x1="220" y1="60" x2="280" y2="60" stroke="#333" stroke-width="2"/>
  <line x1="390" y1="20" x2="390" y2="100" stroke="#333" stroke-width="2"/>
  <line x1="360" y1="60" x2="420" y2="60" stroke="#333" stroke-width="2"/>
  <line x1="530" y1="20" x2="530" y2="100" stroke="#333" stroke-width="2"/>
  <line x1="500" y1="60" x2="560" y2="60" stroke="#333" stroke-width="2"/>
  <!-- Pale light through windows -->
  <rect x="85" y="100" width="50" height="160" fill="#FFFF00" opacity="0.03"/>
  <rect x="225" y="100" width="50" height="160" fill="#FFFF00" opacity="0.03"/>
  <rect x="365" y="100" width="50" height="160" fill="#FFFF00" opacity="0.03"/>
  <rect x="505" y="100" width="50" height="160" fill="#FFFF00" opacity="0.03"/>
  
  <!-- Layer 4: Main workbench (center) -->
  <rect x="150" y="220" width="340" height="60" fill="#1a0d00" stroke="#0d0600" stroke-width="3"/>
  <!-- Workbench top texture -->
  <rect x="150" y="220" width="340" height="15" fill="url(#workbench-top)"/>
  <!-- Table legs -->
  <rect x="155" y="280" width="8" height="30" fill="#0d0600"/>
  <rect x="477" y="280" width="8" height="30" fill="#0d0600"/>
  <rect x="250" y="280" width="6" height="25" fill="#0d0600"/>
  <rect x="384" y="280" width="6" height="25" fill="#0d0600"/>
  
  <!-- Disassembled clock mechanism on workbench -->
  <!-- Main clock body shell -->
  <rect x="240" y="195" width="60" height="40" fill="#1a0d00" stroke="#333" stroke-width="2"/>
  <rect x="245" y="200" width="50" height="30" fill="#000"/>
  <!-- Exposed gears (spilled out) -->
  <circle cx="265" cy="215" r="12" fill="none" stroke="#b87333" stroke-width="2"/>
  <circle cx="265" cy="215" r="4" fill="none" stroke="#b87333" stroke-width="1"/>
  <!-- Gear teeth hints -->
  <line x1="265" y1="203" x2="265" y2="200" stroke="#b87333" stroke-width="2"/>
  <line x1="265" y1="227" x2="265" y2="230" stroke="#b87333" stroke-width="2"/>
  <line x1="253" y1="215" x2="250" y2="215" stroke="#b87333" stroke-width="2"/>
  <line x1="277" y1="215" x2="280" y2="215" stroke="#b87333" stroke-width="2"/>
  
  <!-- Smaller gears scattered -->
  <circle cx="310" cy="228" r="6" fill="none" stroke="#b87333" stroke-width="1.5"/>
  <circle cx="310" cy="228" r="2" fill="none" stroke="#b87333"/>
  <circle cx="340" cy="225" r="4" fill="none" stroke="#b87333" stroke-width="1.5"/>
  <circle cx="370" cy="230" r="8" fill="none" stroke="#b87333" stroke-width="1.5"/>
  <circle cx="370" cy="230" r="3" fill="none" stroke="#b87333"/>
  <circle cx="200" cy="225" r="5" fill="none" stroke="#b87333" stroke-width="1.5"/>
  <circle cx="420" cy="222" r="3" fill="none" stroke="#b87333" stroke-width="1"/>
  
  <!-- Tools on workbench -->
  <!-- Screwdriver -->
  <rect x="165" y="235" width="30" height="3" fill="#444" rx="1"/>
  <rect x="195" y="234" width="8" height="5" fill="#663300" rx="1"/>
  <!-- Tweezers -->
  <line x1="160" y1="228" x2="180" y2="228" stroke="#888" stroke-width="2"/>
  <line x1="160" y1="231" x2="180" y2="231" stroke="#888" stroke-width="2"/>
  <!-- Oil-stained velvet (drawer liner) -->
  <rect x="290" y="238" width="50" height="8" fill="#1a0033" opacity="0.6" rx="2"/>
  
  <!-- Locked drawer on workbench -->
  <rect x="360" y="240" width="60" height="30" fill="#0d0600" stroke="#333" stroke-width="2"/>
  <!-- Keyhole shaped like gear tooth -->
  <circle cx="390" cy="255" r="5" fill="#000" stroke="#555" stroke-width="1"/>
  <rect x="390" y="258" width="3" height="6" fill="#000"/>
  <!-- Gear-tooth pattern on keyhole -->
  <circle cx="387" cy="253" r="1" fill="#777"/>
  <circle cx="393" cy="253" r="1" fill="#777"/>
  <circle cx="387" cy="257" r="1" fill="#777"/>
  <circle cx="393" cy="257" r="1" fill="#777"/>
  
  <!-- Layer 5: Pendulums standing silent against wall (right) -->
  <line x1="570" y1="160" x2="570" y2="240" stroke="#555" stroke-width="3"/>
  <circle cx="570" cy="242" r="8" fill="#1a0d00" stroke="#555" stroke-width="1"/>
  <line x1="590" y1="165" x2="590" y2="235" stroke="#555" stroke-width="2"/>
  <circle cx="590" cy="237" r="7" fill="#1a0d00" stroke="#555" stroke-width="1"/>
  
  <!-- Mainsprings coiled like serpents -->
  <circle cx="100" cy="340" r="15" fill="none" stroke="#666" stroke-width="2"/>
  <circle cx="100" cy="340" r="11" fill="none" stroke="#666" stroke-width="1.5"/>
  <circle cx="100" cy="340" r="7" fill="none" stroke="#666" stroke-width="1"/>
  <circle cx="100" cy="340" r="3" fill="#555"/>
  
  <!-- Layer 6: Doors -->
  <!-- South door (to foyer) - bottom center -->
  <rect x="280" y="365" width="80" height="35" fill="url(#floor-dark)" opacity="0.4"/>
  <rect x="280" y="375" width="80" height="25" fill="#050500"/>
  <rect x="275" y="370" width="5" height="30" fill="#1a0d00" stroke="#0d0600" stroke-width="1"/>
  <rect x="360" y="370" width="5" height="30" fill="#1a0d00" stroke="#0d0600" stroke-width="1"/>
  
  <!-- West passage (to library) - left wall -->
  <rect x="0" y="180" width="20" height="80" fill="#000"/>
  <rect x="15" y="185" width="10" height="70" fill="#111" opacity="0.5"/>
  <!-- Fallen pages scattered at threshold -->
  <rect x="5" y="255" width="15" height="8" fill="#555" opacity="0.4" transform="rotate(-5, 12, 259)"/>
  <rect x="2" y="262" width="12" height="6" fill="#555" opacity="0.3" transform="rotate(3, 8, 265)"/>
  
  <!-- East door (to bedroom) - right wall -->
  <rect x="620" y="160" width="20" height="100" fill="#000"/>
  <rect x="620" y="160" width="10" height="100" fill="#0d0600"/>
  <!-- Half-shut, revealing dim corridor -->
  <rect x="630" y="165" width="10" height="90" fill="#111" opacity="0.7"/>
  
  <!-- Layer 7: Scattered gears on floor -->
  <circle cx="80" cy="310" r="4" fill="none" stroke="#886600" stroke-width="1.5" opacity="0.7"/>
  <circle cx="150" cy="350" r="6" fill="none" stroke="#886600" stroke-width="1.5" opacity="0.6"/>
  <circle cx="500" cy="330" r="3" fill="none" stroke="#886600" stroke-width="1" opacity="0.5"/>
  <circle cx="550" cy="360" r="5" fill="none" stroke="#886600" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Layer 8: Atmosphere - brass gleams, phantom ticking -->
  <!-- Light catching on brass -->
  <rect x="230" y="195" width="80" height="60" fill="#FF8800" opacity="0.03"/>
  <!-- Dust in light -->
  <circle cx="100" cy="150" r="1" fill="#FFF" opacity="0.15"/>
  <circle cx="250" cy="140" r="1" fill="#FFF" opacity="0.12"/>
  <circle cx="400" cy="130" r="1" fill="#FFF" opacity="0.1"/>
  <circle cx="550" cy="160" r="1" fill="#FFF" opacity="0.12"/>
  
  <!-- Vignette -->
  <rect x="0" y="0" width="640" height="400" fill="url(#wall-grimy)" opacity="0.1" transform="rotate(180, 320, 200)"/>
</svg>
