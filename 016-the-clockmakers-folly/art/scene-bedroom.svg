<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <defs>
    <pattern id="wall-paneled" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#1a0d00"/>
      <rect x="2" y="2" width="36" height="36" fill="#0d0600" stroke="#1a0d00" stroke-width="2"/>
      <rect x="5" y="5" width="30" height="30" fill="#110a00"/>
    </pattern>
    <pattern id="bedsheet" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="#333322"/>
      <rect x="0" y="0" width="9" height="1" fill="#222211" opacity="0.5"/>
      <rect x="0" y="3" width="9" height="1" fill="#222211" opacity="0.3"/>
      <rect x="0" y="6" width="9" height="1" fill="#222211" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Layer 1: Background walls -->
  <rect width="640" height="400" fill="#0a0500"/>
  <rect x="0" y="0" width="640" height="270" fill="url(#wall-paneled)"/>
  
  <!-- Layer 2: Floor -->
  <rect x="0" y="270" width="640" height="130" fill="#0d0600"/>
  <!-- Floor boards -->
  <line x1="0" y1="290" x2="640" y2="290" stroke="#050500" stroke-width="2"/>
  <line x1="0" y1="320" x2="640" y2="320" stroke="#050500" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="350" x2="640" y2="350" stroke="#050500" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="380" x2="640" y2="380" stroke="#050500" stroke-width="1" opacity="0.5"/>
  
  <!-- Layer 3: Four-poster bed (center-left) -->
  <!-- Four posts -->
  <rect x="40" y="150" width="6" height="140" fill="#1a0d00" stroke="#0d0600" stroke-width="1"/>
  <rect x="180" y="150" width="6" height="140" fill="#1a0d00" stroke="#0d0600" stroke-width="1"/>
  <rect x="35" y="170" width="6" height="130" fill="#1a0d00" stroke="#0d0600" stroke-width="1"/>
  <rect x="185" y="170" width="6" height="130" fill="#1a0d00" stroke="#0d0600" stroke-width="1"/>
  
  <!-- Bed frame -->
  <rect x="25" y="250" width="180" height="60" fill="#1a0d00" stroke="#0d0600" stroke-width="2"/>
  <!-- Headboard -->
  <rect x="20" y="190" width="10" height="70" fill="#1a0d00" stroke="#0d0600" stroke-width="2"/>
  <rect x="28" y="195" width="8" height="60" fill="#0d0600" stroke="#1a0d00" stroke-width="1"/>
  <!-- Footboard -->
  <rect x="190" y="230" width="10" height="40" fill="#1a0d00" stroke="#0d0600" stroke-width="2"/>
  
  <!-- Bedsheets - neatly made, taut -->
  <rect x="30" y="250" width="160" height="55" fill="url(#bedsheet)"/>
  <!-- Blanket pulled taut -->
  <rect x="30" y="255" width="155" height="45" fill="#2a2010" opacity="0.7"/>
  <!-- Pillow indented -->
  <ellipse cx="65" cy="260" rx="30" ry="12" fill="#333322" opacity="0.8"/>
  <ellipse cx="65" cy="260" rx="25" ry="10" fill="#3a3020" opacity="0.5"/>
  <!-- Pillow indentation -->
  <ellipse cx="65" cy="262" rx="20" ry="7" fill="#252010" opacity="0.3"/>
  
  <!-- Heavy bed curtains -->
  <rect x="25" y="150" width="10" height="110" fill="#1a0d00" opacity="0.8"/>
  <rect x="185" y="150" width="10" height="110" fill="#1a0d00" opacity="0.8"/>
  <!-- Curtain rod top -->
  <rect x="20" y="148" width="185" height="4" fill="#1a0d00" stroke="#0d0600" stroke-width="1"/>
  <!-- Curtain drape hints -->
  <path d="M35 150 Q40 180 35 250" fill="none" stroke="#0d0600" stroke-width="2" opacity="0.3"/>
  <path d="M180 150 Q175 180 180 250" fill="none" stroke="#0d0600" stroke-width="2" opacity="0.3"/>
  
  <!-- Layer 4: Wardrobe (left corner) -->
  <rect x="0" y="120" width="80" height="180" fill="#0d0600" stroke="#1a0d00" stroke-width="3"/>
  <!-- Doors slightly ajar -->
  <rect x="3" y="125" width="35" height="170" fill="#110a00" stroke="#1a0d00" stroke-width="1"/>
  <rect x="42" y="125" width="35" height="170" fill="#110a00" stroke="#1a0d00" stroke-width="1"/>
  <!-- Gap showing coats -->
  <rect x="37" y="130" width="8" height="160" fill="#000" opacity="0.6"/>
  <!-- Coat shapes inside -->
  <path d="M38 140 L38 200 L42 200 L44 170 L44 140" fill="#1a0d00" opacity="0.5"/>
  <path d="M40 142 L40 195 L43 195 L44 175 L44 142" fill="#111" opacity="0.4"/>
  
  <!-- Wardrobe handles -->
  <rect x="10" y="200" width="8" height="4" fill="#554400" opacity="0.4" rx="1"/>
  <rect x="55" y="200" width="8" height="4" fill="#554400" opacity="0.4" rx="1"/>
  
  <!-- Box with crystalline object at bottom -->
  <rect x="15" y="265" width="25" height="18" fill="#1a0d00" stroke="#0d0600" stroke-width="1"/>
  <!-- Tissue paper -->
  <rect x="17" y="260" width="21" height="8" fill="#444" opacity="0.4" rx="1"/>
  <!-- Dark crystalline glimpse -->
  <polygon points="22,272 27,268 32,272 30,278 24,278" fill="#000033" opacity="0.6"/>
  <polygon points="24,270 27,267 30,270 28,274 25,274" fill="#000044" opacity="0.4"/>
  
  <!-- Layer 5: Safe in wall (near bed) -->
  <rect x="130" y="170" width="50" height="60" fill="#0d0d0d" stroke="#333" stroke-width="2"/>
  <rect x="135" y="175" width="40" height="50" fill="#111" stroke="#444" stroke-width="1"/>
  <!-- Circular combination dial -->
  <circle cx="155" cy="200" r="15" fill="#222" stroke="#555" stroke-width="2"/>
  <circle cx="155" cy="200" r="10" fill="#111" stroke="#444" stroke-width="1"/>
  <circle cx="155" cy="200" r="3" fill="#333"/>
  <!-- Number markings -->
  <line x1="155" y1="185" x2="155" y2="188" stroke="#555" stroke-width="1"/>
  <line x1="155" y1="212" x2="155" y2="215" stroke="#555" stroke-width="1"/>
  <line x1="140" y1="200" x2="143" y2="200" stroke="#555" stroke-width="1"/>
  <line x1="167" y1="200" x2="170" y2="200" stroke="#555" stroke-width="1"/>
  
  <!-- Layer 6: Nightstand (right side) -->
  <rect x="480" y="240" width="50" height="45" fill="#1a0d00" stroke="#0d0600" stroke-width="2"/>
  <!-- Top -->
  <rect x="475" y="235" width="60" height="6" fill="#0d0600"/>
  <!-- Legs -->
  <rect x="483" y="285" width="5" height="20" fill="#0d0600"/>
  <rect x="522" y="285" width="5" height="20" fill="#0d0600"/>
  
  <!-- Journal on nightstand (open) -->
  <rect x="485" y="228" width="30" height="20" fill="#443322" rx="1"/>
  <!-- Open pages -->
  <rect x="487" y="230" width="13" height="16" fill="#555544" opacity="0.8"/>
  <rect x="500" y="230" width="13" height="16" fill="#555544" opacity="0.8"/>
  <!-- Frantic writing -->
  <line x1="490" y1="234" x2="498" y2="234" stroke="#000" stroke-width="0.5" opacity="0.5"/>
  <line x1="490" y1="237" x2="497" y2="237" stroke="#000" stroke-width="0.5" opacity="0.5"/>
  <line x1="490" y1="240" x2="496" y2="240" stroke="#000" stroke-width="0.5" opacity="0.5"/>
  <line x1="503" y1="234" x2="510" y2="234" stroke="#000" stroke-width="0.5" opacity="0.5"/>
  <line x1="503" y1="237" x2="509" y2="237" stroke="#000" stroke-width="0.5" opacity="0.5"/>
  <line x1="503" y1="240" x2="508" y2="240" stroke="#000" stroke-width="0.5" opacity="0.5"/>
  <!-- Underlined phrase -->
  <line x1="488" y1="244" x2="512" y2="244" stroke="#000" stroke-width="0.8" opacity="0.6"/>
  <!-- Numbers visible -->
  <text x="495" y="242" font-family="serif" font-size="4" fill="#000" opacity="0.6">1159</text>
  
  <!-- Layer 7: Calendar on wall -->
  <rect x="300" y="60" width="60" height="50" fill="#555544" stroke="#333" stroke-width="1"/>
  <!-- Calendar header -->
  <rect x="300" y="60" width="60" height="12" fill="#333"/>
  <text x="330" y="69" font-family="serif" font-size="6" fill="#888" text-anchor="middle">APRIL 1887</text>
  <!-- Calendar grid -->
  <line x1="305" y1="75" x2="355" y2="75" stroke="#666" stroke-width="0.5"/>
  <!-- Day numbers (simplified) -->
  <text x="307" y="82" font-family="serif" font-size="5" fill="#444">1</text>
  <text x="317" y="82" font-family="serif" font-size="5" fill="#444">2</text>
  <text x="327" y="82" font-family="serif" font-size="5" fill="#444">3</text>
  <text x="337" y="82" font-family="serif" font-size="5" fill="#444">4</text>
  <text x="347" y="82" font-family="serif" font-size="5" fill="#444">5</text>
  <text x="307" y="90" font-family="serif" font-size="5" fill="#444">8</text>
  <text x="317" y="90" font-family="serif" font-size="5" fill="#444">9</text>
  <text x="327" y="90" font-family="serif" font-size="5" fill="#444">10</text>
  
  <!-- 14th circled in heavy black ink -->
  <circle cx="342" cy="95" r="7" fill="none" stroke="#000" stroke-width="2"/>
  <text x="342" y="97" font-family="serif" font-size="5" fill="#000" text-anchor="middle">14</text>
  <text x="357" y="97" font-family="serif" font-size="5" fill="#444">15</text>
  <text x="307" y="98" font-family="serif" font-size="5" fill="#444">11</text>
  <text x="317" y="98" font-family="serif" font-size="5" fill="#444">12</text>
  <text x="327" y="98" font-family="serif" font-size="5" fill="#444">13</text>
  
  <!-- Layer 8: Washstand with pitcher and basin -->
  <rect x="400" y="200" width="40" height="80" fill="#1a0d00" stroke="#0d0600" stroke-width="2"/>
  <!-- Shelf top -->
  <rect x="395" y="195" width="50" height="5" fill="#0d0600"/>
  <!-- Stand legs -->
  <rect x="403" y="280" width="4" height="20" fill="#0d0600"/>
  <rect x="433" y="280" width="4" height="20" fill="#0d0600"/>
  
  <!-- Pitcher -->
  <path d="M407 180 L407 195 L405 200 L420 200 L418 195 L418 180" fill="#444" stroke="#333" stroke-width="1"/>
  <path d="M408 180 L408 193 L416 193 L416 180" fill="#555"/>
  <!-- Water inside -->
  <rect x="409" y="185" width="6" height="7" fill="#556677" opacity="0.5"/>
  
  <!-- Basin -->
  <ellipse cx="415" cy="215" rx="12" ry="6" fill="#444" stroke="#333" stroke-width="1"/>
  <ellipse cx="415" cy="213" rx="10" ry="5" fill="#556677" opacity="0.4"/>
  <!-- Undisturbed water surface -->
  <rect x="405" y="212" width="20" height="3" fill="#556677" opacity="0.3" rx="2"/>
  
  <!-- Layer 9: Doors -->
  <!-- East door (to library/foyer) -->
  <rect x="610" y="130" width="30" height="140" fill="#0d0600" stroke="#1a0d00" stroke-width="2"/>
  <!-- Door knob -->
  <circle cx="615" cy="200" r="3" fill="#554400" opacity="0.5"/>
  
  <!-- North door (locked, ornate keyhole) -->
  <rect x="250" y="120" width="60" height="150" fill="#0d0600" stroke="#1a0d00" stroke-width="2"/>
  <!-- Ornate keyhole -->
  <rect x="275" y="190" width="10" height="14" fill="#000" stroke="#555" stroke-width="1" rx="2"/>
  <circle cx="280" cy="193" r="4" fill="#000" stroke="#555" stroke-width="1"/>
  <rect x="279" y="197" width="2" height="6" fill="#000"/>
  
  <!-- Layer 10: Atmosphere -->
  <!-- Oppressively still air -->
  <!-- Dust settling -->
  <circle cx="150" cy="120" r="1" fill="#FFF" opacity="0.08"/>
  <circle cx="300" cy="100" r="1" fill="#FFF" opacity="0.06"/>
  <circle cx="450" cy="110" r="1" fill="#FFF" opacity="0.07"/>
  
  <!-- Shadow under bed -->
  <ellipse cx="110" cy="295" rx="70" ry="8" fill="#000" opacity="0.5"/>
  <!-- Shadow under nightstand -->
  <ellipse cx="505" cy="305" rx="20" ry="4" fill="#000" opacity="0.5"/>
  
  <!-- Vignette -->
  <rect x="0" y="0" width="640" height="400" fill="#000" opacity="0.2"/>
</svg>
