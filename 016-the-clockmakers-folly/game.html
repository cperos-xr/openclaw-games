  "scene-bedroom": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 640 400\" width=\"640\" height=\"400\">\n  <defs>\n    <pattern id=\"wall-paneled\" width=\"40\" height=\"40\" patternUnits=\"userSpaceOnUse\">\n      <rect width=\"40\" height=\"40\" fill=\"#1a0d00\"/>\n      <rect x=\"2\" y=\"2\" width=\"36\" height=\"36\" fill=\"#0d0600\" stroke=\"#1a0d00\" stroke-width=\"2\"/>\n      <rect x=\"5\" y=\"5\" width=\"30\" height=\"30\" fill=\"#110a00\"/>\n    </pattern>\n    <pattern id=\"bedsheet\" width=\"10\" height=\"10\" patternUnits=\"userSpaceOnUse\">\n      <rect width=\"10\" height=\"10\" fill=\"#333322\"/>\n      <rect x=\"0\" y=\"0\" width=\"9\" height=\"1\" fill=\"#222211\" opacity=\"0.5\"/>\n      <rect x=\"0\" y=\"3\" width=\"9\" height=\"1\" fill=\"#222211\" opacity=\"0.3\"/>\n      <rect x=\"0\" y=\"6\" width=\"9\" height=\"1\" fill=\"#222211\" opacity=\"0.3\"/>\n    </pattern>\n  </defs>\n  \n  <!-- Layer 1: Background walls -->\n  <rect width=\"640\" height=\"400\" fill=\"#0a0500\"/>\n  <rect x=\"0\" y=\"0\" width=\"640\" height=\"270\" fill=\"url(#wall-paneled)\"/>\n  \n  <!-- Layer 2: Floor -->\n  <rect x=\"0\" y=\"270\" width=\"640\" height=\"130\" fill=\"#0d0600\"/>\n  <!-- Floor boards -->\n  <line x1=\"0\" y1=\"290\" x2=\"640\" y2=\"290\" stroke=\"#050500\" stroke-width=\"2\"/>\n  <line x1=\"0\" y1=\"320\" x2=\"640\" y2=\"320\" stroke=\"#050500\" stroke-width=\"1\" opacity=\"0.5\"/>\n  <line x1=\"0\" y1=\"350\" x2=\"640\" y2=\"350\" stroke=\"#050500\" stroke-width=\"1\" opacity=\"0.5\"/>\n  <line x1=\"0\" y1=\"380\" x2=\"640\" y2=\"380\" stroke=\"#050500\" stroke-width=\"1\" opacity=\"0.5\"/>\n  \n  <!-- Layer 3: Four-poster bed (center-left) -->\n  <!-- Four posts -->\n  <rect x=\"40\" y=\"150\" width=\"6\" height=\"140\" fill=\"#1a0d00\" stroke=\"#0d0600\" stroke-width=\"1\"/>\n  <rect x=\"180\" y=\"150\" width=\"6\" height=\"140\" fill=\"#1a0d00\" stroke=\"#0d0600\" stroke-width=\"1\"/>\n  <rect x=\"35\" y=\"170\" width=\"6\" heigh   "scene-observatory": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 640 400\" width=\"640\" height=\"400\">\n  <defs>\n    <pattern id=\"stone-dome\" width=\"40\" height=\"20\" patternUnits=\"userSpaceOnUse\">\n      <rect width=\"40\" height=\"20\" fill=\"#1a1a1a\"/>\n      <rect x=\"2\" y=\"2\" width=\"36\" height=\"16\" fill=\"#111\" stroke=\"#000\" stroke-width=\"1\"/>\n    </pattern>\n    <pattern id=\"star-chart\" width=\"30\" height=\"30\" patternUnits=\"userSpaceOnUse\">\n      <rect width=\"30\" height=\"30\" fill=\"#1a1a1a\"/>\n      <circle cx=\"5\" cy=\"5\" r=\"1\" fill=\"#333\"/>\n      <circle cx=\"15\" cy=\"10\" r=\"0.5\" fill=\"#333\"/>\n      <circle cx=\"25\" cy=\"20\" r=\"1\" fill=\"#333\"/>\n      <circle cx=\"10\" cy=\"25\" r=\"0.5\" fill=\"#333\"/>\n      <line x1=\"5\" y1=\"5\" x2=\"15\" y2=\"10\" stroke=\"#222\" stroke-width=\"0.5\"/>\n      <line x1=\"15\" y1=\"10\" x2=\"25\" y2=\"20\" stroke=\"#222\" stroke-width=\"0.5\"/>\n    </pattern>\n  </defs>\n  \n  <!-- Layer 1: Background - circular room, domed ceiling -->\n  <rect width=\"640\" height=\"400\" fill=\"#0a0a0a\"/>\n  <!-- Curved wall hint (left and right) -->\n  <ellipse cx=\"320\" cy=\"200\" rx=\"310\" ry=\"190\" fill=\"#0d0d0d\" stroke=\"#1a1a1a\" stroke-width=\"2\"/>\n  <!-- Wall surface -->\n  <rect x=\"0\" y=\"0\" width=\"640\" height=\"280\" fill=\"url(#stone-dome)\"/>\n  \n  <!-- Layer 2: Floor -->\n  <rect x=\"0\" y=\"280\" width=\"640\" height=\"120\" fill=\"#111\"/>\n  <!-- Floor pattern -->\n  <ellipse cx=\"320\" cy=\"340\" rx=\"200\" ry=\"40\" fill=\"#0a0a0a\" stroke=\"#1a1a1a\" stroke-width=\"1\"/>\n  \n  <!-- Layer 3: Domed ceiling with oculus (top center) -->\n  <!-- Ceiling dome -->\n  <ellipse cx=\"320\" cy=\"80\" rx=\"250\" ry=\"70\" fill=\"#0d0d0d\" stroke=\"#1a1a1a\" stroke-width=\"2\"/>\n  <!-- Oculus opening -->\n  <ellipse cx=\"320\" cy=\"50\" rx=\"50\" ry=\"25\" fill=\"#000033\" stroke=\"#222\" stroke-width=\"3\"/>\n  <!-- Shuttered oculus - shutters partially open -->\n  <rect x=\"275\" y=\"38\" width=\"20\" height=\"24\" fill=\"#111\" opacity=\"0.6\"/>\n  <rect x=\"345\" y=\"38\" width=\"20\" height=\"24\" fill=\"#111\" opacity=\"0.6\"/>\n  <!-- Twilight sky through oculus -->\n  <ellipse cx=\"320\" cy=\"52\" rx=\"25\" ry=\"10\" fill=\"#000044\" opacity=\"0.6\"/>\n  <!-- Stars visible through oculus -->\n  <circle cx=\"312\" cy=\"48\" r=\"1\" fill=\"#FFF\" opacity=\"0.5\"/>\n  <circle cx=\"322\" cy=\"50\" r=\"0.8\" fill=\"#FFF\" opacity=\"0.4\"/>\n  <circle cx=\"318\" cy=\"55\" r=\"0.6\" fill=\"#FFF\" opacity=\"0.3\"/>\n  <circle cx=\"328\" cy=\"47\" r=\"1\" fill=\"#FFF\" opacity=\"0.4\"/>\n  \n  <!-- Layer 4: Brass telescope (center, pointing at oculus) -->\n  <!-- Telescope tube -->\n  <rect x=\"295\" y=\"120\" width=\"50\" height=\"160\" fill=\"#b87333\" stroke=\"#885500\" stroke-width=\"2\" rx=\"3\"/>\n  <!-- Telescope narrowing toward eyepiece -->\n  <rect x=\"300\" y=\"115\" width=\"40\" height=\"10\" fill=\"#b87333\" stroke=\"#885500\" stroke-width=\"2\"/>\n  <!-- Eyepiece mount (empty - lens missing) -->\n  <circle cx=\"320\" cy=\"115\" r=\"12\" fill=\"#000\" stroke=\"#885500\" stroke-width=\"2\"/>\n  <circle cx=\"320\" cy=\"115\" r=\"8\" fill=\"#000\"/>\n  <!-- Empty lens mount visible -->\n  <circle cx=\"320\" cy=\"115\" r=\"6\" fill=\"#111\" stroke=\"#555\" stroke-width=\"1\"/>\n  <!-- Base mount -->\n  <rect x=\"285\" y=\"275\" width=\"70\" height=\"15\" fill=\"#1a0d00\" stroke=\"#885500\" stroke-width=\"2\"/>\n  <!-- Tripod stand -->\n  <line x1=\"300\" y1=\"285\" x2=\"280\" y2=\"340\" stroke=\"#885500\" stroke-width=\"4\"/>\n  <line x1=\"340\" y1=\"285\" x2=\"360\" y2=\"340\" stroke=\"#885500\" stroke-width=\"4\"/>\n  <line x1=\"320\" y1=\"285\" x2=\"320\" y2=\"350\" stroke=\"#885500\" stroke-width=\"4\"/>\n  \n  <!-- Layer 5: Astronomical clocks on curved walls -->\n  <!-- Left wall clock (large, complex) -->\n  <circle cx=\"80\" cy=\"160\" r=\"50\" fill=\"#0d0d0d\" stroke=\"#b87333\" stroke-width=\"3\"/>\n  <circle cx=\"80\" cy=\"160\" r=\"42\" fill=\"#111\" stroke=\"#885500\" stroke-width=\"1\"/>\n  <!-- Multiple hands -->\n  <line x1=\"80\" y1=\"160\" x2=\"80\" y2=\"125\" stroke=\"#b87333\" stroke-width=\"2\"/>\n  <line x1=\"80\" y1=\"160\" x2=\"105\" y2=\"155\" stroke=\"#b87333\" stroke-width=\"2\"/>\n  <line x1=\"80\" y1=\"160\" x2=\"75\" y2=\"140\" stroke=\"#885500\" stroke-width=\"1.5\"/>\n  <line x1=\"80\" y1=\"160\" x2=\"100\" y2=\"170\" stroke=\"#885500\" stroke-width=\"1.5\"/>\n  <line x1=\"80\" y1=\"160\" x2=\"60\" y2=\"165\" stroke=\"#664400\" stroke-width=\"1\"/>\n  <!-- Small subdials -->\n  <circle cx=\"80\" cy=\"135\" r=\"8\" fill=\"#000\" stroke=\"#664400\" stroke-width=\"1\"/>\n  <circle cx=\"100\" cy=\"160\" r=\"6\" fill=\"#000\" stroke=\"#664400\" stroke-width=\"1\"/>\n  <circle cx=\"60\" cy=\"165\" r=\"6\" fill=\"#000\" stroke=\"#664400\" stroke-width=\"1\"/>\n  <circle cx=\"80\" cy=\"185\" r=\"8\" fill=\"#000\" stroke=\"#664400\" stroke-width=\"1\"/>\n  <!-- Clock stopped - all same time -->\n  <circle cx=\"65\" cy=\"135\" r=\"1\" fill=\"#b87333\"/>\n  <circle cx=\"95\" cy=\"160\" r=\"1\" fill=\"#b87333\"/>\n  \n  <!-- Right wall clock -->\n  <circle cx=\"560\" cy=\"160\" r=\"50\" fill=\"#0d0d0d\" stroke=\"#b87333\" stroke-width=\"3\"/>\n  <circle cx=\"560\" cy=\"160\" r=\"42\" fill=\"#111\" stroke=\"#885500\" stroke-width=\"1\"/>\n  <line x1=\"560\" y1=\"160\" x2=\"560\" y2=\"125\" stroke=\"#b87333\" stroke-width=\"2\"/>\n  <line x1=\"560\" y1=\"160\" x2=\"585\" y2=\"155\" stroke=\"#b87333\" stroke-width=\"2\"/>\n  <line x1=\"560\" y1=\"160\" x2=\"555\" y2=\"140\" stroke=\"#885500\" stroke-width=\"1.5\"/>\n  <line x1=\"560\" y1=\"160\" x2=\"580\" y2=\"170\" stroke=\"#885500\" stroke-width=\"1.5\"/>\n  <circle cx=\"560\" cy=\"135\" r=\"8\" fill=\"#000\" stroke=\"#664400\" stroke-width=\"1\"/>\n  <circle cx=\"580\" cy=\"160\" r=\"6\" fill=\"#000\" stroke=\"#664400\" stroke-width=\"1\"/>\n  <circle cx=\"540\" cy=\"165\" r=\"6\" fill   "item-observatory": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 640 400\" width=\"640\" height=\"400\">\n  <defs>\n    <pattern id=\"stone-dome\" width=\"40\" height=\"20\" patternUnits=\"userSpaceOnUse\">\n      <rect width=\"40\" height=\"20\" fill=\"#1a1a1a\"/>\n      <rect x=\"2\" y=\"2\" width=\"36\" height=\"16\" fill=\"#111\" stroke=\"#000\" stroke-width=\"1\"/>\n    </pattern>\n    <pattern id=\"star-chart\" width=\"30\" height=\"30\" patternUnits=\"userSpaceOnUse\">\n      <rect width=\"30\" height=\"30\" fill=\"#1a1a1a\"/>\n      <circle cx=\"5\" cy=\"5\" r=\"1\" fill=\"#333\"/>\n      <circle cx=\"15\" cy=\"10\" r=\"0.5\" fill=\"#333\"/>\n      <circle cx=\"25\" cy=\"20\" r=\"1\" fill=\"#333\"/>\n      <circle cx=\"10\" cy=\"25\" r=\"0.5\" fill=\"#333\"/>\n      <line x1=\"5\" y1=\"5\" x2=\"15\" y2=\"10\" stroke=\"#222\" stroke-width=\"0.5\"/>\n      <line x1=\"15\" y1=\"10\" x2=\"25\" y2=\"20\" stroke=\"#222\" stroke-width=\"0.5\"/>\n    </pattern>\n  </defs>\n  \n  <!-- Layer 1: Background - circular room, domed ceiling -->\n  <rect width=\"640\" height=\"400\" fill=\"#0a0a0a\"/>\n  <!-- Curved wall hint (left and right) -->\n  <ellipse cx=\"320\" cy=\"200\" rx=\"310\" ry=\"190\" fill=\"#0d0d0d\" stroke=\"#1a1a1a\" stroke-width=\"2\"/>\n  <!-- Wall surface -->\n  <rect x=\"0\" y=\"0\" width=\"640\" height=\"280\" fill=\"url(#stone-dome)\"/>\n  \n  <!-- Layer 2: Floor -->\n  <rect x=\"0\" y=\"280\" width=\"640\" height=\"120\" fill=\"#111\"/>\n  <!-- Floor pattern -->\n  <ellipse cx=\"320\" cy=\"340\" rx=\"200\" ry=\"40\" fill=\"#0a0a0a\" stroke=\"#1a1a1a\" stroke-width=\"1\"/>\n  \n  <!-- Layer 3: Domed ceiling with oculus (top center) -->\n  <!-- Ceiling dome -->\n  <ellipse cx=\"320\" cy=\"80\" rx=\"250\" ry=\"70\" fill=\"#0d0d0d\" stroke=\"#1a1a1a\" stroke-width=\"2\"/>\n  <!-- Oculus opening -->\n  <ellipse cx=\"320\" cy=\"50\" rx=\"50\" ry=\"25\" fill=\"#000033\" stroke=\"#222\" stroke-width=\"3\"/>\n  <!-- Shuttered oculus - shutters partially open -->\n  <rect x=\"275\" y=\"38\" width=\"20\" height=\"24\" fill=\"#111\" opacity=\"0.6\"/>\n  <rect x=\"345\" y=\"38\" width=\"20\" height=\"24\" fill=\"#111\" opacity=\"0.6\"/>\n  <!-- Twilight sky through oculus -->\n  <ellipse cx=\"320\" cy=\"52\" rx=\"25\" ry=\"10\" fill=\"#000044\" opacity=\"0.6\"/>\n  <!-- Stars visible through oculus -->\n  <circle cx=\"312\" cy=\"48\" r=\"1\" fill=\"#FFF\" opacity=\"0.5\"/>\n  <circle cx=\"322\" cy=\"50\" r=\"0.8\" fill=\"#FFF\" opacity=\"0.4\"/>\n  <circle cx=\"318\" cy=\"55\" r=\"0.6\" fill=\"#FFF\" opacity=\"0.3\"/>\n  <circle cx=\"328\" cy=\"47\" r=\"1\" fill=\"#FFF\" opacity=\"0.4\"/>\n  \n  <!-- Layer 4: Brass telescope (center, pointing at oculus) -->\n  <!-- Telescope tube -->\n  <rect x=\"295\" y=\"120\" width=\"50\" height=\"160\" fill=\"#b87333\" stroke=\"#885500\" stroke-width=\"2\" rx=\"3\"/>\n  <!-- Telescope narrowing toward eyepiece -->\n  <rect x=\"300\" y=\"115\" width=\"40\" height=\"10\" fill=\"#b87333\" stroke=\"#885500\" stroke-width=\"2\"/>\n  <!-- Eyepiece mount (empty - lens missing) -->\n  <circle cx=\"320\" cy=\"115\" r=\"12\" fill=\"#000\" stroke=\"#885500\" stroke-width=\"2\"/>\n  <circle cx=\"320\" cy=\"115\" r=\"8\" fill=\"#000\"/>\n  <!-- Empty lens mount visible -->\n  <circle cx=\"320\" cy=\"115\" r=\"6\" fill=\"#111\" stroke=\"#555\" stroke-width=\"1\"/>\n  <!-- Base mount -->\n  <rect x=\"285\" y=\"275\" width=\"70\" height=\"15\" fill=\"#1a0d00\" stroke=\"#885500\" stroke-width=\"2\"/>\n  <!-- Tripod stand -->\n  <line x1=\"300\" y1=\"285\" x2=\"280\" y2=\"340\" stroke=\"#885500\" stroke-width=\"4\"/>\n  <line x1=\"340\" y1=\"285\" x2=\"360\" y2=\"340\" stroke=\"#885500\" stroke-width=\"4\"/>\n  <line x1=\"320\" y1=\"285\" x2=\"320\" y2=\"350\" stroke=\"#885500\" stroke-width=\"4\"/>\n  \n  <!-- Layer 5: Astronomical clocks on curved walls -->\n  <!-- Left wall clock (large, complex) -->\n  <circle cx=\"80\" cy=\"160\" r=\"50\" fill=\"#0d0d0d\" stroke=\"#b87333\" stroke-width=\"3\"/>\n  <circle cx=\"80\" cy=\"160\" r=\"42\" fill=\"#111\" stroke=\"#885500\" stroke-width=\"1\"/>\n  <!-- Multiple hands -->\n  <line x1=\"80\" y1=\"160\" x2=\"80\" y2=\"125\" stroke=\"#b87333\" stroke-width=\"2\"/>\n  <line x1=\"80\" y1=\"160\" x2=\"105\" y2=\"155\" stroke=\"#b87333\" stroke-width=\"2\"/>\n  <line x1=\"80\" y1=\"160\" x2=\"75\" y2=\"140\" stroke=\"#885500\" stroke-width=\"1.5\"/>\n  <line x1=\"80\" y1=\"160\" x2=\"100\" y2=\"170\" stroke=\"#885500\" stroke-width=\"1.5\"/>\n  <line x1=\"80\" y1=\"160\" x2=\"60\" y2=\"165\" stroke=\"#664400\" stroke-width=\"1\"/>\n  <!-- Small subdials -->\n  <circle cx=\"80\" cy=\"135\" r=\"8\" fill=\"#000\" stroke=\"#664400\" stroke-width=\"1\"/>\n  <circle cx=\"100\" cy=\"160\" r=\"6\" fill=\"#000\" stroke=\"#664400\" stroke-width=\"1\"/>\n  <circle cx=\"60\" cy=\"165\" r=\"6\" fill=\"#000\" stroke=\"#664400\" stroke-width=\"1\"/>\n  <circle cx=\"80\" cy=\"185\" r=\"8\" fill=\"#000\" stroke=\"#664400\" stroke-width=\"1\"/>\n  <!-- Clock stopped - all same time -->\n  <circle cx=\"65\" cy=\"135\" r=\"1\" fill=\"#b87333\"/>\n  <circle cx=\"95\" cy=\"160\" r=\"1\" fill=\"#b87333\"/>\n  \n  <!-- Right wall clock -->\n  <circle cx=\"560\" cy=\"160\" r=\"50\" fill=\"#0d0d0d\" stroke=\"#b87333\" stroke-width=\"3\"/>\n  <circle cx=\"560\" cy=\"160\" r=\"42\" fill=\"#111\" stroke=\"#885500\" stroke-width=\"1\"/>\n  <line x1=\"560\" y1=\"160\" x2=\"560\" y2=\"125\" stroke=\"#b87333\" stroke-width=\"2\"/>\n  <line x1=\"560\" y1=\"160\" x2=\"585\" y2=\"155\" stroke=\"#b87333\" stroke-width=\"2\"/>\n  <line x1=\"560\" y1=\"160\" x2=\"555\" y2=\"140\" stroke=\"#885500\" stroke-width=\"1.5\"/>\n  <line x1=\"560\" y1=\"160\" x2=\"580\" y2=\"170\" stroke=\"#885500\" stroke-width=\"1.5\"/>\n  <circle cx=\"560\" cy=\"135\" r=\"8\" fill=\"#000\" stroke=\"#664400\" stroke-width=\"1\"/>\n  <circle cx=\"580\" cy=\"160\" r=\"6\" fill=\"#000\" stroke=\"#664400\" stroke-width=\"1\"/>\n  <circle cx=\"540\" cy=\"165\" r=\"6\" fill=\"#000\" stroke=\"#664400\" stroke-width=\"1\"/>\n  <circle cx=\"560\" cy=\"185\" r=\"8\" fill=\"#000\" stroke=\"#664400\" stroke-width=\"1\"/>\n  \n  <!-- Smaller astronomical clocks -->\n  <circle cx=\"200\" cy=\"140\" r=\"25\" fill=\"#0d0d0d\" stroke=\"#b87333\" stroke-width=\"2\"/>\n  <circle cx=\"200\" cy=\"140\" r=\"20\" fill=\"#111\"/>\n  <line x1=\"200\" y1=\"140\" x2=\"200\" y2=\"124\" stroke=\"#b87333\" stroke-width=\"2\"/>\n  <line x1=\"200\" y1=\"140\" x2=\"215\" y2=\"138\" stroke=\"#b87333\" stroke-width=\"1.5\"/>\n  \n  <circle cx=\"440\" cy=\"140\" r=\"25\" fill=\"#0d0d0d\" stroke=\"#b87333\" stroke-width=\"2\"/>\n  <circle cx=\"440\" cy=\"140\" r=\"20\" fill=\"#111\"/>\n  <line x1=\"440\" y1=\"140\" x2=\"440\" y2=\"124\" stroke=\"#b87333\" stroke-width=\"2\"/>\n  <line x1=\"440\" y1=\"140\" x2=\"455\" y2=\"138\" stroke=\"#b87333\" stroke-width=\"1.5\"/>\n  \n  <!-- Layer 6: Star charts pinned to walls with red thread -->\n  <!-- Left star chart -->\n  <rect x=\"20\" y=\"220\" width=\"60\" height=\"50\" fill=\"url(#star-chart)\" stroke=\"#333\" stroke-width=\"1\"/>\n  <rect x=\"22\" y=\"222\" width=\"56\" height=\"46\" fill=\"#111\" opacity=\"0.5\"/>\n  <!-- Constellation lines -->\n  <line x1=\"35\" y1=\"235\" x2=\"50\" y2=\"242\" stroke=\"#555\" stroke-width=\"1\"/>\n  <line x1=\"50\" y1=\"242\" x2=\"60\" y2=\"235\" stroke=\"#555\" stroke-width=\"1\"/>\n  <line x1=\"60\" y1=\"235\" x2=\"55\" y2=\"255\" stroke=\"#555\" stroke-width=\"1\"/>\n  <circle cx=\"35\" cy=\"235\" r=\"2\" fill=\"#555\"/>\n  <circle cx=\"50\" cy=\"242\" r=\"2\" fill=\"#555\"/>\n  <circle cx=\"60\" cy=\"235\" r=\"2\" fill=\"#555\"/>\n  <circle cx=\"55\" cy=\"255\" r=\"2\" fill=\"#555\"/>\n  \n  <!-- Right star chart -->\n  <rect x=\"560\" y=\"220\" width=\"60\" height=\"50\" fill=\"url(#star-chart)\" stroke=\"#333\" stroke-width=\"1\"/>\n  <rect x=\"562\" y=\"222\" width=\"56\" height=\"46\" fill=\"#111\" opacity=\"0.5\"/>\n  <line x1=\"575\" y1=\"235\" x2=\"590\" y2=\"240\" stroke=\"#555\" stroke-width=\"1\"/>\n  <line x1=\"590\" y1=\"240\" x2=\"600\" y2=\"250\" stroke=\"#555\" stroke-width=\"1\"/>\n  <circle cx=\"575\" cy=\"235\" r=\"2\" fill=\"#555\"/>\n  <circle cx=\"590\" cy=\"240\" r=\"2\" fill=\"#555\"/>\n  <circle cx=\"600\" cy=\"250\" r=\"2\" fill=\"#555\"/>\n  \n  <!-- Red thread web connecting charts -->\n  <line x1=\"80\" y1=\"250\" x2=\"200\" y2=\"200\" stroke=\"#FF0000\" stroke-width=\"1\" opacity=\"0.3\"/>\n  <line x1=\"200\" y1=\"200\" x2=\"320\" y2=\"180\" stroke=\"#FF0000\" stroke-width=\"1\" opacity=\"0.25\"/>\n  <line x1=\"320\" y1=\"180\" x2=\"440\" y2=\"200\" stroke=\"#FF0000\" stroke-width=\"1\" opacity=\"0.25\"/>\n  <line x1=\"440\" y1=\"200\" x2=\"560\" y2=\"250\" stroke=\"#FF0000\" stroke-width=\"1\" opacity=\"0.3\"/>\n  <!-- Thread pinned points -->\n  <circle cx=\"200\" cy=\"200\" r=\"2\" fill=\"#FF0000\" opacity=\"0.5\"/>\n  <circle cx=\"440\" cy=\"200\" r=\"2\" fill=\"#FF0000\" opacity=\"0.5\"/>\n  <!-- Dates and times noted -->\n  <rect x=\"90\" y=\"255\" width=\"20\" height=\"8\" fill=\"#330000\" opacity=\"0.5\"/>\n  <text x=\"100\" y=\"261\" font-family=\"serif\" font-size=\"4\" fill=\"#880000\" text-anchor=\"middle\">03:14</text>\n  <rect x=\"530\" y=\"255\" width=\"20\" height=\"8\" fill=\"#330000\" opacity=\"0.5\"/>\n  <text x=\"540\" y=\"261\" font-family=\"serif\" font-size=\"4\" fill=\"#880000\" text-anchor=\"middle\">11:59</text>\n  \n  <!-- Layer 7: Winding key on velvet cushion -->\n  <rect x=\"480\" y=\"310\" width=\"60\" height=\"30\" fill=\"#330022\" stroke=\"#220011\" stroke-width=\"1\" rx=\"3\"/>\n  <!-- Velvet texture -->\n  <rect x=\"485\" y=\"315\" width=\"50\" height=\"20\" fill=\"#2a0018\" opacity=\"0.7\" rx=\"2\"/>\n  <!-- Master Winding Key -->\n  <!-- Handle shaped like ouroboros/serpent eating tail -->\n  <circle cx=\"510\" cy=\"325\" r=\"8\" fill=\"#111\" stroke=\"#444\" stroke-width=\"2\"/>\n  <!-- Serpent body -->\n  <path d=\"M510 317 Q518 317 518 325 Q518 333 510 333 Q502 333 502 325 Q502 317 510 317\" fill=\"none\" stroke=\"#666\" stroke-width=\"2\"/>\n  <!-- Serpent head biting tail -->\n  <circle cx=\"516\" cy=\"319\" r=\"2\" fill=\"#555\"/>\n  <!-- Key shaft -->\n  <rect x=\"518\" y=\"323\" width=\"15\" height=\"4\" fill=\"#444\" stroke=\"#333\" stroke-width=\"1\"/>\n  <!-- Key teeth -->\n  <rect x=\"528\" y=\"326\" width=\"3\" height=\"4\" fill=\"#444\"/>\n  <rect x=\"531\" y=\"326\" width=\"2\" height=\"2\" fill=\"#444\"/>\n  \n  <!-- Layer 8: Staircase down to bedroom (spiral, in floor) -->\n  <!-- Staircase opening -->\n  <ellipse cx=\"320\" cy=\"360\" rx=\"30\" ry=\"15\" fill=\"#000\" stroke=\"#333\" stroke-width=\"2\"/>\n  <!-- Steps going down -->\n  <rect x=\"295\" y=\"350\" width=\"20\" height=\"5\" fill=\"#1a1a1a\"/>\n  <rect x=\"298\" y=\"354\" width=\"18\" height=\"5\" fill=\"#151515\"/>\n  <rect x=\"302\" y=\"358\" width=\"15\" height=\"4\" fill=\"#111\"/>\n  <!-- Iron railing -->\n  <path d=\"M290 345 Q320 335 350 345\" fill=\"none\" stroke=\"#555\" stroke-width=\"2\"/>\n  <line x1=\"300\" y1=\"345\" x2=\"300\" y2=\"350\" stroke=\"#555\" stroke-width=\"2\"/>\n  <line x1=\"340\" y1=\"345\" x2=\"340\" y2=\"350\" stroke=\"#555\" stroke-width=\"2\"/>\n  \n  <!-- Layer 9: Atmosphere - cold, thin air, perpetual twilight -->\n  <!-- Stars in the sky through oculus -->\n  <circle cx=\"280\" cy=\"30\" r=\"1\" fill=\"#FFF\" opacity=\"0.4\"/>\n  <circle cx=\"350\" cy=\"25\" r=\"0.8\" fill=\"#FFF\" opacity=\"0.3\"/>\n  <circle cx=\"370\" cy=\"35\" r=\"1\" fill=\"#FFF\" opacity=\"0.35\"/>\n  <circle cx=\"290\" cy=\"45\" r=\"0.6\" fill=\"#FFF\" opacity=\"0.3\"/>\n  <circle cx=\"360\" cy=\"40\" r=\"0.8\" fill=\"#FFF\" opacity=\"0.4\"/>\n  \n  <!-- Cold air effect -->\n  <rect x=\"280\" y=\"100\" width=\"80\" height=\"50\" fill=\"#000044\" opacity=\"0.05\"/>\n  \n  <!-- Dust/atmosphere particles -->\n  <circle cx=\"150\" cy=\"180\" r=\"1\" fill=\"#FFF\" opacity=\"0.08\"/>\n  <circle cx=\"400\" cy=\"170\" r=\"1\" fill=\"#FFF\" opacity=\"0.   "scene-workshop": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 640 400\" width=\"640\" height=\"400\">\n  <defs>\n    <pattern id=\"wall-grimy\" width=\"40\" height=\"20\" patternUnits=\"userSpaceOnUse\">\n      <rect width=\"40\" height=\"20\" fill=\"#0d0d0d\"/>\n      <rect x=\"2\" y=\"2\" width=\"36\" height=\"16\" fill=\"#111\" stroke=\"#0a0a0a\" stroke-width=\"1\"/>\n      <rect x=\"10\" y=\"5\" width=\"5\" height=\"3\" fill=\"#1a1a00\" opacity=\"0.3\"/>\n      <rect x=\"25\" y=\"12\" width=\"4\" height=\"2\" fill=\"#1a1a00\" opacity=\"0.2\"/>\n    </pattern>\n    <pattern id=\"workbench-top\" width=\"20\" height=\"20\" patternUnits=\"userSpaceOnUse\">\n      <rect width=\"20\" height=\"20\" fill=\"#1a0d00\"/>\n      <rect x=\"0\" y=\"0\" width=\"19\" height=\"2\" fill=\"#0d0600\" opacity=\"0.5\"/>\n      <rect x=\"5\" y=\"4\" width=\"10\" height=\"1\" fill=\"#0d0600\" opacity=\"0.3\"/>\n      <rect x=\"2\" y=\"8\" width=\"15\" height=\"1\" fill=\"#0d0600\" opacity=\"0.3\"/>\n      <rect x=\"8\" y=\"12\" width=\"8\" height=\"1\" fill=\"#0d0600\" opacity=\"0.3\"/>\n    </pattern>\n  </defs>\n  \n  <!-- Layer 1: Background walls -->\n  <rect width=\"640\" height=\"400\" fill=\"#050500\"/>\n  <rect x=\"0\" y=\"0\" width=\"640\" height=\"260\" fill=\"url(#wall-grimy)\"/>\n  \n  <!-- Layer 2: Floor -->\n  <rect x=\"0\" y=\"260\" width=\"640\" height=\"140\" fill=\"#0d0600\"/>\n  <!-- Floor boards -->\n  <line x1=\"0\" y1=\"280\" x2=\"640\" y2=\"280\" stroke=\"#050500\" stroke-width=\"2\"/>\n  <line x1=\"0\" y1=\"310\" x2=\"640\" y2=\"310\" stroke=\"#050500\" stroke-width=\"1\" opacity=\"0.5\"/>\n  <line x1=\"0\" y1=\"340\" x2=\"640\" y2=\"340\" stroke=\"#050500\" stroke-width=\"1\" opacity=\"0.5\"/>\n  <line x1=\"0\" y1=\"370\" x2=\"640\" y2=\"370\" stroke=\"#050500\" stroke-width=\"1\" opacity=\"0.5\"/>\n  \n  <!-- Layer 3: Grimy windows (top) -->\n  <rect x=\"80\" y=\"20\" width=\"60\" height=\"80\" fill=\"#222\" stroke=\"#333\" stroke-width=\"2\"/>\
