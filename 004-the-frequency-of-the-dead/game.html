  state.hintTimeouts = [];
}

function showHint(sceneId, index) {
  if (!state.hintsEnabled) return;
  const hints = GAME_DATA.hints && GAME_DATA.hints[sceneId];
  if (!hints || index >= hints.length) return;
  const hint = hints[index];
  addText(hint.text, 'hint');
}

function startHintTimer(sceneId) {
  clearHintTimers();
  const hints = GAME_DATA.hints && GAME_DATA.hints[sceneId];
  if (!hints || !state.hintsEnabled) return;
  hints.forEach((hint, idx) => {
    const timeout = setTimeout(() => showHint(sceneId, idx), hint.delay * 1000);
    state.hintTimeouts.push(timeout);
  });
}

function toggleHints() {
  state.hintsEnabled = !state.hintsEnabled;
  const btn = document.getElementById('hint-toggle');
  if (btn) btn.textContent = state.hintsEnabled ? 'HINTS: ON' : 'HINTS: OFF';
  if (!state.hintsEnabled) {
    clearHintTimers();
  } else {
    startHintTimer(state.currentScene);
  }
}

// ---- Locked Exit Logic ----
// Puzzle blocksExit format in this game is just a direction string like "west"
// We need to map that to a blocking puzzle per scene.
function isExitLocked(sceneId, direction) {
  // Find any unsolved puzzle in this scene that blocks this direction
  return GAME_DATA.puzzles.some(p =>
    p.scene === sceneId &&
    p.blocksExit === direction &&
    !state.solvedPuzzles.includes(p.id)
  );
}

function getBlockedMessage(sceneId, direction) {
  const puzzle = GAME_DATA.puzzles.find(p =>
    p.scene === sceneId &&
    p.blocksExit === direction &&
    !state.solvedPuzzles.includes(p.id)
  );
  if (!puzzle) return null;
  // Return a generic blocked message based on the scene/direction
  const scene = GAME_DATA.scenes.find(s => s.id === sceneId);
  const messages = {
    'transmitter-room:west': 'The corridor to the control booth is sealed shut. Something mechanical is blocking the way — a heavy bolt or latch that needs engaging from this side.',
    'control-booth:north': 'The sound booth door is locked tight. You need a key.',
    'sound-booth:south': 'The door seals shut behind you with a pneumatic hiss. It will only open once its purpose has been served... or perhaps from the other side.'
  };
  const key = sceneId + ':' + direction;
  return messages[key] || 'The way ' + direction + ' is blocked. Something prevents you from going that way.';
}

// ---- Scene Rendering ----
function renderScene(sceneId) {
  const scene = GAME_DATA.scenes.find(s => s.id === sceneId);
  if (!scene) { addText('ERROR: Scene not found!', 'error'); return; }

  state.currentScene = sceneId;
  if (!state.visitedScenes.includes(sceneId)) state.visitedScenes.push(sceneId);

  // Hint timer
  clearHintTimers();
  startHintTimer(sceneId);

  // Update scene name
  sceneName.textContent = scene.name.toUpperCase();

  // Update art
  const artKey = sceneId;
  if (window.GAME_ART && window.GAME_ART[artKey]) {
    artDisplay.innerHTML = window.GAME_ART[artKey];
  } else {
    artDisplay.innerHTML = '<span class="no-art">[ ' + scene.name.toUpperCase() + ' ]</span>';
  }

  // Display prose
  clearText();
  addText(scene.prose);

  // Show available items (not yet taken)
  const availableItems = (scene.items || []).filter(itemId =>
    !state.inventory.includes(itemId) && !state.solvedPuzzles.some(pid => {
      const p = GAME_DATA.puzzles.find(x => x.id === pid);
      return p && p.reveals && p.reveals.includes(itemId);
    })
  );
  if (availableItems.length > 0) {
    const itemNames = availableItems.map(id => {
      const item = GAME_DATA.items.find(i => i.id === id);
      return item ? `<span class="look-target" data-look="${id}">${item.name}</span>` : id;
    });
    addText('You notice: ' + itemNames.join(', '), 'system');
  }

  // Show unsolved puzzles
  const scenePuzzles = (scene.puzzles || []).filter(pid =>
    !state.solvedPuzzles.includes(pid)
  );
  scenePuzzles.forEach(pid => {
    const puzzle = GAME_DATA.puzzles.find(p => p.id === pid);
    if (puzzle && !puzzle.blocksExit) {
      addText('There is something here that catches your attention...', 'system');
    }
  });

  // Render exits
  renderExits(scene.exits || {});

  // Render inventory
  renderInventory();

  // Check win condition
  checkWin();

  // Save state
  saveState();
}

function renderExits(exits) {
  exitsBar.innerHTML = '';
  Object.keys(exits).forEach(dir => {
    const targetScene = exits[dir];
    const locked = isExitLocked(state.currentScene, dir);
    const btn = document.createElement('button');
    btn.className = 'exit-btn' + (locked ? '' : ' available');
    btn.textContent = dir.toUpperCase();
    if (locked) {
      btn.onclick = () => {
        const msg = getBlockedMessage(state.currentScene, dir);
        addText(msg || 'The way ' + dir + ' is blocked.', 'locked');
      };
    } else {
      btn.onclick = () => go(targetScene);
    }
    exitsBar.appendChild(btn);
  });
}

function renderInventory() {
  const items = invBar.querySelectorAll('.inv-item');
  items.forEach(el => el.remove());
  const empty = document.getElementById('inv-empty');

  if (state.inventory.length === 0) {
    if (empty) empty.style.display = '';
  } else {
    if (empty) empty.style.display = 'none';
    state.inventory.forEach(itemId => {
      const item = GAME_DATA.items.find(i => i.id === itemId);
      if (!item) return;
      const el = document.createElement('span');
      el.className = 'inv-item' + (state.selectedItem === itemId ? ' selected' : '');
      el.textContent = item.name;
      el.onclick = () => selectItem(itemId);
      invBar.appendChild(el);
    });
  }
}

// ---- Command Handlers ----
function setCommand(cmd) {
  state.activeCommand = cmd;
  document.querySelectorAll('.cmd-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cmd === cmd);
  });
  if (cmd === 'look') {
    const scene = GAME_DATA.scenes.find(s => s.id === state.currentScene);
    if (scene && scene.lookDescriptions) {
      const targets = Object.keys(scene.lookDescriptions);
      if (targets.length > 0) {
        addText('You can examine: ' + targets.map(t =>
          `<span class="look-target" data-look="${t}">${t}</span>`
        ).join(', '), 'system');
      }
    }
  } else if (cmd === 'use') {
    if (state.inventory.length > 0) {
      addText('Select an item from your inventory, then click what to use it on.', 'system');
    } else {
      addText('You have nothing to use.', 'system');
    }
  } else if (cmd === 'take') {
    const scene = GAME_DATA.scenes.find(s => s.id === state.currentScene);
    const available = (scene.items || []).filter(id => !state.inventory.includes(id));
    if (available.length > 0) {
      available.forEach(id => takeItem(id));
    } else {
      addText('Nothing here to take.', 'system');
    }
  } else if (cmd === 'examine') {
    const scene = GAME_DATA.scenes.find(s => s.id === state.currentScene);
    if (scene && scene.lookDescriptions) {
      const targets = Object.keys(scene.lookDescriptions);
      if (targets.length > 0) {
        addText('You can examine: ' + targets.map(t =>
          `<span class="look-target" data-look="${t}">${t}</span>`
        ).join(', '), 'system');
      }
    }
  }
}

function selectItem(itemId) {
  state.selectedItem = state.selectedItem === itemId ? null : itemId;
  renderInventory();
  if (state.selectedItem) {
    const item = GAME_DATA.items.find(i => i.id === itemId);
    addText(`Selected: ${item.name}. Click USE, then a target.`, 'system');
  }
}

function takeItem(itemId) {
  if (state.inventory.includes(itemId)) return;
  const item = GAME_DATA.items.find(i => i.id === itemId);
  if (!item) return;
  const scene = GAME_DATA.scenes.find(s => s.id === state.currentScene);
  if (!scene || !(scene.items || []).includes(itemId)) return;

  state.inventory.push(itemId);
  addText(`You picked up: ${item.name} — ${item.description}`, 'success');
  renderInventory();
  saveState();
}

function lookAt(target) {
  const scene = GAME_DATA.scenes.find(s => s.id === state.currentScene);
  if (scene && scene.lookDescriptions && scene.lookDescriptions[target]) {
    addText(scene.lookDescriptions[target]);
  } else {
    // Check if it's an item
    const item = GAME_DATA.items.find(i => i.id === target);
    if (item) {
      addText(item.description);
    } else {
      addText('Nothing interesting about that.', 'system');
    }
  }
}

// ---- Puzzle Solving ----
function trySolvePuzzle(itemId, targetId) {
  // Find a puzzle in the current scene that:
  // 1. Requires this item
  // 2. Hasn't been solved yet
  // 3. Matches the target (item usedOn or look target)

  const scenePuzzles = GAME_DATA.puzzles.filter(p =>
    p.scene === state.currentScene &&
    !state.solvedPuzzles.includes(p.id)
  );

  for (const puzzle of scenePuzzles) {
    // Check if all required items are in inventory
    const allReqsMet = puzzle.requires.every(req => state.inventory.includes(req));

    // Check if the target matches something in the puzzle
    // The target could be the puzzle id, or derived from the action description
    const actionLower = (puzzle.action || '').toLowerCase();
    const targetLower = (targetId || '').toLowerCase();
    const itemLower = (itemId || '').toLowerCase();

    // Match logic: check if the item is required and the target relates to the puzzle
    const itemIsRequired = puzzle.requires.includes(itemId);
    const targetMatchesAction = !targetId ||
      actionLower.includes(targetLower) ||
      puzzle.id === targetId ||
      targetId.includes(puzzle.scene);

    if (itemIsRequired && allReqsMet) {
      solvePuzzle(puzzle);
      return true;
    }
  }

  return false;
}

function solvePuzzle(puzzle) {
  if (state.solvedPuzzles.includes(puzzle.id)) return;

  state.solvedPuzzles.push(puzzle.id);

  // Visual feedback
  artDisplay.classList.add('puzzle-solved');
  setTimeout(() => artDisplay.classList.remove('puzzle-solved'), 600);

  // Show result text
  addText(puzzle.result, 'success');

  // Remove required items from inventory (consumed by puzzle)
  puzzle.requires.forEach(reqId => {
    const idx = state.inventory.indexOf(reqId);
    if (idx !== -1) state.inventory.splice(idx, 1);
  });

  // Reveal new items
  (puzzle.reveals || []).forEach(revealId => {
    const revealItem = GAME_DATA.items.find(i => i.id === revealId);
    if (revealItem) {
      // Check if it's a scene name (like "sound-booth")
      const revealScene = GAME_DATA.scenes.find(s => s.id === revealId);
      if (revealScene) {
        addText(`The way to ${revealScene.name} is now open!`, 'success');
      } else {
        state.inventory.push(revealId);
        addText(`You obtained: ${revealItem.name}`, 'success');
      }
    }
  });

  // Update exits display (may have unlocked new paths)
  renderExits(GAME_DATA.scenes.find(s => s.id === state.currentScene).exits || {});
  renderInventory();
  checkWin();
  saveState();
}

function useItemOn(itemId, targetId) {
  // First try to solve a puzzle
  if (trySolvePuzzle(itemId, targetId)) {
    state.selectedItem = null;
    renderInventory();
    return;
  }

  // Fallback: try looking at the target
  const scene = GAME_DATA.scenes.find(s => s.id === state.currentScene);
  if (scene && scene.lookDescriptions && scene.lookDescriptions[targetId]) {
    addText(scene.lookDescriptions[targetId]);
    addText("That doesn't work with " + GAME_DATA.items.find(i => i.id === itemId)?.name + '.', 'system');
  } else {
    addText("That doesn't seem to work.", 'system');
  }
  state.selectedItem = null;
  renderInventory();
}

function go(sceneId) {
  // Check if exit is locked
  // We need to find the direction for this target scene
  const scene = GAME_DATA.scenes.find(s => s.id === state.currentScene);
  if (scene && scene.exits) {
    for (const [dir, target] of Object.entries(scene.exits)) {
      if (target === sceneId && isExitLocked(state.currentScene, dir)) {
        addText(getBlockedMessage(state.currentScene, dir), 'locked');
        return;
      }
    }
  }

  addText('---', 'system');
  renderScene(sceneId);
}

function checkWin() {
  if (state.won) return;
  const wc = GAME_DATA.winCondition;
  if (!wc) return;
  if (state.currentScene === wc.scene &&
      wc.requires.every(req => state.inventory.includes(req))) {
    state.won = true;
    addText('', '');
    addText('*** ' + wc.description + ' ***', 'success');
    addText('', '');
    addText('CONGRATULATIONS! YOU HAVE COMPLETED THE GAME!', 'success');
    addText('Type /restart to play again.', 'system');
  }
}

// ---- Persistence ----
function saveState() {
  try {
    localStorage.setItem('game-' + GAME_DATA.slug, JSON.stringify(state));
  } catch(e) {}
}

function loadState() {
  try {
    const saved = localStorage.getItem('game-' + GAME_DATA.slug);
    if (saved) {
      const s = JSON.parse(saved);
      Object.assign(state, s);
      return true;
    }
  } catch(e) {}
  return false;
}

// ---- Event Listeners ----
document.querySelectorAll('.cmd-btn').forEach(btn => {
  btn.onclick = () => setCommand(btn.dataset.cmd);
});

document.getElementById('hint-toggle').addEventListener('click', toggleHints);

document.addEventListener('click', (e) => {
  if (e.target.classList.contains('look-target')) {
    const target = e.target.dataset.look;
    if (state.activeCommand === 'use' && state.selectedItem) {
      useItemOn(state.selectedItem, target);
    } else {
      lookAt(target);
    }
  }
});

// ---- Restart command ----
document.addEventListener('keydown', (e) => {
  // Handle /restart
  if (e.key === 'Enter') {
    const input = textDisplay.querySelector('input.restart-input');
    if (input && input.value.trim() === '/restart') {
      localStorage.removeItem('game-' + GAME_DATA.slug);
      location.reload();
    }
  }
});

// ---- Initialize ----
function init() {
  if (Object.keys(GAME_DATA).length === 0) {
    addText('ERROR: No game data loaded.', 'error');
    return;
  }

  addText('=== ' + GAME_DATA.title.toUpperCase() + ' ===', 'success');
  addText(GAME_DATA.setting, 'system');
  addText('', '');
  addText('Commands: LOOK | TAKE | USE | EXAMINE', 'system');
  addText('Click exits to move between rooms.', 'system');
  addText('---', 'system');

  if (!loadState()) {
    renderScene('lobby');
  } else {
    renderScene(state.currentScene);
    addText('[Game restored from save]', 'system');
  }
}

init();

</script>
