  "sound-booth": "<img src=\"art/scene-sound-booth.png\" alt=\"sound-booth\">"640\" height=\"400\" viewBox=\"0 0 640 400\" xmlns=\"http://www.w3.org/2000/svg\">\n  <!-- Background: Dark soundproofed room -->\n  <rect width=\"640\" height=\"400\" fill=\"#0a0a08\"/>\n  \n  <!-- Diamond-patterned acoustic foam on all walls -->\n  <defs>\n    <pattern id=\"diamond-foam\" patternUnits=\"userSpaceOnUse\" width=\"40\" height=\"40\" patternTransform=\"rotate(45)\">\n      <rect width=\"20\" height=\"20\" fill=\"#1a1a18\"/>\n      <rect width=\"20\" height=\"20\" fill=\"#2a2a25\" x=\"20\" y=\"20\"/>\n    </pattern>\n  </defs>\n  \n  <!-- Left wall foam -->\n  <rect x=\"0\" y=\"0\" width=\"100\" height=\"400\" fill=\"url(#diamond-foam)\"/>\n  <!-- Right wall foam -->\n  <rect x=\"540\" y=\"0\" width=\"100\" height=\"400\" fill=\"url(#diamond-foam)\"/>\n  <!-- Back wall foam -->\n  <rect x=\"100\" y=\"0\" width=\"440\" height=\"150\" fill=\"url(#diamond-foam)\"/>\n  <!-- Floor foam -->\n  <rect x=\"100\" y=\"250\" width=\"440\" height=\"150\" fill=\"url(#diamond-foam)\"/>\n  \n  <!-- Darker disturbed foam on far wall -->\n  <rect x=\"300\" y=\"50\" width=\"100\" height=\"80\" fill=\"#0a0a08\" opacity=\"0.7\"/>\n  \n  <!-- Numbers scratched into foam: 7-3-1-9 -->\n  <text x=\"320\" y=\"100\" font-family=\"monospace\" font-size=\"24\" fill=\"#333330\" stroke=\"#1a1a18\" stroke-width=\"1\">7-3-1-9</text>\n  \n  <!-- Microphone stand (skeletal) -->\n  <line x1=\"320\" y1=\"200\" x2=\"320\" y2=\"350\" stroke=\"#4a4a45\" stroke-width=\"4\"/>\n  <!-- Stand base -->\n  <circle cx=\"320\" cy=\"350\" r=\"15\" fill=\"#3a3a35\" stroke=\"#555550\" stroke-width=\"2\"/>\n  <!-- Arm reaching up -->\n  <line x1=\"320\" y1=\"200\" x2=\"340\" y2=\"180\" stroke=\"#4a4a45\" stroke-width=\"3\"/>\n  <circle cx=\"340\" cy=\"180\" r=\"5\" fill=\"#4a4a45\" stroke=\"#555550\" stroke-width=\"1\"/>\n  \n  <!-- Scroll of yellowed paper -->\n  <rect x=\"200\" y=\"300\" width=\"60\" height=\"40\" fill=\"#d4a 0\" y=\"110\" width=\"100\" height=\"35\" fill=\"#3a3a35\" stroke=\"#444440\" stroke-width=\"1\"/>\n    <rect x=\"160\" y=\"155\" width=\"100\" height=\"35\" fill=\"#3a3a35\" stroke=\"#444440\" stroke-width=\"1\"/>\n    <rect x=\"160\" y=\"200\" width=\"100\" height=\"35\" fill=\"#3a3a35\" stroke=\"#444440\" stroke-width=\"1\"/>\n    <rect x=\"160\" y=\"245\" width=\"100\" height=\"35\" fill=\"#3a3a35\" stroke=\"#444440\" stroke-width=\"1\"/>\n    <rect x=\"160\" y=\"290\" width=\"100\" height=\"35\" fill=\"#3a3a35\" stroke=\"#444440\" stroke-width=\"1\"/>\n  </g>\n  \n  <!-- Oak desk -->\n  <rect x=\"250\" y=\"200\" width=\"180\" height=\"80\" fill=\"#8b4513\" stroke=\"#5a2d0c\" stroke-width=\"3\"/>\n  <!-- Desk top -->\n  <rect x=\"255\" y=\"205\" width=\"170\" height=\"10\" fill=\"#a0522d\" stroke=\"#5a2d0c\" stroke-width=\"1\"/>\n  \n  <!-- Dr. Holloway's journal (open) -->\n  <rect x=\"280\" y=\"210\" width=\"60\" height=\"40\" fill=\"#d4af37\" stroke=\"#b8860b\" stroke-width=\"2\"/>\n  <line x1=\"310\" y1=\"210\" x2=\"310\" y2=\"250\" stroke=\"#b8860b\" stroke-width=\"1\"/>\n  <!-- Handwriting lines -->\n  <line x1=\"285\" y1=\"220\" x2=\"305\" y2=\"220\" stroke=\"#000000\" stroke-width=\"1\" opacity=\"0.6\"/>\n  <line x1=\"285\" y1=\"225\" x2=\"305\" y2=\"225\" stroke=\"#000000\" stroke-width=\"1\" opacity=\"0.6\"/>\n  <line x1=\"315\" y1=\"220\" x2=\"335\" y2=\"220\" stroke=\"#000000\" stroke-width=\"1\" opacity=\"0.6\"/>\n  <line x1=\"315\" y1=\"225\" x2=\"335\" y2=\"225\" stroke=\"#000000\" stroke-width=\"1\" opacity=\"0.6\"/>\n  <line x1=\"285\" y1=\"235\" x2=\"305\" y2=\"235\" stroke=\"#000000\" stroke-width=\"1\" opacity=\"0.4\"/>\n  <!-- Final entry trailing off -->\n  <line x1=\"315\" y1=\"240\" x2=\"330\" y2=\"240\" stroke=\"#000000\" stroke-width=\"1\" opacity=\"0.3\"/>\n  \n  <!-- Steel lockbox -->\n  <rect x=\"350\" y=\"220\" width=\"60\" height=\"40\" fill=\"#4a4a45\" stroke=\"#666660\" stroke-width=\"3\"/>\n  <!-- Combination dial -->\n  <circle cx=\"380\" cy=\"240\" r=\"12\" fill=\"#2a2a25\" stroke=\"#555550\" stroke-width=\"2\"/>\n  <circle cx=\"380\" cy=\"240\" r=\"8\" fill=\"#3a3a35\" stroke=\"#555550\" stroke-width=\"1\"/>\n  <!-- Dial indicator -->\n  <line x1=\"380\" y1=\"240\" x2=\"380\" y2=\"230\" stroke=\"#ff8800\" stroke-width=\"2\"/>\n  \n  <!-- Concrete stairs leading up -->\n  <g id=\"stairs\">\n    <rect x=\"500\" y=\"280\" width=\"120\" height=\"20\" fill=\"#3a3a35\" stroke=\"#555550\" stroke-width=\"2\"/>\n    <rect x=\"500\" y=\"260\" width=\"120\" height=\"20\" fill=\"#3a3a35\" stroke=\"#555550\" stroke-width=\"2\"/>\n    <rect x=\"500\" y=\"240\" width=\"120\" height=\"20\" fill=\"#3a3a35\" stroke=\"#555550\" stroke-width=\"2\"/>\n    <rect x=\"500\" y=\"220\" width=\"120\" height=\"20\" fill=\"#3a3a35\" stroke=\"#555550\" stroke-width=\"2\"/>\n    <rect x=\"500\" y=\"200\" width=\"120\" height=\"20\" fill=\"#3a3a35\" stroke=\"#555550\" stroke-width=\"2\"/>\n  </g>\n  <!-- Railing -->\n  <line x1=\"610\" y1=\"200\" x2=\"610\" y2=\"300\" stroke=\"#4a4a45\" stroke-width=\"3\"/>\n  <line x1=\"610\" y1=\"200\" x2=\"580\" y2=\"200\" stroke=\"#4a4a45\" stroke-width=\"2\"/>\n  \n  <!-- Reel-to-reel tapes stacked like vertebrae -->\n  <g id=\"tapes\">\n    <rect x=\"450\" y=\"120\" width=\"40\" height=\"30\" fill=\"#2a2a25\" stroke=\"#555550\" stroke-width=\"2\"/>\n    <rect x=\"450\" y=\"150\" width=\"40\" height=\"30\" fill=\"#2a2a25\" stroke=\"#555550\" stroke-width=\"2\"/>\n    <rect x=\"450\" y=\"180\" width=\"40\" height=\"30\" fill=\"#2a2a25\" stroke=\"#555550\" stroke-width=\"2\"/>\n    <rect x=\"450\" y=\"210\" width=\"40\" height=\"30\" fill=\"#2a2a25\" stroke=\"#555550\" stroke-width=\"2\"/>\n    <!-- Labels in erratic hand -->\n    <rect x=\"455\" y=\"125\" width=\"30\" height=\"8\" fill=\"#d4af37\" opacity=\"0.4\"/>\n    <rect x=\"455\" y=\"155\" width=\"30\" height=\"8\" fill=\"#d4af37\" opacity=\"0.5\"/>\n    <rect x=\"455\" y=\"185\" width=\"30\" height=\"8\" fill=\"#d4af37\" opacity=\"0.3\"/>\n    <rect x=\"455\" y=\"215\" width=\"30\" height=\"8\" fill=\"#d4af37\" opacity=\"0.6\"/>\n  </g>\n  \n  <!-- Items: maintenance wrench and antenna crystal -->\n  <!-- Wrench -->\n  <rect x=\"300\" y=\"300\" width=\"60\" height=\"10\" fill=\"#708090\" stroke=\"#4a5568\" stroke-width=\"2\"/>\n  <rect x=\"355\" y=\"295\" width=\"15\" height=\"20\" fill=\"#708090\" stroke=\"#4a5568\" stroke-width=\"2\"/>\n  <!-- Rust stains -->\n  <rect x=\"310\" y=\"302\" width=\"20\" height=\"6\" fill=\"#8b4513\" opacity=\"0.5\"/>\n  \n  <!-- Antenna crystal -->\n  <polygon points=\"400,310 410,280 420,310 410,320\" fill=\"#e0e0e0\" stroke=\"#a0a0a0\" stroke-width=\"2\"/>\n  <circle cx=\"410\" cy=\"295\" r=\"5\" fill=\"#ffffff\" opacity=\"0.8\"/>\n  \n  <!-- Dust particles -->\n  <circle cx=\"200\" cy=\"300\" r=\"2\" fill=\"#808080\" opacity=\"0.5\"/>\n  <circle cx=\"250\" cy=\"250\" r=\"1.5\" fill=\"#808080\" opacity=\"0.4\"/>\n  <circle cx=\"350\" cy=\"180\" r=\"2\" fill=\"#808080\" opacity=\"0.6\"/>\n  <circle cx=\"450\" cy=\"250\" r=\"1.5\" fill=\"#808080\" opacity=\"0.3\"/>\n</svg>",
  "rooftop": "<img src=\"art/scene-rooftop.png\" alt=\"rooftop\">"640\" height=\"400\" viewBox=\"0 0 640 400\" xmlns=\"http://www.w3.org/2000/svg\">\n  <!-- Background: Dark foggy rooftop -->\n  <rect width=\"640\" height=\"400\" fill=\"#1a1a18\"/>\n  \n  <!-- Fog layers -->\n  <rect x=\"0\" y=\"0\" width=\"640\" height=\"150\" fill=\"#2a2a25\" opacity=\"0.5\"/>\n  <rect x=\"0\" y=\"50\" width=\"640\" height=\"100\" fill=\"#3a3a35\" opacity=\"0.3\"/>\n  <rect x=\"0\" y=\"100\" width=\"640\" height=\"80\" fill=\"#4a4a45\" opacity=\"0.2\"/>\n  \n  <!-- Rooftop surface -->\n  <rect x=\"0\" y=\"300\" width=\"640\" height=\"100\" fill=\"#2a2a25\"/>\n  <!-- Rooftop texture -->\n  <g stroke=\"#333330\" stroke-width=\"1\">\n    <line x1=\"0\" y1=\"320\" x2=\"640\" y2=\"320\"/>\n    <line x1=\"0\" y1=\"340\" x2=\"640\" y2=\"340\"/>\n    <line x1=\"0\" y1=\"360\" x2=\"640\" y2=\"360\"/>\n    <line x1=\"0\" y1=\"380\" x2=\"640\" y2=\"380\"/>\n  </g>\n  \n  <!-- Cliff edge -->\n  <rect x=\"0\" y=\"300\" width=\"640\" height=\"20\" fill=\"#1a1a18\"/>\n  <!-- Black water below -->\n  <rect x=\"0\" y=\"320\" width=\"640\" height=\"80\" fill=\"#0a0a08\"/>\n  <!-- White teeth (waves) -->\n  <path d=\"M50,340 Q70,330 90,340 T130,340 T170,340 T210,340\" stroke=\"#ffffff\" stroke-width=\"2\" fill=\"none\" opacity=\"0.3\"/>\n  <path d=\"M300,350 Q320,340 340,350 T380,350 T420,350\" stroke=\"#ffffff\" stroke-width=\"1\" fill=\"none\" opacity=\"0.2\"/>\n  <path d=\"M450,335 Q470,325 490,335 T530,335\" stroke=\"#ffffff\" stroke-width=\"2\" fill=\"none\" opacity=\"0.25\"/>\n  \n  <!-- Steel lattice antenna tower -->\n  <g id=\"tower\">\n    <!-- Main vertical supports -->\n    <line x1=\"280\" y1=\"50\" x2=\"280\" y2=\"300\" stroke=\"#4a4a45\" stroke-width=\"4\"/>\n    <line x1=\"360\" y1=\"50\" x2=\"360\" y2=\"300\" stroke=\"#4a4a45\" stroke-width=\"4\"/>\n    <!-- Cross beams -->\n    <line x1=\"280\" y1=\"80\" x2=\"360\" y2=\"80\" stroke=\"#4a4a45\" stroke-width=\"2\"/>\n    <line x1=\"280\" y1=\"120\" x2=\"360\" y2=\"120\" stroke=\"#4a4a45\" stroke-width=\"2\"/>\n    <line x1=\"280\" y1=\"160\" x2=\"360\" y2=\"160\" stroke=\"#4a4a45\" stroke-width=\"2\"/>\n    <line x1=\"280\" y1=\"200\" x2=\"360\" y2=\"200\" stroke=\"#4a4a45\" stroke-width=\"2\"/>\n    <line x1=\"280\" y1=\"240\" x2=\"360\" y2=\"240\" stroke=\"#4a4a45\" stroke-width=\"2\"/>\n    <line x1=\"280\" y1=\"280\" x2=\"360\" y2=\"280\" stroke=\"#4a4a45\" stroke-width=\"2\"/>\n    <!-- Diagonal supports -->\n    <line x1=\"280\" y1=\"80\" x2=\"360\" y2=\"120\" stroke=\"#4a4a45\" stroke-width=\"1\"/>\n    <line x1=\"360\" y1=\"80\" x2=\"280\" y2=\"120\" stroke=\"#4a4a45\" stroke-width=\"1\"/>\n    <line x1=\"280\" y1=\"160\" x2=\"360\" y2=\"200\" stroke=\"#4a4a45\" stroke-width=\"1\"/>\n    <line x1=\"360\" y1=\"160\" x2=\"280\" y2=\"200\" stroke=\"#4a4a45\" stroke-width=\"1\"/>\n    <line x1=\"280\" y1=\"240\" x2=\"360\" y2=\"280\" stroke=\"#4a4a45\" stroke-width=\"1\"/>\n    <line x1=\"360\" y1=\"240\" x2=\"280\" y2=\"280\" stroke=\"#4a4a45\" stroke-width=\"1\"/>\n  </g>\n  \n  <!-- Transmission coil inside tower -->\n  <rect x=\"300\" y=\"100\" width=\"40\" height=\"180\" fill=\"#2a2a25\" stroke=\"#555550\" stroke-width=\"2\"/>\n  <!-- Coil windings -->\n  <g stroke=\"#b87333\" stroke-width=\"3\" opacity=\"0.7\">\n    <line x1=\"305\" y1=\"120\" x2=\"335\" y2=\"120\"/>\n    <line x1=\"305\" y1=\"140\" x2=\"335\" y2=\"140\"/>\n    <line x1=\"305\" y1=\"160\" x2=\"335\" y2=\"160\"/>\n    <line x1=\"305\" y1=\"180\" x2=\"335\" y2=\"180\"/>\n    <line x1=\"305\" y1=\"200\" x2=\"335\" y2=\"200\"/>\n    <line x1=\"305\" y1=\"220\" x2=\"335\" y2=\"220\"/>\n    <line x1=\"305\" y1=\"240\" x2=\"335\" y2=\"240\"/>\n    <line x1=\"305\" y1=\"260\" x2=\"335\" y2=\"260\"/>\n  </g>\n  \n  <!-- Service panel (ajar) -->\n  <rect x=\"310\" y=\"180\" width=\"20\" height=\"40\" fill=\"#3a3a35\" stroke=\"#555550\" stroke-width=\"2\"/>\n  <line x1=\"310\" y1=\"200\" x2=\"305\" y2=\"195\" stroke=\"#555550\" stroke-width=\"2\"/>\n  <line x1=\"310\" y1=\"220\" x2=\"305\" y2=\"225\" stroke=\"#555550\" stroke-width=\"2\"/>\n  \n  <!-- Crystalline socket (empty, dark) -->\n  <circle cx=\"320\" cy=\"200\" r=\"10\" fill=\"#0a0a08\" stroke=\"#333330\" stroke-width=\"2\"/>\n  <circle cx=\"320\" cy=\"200\" r=\"6\" fill=\"#1a1a18\" stroke=\"#333330\" stroke-width=\"1\"/>\n  \n  <!-- Fog coils around tower -->\n  <path d=\"M250,100 Q270,90 290,100 T330,100\" stroke=\"#666660\" stroke-width=\"2\" fill=\"none\" opacity=\"0.3\"/>\n  <path d=\"M260,150 Q280,140 300,150 T340,150\" stroke=\"#666660\" stroke-width=\"2\" fill=\"none\" opacity=\"0.2\"/>\n  <path d=\"M250,200 Q270,190 290,200 T330,200\" stroke=\"#666660\" stroke-width=\"2\" fill=\"none\" opacity=\"0.3\"/>\n  \n  <!-- Wind effect lines -->\n  <line x1=\"100\" y1=\"50\" x2=\"200\" y2=\"60\" stroke=\"#666660\" stroke-width=\"1\" opacity=\"0.4\"/>\n  <line x1=\"150\" y1=\"80\" x2=\"250\" y2=\"90\" stroke=\"#666660\" stroke-width=\"1\" opacity=\"0.3\"/>\n  <line x1=\"50\" y1=\"120\" x2=\"150\" y2=\"130\" stroke=\"#666660\" stroke-width=\"1\" opacity=\"0.3\"/>\n  <line x1=\"450\" y1=\"60\" x2=\"550\" y2=\"70\" stroke=\"#666660\" stroke-width=\"1\" opacity=\"0.4\"/>\n  <line x1=\"400\" y1=\"100\" x2=\"500\" y2=\"110\" stroke=\"#666660\" stroke-width=\"1\" opacity=\"0.3\"/>\n  \n  <!-- Ambient hum glow -->\n  <circle cx=\"320\" cy=\"200\" r=\"40\" fill=\"#ff8800\" opacity=\"0.05\"/>\n  <circle cx=\"320\" cy=\"200\" r=\"25\" fill=\"#aa00ff\" opacity=\"0.03\"/>\n</svg>",
  "antenna-tower": "<img src=\"art/scene-antenna-tower.png\" alt=\"antenna-tower\">"640\" height=\"400\" viewBox=\"0 0 640 400\" xmlns=\"http://www.w3.org/2000/svg\">\n  <!-- Background: Inside the tower, fog-light -->\n  <rect width=\"640\" height=\"400\" fill=\"#1a1a18\"/>\n  \n  <!-- Fog-light from outside -->\n  <rect x=\"0\" y=\"0\" width=\"640\" height=\"100\" fill=\"#2a2a25\" opacity=\"0.4\"/>\n  <rect x=\"0\" y=\"50\" width=\"640\" height=\"80\" fill=\"#3a3a35\" opacity=\"0.2\"/>\n  \n  <!-- Tower interior walls -->\n  <rect x=\"100\" y=\"0\" width=\"20\" height=\"400\" fill=\"#2a2a25\"/>\n  <rect x=\"520\" y=\"0\" width=\"20\" height=\"400\" fill=\"#2a2a25\"/>\n  \n  <!-- Floor -->\n  <rect x=\"0\" y=\"350\" width=\"640\" height=\"50\" fill=\"#1a1a18\"/>\n  <g stroke=\"#333330\" stroke-width=\"1\">\n    <line x1=\"0\" y1=\"370\" x2=\"640\" y2=\"370\"/>\n  </g>\n  \n  <!-- Skeletal frame of tower -->\n  <g id=\"skeletal-frame\">\n    <!-- Vertical beams -->\n    <line x1=\"150\" y1=\"0\" x2=\"150\" y2=\"400\" stroke=\"#4a4a45\" stroke-width=\"5\"/>\n    <line x1=\"490\" y1=\"0\" x2=\"490\" y2=\"400\" stroke=\"#4a4a45\" stroke-width=\"5\"/>\n    <line x1=\"200\" y1=\"0\" x2=\"200\" y2=\"400\" stroke=\"#4a4a45\" stroke-width=\"3\"/>\n    <line x1=\"440\" y1=\"0\" x2=\"440\" y2=\"400\" stroke=\"#4a4a45\" stroke-width=\"3\"/>\n    <!-- Horizontal crossbeams -->\n    <line x1=\"150\" y1=\"100\" x2=\"490\" y2=\"100\" stroke=\"#4a4a45\" stroke-width=\"2\"/>\n    <line x1=\"150\" y1=\"200\" x2=\"490\" y2=\"200\" stroke=\"#4a4a45\" stroke-width=\"2\"/>\n    <line x1=\"150\" y1=\"300\" x2=\"490\" y2=\"300\" stroke=\"#4a4a45\" stroke-width=\"2\"/>\n    <!-- Diagonal braces -->\n    <line x1=\"150\" y1=\"100\" x2=\"200\" y2=\"200\" stroke=\"#4a4a45\" stroke-width=\"1\"/>\n    <line x1=\"490\" y1=\"100\" x2=\"440\" y2=\"200\" stroke=\"#4a4a45\" stroke-width=\"1\"/>\n    <line x1=\"200\" y1=\"200\" x2=\"150\" y2=\"300\" stroke=\"#4a4a45\" stroke-width=\"1\"/>\n    <line x // ---- Game State ----
const state = {
  currentScene: 'lobby',
  inventory: [],
  solvedPuzzles: [],
  visitedScenes: ['lobby'],
  activeCommand: null,
  selectedItem: null,
  won: false,
  hintsEnabled: true,
  hintTimeouts: []
};

// ---- DOM References ----
const artDisplay = document.getElementById('art-display');
const sceneName = document.getElementById('scene-name');
const textDisplay = document.getElementById('text-display');
const invBar = document.getElementById('inventory-bar');
const exitsBar = document.getElementById('exits-bar');

// ---- Display Functions ----
function addText(text, cls = '') {
  const p = document.createElement('p');
  p.className = cls;
  p.innerHTML = text;
  textDisplay.appendChild(p);
  textDisplay.scrollTop = textDisplay.scrollHeight;
}

function clearText() { textDisplay.innerHTML = ''; }

// ---- Hint System ----
function clearHintTimers() {
  state.hintTimeouts.forEach(timeout => clearTimeout(timeout));
  state.hintTimeouts = [];
}

function showHint(sceneId, index) {
  if (!state.hintsEnabled) return;
  const hints = GAME_DATA.hints && GAME_DATA.hints[sceneId];
  if (!hints || index >= hints.length) return;
  const hint = hints[index];
  addText(hint.text, 'hint');
}

function startHintTimer(sceneId) {
  clearHintTimers();
  const hints = GAME_DATA.hints && GAME_DATA.hints[sceneId];
  if (!hints || !state.hintsEnabled) return;
  hints.forEach((hint, idx) => {
    const timeout = setTimeout(() => showHint(sceneId, idx), hint.delay * 1000);
    state.hintTimeouts.push(timeout);
  });
}

function toggleHints() {
  state.hintsEnabled = !state.hintsEnabled;
  const btn = document.getElementById('hint-toggle');
  if (btn) btn.textContent = state.hintsEnabled ? 'HINTS: ON' : 'HINTS: OFF';
  if (!state.hintsEnabled) {
    clearHintTimers();
  } else {
    startHintTimer(state.currentScene);
  }
}

// ---- Locked Exit Logic ----
// Puzzle blocksExit format in this game is just a direction string like "west"
// We need to map that to a blocking puzzle per scene.
function isExitLocked(sceneId, direction) {
  // Find any unsolved puzzle in this scene that blocks this direction
  return GAME_DATA.puzzles.some(p =>
    p.scene === sceneId &&
    p.blocksExit === direction &&
    !state.solvedPuzzles.includes(p.id)
  );
}

function getBlockedMessage(sceneId, direction) {
  const puzzle = GAME_DATA.puzzles.find(p =>
    p.scene === sceneId &&
    p.blocksExit === direction &&
    !state.solvedPuzzles.includes(p.id)
  );
  if (!puzzle) return null;
  // Return a generic blocked message based on the scene/direction
  const scene = GAME_DATA.scenes.find(s => s.id === sceneId);
  const messages = {
    'transmitter-room:west': 'The corridor to the control booth is sealed shut. Something mechanical is blocking the way — a heavy bolt or latch that needs engaging from this side.',
    'control-booth:north': 'The sound booth door is locked tight. You need a key.',
    'sound-booth:south': 'The door seals shut behind you with a pneumatic hiss. It will only open once its purpose has been served... or perhaps from the other side.'
  };
  const key = sceneId + ':' + direction;
  return messages[key] || 'The way ' + direction + ' is blocked. Something prevents you from going that way.';
}

// ---- Scene Rendering ----
function renderScene(sceneId) {
  const scene = GAME_DATA.scenes.find(s => s.id === sceneId);
  if (!scene) { addText('ERROR: Scene not found!', 'error'); return; }

  state.currentScene = sceneId;
  if (!state.visitedScenes.includes(sceneId)) state.visitedScenes.push(sceneId);

  // Hint timer
  clearHintTimers();
  startHintTimer(sceneId);

  // Update scene name
  sceneName.textContent = scene.name.toUpperCase();

  // Update art
  const artKey = sceneId;
  if (window.GAME_ART && window.GAME_ART[artKey]) {
    artDisplay.innerHTML = window.GAME_ART[artKey];
  } else {
    artDisplay.innerHTML = '<span class="no-art">[ ' + scene.name.toUpperCase() + ' ]</span>';
  }

  // Display prose
  clearText();
  addText(scene.prose);

  // Show available items (not yet taken)
  const availableItems = (scene.items || []).filter(itemId =>
    !state.inventory.includes(itemId) && !state.solvedPuzzles.some(pid => {
      const p = GAME_DATA.puzzles.find(x => x.id === pid);
      return p && p.reveals && p.reveals.includes(itemId);
    })
  );
  if (availableItems.length > 0) {
    const itemNames = availableItems.map(id => {
      const item = GAME_DATA.items.find(i => i.id === id);
      return item ? `<span class="look-target" data-look="${id}">${item.name}</span>` : id;
    });
    addText('You notice: ' + itemNames.join(', '), 'system');
  }

  // Show unsolved puzzles
  const scenePuzzles = (scene.puzzles || []).filter(pid =>
    !state.solvedPuzzles.includes(pid)
  );
  scenePuzzles.forEach(pid => {
    const puzzle = GAME_DATA.puzzles.find(p => p.id === pid);
    if (puzzle && !puzzle.blocksExit) {
      addText('There is something here that catches your attention...', 'system');
    }
  });

  // Render exits
  renderExits(scene.exits || {});

  // Render inventory
  renderInventory();

  // Check win condition
  checkWin();

  // Save state
  saveState();
}

function renderExits(exits) {
  exitsBar.innerHTML = '';
  Object.keys(exits).forEach(dir => {
    const targetScene = exits[dir];
    const locked = isExitLocked(state.currentScene, dir);
    const btn = document.createElement('button');
    btn.className = 'exit-btn' + (locked ? '' : ' available');
    btn.textContent = dir.toUpperCase();
    if (locked) {
      btn.onclick = () => {
        const msg = getBlockedMessage(state.currentScene, dir);
        addText(msg || 'The way ' + dir + ' is blocked.', 'locked');
      };
    } else {
      btn.onclick = () => go(targetScene);
    }
    exitsBar.appendChild(btn);
  });
}

function renderInventory() {
  const items = invBar.querySelectorAll('.inv-item');
  items.forEach(el => el.remove());
  const empty = document.getElementById('inv-empty');

  if (state.inventory.length === 0) {
    if (empty) empty.style.display = '';
  } else {
    if (empty) empty.style.display = 'none';
    state.inventory.forEach(itemId => {
      const item = GAME_DATA.items.find(i => i.id === itemId);
      if (!item) return;
      const el = document.createElement('span');
      el.className = 'inv-item' + (state.selectedItem === itemId ? ' selected' : '');
      el.textContent = item.name;
      el.onclick = () => selectItem(itemId);
      invBar.appendChild(el);
    });
  }
}

// ---- Command Handlers ----
function setCommand(cmd) {
  state.activeCommand = cmd;
  document.querySelectorAll('.cmd-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cmd === cmd);
  });
  if (cmd === 'look') {
    const scene = GAME_DATA.scenes.find(s => s.id === state.currentScene);
    if (scene && scene.lookDescriptions) {
      const targets = Object.keys(scene.lookDescriptions);
      if (targets.length > 0) {
        addText('You can examine: ' + targets.map(t =>
          `<span class="look-target" data-look="${t}">${t}</span>`
        ).join(', '), 'system');
      }
    }
  } else if (cmd === 'use') {
    if (state.inventory.length > 0) {
      addText('Select an item from your inventory, then click what to use it on.', 'system');
    } else {
      addText('You have nothing to use.', 'system');
    }
  } else if (cmd === 'take') {
    const scene = GAME_DATA.scenes.find(s => s.id === state.currentScene);
    const available = (scene.items || []).filter(id => !state.inventory.includes(id));
    if (available.length > 0) {
      available.forEach(id => takeItem(id));
    } else {
      addText('Nothing here to take.', 'system');
    }
  } else if (cmd === 'examine') {
    const scene = GAME_DATA.scenes.find(s => s.id === state.currentScene);
    if (scene && scene.lookDescriptions) {
      const targets = Object.keys(scene.lookDescriptions);
      if (targets.length > 0) {
        addText('You can examine: ' + targets.map(t =>
          `<span class="look-target" data-look="${t}">${t}</span>`
        ).join(', '), 'system');
      }
    }
  }
}

function selectItem(itemId) {
  state.selectedItem = state.selectedItem === itemId ? null : itemId;
  renderInventory();
  if (state.selectedItem) {
    const item = GAME_DATA.items.find(i => i.id === itemId);
    addText(`Selected: ${item.name}. Click USE, then a target.`, 'system');
  }
}

function takeItem(itemId) {
  if (state.inventory.includes(itemId)) return;
  const item = GAME_DATA.items.find(i => i.id === itemId);
  if (!item) return;
  const scene = GAME_DATA.scenes.find(s => s.id === state.currentScene);
  if (!scene || !(scene.items || []).includes(itemId)) return;

  state.inventory.push(itemId);
  addText(`You picked up: ${item.name} — ${item.description}`, 'success');
  renderInventory();
  saveState();
}

function lookAt(target) {
  const scene = GAME_DATA.scenes.find(s => s.id === state.currentScene);
  if (scene && scene.lookDescriptions && scene.lookDescriptions[target]) {
    addText(scene.lookDescriptions[target]);
  } else {
    // Check if it's an item
    const item = GAME_DATA.items.find(i => i.id === target);
    if (item) {
      addText(item.description);
    } else {
      addText('Nothing interesting about that.', 'system');
    }
  }
}

// ---- Puzzle Solving ----
function trySolvePuzzle(itemId, targetId) {
  // Find a puzzle in the current scene that:
  // 1. Requires this item
  // 2. Hasn't been solved yet
  // 3. Matches the target (item usedOn or look target)

  const scenePuzzles = GAME_DATA.puzzles.filter(p =>
    p.scene === state.currentScene &&
    !state.solvedPuzzles.includes(p.id)
  );

  for (const puzzle of scenePuzzles) {
    // Check if all required items are in inventory
    const allReqsMet = puzzle.requires.every(req => state.inventory.includes(req));

    // Check if the target matches something in the puzzle
    // The target could be the puzzle id, or derived from the action description
    const actionLower = (puzzle.action || '').toLowerCase();
    const targetLower = (targetId || '').toLowerCase();
    const itemLower = (itemId || '').toLowerCase();

    // Match logic: check if the item is required and the target relates to the puzzle
    const itemIsRequired = puzzle.requires.includes(itemId);
    const targetMatchesAction = !targetId ||
      actionLower.includes(targetLower) ||
      puzzle.id === targetId ||
      targetId.includes(puzzle.scene);

    if (itemIsRequired && allReqsMet) {
      solvePuzzle(puzzle);
      return true;
    }
  }

  return false;
}

function solvePuzzle(puzzle) {
  if (state.solvedPuzzles.includes(puzzle.id)) return;

  state.solvedPuzzles.push(puzzle.id);

  // Visual feedback
  artDisplay.classList.add('puzzle-solved');
  setTimeout(() => artDisplay.classList.remove('puzzle-solved'), 600);

  // Show result text
  addText(puzzle.result, 'success');

  // Remove required items from inventory (consumed by puzzle)
  puzzle.requires.forEach(reqId => {
    const idx = state.inventory.indexOf(reqId);
    if (idx !== -1) state.inventory.splice(idx, 1);
  });

  // Reveal new items
  (puzzle.reveals || []).forEach(revealId => {
    const revealItem = GAME_DATA.items.find(i => i.id === revealId);
    if (revealItem) {
      // Check if it's a scene name (like "sound-booth")
      const revealScene = GAME_DATA.scenes.find(s => s.id === revealId);
      if (revealScene) {
        addText(`The way to ${revealScene.name} is now open!`, 'success');
      } else {
        state.inventory.push(revealId);
        addText(`You obtained: ${revealItem.name}`, 'success');
      }
    }
  });

  // Update exits display (may have unlocked new paths)
  renderExits(GAME_DATA.scenes.find(s => s.id === state.currentScene).exits || {});
  renderInventory();
  checkWin();
  saveState();
}

function useItemOn(itemId, targetId) {
  // First try to solve a puzzle
  if (trySolvePuzzle(itemId, targetId)) {
    state.selectedItem = null;
    renderInventory();
    return;
  }

  // Fallback: try looking at the target
  const scene = GAME_DATA.scenes.find(s => s.id === state.currentScene);
  if (scene && scene.lookDescriptions && scene.lookDescriptions[targetId]) {
    addText(scene.lookDescriptions[targetId]);
    addText("That doesn't work with " + GAME_DATA.items.find(i => i.id === itemId)?.name + '.', 'system');
  } else {
    addText("That doesn't seem to work.", 'system');
  }
  state.selectedItem = null;
  renderInventory();
}

function go(sceneId) {
  // Check if exit is locked
  // We need to find the direction for this target scene
  const scene = GAME_DATA.scenes.find(s => s.id === state.currentScene);
  if (scene && scene.exits) {
    for (const [dir, target] of Object.entries(scene.exits)) {
      if (target === sceneId && isExitLocked(state.currentScene, dir)) {
        addText(getBlockedMessage(state.currentScene, dir), 'locked');
        return;
      }
    }
  }

  addText('---', 'system');
  renderScene(sceneId);
}

function checkWin() {
  if (state.won) return;
  const wc = GAME_DATA.winCondition;
  if (!wc) return;
  if (state.currentScene === wc.scene &&
      wc.requires.every(req => state.inventory.includes(req))) {
    state.won = true;
    addText('', '');
    addText('*** ' + wc.description + ' ***', 'success');
    addText('', '');
    addText('CONGRATULATIONS! YOU HAVE COMPLETED THE GAME!', 'success');
    addText('Type /restart to play again.', 'system');
  }
}

// ---- Persistence ----
function saveState() {
  try {
    localStorage.setItem('game-' + GAME_DATA.slug, JSON.stringify(state));
  } catch(e) {}
}

function loadState() {
  try {
    const saved = localStorage.getItem('game-' + GAME_DATA.slug);
    if (saved) {
      const s = JSON.parse(saved);
      Object.assign(state, s);
      return true;
    }
  } catch(e) {}
  return false;
}

// ---- Event Listeners ----
document.querySelectorAll('.cmd-btn').forEach(btn => {
  btn.onclick = () => setCommand(btn.dataset.cmd);
});

document.getElementById('hint-toggle').addEventListener('click', toggleHints);

document.addEventListener('click', (e) => {
  if (e.target.classList.contains('look-target')) {
    const target = e.target.dataset.look;
    if (state.activeCommand === 'use' && state.selectedItem) {
      useItemOn(state.selectedItem, target);
    } else {
      lookAt(target);
    }
  }
});

// ---- Restart command ----
document.addEventListener('keydown', (e) => {
  // Handle /restart
  if (e.key === 'Enter') {
    const input = textDisplay.querySelector('input.restart-input');
    if (input && input.value.trim() === '/restart') {
      localStorage.removeItem('game-' + GAME_DATA.slug);
      location.reload();
    }
  }
});

// ---- Initialize ----
function init() {
  if (Object.keys(GAME_DATA).length === 0) {
    addText('ERROR: No game data loaded.', 'error');
    return;
  }

  addText('=== ' + GAME_DATA.title.toUpperCase() + ' ===', 'success');
  addText(GAME_DATA.setting, 'system');
  addText('', '');
  addText('Commands: LOOK | TAKE | USE | EXAMINE', 'system');
  addText('Click exits to move between rooms.', 'system');
  addText('---', 'system');

  if (!loadState()) {
    renderScene('lobby');
  } else {
    renderScene(state.currentScene);
    addText('[Game restored from save]', 'system');
  }
}

init();

</script>
