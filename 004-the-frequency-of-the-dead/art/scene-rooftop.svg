<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Dark foggy rooftop -->
  <rect width="640" height="400" fill="#1a1a18"/>
  
  <!-- Fog layers -->
  <rect x="0" y="0" width="640" height="150" fill="#2a2a25" opacity="0.5"/>
  <rect x="0" y="50" width="640" height="100" fill="#3a3a35" opacity="0.3"/>
  <rect x="0" y="100" width="640" height="80" fill="#4a4a45" opacity="0.2"/>
  
  <!-- Rooftop surface -->
  <rect x="0" y="300" width="640" height="100" fill="#2a2a25"/>
  <!-- Rooftop texture -->
  <g stroke="#333330" stroke-width="1">
    <line x1="0" y1="320" x2="640" y2="320"/>
    <line x1="0" y1="340" x2="640" y2="340"/>
    <line x1="0" y1="360" x2="640" y2="360"/>
    <line x1="0" y1="380" x2="640" y2="380"/>
  </g>
  
  <!-- Cliff edge -->
  <rect x="0" y="300" width="640" height="20" fill="#1a1a18"/>
  <!-- Black water below -->
  <rect x="0" y="320" width="640" height="80" fill="#0a0a08"/>
  <!-- White teeth (waves) -->
  <path d="M50,340 Q70,330 90,340 T130,340 T170,340 T210,340" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M300,350 Q320,340 340,350 T380,350 T420,350" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.2"/>
  <path d="M450,335 Q470,325 490,335 T530,335" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.25"/>
  
  <!-- Steel lattice antenna tower -->
  <g id="tower">
    <!-- Main vertical supports -->
    <line x1="280" y1="50" x2="280" y2="300" stroke="#4a4a45" stroke-width="4"/>
    <line x1="360" y1="50" x2="360" y2="300" stroke="#4a4a45" stroke-width="4"/>
    <!-- Cross beams -->
    <line x1="280" y1="80" x2="360" y2="80" stroke="#4a4a45" stroke-width="2"/>
    <line x1="280" y1="120" x2="360" y2="120" stroke="#4a4a45" stroke-width="2"/>
    <line x1="280" y1="160" x2="360" y2="160" stroke="#4a4a45" stroke-width="2"/>
    <line x1="280" y1="200" x2="360" y2="200" stroke="#4a4a45" stroke-width="2"/>
    <line x1="280" y1="240" x2="360" y2="240" stroke="#4a4a45" stroke-width="2"/>
    <line x1="280" y1="280" x2="360" y2="280" stroke="#4a4a45" stroke-width="2"/>
    <!-- Diagonal supports -->
    <line x1="280" y1="80" x2="360" y2="120" stroke="#4a4a45" stroke-width="1"/>
    <line x1="360" y1="80" x2="280" y2="120" stroke="#4a4a45" stroke-width="1"/>
    <line x1="280" y1="160" x2="360" y2="200" stroke="#4a4a45" stroke-width="1"/>
    <line x1="360" y1="160" x2="280" y2="200" stroke="#4a4a45" stroke-width="1"/>
    <line x1="280" y1="240" x2="360" y2="280" stroke="#4a4a45" stroke-width="1"/>
    <line x1="360" y1="240" x2="280" y2="280" stroke="#4a4a45" stroke-width="1"/>
  </g>
  
  <!-- Transmission coil inside tower -->
  <rect x="300" y="100" width="40" height="180" fill="#2a2a25" stroke="#555550" stroke-width="2"/>
  <!-- Coil windings -->
  <g stroke="#b87333" stroke-width="3" opacity="0.7">
    <line x1="305" y1="120" x2="335" y2="120"/>
    <line x1="305" y1="140" x2="335" y2="140"/>
    <line x1="305" y1="160" x2="335" y2="160"/>
    <line x1="305" y1="180" x2="335" y2="180"/>
    <line x1="305" y1="200" x2="335" y2="200"/>
    <line x1="305" y1="220" x2="335" y2="220"/>
    <line x1="305" y1="240" x2="335" y2="240"/>
    <line x1="305" y1="260" x2="335" y2="260"/>
  </g>
  
  <!-- Service panel (ajar) -->
  <rect x="310" y="180" width="20" height="40" fill="#3a3a35" stroke="#555550" stroke-width="2"/>
  <line x1="310" y1="200" x2="305" y2="195" stroke="#555550" stroke-width="2"/>
  <line x1="310" y1="220" x2="305" y2="225" stroke="#555550" stroke-width="2"/>
  
  <!-- Crystalline socket (empty, dark) -->
  <circle cx="320" cy="200" r="10" fill="#0a0a08" stroke="#333330" stroke-width="2"/>
  <circle cx="320" cy="200" r="6" fill="#1a1a18" stroke="#333330" stroke-width="1"/>
  
  <!-- Fog coils around tower -->
  <path d="M250,100 Q270,90 290,100 T330,100" stroke="#666660" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M260,150 Q280,140 300,150 T340,150" stroke="#666660" stroke-width="2" fill="none" opacity="0.2"/>
  <path d="M250,200 Q270,190 290,200 T330,200" stroke="#666660" stroke-width="2" fill="none" opacity="0.3"/>
  
  <!-- Wind effect lines -->
  <line x1="100" y1="50" x2="200" y2="60" stroke="#666660" stroke-width="1" opacity="0.4"/>
  <line x1="150" y1="80" x2="250" y2="90" stroke="#666660" stroke-width="1" opacity="0.3"/>
  <line x1="50" y1="120" x2="150" y2="130" stroke="#666660" stroke-width="1" opacity="0.3"/>
  <line x1="450" y1="60" x2="550" y2="70" stroke="#666660" stroke-width="1" opacity="0.4"/>
  <line x1="400" y1="100" x2="500" y2="110" stroke="#666660" stroke-width="1" opacity="0.3"/>
  
  <!-- Ambient hum glow -->
  <circle cx="320" cy="200" r="40" fill="#ff8800" opacity="0.05"/>
  <circle cx="320" cy="200" r="25" fill="#aa00ff" opacity="0.03"/>
</svg>