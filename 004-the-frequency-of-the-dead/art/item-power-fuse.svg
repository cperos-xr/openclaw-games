  <rect width="64" height="64" fill="#1a1a18"/>
  
  <!-- Ceramic body of fuse -->
  <rect x="20" y="16" width="24" height="32" fill="#f5f5dc" stroke="#d2b48c" stroke-width="3"/>
  <!-- Ceramic texture -->
  <rect x="22" y="18" width="20" height="28" fill="#e8e8d0" opacity="0.7"/>
  
  <!-- Copper contacts -->
  <rect x="18" y="12" width="28" height="6" fill="#b87333" stroke="#8b5a2b" stroke-width="2"/>
  <rect x="18" y="46" width="28" height="6" fill="#b87333" stroke="#8b5a2b" stroke-width="2"/>
  
  <!-- Contact details -->
  <line x1="20" y1="15" x2="44" y2="15" stroke="#cd7f32" stroke-width="1"/>
  <line x1="20" y1="49" x2="44" y2="49" stroke="#cd7f32" stroke-width="1"/>
  
  <!-- Age and wear -->
  <rect x="24" y="20" width="16" height="4" fill="#d2b48c" opacity="0.3"/>
  <rect x="24" y="40" width="16" height="4" fill="#d2b48c" opacity="0.3"/>
  <line x1="22" y1="30" x2="42" y2="30" stroke="#8b7355" stroke-width="1" opacity="0.4"/>
