<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" fill="#1a1a18"/>
  
  <!-- Scroll body (yellowed paper) -->
  <rect x="16" y="12" width="32" height="40" fill="#d4af37" stroke="#b8860b" stroke-width="2"/>
  <!-- Paper curl effect at top -->
  <path d="M16,12 Q24,8 32,12 Q40,8 48,12" fill="#f5deb3" stroke="#b8860b" stroke-width="1"/>
  <!-- Paper curl at bottom -->
  <path d="M16,52 Q24,56 32,52 Q40,56 48,52" fill="#f5deb3" stroke="#b8860b" stroke-width="1"/>
  
  <!-- Frequency code: 7-3-1-9 -->
  <text x="32" y="30" font-family="monospace" font-size="14" fill="#8b6914" stroke="#5a4a2a" stroke-width="1" text-anchor="middle" font-weight="bold">7-3-1-9</text>
  
  <!-- Shaky ink effect -->
  <line x1="20" y1="36" x2="44" y2="36" stroke="#8b6914" stroke-width="1" opacity="0.3"/>
  <line x1="22" y1="40" x2="42" y2="40" stroke="#8b6914" stroke-width="1" opacity="0.2"/>
  
  <!-- Age stains -->
  <rect x="20" y="16" width="8" height="6" fill="#8b7355" opacity="0.2"/>
  <rect x="36" y="42" width="10" height="6" fill="#8b7355" opacity="0.2"/>
  <circle cx="44" cy="20" r="3" fill="#8b7355" opacity="0.15"/>
</svg>