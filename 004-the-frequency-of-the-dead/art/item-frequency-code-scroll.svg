<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" fill="#000000"/>
  
  <!-- Scroll body (unraveling parchment) -->
  <g id="scroll-body">
    <!-- Main parchment surface -->
    <path d="M12 10 C 12 8, 52 8, 52 10 L 54 50 C 54 54, 10 54, 10 50 Z" fill="#d4af37" stroke="#8b6914" stroke-width="1.5"/>
    
    <!-- Top roll (unraveling) -->
    <path d="M10 12 Q 32 6 54 12 L 52 8 Q 32 2 12 8 Z" fill="#f5deb3" stroke="#8b6914" stroke-width="1"/>
    
    <!-- Bottom roll -->
    <path d="M10 50 Q 32 56 54 50 L 52 54 Q 32 60 12 54 Z" fill="#f5deb3" stroke="#8b6914" stroke-width="1"/>
  </g>

  <!-- Inked Radio Wave Patterns (Replacing 7-3-1-9 text) -->
  <g id="radio-waves" stroke="#5a4a2a" fill="none" stroke-width="1.5" stroke-linecap="round">
    <!-- Wave 1: Representing '7' (maybe 7 peaks or specific amplitude) -->
    <path d="M18 20 Q 22 14 26 20 T 34 20 T 42 20 T 50 20" opacity="0.8"/>
    
    <!-- Wave 2: Representing '3' -->
    <path d="M20 28 Q 24 24 28 28 T 36 28 T 44 28" opacity="0.9"/>
    
    <!-- Wave 3: Representing '1' -->
    <path d="M25 36 Q 32 30 39 36" opacity="0.7"/>
    
    <!-- Wave 4: Representing '9' -->
    <path d="M16 44 Q 18 40 20 44 T 24 44 T 28 44 T 32 44 T 36 44 T 40 44 T 44 44 T 48 44 T 52 44" opacity="0.8"/>
  </g>
  
  <!-- Grime and Age Stains -->
  <g fill="#5d4037" opacity="0.3">
    <circle cx="15" cy="15" r="3"/>
    <circle cx="48" cy="45" r="4"/>
    <rect x="25" y="12" width="12" height="2" transform="rotate(5, 25, 12)"/>
  </g>
  
  <!-- Torn edge detail -->
  <path d="M10 30 L 12 31 L 10 32 Z" fill="#000000"/>
  <path d="M54 25 L 52 26 L 54 27 Z" fill="#000000"/>
</svg>
