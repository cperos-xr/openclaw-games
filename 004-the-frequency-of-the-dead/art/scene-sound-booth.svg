<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Dark soundproofed room -->
  <rect width="640" height="400" fill="#000000"/>
  
  <!-- Diamond-patterned acoustic foam on all walls -->
  <defs>
    <pattern id="diamond-foam" patternUnits="userSpaceOnUse" width="40" height="40" patternTransform="rotate(45)">
      <rect width="20" height="20" fill="#111111"/>
      <rect width="20" height="20" fill="#222222" x="20" y="20"/>
    </pattern>
  </defs>
  
  <!-- Interior geometry (Walls/Floor/Ceiling) -->
  <g id="architecture">
    <!-- Left wall foam -->
    <rect x="0" y="0" width="100" height="400" fill="url(#diamond-foam)"/>
    <!-- Right wall foam -->
    <rect x="540" y="0" width="100" height="400" fill="url(#diamond-foam)"/>
    <!-- Back wall foam -->
    <rect x="100" y="0" width="440" height="150" fill="url(#diamond-foam)"/>
    <!-- Floor foam -->
    <rect x="100" y="250" width="440" height="150" fill="url(#diamond-foam)"/>
    
    <!-- Darker disturbed foam on far wall (faded area) -->
    <rect x="250" y="50" width="140" height="100" fill="#000000" opacity="0.8"/>
  </g>
  
  <!-- Numbers scratched into foam: 7-3-1-9 (REPLACED TEXT with hand-coded paths) -->
  <g id="scratched-code" stroke="#444440" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <!-- 7 -->
    <path d="M 310 80 L 330 80 L 320 110"/>
    <!-- - -->
    <path d="M 335 95 L 345 95"/>
    <!-- 3 -->
    <path d="M 350 80 Q 365 80 365 92 Q 365 105 350 105 M 365 92 Q 350 92 350 92"/>
    <!-- - -->
    <path d="M 375 95 L 385 95"/>
    <!-- 1 -->
    <path d="M 395 110 L 405 110 M 400 110 L 400 80 L 395 85"/>
    <!-- - -->
    <path d="M 415 95 L 425 95"/>
    <!-- 9 -->
    <path d="M 435 95 Q 435 80 445 80 Q 455 80 455 95 L 455 110 M 435 95 L 455 95"/>
  </g>
  
  <!-- Microphone stand (skeletal) -->
  <g id="mic-stand">
    <line x1="320" y1="200" x2="320" y2="350" stroke="#4a4a45" stroke-width="4"/>
    <!-- Stand base -->
    <circle cx="320" cy="350" r="15" fill="#3a3a35" stroke="#555550" stroke-width="2"/>
    <!-- Arm reaching up -->
    <line x1="320" y1="200" x2="340" y2="180" stroke="#4a4a45" stroke-width="3"/>
    <circle cx="340" cy="180" r="5" fill="#4a4a45" stroke="#555550" stroke-width="1"/>
  </g>
  
  <!-- Scroll of yellowed paper (Replaced simple rect) -->
  <g id="scroll-prop" transform="translate(200, 300) scale(0.6)">
    <path d="M12 10 C 12 8, 52 8, 52 10 L 54 50 C 54 54, 10 54, 10 50 Z" fill="#d4af37" stroke="#8b6914" stroke-width="2.5"/>
    <path d="M10 12 Q 32 6 54 12 L 52 8 Q 32 2 12 8 Z" fill="#f5deb3" stroke="#8b6914" stroke-width="2"/>
    <path d="M10 50 Q 32 56 54 50 L 52 54 Q 32 60 12 54 Z" fill="#f5deb3" stroke="#8b6914" stroke-width="2"/>
    <!-- Faint waves on it -->
    <path d="M20 25 Q 32 20 44 25" stroke="#8b6914" stroke-width="1.5" fill="none" opacity="0.6"/>
  </g>
  
  <!-- Atmospheric/Lighting details -->
  <g id="atmosphere">
    <circle cx="320" cy="200" r="120" fill="radialGradient" opacity="0.05"/>
    <!-- Shadowing on floor -->
    <ellipse cx="320" cy="360" rx="100" ry="20" fill="#000000" opacity="0.4"/>
  </g>
  
  <!-- Pneumatic Door seal detail -->
  <g id="door-detail">
    <rect x="0" y="150" width="100" height="100" fill="#222222" stroke="#444440" stroke-width="3"/>
    <line x1="20" y1="150" x2="20" y2="250" stroke="#555550" stroke-width="1.5"/>
    <circle cx="50" cy="200" r="8" fill="#111111" stroke="#333330"/>
  </g>
</svg>
