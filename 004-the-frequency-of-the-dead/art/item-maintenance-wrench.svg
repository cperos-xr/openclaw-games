<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" fill="#1a1a18"/>
  
  <!-- Wrench handle -->
  <rect x="28" y="16" width="8" height="36" fill="#708090" stroke="#4a5568" stroke-width="3"/>
  <!-- Handle texture -->
  <line x1="30" y1="20" x2="30" y2="48" stroke="#4a5568" stroke-width="1" opacity="0.5"/>
  <line x1="34" y1="20" x2="34" y2="48" stroke="#4a5568" stroke-width="1" opacity="0.5"/>
  
  <!-- Wrench head (open end) -->
  <rect x="20" y="12" width="24" height="12" fill="#708090" stroke="#4a5568" stroke-width="3"/>
  <!-- Jaw opening -->
  <rect x="24" y="14" width="16" height="4" fill="#1a1a18" stroke="#4a5568" stroke-width="1"/>
  <!-- Jaw tips -->
  <rect x="18" y="10" width="4" height="6" fill="#708090" stroke="#4a5568" stroke-width="1"/>
  <rect x="42" y="10" width="4" height="6" fill="#708090" stroke="#4a5568" stroke-width="1"/>
  
  <!-- Rust stains -->
  <rect x="28" y="20" width="8" height="10" fill="#8b4513" opacity="0.4"/>
  <rect x="26" y="35" width="12" height="8" fill="#8b4513" opacity="0.3"/>
  <circle cx="32" cy="40" r="3" fill="#8b4513" opacity="0.5"/>
  
  <!-- Wear marks -->
  <line x1="22" y1="16" x2="42" y2="16" stroke="#4a5568" stroke-width="1" opacity="0.6"/>
  <line x1="22" y1="20" x2="42" y2="20" stroke="#4a5568" stroke-width="1" opacity="0.4"/>
</svg>