<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" fill="#000000"/>
  
  <!-- Modern Stylish Studio Key -->
  <g id="modern-key" transform="translate(10, 10)">
    <!-- Key Bow (Modern Square/Round hybrid) -->
    <path d="M 2 2 L 18 2 L 20 4 L 20 16 L 18 18 L 2 18 L 0 16 L 0 4 Z" fill="#d4af37" stroke="#b8860b" stroke-width="2"/>
    <rect x="5" y="5" width="10" height="8" fill="#1a1a18" stroke="#b8860b" stroke-width="1.5"/>
    
    <!-- Modern stylish logo or sound wave icon on bow (Replaces text) -->
    <path d="M 6 9 L 14 9 M 8 7 L 8 11 M 10 5 L 10 13 M 12 7 L 12 11" stroke="#d4af37" stroke-width="1" opacity="0.8"/>

    <!-- Handle connection (neck) -->
    <rect x="20" y="8" width="4" height="4" fill="#b8860b"/>
    
    <!-- Key Blade (Modern flat style) -->
    <rect x="24" y="8" width="26" height="4" fill="#d4af37" stroke="#b8860b" stroke-width="1.5"/>
    
    <!-- Sophisticated Teeth pattern (Replaces simple blocks) -->
    <g id="modern-bitting" fill="#d4af37" stroke="#b8860b" stroke-width="1">
      <path d="M 32 12 L 34 14 L 36 12 Z"/>
      <path d="M 38 12 L 40 16 L 42 12 Z"/>
      <path d="M 44 12 L 48 14 L 46 12 Z"/>
    </g>
  </g>
  
  <!-- Highlighting/Reflections -->
  <path d="M 12 12 L 28 12 L 54 12" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
  <rect x="15" y="15" width="2" height="2" fill="#ffffff" opacity="0.2"/>
</svg>
