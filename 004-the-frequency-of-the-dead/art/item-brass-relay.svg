<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" fill="#1a1a18"/>
  
  <!-- Brass relay switch body -->
  <rect x="16" y="20" width="32" height="24" fill="#d4af37" stroke="#b8860b" stroke-width="3"/>
  <!-- Tarnished areas -->
  <rect x="18" y="22" width="28" height="20" fill="#b8860b" opacity="0.5"/>
  <rect x="20" y="25" width="24" height="14" fill="#cd7f32" opacity="0.4"/>
  
  <!-- Contact points -->
  <circle cx="24" cy="32" r="4" fill="#8b6914" stroke="#5a4a2a" stroke-width="2"/>
  <circle cx="40" cy="32" r="4" fill="#8b6914" stroke="#5a4a2a" stroke-width="2"/>
  
  <!-- Switch lever -->
  <rect x="28" y="12" width="8" height="12" fill="#d4af37" stroke="#b8860b" stroke-width="2"/>
  <line x1="32" y1="24" x2="32" y2="28" stroke="#b8860b" stroke-width="2"/>
  
  <!-- Age lines -->
  <line x1="18" y1="20" x2="46" y2="20" stroke="#8b6914" stroke-width="1" opacity="0.5"/>
  <line x1="18" y1="44" x2="46" y2="44" stroke="#8b6914" stroke-width="1" opacity="0.5"/>
</svg>