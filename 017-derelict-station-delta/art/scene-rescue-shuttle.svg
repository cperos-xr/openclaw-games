<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
<rect width="640" height="400" fill="#0a0a18"/>
<!-- Stars through shuttle window -->
<circle cx="100" cy="50" r="1.5" fill="#ffffff" opacity="0.8"/>
<circle cx="200" cy="30" r="1" fill="#ffffff" opacity="0.6"/>
<circle cx="350" cy="60" r="1.2" fill="#ffffff" opacity="0.7"/>
<circle cx="500" cy="40" r="1.5" fill="#ffffff" opacity="0.9"/>
<circle cx="450" cy="80" r="1" fill="#ffffff" opacity="0.5"/>
<circle cx="580" cy="25" r="1.3" fill="#ffffff" opacity="0.8"/>
<circle cx="150" cy="90" r="1" fill="#ffffff" opacity="0.4"/>
<circle cx="50" cy="70" r="1.5" fill="#ffffff" opacity="0.7"/>
<circle cx="300" cy="45" r="1" fill="#ffffff" opacity="0.6"/>
<circle cx="550" cy="100" r="1.2" fill="#ffffff" opacity="0.5"/>
<!-- Window frame -->
<rect x="120" y="20" width="400" height="180" rx="8" fill="#0d0d22" stroke="#445566" stroke-width="4"/>
<rect x="320" y="20" width="2" height="180" fill="#445566" stroke-width="1"/>
<rect x="120" y="110" width="400" height="2" fill="#445566" stroke-width="1"/>
<!-- Distant planet glow -->
<circle cx="500" cy="140" r="40" fill="#1a2244" opacity="0.6"/>
<circle cx="500" cy="140" r="38" fill="none" stroke="#3388cc" stroke-width="1" opacity="0.4"/>
<!-- Shuttle interior floor -->
<rect x="0" y="280" width="640" height="120" fill="#1a1a2a"/>
<rect x="0" y="280" width="640" height="3" fill="#333344"/>
<!-- Floor detail lines -->
<line x1="0" y1="310" x2="640" y2="310" stroke="#222233" stroke-width="1"/>
<line x1="0" y1="340" x2="640" y2="340" stroke="#222233" stroke-width="1"/>
<!-- Side panels -->
<rect x="0" y="200" width="60" height="200" fill="#151528" stroke="#334455" stroke-width="2"/>
<rect x="580" y="200" width="60" height="200" fill="#151528" stroke="#334455" stroke-width="2"/>
<!-- Panel lights - green for safety -->
<circle cx="20" cy="250" r="4" fill="#33cc33" opacity="0.8"/>
<circle cx="20" cy="280" r="4" fill="#33cc33" opacity="0.6"/>
<circle cx="20" cy="310" r="4" fill="#33cc33" opacity="0.9"/>
<circle cx="620" cy="250" r="4" fill="#33cc33" opacity="0.7"/>
<circle cx="620" cy="280" r="4" fill="#33cc33" opacity="0.8"/>
<circle cx="620" cy="310" r="4" fill="#33cc33" opacity="0.6"/>
<!-- Pilot seat silhouette -->
<rect x="270" y="240" width="100" height="100" rx="10" fill="#111122" stroke="#334455" stroke-width="2"/>
<rect x="290" y="250" width="60" height="60" rx="8" fill="#1a1a30"/>
<!-- Console lights blinking -->
<rect x="300" y="350" width="40" height="15" rx="2" fill="#3388cc" opacity="0.7"/>
<rect x="350" y="350" width="30" height="15" rx="2" fill="#cc8833" opacity="0.5"/>
<rect x="260" y="350" width="30" height="15" rx="2" fill="#33cc33" opacity="0.6"/>
<!-- ESCAPE text -->
<text x="320" y="210" font-family="monospace" font-size="14" fill="#33cc33" text-anchor="middle" opacity="0.9">RESCUE TRANSPORT ACTIVE</text>
<text x="320" y="230" font-family="monospace" font-size="10" fill="#3388cc" text-anchor="middle" opacity="0.7">DESTINATION: EARTH // ETA 14 DAYS</text>
</svg>