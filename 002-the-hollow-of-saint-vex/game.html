        /* ============================================================
         * OPENCLAW GAME TEMPLATE v3.0 — MOBILE-FIRST
         *
         * ARCHITECTURE:
         *   Mobile (<769px): Scrollable page. Art top. Content below.
         *   Desktop (≥769px): Fixed 100vh. Art left 60%. Text right 40%.
         *
         * FIVE RULES THAT MUST NEVER BE BROKEN:
         *   1. NEVER add height:100vh + overflow:hidden outside the desktop media query

         *   3. ALWAYS use aspect-ratio: 8/5 (640x400) for the art panel on mobile
         *   4. ALWAYS use min-height:44px on every clickable button (touch targets)
         *   5. ALWAYS use flex-wrap:wrap on .command-bar and #exits-bar
         * ============================================================ */

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* CRT scanline overlay */
        body::after {
            content: ''; position: fixed; inset: 0; z-index: 999; pointer-events: none;
            background: repeating-linear-gradient(

        }

        /* ── MOBILE BASE (default, all screens) ─────────────────────

         * Everything stacks vertically and scrolls naturally.
         * ──────────────────────────────────────────────────────────── */
        body {
            background: #000; color: #33ff33;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: 11px; line-height: 1.6;
            padding: 8px; max-width: 1200px; margin: 0 auto;
            overflow-x: hidden; /* prevent horizontal scroll from oversized art */
        }

        header { text-align: center; padding-bottom: 8px; }
        h1 { font-size: 13px; color: #33ff33; text-shadow: 0 0 8px #33ff33; margin-bottom: 4px; }
        .subtitle { font-size: 8px; color: #226622; }

        #scene-name {
            font-size: 12px; text-align: center; color: #ffff33;
            text-transform: uppercase; letter-spacing: 1px; padding: 6px 0;
        }

        /* Art panel: fills width, keeps 8:5 (640×400) aspect ratio.
         * max-height: 56vw = ~210px on a 375px phone — art is clear but
         * leaves plenty of room below for text and controls. */
        .art-panel {
            width: 100%; aspect-ratio: 8 / 5; max-height: 56vw;
            border: 2px solid #33ff33; background: #111;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        #art-display { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #art-display svg, #art-display img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
        .no-art { color: #226622; font-size: 9px; text-align: center; }

        /* Text panel: plain block on mobile, no fixed height */
        .text-panel {
            border: 2px solid #33ff33; background: #111;
            padding: 10px; margin-top: 8px;
        }

        /* Story text: scrollable, capped so it doesn't swallow the whole screen */
        #text-display {
            overflow-y: auto; max-height: 40vh;
            border-bottom: 1px solid #226622; padding-bottom: 8px; margin-bottom: 8px;
        }
        #text-display p { margin-bottom: 8px; }
        #text-display .system  { color: #33bbff; font-style: italic; }
        #text-display .success { color: #ffff33; font-weight: bold; }
        #text-display .locked  { color: #ff3333; }
        #text-display .error   { color: #ff5555; }
        .look-target { color: #ffff33; text-decoration: underline; cursor: pointer; }
        .look-target:hover { color: #ffcc00; }

        /* Command buttons: wrapping row, 44px tap targets */
        .command-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
        .cmd-btn {
            background: #000; color: #33ff33; border: 1px solid #33ff33;
            padding: 10px 14px; min-height: 44px; min-width: 44px; flex: 1;
            font-family: 'Press Start 2P', monospace; font-size: 9px; cursor: pointer;
        }
        .cmd-btn:hover, .cmd-btn.active { background: #33ff33; color: #000; }
        #hint-toggle { flex: 0 0 auto; }

        /* Inventory */
        .inventory-panel { border: 1px solid #226622; background: #000; padding: 8px; margin-bottom: 8px; }
        .inventory-panel h3 { font-size: 8px; color: #ffff33; margin-bottom: 6px; }
        #inventory-bar { display: flex; flex-wrap: wrap; gap: 6px; min-height: 18px; }
        #inv-empty { color: #226622; font-size: 9px; }
        .inv-item {
            border: 1px solid #33ff33; padding: 8px 10px; min-height: 36px;
            font-family: inherit; font-size: 9px; cursor: pointer; background: #000; color: #33ff33;
        }
        .inv-item:hover, .inv-item.selected { background: #33ff33; color: #000; }

        /* Exits */
        .exits-panel { border: 1px solid #226622; background: #000; padding: 8px; }
        .exits-panel h3 { font-size: 8px; color: #ffff33; margin-bottom: 6px; }
        #exits-bar { display: flex; flex-wrap: wrap; gap: 6px; }
        .exit-btn {
            background: #000; color: #33ff33; border: 1px solid #33ff33;
            padding: 10px 14px; min-height: 44px; min-width: 44px;
            font-family: 'Press Start 2P', monospace; font-size: 9px; cursor: pointer;
        }
        .exit-btn.available:hover { background: #33ff33; color: #000; }
        .exit-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .hint { color: #FFAA00 !important; font-style: italic; border-left: 2px solid #FFAA00; padding-left: 8px; margin: 5px 0; }
        .hint::before { content: "HINT: "; font-weight: bold; }

        footer { margin-top: 8px; text-align: center; font-size: 7px; color: #113311; padding: 8px 0; }

        /* Animations */
        @keyframes puzzle-solved {
            0%   { filter: brightness(1) drop-shadow(0 0 4px #ffff33); }
            50%  { filter: brightness(1.8) drop-shadow(0 0 20px #ffff33); }
            100% { filter: brightness(1) drop-shadow(0 0 4px #ffff33); }
        }
        @keyframes itemGlow {
            0%   { box-shadow: 0 0 4px #33ff33; }
            50%  { box-shadow: 0 0 16px #33ff33; }
            100% { box-shadow: 0 0 4px #33ff33; }
        }
        @keyframes unlockPulse {
            0%, 100% { border-color: #33ff33; }
            50% { border-color: #ffff33; box-shadow: 0 0 12px #ffff33; }
        }
        .puzzle-solved { animation: puzzle-solved 0.6s ease-out; }
        .item-new { animation: itemGlow 1s ease-in-out 3; }
        .newly-unlocked { animation: unlockPulse 1s ease 3; }

        /* ── DESKTOP (≥769px): side-by-side, fits 100vh ─────────────
         * Only here do we apply height:100vh + overflow:hidden.
         * Flex layout with min-height:0 so panels can shrink properly.
         * ──────────────────────────────────────────────────────────── */
        @media (min-width: 769px) {
            body {
                display: flex; flex-direction: column;
                height: 100vh; overflow: hidden;
                font-size: 12px; padding: 12px;
            }
            header { flex-shrink: 0; margin-bottom: 6px; }

            .subtitle { font-size: 9px; }

            .game-container {
                display: flex; flex: 1; gap: 12px;
                min-height: 0; /* CRITICAL: lets flex children shrink below content height */
            }
            .art-panel {
                flex: 3; aspect-ratio: unset; max-height: none; /* flex dictates height */

            }
            .text-panel {
                flex: 2; display: flex; flex-direction: column;
                overflow: hidden; margin-top: 0;
            }
            #text-display { flex: 1; max-height: none; overflow-y: auto; }
            .cmd-btn    { flex: 1; padding: 6px 10px; min-height: 36px; }
            .exit-btn   { padding: 6px 10px; min-height: 36px; }
            .inv-item   { padding: 4px 8px; min-height: 30px; }
            footer { flex-shrink: 0; }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .game-container { display: flex !important; flex-direction: row !important; }
            .art-panel { flex: 1; aspect-ratio: unset; max-height: none; }
            .text-panel { flex: 1; overflow-y: auto; }
            #text-display { max-height: 45vh; }
        }
    </style>

// ============================================================
// GAME ENGINE
// ============================================================
/**
 * THE HOLLOW OF SAINT VEX — Game Logic (v2 Fixed)
 * Fixed by Valerius — proper puzzle resolution with target validation
 */

const state = {
  currentScene: 'scene-1-entrance',
  inventory: [],
  solvedPuzzles: [],
  visitedScenes: ['scene-1-entrance'],
  activeCommand: null,
  selectedItem: null,
  won: false
};

const artDisplay = document.getElementById('art-display');
const sceneName = document.getElementById('scene-name');
const textDisplay = document.getElementById('text-display');
const invBar = document.getElementById('inventory-bar');
const exitsBar = document.getElementById('exits-bar');

function addText(text, cls = '') {
  const p = document.createElement('p');
  p.className = cls;
  p.innerHTML = text;
  textDisplay.appendChild(p);
  textDisplay.scrollTop = textDisplay.scrollHeight;
}

function clearText() { textDisplay.innerHTML = ''; }

// Find a puzzle in current scene that can be solved with the given item(s)
function findSolvablePuzzle(itemId) {
  return GAME_DATA.puzzles.find(p =>
    p.scene === state.currentScene &&
    !state.solvedPuzzles.includes(p.id) &&
    p.requires.includes(itemId) &&
    p.requires.every(req => state.inventory.includes(req))
  );
}

// Check if any puzzle blocks an exit from the current scene
function isExitBlocked(sceneId, direction) {
  return GAME_DATA.puzzles.some(p =>
    p.scene === sceneId &&
    p.blocksExit &&
    p.blocksExit.direction === direction &&
    !state.solvedPuzzles.includes(p.id)
  );
}

// Get the blocked message for an exit
function getBlockedMessage(sceneId, direction) {
  const puzzle = GAME_DATA.puzzles.find(p =>
    p.scene === sceneId &&
    p.blocksExit &&
    p.blocksExit.direction === direction &&
    !state.solvedPuzzles.includes(p.id)
  );
  return puzzle ? (puzzle.blocksExit.blockedMessage || 'Something blocks the way.') : '';
}

function renderScene(sceneId) {
  const scene = GAME_DATA.scenes.find(s => s.id === sceneId);
  if (!scene) { addText('ERROR: Scene not found!', 'error'); return; }

  state.currentScene = sceneId;
  if (!state.visitedScenes.includes(sceneId)) state.visitedScenes.push(sceneId);

  sceneName.textContent = scene.name.toUpperCase();

  if (window.GAME_ART && window.GAME_ART[sceneId]) {
    artDisplay.innerHTML = window.GAME_ART[sceneId];
  } else {
    artDisplay.innerHTML = `<span class="no-art">[ ${scene.name.toUpperCase()} ]</span>`;
  }

  clearText();
  addText(scene.prose);

  const availableItems = (scene.items || []).filter(itemId => !state.inventory.includes(itemId));
  if (availableItems.length > 0) {
    const itemLinks = availableItems.map(id => {
      const item = GAME_DATA.items.find(i => i.id === id);
      return `<span class="look-target" data-look="${id}">${item.name}</span>`;
    });
    addText('You notice: ' + itemLinks.join(', '), 'system');
  }

  if (scene.lookDescriptions) {
    addText('You can also examine: ' + Object.keys(scene.lookDescriptions).map(t => 
      `<span class="look-target" data-look="${t}">${t}</span>`
    ).join(', '), 'system');
  }

  renderExits(scene.exits || {});
  renderInventory();
  checkWin();
}

function renderExits(exits) {
  exitsBar.innerHTML = '';
  ['north', 'south', 'east', 'west'].forEach(dir => {
    const targetId = exits[dir];
    const blocked = targetId && isExitBlocked(state.currentScene, dir);
    const btn = document.createElement('button');
    btn.className = 'exit-btn' + (targetId && !blocked ? ' available' : '');
    btn.textContent = dir.toUpperCase();
    btn.disabled = !targetId || blocked;
    if (blocked) {
      btn.title = getBlockedMessage(state.currentScene, dir);
    }
    if (targetId && !blocked) {
      btn.onclick = () => { addText('---', 'system'); renderScene(targetId); };
    }
    exitsBar.appendChild(btn);
  });
}

function renderInventory() {
  const existing = invBar.querySelectorAll('.inv-item');
  existing.forEach(el => el.remove());
  const empty = document.getElementById('inv-empty');

  if (state.inventory.length === 0) {
    empty.style.display = '';
  } else {
    empty.style.display = 'none';
    state.inventory.forEach(itemId => {
      const item = GAME_DATA.items.find(i => i.id === itemId);
      if (!item) return;
      const el = document.createElement('span');
      el.className = 'inv-item' + (state.selectedItem === itemId ? ' selected' : '');
      el.textContent = item.name;
      el.onclick = () => selectItem(itemId);
      invBar.appendChild(el);
    });
  }
}

function selectItem(itemId) {
  state.selectedItem = (state.selectedItem === itemId) ? null : itemId;
  renderInventory();
  if (state.selectedItem) {
    const item = GAME_DATA.items.find(i => i.id === itemId);
    addText(`Selected: ${item.name}. Ready to USE.`, 'system');
  }
}

function handleCommand(cmd) {
  state.activeCommand = cmd;
  document.querySelectorAll('.cmd-btn').forEach(b => b.classList.toggle('active', b.dataset.cmd === cmd));
  
  if (cmd === 'take') {
    const scene = GAME_DATA.scenes.find(s => s.id === state.currentScene);
    const available = (scene.items || []).filter(id => !state.inventory.includes(id));
    if (available.length > 0) {
      available.forEach(id => {
        if (!state.inventory.includes(id)) {
          state.inventory.push(id);
          const item = GAME_DATA.items.find(i => i.id === id);
          addText(`Taken: ${item.name}`, 'success');
        }
      });
      renderInventory();
      renderScene(state.currentScene)
// Reset button handler
document.getElementById('reset-btn').addEventListener('click', function() {
    if (confirm('Reset the game to the beginning?')) {
        state.currentScene = GAME_DATA.scenes[0].id;
        state.inventory = [];
        state.solvedPuzzles = [];
        state.visitedScenes = [state.currentScene];
        state.activeCommand = null;
        state.selectedItem = null;
        state.won = false;
        clearText();
        addText('The story begins anew...', 'system');
        renderScene(state.currentScene);
        renderInventory();
    }
});
;
    } else {
      addText('Nothing here to take.', 'system');
    }
  } else if (cmd === 'use') {
    if (state.inventory.length > 0) {
      addText('Select an item from inventory, then click a target in the scene.', 'system');
    } else {
      addText('You have nothing to use.', 'system');
    }
  }
}

function lookAt(target) {
  const scene = GAME_DATA.scenes.find(s => s.id === state.currentScene);
  if (scene.lookDescriptions && scene.lookDescriptions[target]) {
    addText(scene.lookDescriptions[target]);
  } else {
    const item = GAME_DATA.items.find(i => i.id === target || i.name.toLowerCase() === target.toLowerCase());
    if (item) addText(item.description);
    else addText("You don't see anything special about that.");
  }
}

// Main use handler — called when player clicks a look-target while in USE mode
function useItemOn(targetId) {
  if (!state.selectedItem) {
    addText('Select an item from your inventory first.', 'system');
    return;
  }

  const item = GAME_DATA.items.find(i => i.id === state.selectedItem);
  const puzzle = findSolvablePuzzle(state.selectedItem);

  if (puzzle) {
    // Special handling for the bell puzzle (requires all bells + book)
    if (puzzle.id === 'puzzle-ring-bells') {
      if (puzzle.requires.every(req => state.inventory.includes(req))) {
        state.solvedPuzzles.push(puzzle.id);
        addText(puzzle.result, 'success');
      } else {
        addText("You have some of the bells, but the ritual requires the full set and the book.", 'system');
        return;
      }
    } else {
      state.solvedPuzzles.push(puzzle.id);
      addText(puzzle.result, 'success');

      // Reveal items or scenes
      (puzzle.reveals || []).forEach(rid => {
        const revealItem = GAME_DATA.items.find(i => i.id === rid);
        if (revealItem && !state.inventory.includes(rid)) {
          state.inventory.push(rid);
          addText(`You found: ${revealItem.name}`, 'success');
        }
      });
    }
    renderScene(state.currentScene);
  } else {
    // No matching puzzle — show description of what they clicked
    addText(`Using ${item.name} here doesn't seem to work.`, 'system');
    lookAt(targetId);
  }
}

function checkWin() {
  const wc = GAME_DATA.winCondition;
  if (state.currentScene === wc.scene && 
      wc.requires.every(r => state.inventory.includes(r)) && 
      state.solvedPuzzles.includes('puzzle-ring-bells')) {
    state.won = true;
    addText('*** ' + wc.description + ' ***', 'success');
  }
}

// Command buttons
document.querySelectorAll('.cmd-btn').forEach(btn => btn.onclick = () => handleCommand(btn.dataset.cmd));

// Click handler for look-targets
document.addEventListener('click', (e) => {
  if (e.target.classList.contains('look-target')) {
    const target = e.target.dataset.look;
    if (state.activeCommand === 'use' && state.selectedItem) {
      useItemOn(target);
    } else {
      lookAt(target);
    }
  }
});

function init() {
  addText(`=== ${GAME_DATA.title.toUpperCase()} ===`, 'success');
  renderScene('scene-1-entrance');
}

window.onload = init;

</script>
