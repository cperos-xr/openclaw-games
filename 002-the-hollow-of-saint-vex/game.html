<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }

    background: repeating-linear-gradient(

    pointer-events: none;
  }

  .container {
    max-width: 720px; margin: 0 auto; padding: 32px 16px;
  }

  #art-display {
    border: 2px solid #33ff33;
    margin-bottom: 20px;
    background: #000;
    min-height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #art-display svg, #art-display img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  #scene-name {
    font-size: 16px;
    text-align: center;
    margin-bottom: 10px;
    color: #ffff33;
    text-shadow: 0 0 10px rgba(255,255,51,0.5);
  }

  #text-display {
    border: 1px solid #226622;
    padding: 16px;
    margin-bottom: 20px;
    background: rgba(0,20,0,0.7);
    min-height: 200px;
    max-height: 300px;
    overflow-y: auto;
  }

  #text-display p {
    margin-bottom: 8px;
  }

  .system { color: #66ff66; }
  .success { color: #ffff33; }
  .error { color: #ff3333; }

  .look-target {
    color: #ff9933;
    cursor: pointer;
    text-decoration: underline;
  }

  .look-target:hover {
    color: #ffcc33;
  }

  #inventory-bar {
    border: 1px solid #33ff33;
    padding: 10px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 40px;
  }

  .inv-item {
    border: 1px solid #33ff33;
    padding: 4px 8px;
    cursor: pointer;
  }

  .inv-item.selected {
    background: #33ff33;
    color: #000;
  }

  #inv-empty {
    color: #226622;
  }

  #exits-bar {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .exit-btn {
    border: 2px solid #33ff33;
    background: #000;
    color: #33ff33;
    padding: 8px 16px;
    cursor: pointer;
    font-family: 'Press Start 2P', monospace;
  }

  .exit-btn.available:hover {
    background: #33ff33;
    color: #000;
  }

  .exit-btn:disabled {
    border-color: #226622;
    color: #226622;
    cursor: not-allowed;
  }

  .commands {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .cmd-btn {
    border: 2px solid #33ff33;
    background: #000;
    color: #33ff33;
    padding: 10px 20px;
    cursor: pointer;
    font-family: 'Press Start 2P', monospace;
  }

  .cmd-btn.active {
    background: #33ff33;
    color: #000;
  }

  /* Puzzle animations */
  @keyframes puzzle-solved {
    0% { filter: brightness(1); }
    50% { filter: brightness(2); }
    100% { filter: brightness(1); }
  }

  @keyframes unlockPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  @keyframes itemGlow {
    0% { box-shadow: 0 0 5px #33ff33; }
    50% { box-shadow: 0 0 20px #33ff33; }
    100% { box-shadow: 0 0 5px #33ff33; }
  }

  .puzzle-solved {
    animation: puzzle-solved 0.6s ease;
  }

  .item-new {
    animation: unlockPulse 1s ease 3;
  }

  .inv-item.selected {
    animation: itemGlow 1s infinite;
  }

  .no-art {
    color: #226622;
    font-style: italic;
  }

  .hint {
    color: #FFAA00 !important;
    font-style: italic;
    border-left: 2px solid #FFAA00;
    padding-left: 8px;
    margin: 5px 0;
  }
  .hint::before {
    content: "🤔 HINT: ";
    font-weight: bold;
  }
  #hint-toggle {
    background: #000;
    color: #33ff33;
    border: 1px solid #33ff33;
    padding: 5px 10px;
    cursor: pointer;
    font-family: 'Press Start 2P', 'Courier New', monospace;
    margin-left: 10px;
  }

  footer {
    text-align: center;
    color: #113311;
    font-size: 8px;
    margin-top: 48px;
    padding-bottom: 16px;
  }
</style>

const GAME_DATA = {"title":"The Hollow of Saint Vex","slug":"the-hollow-of-saint-vex","number":2,"setting":"Abandoned Victorian mine-temple, Colorado Rockies, 1891","characters":[{"id":"char-ezekiel-vex","name":"Ezekiel Vex","description":"Founder of the Vex Mining Company. Converted the tunnels into a temple to worship an ancient entity called Saint Vex. Died under mysterious circumstances."},{"id":"char-saint-vex","name":"Saint Vex","description":"An ancient entity unearthed by the miners. Worshipped as a saint by Ezekiel Vex. Its presence corrupts the hollow."}],"items":[{"id":"item-pickaxe","name":"Pickaxe","description":"A miner's tool with a worn wooden handle. The head is dull but still serviceable.","foundIn":"scene-1-entrance","usedIn":"scene-1-entrance","usedOn":"puzzle-clear-collapse"},{"id":"item-lantern","name":"Oil Lantern","description":"A brass lantern, unlit. The glass is grimy, the wick dry.","foundIn":"scene-2-supply-tunnel","usedIn":"scene-2-supply-tunnel","usedOn":"puzzle-light-lantern"},{"id":"item-matches","name":"Matches","description":"A small box of sulfur matches. Strikes with a satisfying hiss.","foundIn":"scene-2-supply-tunnel","usedIn":"scene-2-supply-tunnel","usedOn":"puzzle-light-lantern"},{"id":"item-crowbar","name":"Crowbar","description":"A heavy iron crowbar, rusted but sturdy.","foundIn":"scene-4-chapel-antechamber","usedIn":"scene-3-equipment-room","usedOn":"puzzle-open-crate"},{"id":"item-ritual-book","name":"Ritual Book","description":"A leather-bound journal filled with occult diagrams and Latin incantations. Pages are water-stained.","foundIn":"scene-5-flooded-nave","usedIn":"scene-7-reliquary","usedOn":"puzzle-ring-bells"},{"id":"item-bell-saint-vex","name":"Bell of Saint Vex","description":"A small silver bell engraved with the name 'VEX'. It chimes with a hollow resonance.","foundIn":"scene-4-chapel-antechamber","usedIn":"scene-7-reliquary","usedOn":"puzzle-ring-bells"},{"id":"item-bell-hollow","name":"Bell of the Hollow","description":"A tarnished silver bell marked with a spiral symbol. Its sound is deep and mournful.","foundIn":"scene-3-equipment-room","usedIn":"scene-7-reliquary","usedOn":"puzzle-ring-bells"},{"id":"item-bell-bone","name":"Bell of Bone","description":"A silver bell etched with skeletal motifs. It rings with a brittle, sharp tone.","foundIn":"scene-6-bell-tower","usedIn":"scene-7-reliquary","usedOn":"puzzle-ring-bells"},{"id":"item-bell-mercy","name":"Bell of Mercy","description":"A pristine silver bell inscribed with the word 'MISERICORDIA'. Its chime is clear and pure.","foundIn":"scene-7-reliquary","usedIn":"scene-7-reliquary","usedOn":"puzzle-ring-bells"}],"scenes":[{"id":"scene-1-entrance","name":"The Collapsed Entrance","prose":"The Vex Mining Company entrance, 1891. Rotting timber braces frame a dark maw in the mountainside. A sign, splintered and faded, reads 'CONDEMNED - BY ORDER OF TELLER COUNTY.' Cold wind whistles from the blackness within, carrying a scent of damp earth and something older—ozone and rust.\n\nRusted mine cart tracks disappear into the shadow. To the north, a passage is choked with fallen rock and timber. A pickaxe is wedged into a support beam, its handle worn smooth by decades of grip. The mountain looms above, silent and watchful.","exits":{"north":"scene-2-supply-tunnel"},"items":["item-pickaxe"],"puzzles":["puzzle-clear-collapse"],"lookDescriptions":{"sign":"The county seal is barely legible. Below it, someone has scratched 'HE LISTENS' in the wood.","tracks":"They lead into darkness, speckled with orange rust like dried blood.","collapsed passage":"A cave-in blocks the way north. Stones and splintered beams form an impassable wall.","pickaxe":"A miner's tool, left behind. The head is dull but could still break stone.","mountainside":"Pine trees cling to the slopes. The sky is iron-grey, threatening snow."}},{"id":"scene-2-supply-tunnel","name":"The Supply Tunnel","prose":"Darkness swallows the tunnel ahead. The air is thick with dust and the smell of old timber. On the wall, mining graffiti repeats 'HE LISTENS' in shaky white paint. A crate sits against the wall, holding an unlit oil lantern and a coil of frayed rope. Beside the crate, a small box of sulfur matches lies half-buried in coal dust.\n\nThe passage continues east into utter blackness. To the south, the entrance is a rectangle of grey light. The floor is scattered with broken bottles and rusted nails.","exits":{"south":"scene-1-entrance","east":"scene-3-equipment-room"},"items":["item-lantern","item-matches"],"puzzles":["puzzle-light-lantern"],"lookDescriptions":{"graffiti":"The words are painted with a hurried hand. Beneath them, smaller script reads 'VEX VIVIT'.","crate":"A wooden supply crate, lid half-off. Inside: the lantern, rope, and a layer of coal dust.","lantern":"A brass lantern, cold and dark. The wick is dry. Those matches beside it might help.","floor":"Littered with debris. Something glints beneath the dust—a broken pocket watch.","darkness east":"The tunnel disappears into black. Without light, you'd be walking blind.","matches":"A small box of sulfur matches, surprisingly dry despite the humidity."}},{"id":"scene-3-equipment-room","name":"The Equipment Room","prose":"This chamber was once a hive of activity, now a graveyard of industry. Rusted machinery stands like skeletal husks against the walls. A heavy workbench is covered in blueprints that have turned to mush from the humidity. In the corner, a reinforced wooden crate is bolted to the floor, its iron padlock mocking your intrusion.\n\nThe air here is stagnant. A doorway to the north leads toward a flickering, rhythmic orange glow.","exits":{"west":"scene-2-supply-tunnel","north":"scene-4-chapel-antechamber"},"items":["item-bell-hollow"],"puzzles":["puzzle-open-crate"],"lookDescriptions":{"machinery":"Gears and pulleys frozen in place by decades of rust. They look like they might scream if turned.","workbench":"The blueprints are illegible, but you can make out the name 'Ezekiel Vex' signed in elegant, mad script.","crate":"A stout box bound in iron. It's locked tight. If only you had some leverage.","glow":"A faint, orange light pulses from the north, accompanied by a low, vibrating hum."}},{"id":"scene-4-chapel-antechamber","name":"The Chapel Antechamber","prose":"The industrial mine gives way to something far more sinister. The walls have been smoothed and carved with intricate, disturbing sigils. A low stone altar sits in the center, surrounded by hundreds of half-melted candles. The air carries the sickly-sweet scent of incense and old copper.\n\nA heavy iron crowbar leans against a crumbling pillar. In the eastern wall, a loose stone seems to vibrate slightly with a hollow frequency.","exits":{"south":"scene-3-equipment-room","east":"scene-5-flooded-nave"},"items":["item-crowbar","item-bell-saint-vex"],"lookDescriptions":{"sigils":"They hurt to look at. Spirals that seem to turn when you blink, and eyes that follow your movement.","altar":"Dried dark stains mar the surface. It wasn't built for prayer—it was built for payment.","crowbar":"A sturdy tool of forged iron. Perfect for prying or smashing.","loose stone":"Wiggling it reveals a hidden niche behind the masonry. Something silver glints within."},"puzzles":[]},{"id":"scene-5-flooded-nave","name":"The Flooded Nave","prose":"You step into a vast, cavernous hall. Ankle-deep black water covers the floor, rippling with your every step. Stone pillars rise like trees into the vaulted ceiling, where stalactites hang like jagged teeth. At the far end, a grand stone lectern stands on a raised dais, dry and untouched by the flood.\n\nThe silence here is absolute, broken only by the steady 'drip... drip... drip' of water from the heights.","exits":{"west":"scene-4-chapel-antechamber","north":"scene-6-bell-tower"},"items":["item-ritual-book"],"lookDescriptions":{"water":"Oily and opaque. You can feel things brushing against your ankles, but you're too afraid to look down.","lectern":"A massive block of obsidian carved with weeping faces. A leather-bound book rests upon it.","ceiling":"The vault is shrouded in shadow. You get the distinct feeling that something is hanging up there, watching.","ripples":"The ripples from your feet travel across the room and don't stop when they hit the walls—they seem to sink into them."},"puzzles":["puzzle-read-book"]},{"id":"scene-6-bell-tower","name":"The Bell Tower","prose":"The mine opens into a natural chimney-like cavern that vents toward the surface. A bronze framework has been erected here, spanning the chasm. Hanging from the center of the frame is a single, beautiful silver bell. Moonlight filters down from a narrow crack high above, illuminating the dust motes like dancing spirits.\n\nA narrow bridge of planks leads east toward a chamber of intense, suffocating pressure.","exits":{"south":"scene-5-flooded-nave","east":"scene-7-reliquary"},"items":["item-bell-bone"],"lookDescriptions":{"frame":"Victorian engineering repurposed for ritual. The bronze is green with age but the structure is sound.","bell":"It hangs perfectly still, yet you can hear a faint ringing in the back of your skull just by looking at it.","moonlight":"A column of pale blue light that feels cold to the touch. It's the only clean thing in this mountain.","chasm":"The darkness below the bridge is bottomless. Don't slip."},"puzzles":[]},{"id":"scene-7-reliquary","name":"The Reliquary","prose":"This is the heart of the hollow. The walls are lined with shelves containing jars of preserved organs and jars of mountain soil. In the center, a circle of white salt has been laid out on the floor, surrounding a second, much larger altar. The presence of Saint Vex is heavy here, a weight on your chest that makes it hard to breathe.\n\nA final silver bell sits on a velvet cushion atop a stone pedestal. This is where the song must end.","exits":{"west":"scene-6-bell-tower"},"items":["item-bell-mercy"],"lookDescriptions":{"shelves":"Relics of the Vex family's madness. Each jar is meticulously labeled with a date and a name.","salt circle":"Untouched and perfect. It's meant to keep something in... or you out.","altar":"Carved from a single block of mountain granite. It vibrates with a frequency that makes your teeth ache.","pedestal":"The bell resting here seems to absorb the very light around it."},"puzzles":["puzzle-ring-bells"]}],"puzzles":[{"id":"puzzle-clear-collapse","scene":"scene-1-entrance","requires":["item-pickaxe"],"action":"Use pickaxe on collapsed passage","result":"You swing the pickaxe with desperate strength. The timbers groan and the stones tumble, revealing the way forward.","blocksExit":{"scene":"scene-1-entrance","direction":"north","blockedMessage":"The passage is choked with fallen rock and timber."},"reveals":["scene-2-supply-tunnel"]},{"id":"puzzle-open-crate","scene":"scene-3-equipment-room","requires":["item-crowbar"],"action":"Use crowbar on locked crate","result":"With a screech of protesting iron, the lid flies off. You find supplies tucked away for a ritual that never happened.","reveals":["item-bell-hollow"]},{"id":"puzzle-light-lantern","scene":"scene-2-supply-tunnel","requires":["item-matches","item-lantern"],"action":"Use matches on lantern","result":"A flare of sulfur, a steady flame. The golden light pushes back the oppressive shadows of the maze.","blocksExit":{"scene":"scene-2-supply-tunnel","direction":"east","blockedMessage":"The tunnel disappears into black. Without light, you'd be walking blind."},"reveals":[]},{"id":"puzzle-read-book","scene":"scene-5-flooded-nave","requires":["item-lantern"],"action":"Read ritual book with illuminated lantern","result":"The light reveals the hidden ink. The order is clear: 'Mercy shall lead, followed by Bone. Vex must follow, and the Hollow shall close.'","reveals":[]},{"id":"puzzle-ring-bells","scene":"scene-7-reliquary","requires":["item-bell-mercy","item-bell-bone","item-bell-saint-vex","item-bell-hollow","item-ritual-book"],"action":"Ring the bells in the order: Mercy, Bone, Saint Vex, Hollow","result":"The four notes entwine into a powerful harmonic. The air shimmers, and the oppressive weight lifts.","reveals":[]}],"winCondition":{"scene":"scene-7-reliquary","requires":["item-bell-mercy","item-bell-bone","item-bell-saint-vex","item-bell-hollow"],"description":"The song of the silver bells echoes through the mountain. A scream that is not human erupts from the altar as Saint Vex is pulled back into the void. You run for the surface as the mine begins to tremble and collapse. You emerge into the cold mountain air just as the entrance vanishes under a mountain of stone. The hollow is sealed."},"hints":{"scene-1-entrance":[{"delay":30,"text":"That pickaxe isn't just for decoration. It might clear a path."},{"delay":60,"text":"USE the pickaxe on the collapsed passage. The way north is blocked."},{"delay":90,"text":"USE → Pickaxe → Collapsed Passage. Swing that thing already."}],"scene-2-supply-tunnel":[{"delay":30,"text":"The lantern is dark. You need something to light it."},{"delay":60,"text":"Find matches elsewhere. Then USE matches on lantern."},{"delay":90,"text":"Matches are in the Equipment Room. USE matches → lantern."}],"scene-3-equipment-room":[{"delay":30,"text":"That crate is locked tight. You need leverage."},{"delay":60,"text":"Maybe a crowbar could pry it open. Look elsewhere."},{"delay":90,"text":"Crowbar is in the Chapel Antechamber. USE crowbar → crate."}],"scene-4-chapel-antechamber":[{"delay":30,"text":"Take the crowbar. It's leaning there for a reason."},{"delay":60,"text":"Click TAKE, then click the crowbar. Don't be shy."},{"delay":90,"text":"TAKE → Crowbar. Now go pry something open."}],"scene-5-flooded-nave":[{"delay":30,"text":"The book is water-stained. You'll need light to read it."},{"delay":60,"text":"USE the lantern on the book. You have a lantern, right?"},{"delay":90,"text":"USE → Lantern → Ritual Book. It'll reveal the bell order."}],"scene-6-bell-tower":[{"delay":30,"text":"Take the bell. It's silver and etched with bones."},{"delay":60,"text":"TAKE the Bell of Bone. It's hanging right there."},{"delay":90,"text":"Click TAKE, then click the Bell of Bone. Yes, that one."}],"scene-7-reliquary":[{"delay":30,"text":"Four bells, one order. The book said something about Mercy first."},{"delay":60,"text":"Ring the bells: Mercy, Bone, Saint Vex, Hollow. In that order."},{"delay":90,"text":"USE each bell in sequence: Mercy, Bone, Saint Vex, Hollow. Then get out."}]}};

"item-bell-hollow": "<svg width=\"64\" height=\"64\" viewBox=\"0 0 64 64\" xmlns=\"http://www.w3.org/2000/svg\">\n  <ellipse cx=\"32\" cy=\"30\" rx=\"18\" ry=\"22\" fill=\"#C0C0C0\" stroke=\"#000000\" stroke-width=\"2\"/>\n  <rect x=\"28\" y=\"10\" width=\"8\" height=\"12\" fill=\"#C0C0C0\" stroke=\"#000000\" stroke-width=\"2\"/>\n  <ellipse cx=\"32\" cy=\"12\" rx=\"6\" ry=\"4\" fill=\"#C0C0C0\" stroke=\"#000000\" stroke-width=\"2\"/>\n  <path d=\"M32,28 Q30,26 28,26 Q26,28 26,30 Q28,32 30,32 Q32,30 34,30 Q36,32 34,34 Q32,36 30,36\" fill=\"none\" stroke=\"#000000\" stroke-width=\"1\"/>\n  <path d=\"M20,20 Q25,15 30,20 Q35,25 30,30 Q25,35 20,30 Q15,25 20,20 Z\" fill=\"#808080\" opacity=\"0.3\" stroke=\"#000000\" stroke-width=\"1\" stroke-dasharray=\"1,1\"/>\n  <path d=\"M32,52 Q24,50 32,48\" stroke=\"#FFFFFF\" stroke-width=\"1\" fill=\"none\" opacity=\"0.5\"/>\n  <path d=\"M32,52 Q40,50 32,48\" stroke=\"#FFFFFF\" stroke-width=\"1\" fill=\"none\" opacity=\"0.5\"/>\n</svg>",
"item-bell-bone": "<svg width=\"64\" height=\"64\" viewBox=\"0 0 64 64\" xmlns=\"http://www.w3.org/2000/svg\">\n  <ellipse cx=\"32\" cy=\"30\" rx=\"18\" ry=\"22\" fill=\"#C0C0C0\" stroke=\"#000000\" stroke-width=\"2\"/>\n  <rect x=\"28\" y=\"10\" width=\"8\" height=\"12\" fill=\"#C0C0C0\" stroke=\"#000000\" stroke-width=\"2\"/>\n  <ellipse cx=\"32\" cy=\"12\" rx=\"6\" ry=\"4\" fill=\"#C0C0C0\" stroke=\"#000000\" stroke-width=\"2\"/>\n  <path d=\"M24,24 L26,20 L28,24 L30,20 L32,24 L34,20 L36,24 L38,20 L40,24\" stroke=\"#000000\" stroke-width=\"1\" fill=\"none\"/>\n  <path d=\"M32,52 Q28,48 32,44\" stroke=\"#FFFFFF\" stroke-width=\"1\" fill=\"none\"/>\n  <path d=\"M32,52 Q36,48 32,44\" stroke=\"#FFFFFF\" stroke-width=\"1\" fill=\"none\"/>\n</svg>",
"item-bell-mercy": "<svg width=\"64\" height=\"64\" viewBox=\"0 0 64 64\" xmlns=\"http://www.w3.org/2000/svg\">\n  <ellipse cx=\"32\" cy=\"30\" rx=\"18\" ry=\"22\" fill=\"#C0C0C0\" stroke=\"#000000\" stroke-width=\"2\"/>\n  <rect x=\"28\" y=\"10\" width=\"8\" height=\"12\" fill=\"#C0C0C0\" stroke=\"#000000\" stroke-width=\"2\"/>\n  <ellipse cx=\"32\" cy=\"12\" rx=\"6\" ry=\"4\" fill=\"#C0C0C0\" stroke=\"#000000\" stroke-width=\"2\"/>\n  <text x=\"32\" y=\"34\" text-anchor=\"middle\" fill=\"#000000\" font-size=\"6\" font-weight=\"bold\">MISERICORDIA</text>\n  <circle cx=\"32\" cy=\"50\" r=\"8\" fill=\"#FFFFFF\" stroke=\"#000000\" stroke-width=\"1\" opacity=\"0.5\"/>\n  <circle cx=\"32\" cy=\"50\" r=\"4\" fill=\"#FFFFFF\" stroke=\"#000000\" stroke-width=\"1\" opacity=\"0.7\"/>\n</svg>"
};
</script>
<script>
// game-logic.js
// Game: The Hollow of Saint Vex
// Author: Hex Corbin (Gameplay Coder)

// --- Game Data ---
// GAME_DATA is expected to be injected by the Game Assembler.
// If running standalone, ensure GAME_DATA is defined before this script.

// --- State ---
const state = {
  currentScene: 'scene-1-entrance',
  inventory: [],
  solvedPuzzles: [],
  visitedScenes: [],
  activeCommand: null,
  selectedItem: null,
  won: false,
  revealedItems: {},
  hintsEnabled: true,
  hintTimeouts: []
};

// --- DOM ---
const artDisplay = document.getElementById('art-display');
const sceneName = document.getElementById('scene-name');
const textDisplay = document.getElementById('text-display');
const invBar = document.getElementById('inventory-bar');
const exitsBar = document.getElementById('exits-bar');

// --- Helpers ---
const getItem = (id) => GAME_DATA.items.find(i => i.id === id);
const getScene = (id) => GAME_DATA.scenes.find(s => s.id === id);
const getPuzzle = (id) => GAME_DATA.puzzles.find(p => p.id === id);

// --- Hint System ---
function clearHintTimers() {
  state.hintTimeouts.forEach(timeout => clearTimeout(timeout));
  state.hintTimeouts = [];
}

function showHint(sceneId, index) {
  if (!state.hintsEnabled) return;
  const hints = GAME_DATA.hints && GAME_DATA.hints[sceneId];
  if (!hints || index >= hints.length) return;
  const hint = hints[index];
  addText(hint.text, 'hint');
}

function startHintTimer(sceneId) {
  clearHintTimers();
  const hints = GAME_DATA.hints && GAME_DATA.hints[sceneId];
  if (!hints || !state.hintsEnabled) return;
  hints.forEach((hint, idx) => {
    const timeout = setTimeout(() => showHint(sceneId, idx), hint.delay * 1000);
    state.hintTimeouts.push(timeout);
  });
}

function toggleHints() {
  state.hintsEnabled = !state.hintsEnabled;
  const btn = document.getElementById('hint-toggle');
  if (btn) btn.textContent = state.hintsEnabled ? 'HINTS: ON' : 'HINTS: OFF';
  if (!state.hintsEnabled) {
    clearHintTimers();
  } else {
    startHintTimer(state.currentScene);
  }
}

function addText(text, cls = '') {
  const p = document.createElement('p');
  p.className = cls;
  p.innerHTML = text;
  textDisplay.appendChild(p);
  textDisplay.scrollTop = textDisplay.scrollHeight;
}

function clearText() { textDisplay.innerHTML = ''; }

// --- Core Engine ---

function renderScene(sceneId) {
  const scene = getScene(sceneId);
  if (!scene) { addText('ERROR: Scene not found.', 'error'); return; }

  state.currentScene = sceneId;
  if (!state.visitedScenes.includes(sceneId)) state.visitedScenes.push(sceneId);

  // Hint timer
  clearHintTimers();
  startHintTimer(sceneId);

  sceneName.textContent = scene.name.toUpperCase();

  const artKey = sceneId.startsWith('scene-') ? sceneId : 'scene-' + sceneId; 
  let artHtml = null;
  if (typeof GAME_ART !== 'undefined' && GAME_ART[artKey]) { artHtml = GAME_ART[artKey]; }
  else if (window.GAME_ART && window.GAME_ART[artKey]) { artHtml = window.GAME_ART[artKey]; }
  
  if (artHtml) { artDisplay.innerHTML = artHtml; } else {
    artDisplay.innerHTML = `<span class="no-art">[ ${scene.name.toUpperCase()} ]</span>`;
  }

  clearText();

  let prose = scene.prose;
  if (scene.lookDescriptions) {
    const keys = Object.keys(scene.lookDescriptions).sort((a, b) => b.length - a.length);
    keys.forEach(key => {
      const regex = new RegExp(`\\b(${key})\\b`, 'gi');
      prose = prose.replace(regex, `<span class="look-target" data-look="${key}">$1</span>`);
    });
  }
  addText(prose);

  const hiddenByPuzzle = new Set();
  (scene.puzzles || []).forEach(pid => {
    const p = getPuzzle(pid);
    if (p && !state.solvedPuzzles.includes(p.id) && p.reveals) {
      p.reveals.forEach(id => hiddenByPuzzle.add(id));
    }
  });

  const dynamicItems = (state.revealedItems[sceneId] || [])
    .filter(id => !state.inventory.includes(id) && !hiddenByPuzzle.has(id));

  const staticItems = (scene.items || [])
    .filter(id => !state.inventory.includes(id) && !hiddenByPuzzle.has(id));

  const availableItems = [...new Set([...staticItems, ...dynamicItems])];

  if (availableItems.length > 0) {
    const itemLinks = availableItems.map(id => {
      const item = getItem(id);
      return item ? `<span class="look-target" data-look="${id}">${item.name}</span>` : id;
    });
    addText('You see: ' + itemLinks.join(', '), 'system');
  }

  // Show clickable examinable objects
  if (scene.lookDescriptions) {
    const lookKeys = Object.keys(scene.lookDescriptions);
    if (lookKeys.length > 0) {
      const lookLinks = lookKeys.map(key =>
        `<span class="look-target" data-look="${key}">${key}</span>`
      );
      addText('Examine: ' + lookLinks.join(' · '), 'system');
    }
  }

  renderExits(scene.exits || {});
  renderInventory();
  checkWin();
  saveState();
}

function renderExits(exits) {
  exitsBar.innerHTML = '';
  const dirs = ['north', 'south', 'east', 'west'];
  dirs.forEach(dir => {
    if (!exits[dir]) return;
    
    const btn = document.createElement('button');
    btn.className = 'exit-btn';
    btn.textContent = dir.toUpperCase();
    
    if (canExit(state.currentScene, dir)) {
      btn.classList.add('available');
      btn.onclick = () => go(exits[dir]);
    } else {
      btn.disabled = true;
      const blocker = GAME_DATA.puzzles.find(p => 
        p.blocksExit?.scene === state.currentScene && 
        p.blocksExit?.direction === dir &&
        !state.solvedPuzzles.includes(p.id)
      );
      if (blocker) {
        btn.title = blocker.blockedMessage || "Blocked";
        if (blocker.requires.every(id => state.inventory.includes(id))) {
          addText('[HINT] You have what you need! USE the right item on the blocked passage to clear it.', 'success');
        }
      }
    }
    exitsBar.appendChild(btn);
  });
}

function canExit(sceneId, direction) {
  const blocker = GAME_DATA.puzzles.find(p => 
    p.blocksExit?.scene === sceneId && 
    p.blocksExit?.direction === direction &&
    !state.solvedPuzzles.includes(p.id)
  );
  return !blocker;
}

function renderInventory() {
  const items = invBar.querySelectorAll('.inv-item');
  items.forEach(el => el.remove());
  const empty = document.getElementById('inv-empty');

  if (state.inventory.length === 0) {
    empty.style.display = '';
  } else {
    empty.style.display = 'none';
    state.inventory.forEach(id => {
      const item = getItem(id);
      if (!item) return;
      const el = document.createElement('span');
      el.className = 'inv-item' + (state.selectedItem === id ? ' selected' : '');
      el.textContent = item.name;
      el.onclick = () => selectItem(id);
      invBar.appendChild(el);
    });
  }
}

function setCommand(cmd) {
  state.activeCommand = cmd;
  document.querySelectorAll('.cmd-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cmd === cmd);
  });
  
  if (cmd === 'look') {
    const scene = getScene(state.currentScene);
    if (scene.lookDescriptions) {
      addText('You can examine: ' + Object.keys(scene.lookDescriptions).join(', '), 'system');
    }
  } else if (cmd === 'take') {
    const scene = getScene(state.currentScene);
    const dynamic = state.revealedItems[state.currentScene] || [];
    const avail = [...new Set([...(scene.items||[]), ...dynamic])].filter(id => !state.inventory.includes(id));
    avail.forEach(takeItem);
    if (avail.length === 0) addText("Nothing to take.", 'system');
  } else if (cmd === 'use') {
    if (state.inventory.length > 0) {
      addText('1. Click an item in your inventory to select it.', 'system');
      addText('2. Then click a highlighted object in the scene text to use it.', 'system');
    }
    else addText('You have nothing to use.', 'system');
  }
}

function selectItem(id) {
  state.selectedItem = state.selectedItem === id ? null : id;
  renderInventory();
  if (state.selectedItem) {
    addText(`Selected: ${getItem(id).name}`, 'system');
  }
}

function takeItem(id) {
  if (state.inventory.includes(id)) return;
  
  const scene = getScene(state.currentScene);
  const dynamic = state.revealedItems[state.currentScene] || [];
  const avail = [...new Set([...(scene.items||[]), ...dynamic])];
  if (!avail.includes(id)) return;

  state.inventory.push(id);
  addText(`Taken: ${getItem(id).name}`, 'success');
  renderInventory();
  saveState();
}

function lookAt(target) {
  const scene = getScene(state.currentScene);
  if (scene.lookDescriptions && scene.lookDescriptions[target]) {
    addText(scene.lookDescriptions[target]);
    return;
  }
  const item = getItem(target);
  if (item) {
    addText(item.description);
    return;
  }
  addText('Nothing interesting about that.', 'system');
}

function useItemOn(itemId, targetId) {
  const candidates = GAME_DATA.puzzles.filter(p => 
    p.scene === state.currentScene && 
    !state.solvedPuzzles.includes(p.id) &&
    p.requires.includes(itemId)
  );

  const puzzle = candidates.find(p => 
    p.requires.every(req => state.inventory.includes(req)) &&
    (p.requires.includes(targetId) || p.scene === state.currentScene)
  );

  if (puzzle) {
    solvePuzzle(puzzle);
  } else {
    addText("That doesn't work here.", 'system');
  }
}

function solvePuzzle(puzzle) {
  state.solvedPuzzles.push(puzzle.id);
  addText(puzzle.result, 'success');
  
  artDisplay.classList.add('puzzle-solved');
  setTimeout(() => artDisplay.classList.remove('puzzle-solved'), 600);

  if (puzzle.reveals) {
    puzzle.reveals.forEach(id => {
      if (getItem(id)) {
        if (!state.revealedItems[state.currentScene]) state.revealedItems[state.currentScene] = [];
        if (!state.revealedItems[state.currentScene].includes(id)) {
           state.revealedItems[state.currentScene].push(id);
           addText(`Something has been revealed: <span class="look-target item-new" data-look="${id}">${getItem(id).name}</span>`, 'success');
        }
      }
    });
  }

  renderScene(state.currentScene);
  checkWin();
  saveState();
}

function go(sceneId) {
  addText('---', 'system');
  renderScene(sceneId);
}

function checkWin() {
  if (state.won) return;
  const wc = GAME_DATA.winCondition;
  if (state.currentScene === wc.scene && wc.requires.every(id => state.inventory.includes(id))) {
    state.won = true;
    addText('<br>' + wc.description, 'success');
    addText('<br>CONGRATULATIONS!', 'success');
  }
}

document.querySelectorAll('.cmd-btn').forEach(btn => {
  btn.onclick = () => setCommand(btn.dataset.cmd);
});

document.addEventListener('click', (e) => {
  if (e.target.classList.contains('look-target')) {
    const target = e.target.dataset.look;
    if (state.activeCommand === 'use' && state.selectedItem) {
      useItemOn(state.selectedItem, target);
    } else {
      lookAt(target);
    }
  }
});

function saveState() {
  try { localStorage.setItem('game-hollow-vex', JSON.stringify(state)); } catch(e) {}
}
function loadState() {
  try {
    const s = localStorage.getItem('game-hollow-vex');
    if (s) { Object.assign(state, JSON.parse(s)); return true; }
  } catch(e) {}
  return false;
}

function init() {
  if (typeof GAME_DATA === 'undefined' || Object.keys(GAME_DATA).length === 0) {
    addText('ERROR: Game data missing. Run through Game Assembler.', 'error');
    return;
  }

  addText('=== ' + GAME_DATA.title.toUpperCase() + ' ===', 'success');
  addText(GAME_DATA.setting, 'system');
  addText('<br>Commands: LOOK | TAKE | USE | EXAMINE', 'system');
  addText('Click exits to move.', 'system');
  addText('---', 'system');

  if (!loadState()) {
    renderScene('scene-1-entrance');
  } else {
    renderScene(state.currentScene);
    addText('[Game Restored]', 'system');
  }
}

init();
</script>
</body>
