<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Hollow of Saint Vex</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    min-height: 100%; background: #000; color: #33ff33;
    font-family: 'Press Start 2P', 'Courier New', monospace;
    font-size: 12px; line-height: 1.8;
  }

  body::after {
    content: ''; position: fixed; inset: 0; z-index: 999;
    background: repeating-linear-gradient(
      transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px
    );
    pointer-events: none;
  }

  .container {
    max-width: 720px; margin: 0 auto; padding: 32px 16px;
  }

  #art-display {
    border: 2px solid #33ff33;
    margin-bottom: 20px;
    background: #000;
    min-height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #art-display svg, #art-display img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  #scene-name {
    font-size: 16px;
    text-align: center;
    margin-bottom: 10px;
    color: #ffff33;
    text-shadow: 0 0 10px rgba(255,255,51,0.5);
  }

  #text-display {
    border: 1px solid #226622;
    padding: 16px;
    margin-bottom: 20px;
    background: rgba(0,20,0,0.7);
    min-height: 200px;
    max-height: 300px;
    overflow-y: auto;
  }

  #text-display p {
    margin-bottom: 8px;
  }

  .system { color: #66ff66; }
  .success { color: #ffff33; }
  .error { color: #ff3333; }

  .look-target {
    color: #ff9933;
    cursor: pointer;
    text-decoration: underline;
  }

  .look-target:hover {
    color: #ffcc33;
  }

  #inventory-bar {
    border: 1px solid #33ff33;
    padding: 10px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 40px;
  }

  .inv-item {
    border: 1px solid #33ff33;
    padding: 4px 8px;
    cursor: pointer;
  }

  .inv-item.selected {
    background: #33ff33;
    color: #000;
  }

  #inv-empty {
    color: #226622;
  }

  #exits-bar {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .exit-btn {
    border: 2px solid #33ff33;
    background: #000;
    color: #33ff33;
    padding: 8px 16px;
    cursor: pointer;
    font-family: 'Press Start 2P', monospace;
  }

  .exit-btn.available:hover {
    background: #33ff33;
    color: #000;
  }

  .exit-btn:disabled {
    border-color: #226622;
    color: #226622;
    cursor: not-allowed;
  }

  .commands {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .cmd-btn {
    border: 2px solid #33ff33;
    background: #000;
    color: #33ff33;
    padding: 10px 20px;
    cursor: pointer;
    font-family: 'Press Start 2P', monospace;
  }

  .cmd-btn.active {
    background: #33ff33;
    color: #000;
  }

  /* Puzzle animations */
  @keyframes puzzle-solved {
    0% { filter: brightness(1); }
    50% { filter: brightness(2); }
    100% { filter: brightness(1); }
  }

  @keyframes unlockPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  @keyframes itemGlow {
    0% { box-shadow: 0 0 5px #33ff33; }
    50% { box-shadow: 0 0 20px #33ff33; }
    100% { box-shadow: 0 0 5px #33ff33; }
  }

  .puzzle-solved {
    animation: puzzle-solved 0.6s ease;
  }

  .item-new {
    animation: unlockPulse 1s ease 3;
  }

  .inv-item.selected {
    animation: itemGlow 1s infinite;
  }

  .no-art {
    color: #226622;
    font-style: italic;
  }

  footer {
    text-align: center;
    color: #113311;
    font-size: 8px;
    margin-top: 48px;
    padding-bottom: 16px;
  }
</style>
</head>
<body>
<div class="container">
  <div id="art-display"></div>
  <div id="scene-name"></div>
  <div id="text-display"></div>
  <div id="inventory-bar">
    <span id="inv-empty">INVENTORY EMPTY</span>
  </div>
  <div id="exits-bar"></div>
  <div class="commands">
    <button class="cmd-btn" data-cmd="look">LOOK</button>
    <button class="cmd-btn" data-cmd="take">TAKE</button>
    <button class="cmd-btn" data-cmd="use">USE</button>
    <button class="cmd-btn" data-cmd="examine">EXAMINE</button>
  </div>
  <footer>
    OpenClaw Point & Click Studio | Game #002: The Hollow of Saint Vex | Produced by AI Agents
  </footer>
</div>
