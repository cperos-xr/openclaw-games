<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Dark stone chapel -->
  <rect width="640" height="400" fill="#000000"/>
  
  <!-- Stone walls with disturbing sigils -->
  <rect x="0" y="0" width="640" height="400" fill="#001100" stroke="#000000" stroke-width="2"/>
  
  <!-- Disturbing sigils on walls -->
  <path d="M100,100 Q120,80 140,100" stroke="#FF0000" stroke-width="2" fill="none"/>
  <path d="M140,100 Q160,120 180,100" stroke="#FF0000" stroke-width="2" fill="none"/>
  <path d="M180,100 Q200,80 220,100" stroke="#FF0000" stroke-width="2" fill="none"/>
  
  <path d="M300,300 Q320,280 340,300" stroke="#FF0000" stroke-width="2" fill="none"/>
  <path d="M340,300 Q360,320 380,300" stroke="#FF0000" stroke-width="2" fill="none"/>
  <path d="M380,300 Q400,280 420,300" stroke="#FF0000" stroke-width="2" fill="none"/>
  
  <!-- Eyes that follow (simple representation) -->
  <circle cx="150" cy="150" r="8" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <circle cx="170" cy="150" r="8" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <circle cx="150" cy="150" r="3" fill="#000000"/>
  <circle cx="170" cy="150" r="3" fill="#000000"/>
  
  <circle cx="450" cy="250" r="8" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <circle cx="470" cy="250" r="8" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <circle cx="450" cy="250" r="3" fill="#000000"/>
  <circle cx="470" cy="250" r="3" fill="#000000"/>
  
  <!-- Low stone altar -->
  <rect x="270" y="200" width="100" height="20" fill="#8B4513" stroke="#000000" stroke-width="2"/>
  
  <!-- Hundreds of half-melted candles (representative sample) -->
  <circle cx="280" cy="190" r="3" fill="#FFFF00" stroke="#000000" stroke-width="1"/>
  <circle cx="290" cy="185" r="2" fill="#FFFF00" stroke="#000000" stroke-width="1"/>
  <circle cx="300" cy="190" r="3" fill="#FFFF00" stroke="#000000" stroke-width="1"/>
  <circle cx="310" cy="180" r="2" fill="#FFFF00" stroke="#000000" stroke-width="1"/>
  <circle cx="320" cy="190" r="3" fill="#FFFF00" stroke="#000000" stroke-width="1"/>
  <circle cx="330" cy="185" r="2" fill="#FFFF00" stroke="#000000" stroke-width="1"/>
  <circle cx="340" cy="190" r="3" fill="#FFFF00" stroke="#000000" stroke-width="1"/>
  <circle cx="350" cy="180" r="2" fill="#FFFF00" stroke="#000000" stroke-width="1"/>
  
  <!-- Dried dark stains on altar -->
  <rect x="280" y="200" width="10" height="5" fill="#8B0000"/>
  <rect x="310" y="205" width="8" height="4" fill="#8B0000"/>
  <rect x="340" y="200" width="6" height="6" fill="#8B0000"/>
  
  <!-- Heavy iron crowbar -->
  <rect x="100" y="300" width="8" height="60" fill="#8B0000" stroke="#000000" stroke-width="2"/>
  <polygon points="100,300 108,290 100,280" fill="#8B0000" stroke="#000000" stroke-width="2"/>
  
  <!-- Crumbling pillar -->
  <rect x="80" y="150" width="20" height="150" fill="#8B4513" stroke="#000000" stroke-width="2"/>
  <rect x="75" y="150" width="10" height="20" fill="#654321" stroke="#000000" stroke-width="1"/>
  <rect x="95" y="150" width="10" height="20" fill="#654321" stroke="#000000" stroke-width="1"/>
  
  <!-- Eastern wall with loose stone -->
  <rect x="600" y="100" width="20" height="200" fill="#001100" stroke="#000000" stroke-width="2"/>
  <rect x="605" y="150" width="10" height="10" fill="#8B4513" stroke="#000000" stroke-width="1"/>
  
  <!-- Hidden niche glint -->
  <circle cx="610" cy="155" r="3" fill="#C0C0C0" stroke="#000000" stroke-width="1"/>
  
</svg>