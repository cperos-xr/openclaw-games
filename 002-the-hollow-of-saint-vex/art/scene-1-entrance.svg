<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Dark mountain side -->
  <rect width="640" height="400" fill="#000000"/>
  
  <!-- Mountain silhouette -->
  <path d="M0,300 L100,200 L200,280 L300,180 L400,260 L500,200 L600,280 L640,300 L640,400 L0,400 Z" fill="#003300" stroke="#000000" stroke-width="2"/>
  
  <!-- Cave entrance -->
  <ellipse cx="320" cy="250" rx="80" ry="60" fill="#000000" stroke="#000000" stroke-width="3"/>
  
  <!-- Rotting timber braces -->
  <rect x="240" y="190" width="10" height="100" fill="#8B4513" stroke="#000000" stroke-width="1"/>
  <rect x="390" y="190" width="10" height="100" fill="#8B4513" stroke="#000000" stroke-width="1"/>
  <line x1="240" y1="190" x2="390" y2="190" stroke="#8B4513" stroke-width="2"/>
  
  <!-- Condemned sign -->
  <g transform="translate(280, 150)">
    <rect width="80" height="30" fill="#8B0000" stroke="#000000" stroke-width="2"/>
    <path d="M 5 5 L 75 5 M 5 15 L 75 15 M 5 25 L 75 25" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>
    <path d="M 12 8 L 18 22 M 15 15 L 10 15 M 10 8 L 15 22" stroke="#FFFFFF" stroke-width="1.5" fill="none"/> <!-- Crude C -->
    <path d="M 25 8 L 25 22 Q 35 22 35 15 Q 35 8 25 8" stroke="#FFFFFF" stroke-width="1.5" fill="none"/> <!-- Crude D -->
  </g>
  
  <!-- Mine cart tracks -->
  <line x1="100" y1="300" x2="320" y2="250" stroke="#FF8800" stroke-width="3"/>
  <line x1="540" y1="300" x2="320" y2="250" stroke="#FF8800" stroke-width="3"/>
  <line x1="120" y1="305" x2="340" y2="255" stroke="#FF8800" stroke-width="2"/>
  <line x1="520" y1="305" x2="300" y2="255" stroke="#FF8800" stroke-width="2"/>
  
  <!-- Pickaxe wedged in beam -->
  <rect x="300" y="200" width="6" height="40" fill="#8B4513" stroke="#000000" stroke-width="1"/>
  <polygon points="303,200 317,200 310,180 303,190" fill="#C0C0C0" stroke="#000000" stroke-width="1"/>
  
  <!-- Collapsed passage (north) -->
  <rect x="200" y="100" width="240" height="80" fill="#8B4513" stroke="#000000" stroke-width="2"/>
  <line x1="200" y1="100" x2="440" y2="180" stroke="#000000" stroke-width="1"/>
  <line x1="440" y1="100" x2="200" y2="180" stroke="#000000" stroke-width="1"/>
  
  <!-- Some rocks in collapse -->
  <circle cx="280" cy="130" r="8" fill="#654321" stroke="#000000" stroke-width="1"/>
  <circle cx="320" cy="140" r="6" fill="#654321" stroke="#000000" stroke-width="1"/>
  <circle cx="360" cy="120" r="7" fill="#654321" stroke="#000000" stroke-width="1"/>
  
  <!-- Pine trees on mountain -->
  <path d="M50,320 Q55,300 60,320" fill="#006600" stroke="#000000" stroke-width="1"/>
  <path d="M580,340 Q585,320 590,340" fill="#006600" stroke="#000000" stroke-width="1"/>
  
</svg>