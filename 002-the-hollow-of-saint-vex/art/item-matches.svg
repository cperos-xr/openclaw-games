<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Small wooden matchbox with one match lit -->
  
  <!-- Matchbox Base -->
  <rect x="12" y="24" width="40" height="28" rx="2" fill="#5D4037" stroke="#3E2723" stroke-width="2"/>
  <rect x="14" y="26" width="36" height="24" rx="1" fill="#D7CCC8"/>
  
  <!-- Striking Surface -->
  <rect x="12" y="44" width="40" height="8" fill="#4E342E"/>
  
  <!-- The Lit Match -->
  <!-- Stick -->
  <rect x="28" y="8" width="4" height="22" fill="#F5F5DC" stroke="#8B4513" stroke-width="0.5" transform="rotate(-15, 30, 30)"/>
  
  <!-- Burnt Tip -->
  <ellipse cx="23" cy="11" rx="3" ry="4" fill="#212121" transform="rotate(-15, 23, 11)"/>
  
  <!-- Flame -->
  <g opacity="0.9">
    <!-- Outer Flame -->
    <path d="M23 11 C 18 5, 20 -2, 23 -5 C 26 -2, 28 5, 23 11 Z" fill="#FFAB00">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="0.5s" repeatCount="indefinite" />
    </path>
    <!-- Inner Flame -->
    <path d="M23 10 C 20 7, 21 3, 23 1 C 25 3, 26 7, 23 10 Z" fill="#FF6D00"/>
  </g>
  
  <!-- Glow -->
  <circle cx="23" cy="5" r="12" fill="#FFD600" opacity="0.15"/>
</svg>