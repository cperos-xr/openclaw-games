<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Matchbox -->
  <rect x="16" y="20" width="32" height="28" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  
  <!-- Matchbox striking surface -->
  <rect x="16" y="40" width="32" height="8" fill="#FF0000" stroke="#000000" stroke-width="1"/>
  
  <!-- Match sticks -->
  <rect x="20" y="10" width="4" height="10" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <rect x="28" y="10" width="4" height="10" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <rect x="36" y="10" width="4" height="10" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  
  <!-- Match heads -->
  <rect x="20" y="8" width="4" height="2" fill="#FF0000" stroke="#000000" stroke-width="1"/>
  <rect x="28" y="8" width="4" height="2" fill="#FF0000" stroke="#000000" stroke-width="1"/>
  <rect x="36" y="8" width="4" height="2" fill="#FF0000" stroke="#000000" stroke-width="1"/>
  
  <!-- Matchbox label -->
  <text x="32" y="30" text-anchor="middle" fill="#000000" font-size="8">MATCHES</text>
  
</svg>