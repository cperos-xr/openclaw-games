  <path d="M32,28 Q30,26 28,26 Q26,28 26,30 Q28,32 30,32 Q32,30 34,30 Q36,32 34,34 Q32,36 30,36" fill="none" stroke="#000000" stroke-width="1"/>
  
  <!-- Tarnish effect -->
