  <!-- Sound wave (deep and mournful) -->
  <path d="M32,52 Q24,50 32,48" stroke="#FFFFFF" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M32,52 Q40,50 32,48" stroke="#FFFFFF" stroke-width="1" fill="none" opacity="0.5"/>
  
