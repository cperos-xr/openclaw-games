<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Lantern base -->
  <rect x="26" y="40" width="12" height="8" fill="#8B4513" stroke="#000000" stroke-width="1"/>
  
  <!-- Lantern body -->
  <rect x="22" y="20" width="20" height="20" fill="#CD7F32" stroke="#000000" stroke-width="2"/>
  
  <!-- Lantern top -->
  <rect x="24" y="12" width="16" height="8" fill="#8B4513" stroke="#000000" stroke-width="2"/>
  
  <!-- Glass pane -->
  <rect x="26" y="24" width="12" height="12" fill="#E0E0E0" stroke="#000000" stroke-width="1"/>
  
  <!-- Wick -->
  <rect x="30" y="20" width="4" height="4" fill="#000000" stroke="#000000" stroke-width="1"/>
  
  <!-- Grimy effect on glass -->
  <rect x="28" y="26" width="2" height="2" fill="#C0C0C0"/>
  <rect x="34" y="28" width="2" height="2" fill="#C0C0C0"/>
  
</svg>