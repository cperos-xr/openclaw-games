<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Silver Bell with polished finish -->
  <defs>
    <linearGradient id="silver-shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C0C0C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#808080;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Bell Handle -->
  <path d="M32 4 L32 12" stroke="#808080" stroke-width="4" stroke-linecap="round"/>
  <circle cx="32" cy="6" r="3" fill="#C0C0C0" stroke="#444444" stroke-width="1"/>

  <!-- Bell Body -->
  <path d="M32 12 
           C 20 12, 12 24, 10 44
           L 54 44
           C 52 24, 44 12, 32 12 Z" 
        fill="url(#silver-shine)" stroke="#444444" stroke-width="2"/>
  
  <!-- Bell Rim Base -->
  <path d="M8 44 Q 32 52 56 44 L 58 48 Q 32 56 6 48 Z" fill="#E0E0E0" stroke="#444444" stroke-width="1.5"/>
  
  <!-- Clapper -->
  <circle cx="32" cy="48" r="4" fill="#666666" stroke="#222222" stroke-width="1"/>
  
  <!-- Polished Highlight -->
  <path d="M22 18 Q 28 15 32 18" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
</svg>