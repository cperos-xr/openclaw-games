<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Dark stone room -->
  <rect width="640" height="400" fill="#000000"/>
  
  <!-- Stone walls -->
  <rect x="0" y="0" width="640" height="400" fill="#001100" stroke="#000000" stroke-width="2"/>
  
  <!-- Rusted machinery (skeletal husks) -->
  <rect x="50" y="50" width="80" height="60" fill="#8B0000" stroke="#000000" stroke-width="2"/>
  <rect x="60" y="40" width="20" height="20" fill="#8B0000" stroke="#000000" stroke-width="2"/>
  <line x1="50" y1="80" x2="50" y2="100" stroke="#8B0000" stroke-width="2"/>
  <line x1="130" y1="80" x2="130" y2="100" stroke="#8B0000" stroke-width="2"/>
  
  <rect x="510" y="50" width="80" height="60" fill="#8B0000" stroke="#000000" stroke-width="2"/>
  <rect x="520" y="40" width="20" height="20" fill="#8B0000" stroke="#000000" stroke-width="2"/>
  <line x1="510" y1="80" x2="510" y2="100" stroke="#8B0000" stroke-width="2"/>
  <line x1="590" y1="80" x2="590" y2="100" stroke="#8B0000" stroke-width="2"/>
  
  <!-- Heavy workbench -->
  <rect x="220" y="250" width="200" height="30" fill="#8B4513" stroke="#000000" stroke-width="2"/>
  <rect x="230" y="200" width="180" height="50" fill="#8B4513" stroke="#000000" stroke-width="2"/>
  
  <!-- Mushy blueprints -->
  <g transform="translate(240, 210)">
    <rect width="40" height="30" fill="#8B0000" stroke="#000000" stroke-width="1"/>
    <path d="M 5 5 L 35 25 M 35 5 L 5 25" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
    <path d="M 20 2 L 20 28" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
  </g>
  <rect x="290" y="215" width="30" height="25" fill="#8B0000" stroke="#000000" stroke-width="1"/>
  <rect x="330" y="205" width="40" height="35" fill="#8B0000" stroke="#000000" stroke-width="1"/>
  
  <!-- Reinforced wooden crate with iron padlock -->
  <rect x="400" y="200" width="100" height="80" fill="#8B4513" stroke="#000000" stroke-width="2"/>
  <rect x="430" y="200" width="40" height="20" fill="#8B0000" stroke="#000000" stroke-width="2"/>
  <rect x="440" y="220" width="20" height="40" fill="#8B0000" stroke="#000000" stroke-width="2"/>
  
  <!-- Doorway north with orange glow -->
  <rect x="300" y="50" width="40" height="100" fill="#000000" stroke="#000000" stroke-width="2"/>
  <rect x="290" y="30" width="60" height="30" fill="#FF8800" stroke="#000000" stroke-width="2"/>
  
  <!-- Low vibrating hum representation -->
  <path d="M310,40 Q320,20 330,40" stroke="#FF8800" stroke-width="2" fill="none"/>
  <path d="M330,40 Q340,20 350,40" stroke="#FF8800" stroke-width="2" fill="none"/>
  
</svg>