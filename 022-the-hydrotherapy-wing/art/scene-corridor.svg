<svg viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background dark -->
  <rect width="640" height="400" fill="#0a0a0a"/>
  
  <!-- Layer 2: Corridor floor with tiles -->
  <rect x="0" y="300" width="640" height="100" fill="#1a1a00"/>
  <line x1="0" y1="310" x2="640" y2="310" stroke="#0d0d00" stroke-width="1"/>
  <line x1="0" y1="325" x2="640" y2="325" stroke="#0d0d00" stroke-width="1"/>
  <line x1="0" y1="340" x2="640" y2="340" stroke="#0d0d00" stroke-width="1"/>
  <line x1="0" y1="355" x2="640" y2="355" stroke="#0d0d00" stroke-width="1"/>
  <line x1="0" y1="370" x2="640" y2="370" stroke="#0d0d00" stroke-width="1"/>
  <line x1="0" y1="385" x2="640" y2="385" stroke="#0d0d00" stroke-width="1"/>
  
  <!-- Layer 3: Left wall with peeling green paint -->
  <rect x="0" y="0" width="120" height="300" fill="#003300"/>
  <rect x="10" y="20" width="30" height="40" fill="#004400" opacity="0.5"/>
  <rect x="60" y="80" width="40" height="50" fill="#004400" opacity="0.5"/>
  <rect x="20" y="150" width="25" height="35" fill="#004400" opacity="0.5"/>
  <rect x="70" y="200" width="35" height="45" fill="#004400" opacity="0.5"/>
  
  <!-- Layer 4: Right wall -->
  <rect x="520" y="0" width="120" height="300" fill="#003300"/>
  <rect x="550" y="30" width="35" height="45" fill="#004400" opacity="0.5"/>
  <rect x="580" y="100" width="30" height="40" fill="#004400" opacity="0.5"/>
  <rect x="540" y="170" width="25" height="35" fill="#004400" opacity="0.5"/>
  
  <!-- Layer 5: Copper pipes along ceiling -->
  <rect x="0" y="30" width="640" height="8" fill="#FF8800" opacity="0.4"/>
  <rect x="0" y="50" width="640" height="6" fill="#FF8800" opacity="0.3"/>
  
  <!-- Pipe joints -->
  <circle cx="80" cy="34" r="6" fill="#FF8800" opacity="0.5" stroke="#000000" stroke-width="1"/>
  <circle cx="200" cy="34" r="6" fill="#FF8800" opacity="0.5" stroke="#000000" stroke-width="1"/>
  <circle cx="320" cy="34" r="6" fill="#FF8800" opacity="0.5" stroke="#000000" stroke-width="1"/>
  <circle cx="440" cy="34" r="6" fill="#FF8800" opacity="0.5" stroke="#000000" stroke-width="1"/>
  <circle cx="560" cy="34" r="6" fill="#FF8800" opacity="0.5" stroke="#000000" stroke-width="1"/>
  
  <!-- Layer 6: Dripping water drops -->
  <circle cx="80" cy="60" r="2" fill="#0000FF" opacity="0.6"/>
  <circle cx="200" cy="65" r="2" fill="#0000FF" opacity="0.6"/>
  <circle cx="320" cy="58" r="2" fill="#0000FF" opacity="0.6"/>
  <circle cx="440" cy="62" r="2" fill="#0000FF" opacity="0.6"/>
  <circle cx="560" cy="55" r="2" fill="#0000FF" opacity="0.6"/>
  
  <!-- Layer 7: Water stains on walls -->
  <ellipse cx="60" cy="180" rx="20" ry="50" fill="#000088" opacity="0.15"/>
  <ellipse cx="580" cy="200" rx="18" ry="45" fill="#000088" opacity="0.15"/>
  
  <!-- Layer 8: Treatment room door (left side) -->
  <rect x="30" y="120" width="50" height="180" fill="#1a0d00" stroke="#333333" stroke-width="2"/>
  <circle cx="72" cy="220" r="4" fill="#FF8800"/>
  
  <!-- Layer 9: Heavy wooden door at end of corridor -->
  <rect x="270" y="80" width="100" height="220" fill="#1a0d00" stroke="#444444" stroke-width="3"/>
  <rect x="290" y="100" width="60" height="80" fill="#0d0600" stroke="#333333" stroke-width="2"/>
  <circle cx="355" cy="220" r="5" fill="#FF8800"/>
  
  <!-- Door is slightly ajar - gap visible -->
  <rect x="368" y="80" width="4" height="220" fill="#000000"/>
  
  <!-- Layer 10: Atmospheric fog at corridor end -->
  <ellipse cx="320" cy="350" rx="100" ry="30" fill="#000000" opacity="0.4"/>
  
  <!-- Layer 11: Distant eerie glow -->
  <ellipse cx="320" cy="200" rx="40" ry="80" fill="#00FF00" opacity="0.05"/>
</svg>