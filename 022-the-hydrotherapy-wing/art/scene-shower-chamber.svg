<svg viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background dark -->
  <rect width="640" height="400" fill="#050505"/>
  
  <!-- Layer 2: Intricate Victorian tile wall patterns -->
  <rect x="0" y="0" width="640" height="320" fill="#111111"/>
  
  <!-- Decorative tile border pattern -->
  <rect x="0" y="0" width="640" height="20" fill="#333333"/>
  <rect x="0" y="300" width="640" height="20" fill="#333333"/>
  
  <!-- Tile pattern in tiles -->
  <line x1="0" y1="40" x2="640" y2="40" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="0" y1="80" x2="640" y2="80" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="0" y1="120" x2="640" y2="120" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="0" y1="160" x2="640" y2="160" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="0" y1="200" x2="640" y2="200" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="0" y1="240" x2="640" y2="240" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="0" y1="280" x2="640" y2="280" stroke="#1a1a1a" stroke-width="1"/>
  
  <line x1="40" y1="20" x2="40" y2="300" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="80" y1="20" x2="80" y2="300" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="120" y1="20" x2="120" y2="300" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="160" y1="20" x2="160" y2="300" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="200" y1="20" x2="200" y2="300" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="240" y1="20" x2="240" y2="300" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="280" y1="20" x2="280" y2="300" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="320" y1="20" x2="320" y2="300" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="360" y1="20" x2="360" y2="300" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="400" y1="20" x2="400" y2="300" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="440" y1="20" x2="440" y2="300" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="480" y1="20" x2="480" y2="300" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="520" y1="20" x2="520" y2="300" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="560" y1="20" x2="560" y2="300" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="600" y1="20" x2="600" y2="300" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Grime covering tiles -->
  <rect x="0" y="20" width="640" height="280" fill="#000000" opacity="0.3"/>
  <ellipse cx="100" cy="150" rx="60" ry="80" fill="#333333" opacity="0.2"/>
  <ellipse cx="500" cy="180" rx="70" ry="70" fill="#333333" opacity="0.2"/>
  
  <!-- Layer 3: Floor -->
  <rect x="0" y="320" width="640" height="80" fill="#0d0d0d"/>
  
  <!-- Floor drain tiles -->
  <line x1="0" y1="335" x2="640" y2="335" stroke="#050505" stroke-width="1"/>
  <line x1="0" y1="350" x2="640" y2="350" stroke="#050505" stroke-width="1"/>
  <line x1="0" y1="365" x2="640" y2="365" stroke="#050505" stroke-width="1"/>
  <line x1="0" y1="380" x2="640" y2="380" stroke="#050505" stroke-width="1"/>
  
  <!-- Layer 4: Shower heads (iron stalactites) -->
  <!-- Central shower heads -->
  <rect x="200" y="60" width="12" height="40" fill="#555555"/>
  <ellipse cx="206" cy="100" rx="14" ry="8" fill="#444444" stroke="#666666" stroke-width="2"/>
  
  <rect x="280" y="50" width="14" height="50" fill="#555555"/>
  <ellipse cx="287" cy="100" rx="16" ry="9" fill="#444444" stroke="#666666" stroke-width="2"/>
  
  <rect x="350" y="55" width="12" height="45" fill="#555555"/>
  <ellipse cx="356" cy="100" rx="14" ry="8" fill="#444444" stroke="#666666" stroke-width="2"/>
  
  <rect x="420" y="65" width="12" height="35" fill="#555555"/>
  <ellipse cx="426" cy="100" rx="14" ry="8" fill="#444444" stroke="#666666" stroke-width="2"/>
  
  <!-- Side shower heads -->
  <rect x="100" y="80" width="10" height="30" fill="#444444"/>
  <ellipse cx="105" cy="110" rx="12" ry="7" fill="#333333" stroke="#555555" stroke-width="2"/>
  
  <rect x="530" y="75" width="10" height="35" fill="#444444"/>
  <ellipse cx="535" cy="110" rx="12" ry="7" fill="#333333" stroke="#555555" stroke-width="2"/>
  
  <!-- Rust on shower heads -->
  <rect x="202" y="70" width="4" height="15" fill="#FF8800" opacity="0.3"/>
  <rect x="283" y="60" width="5" height="20" fill="#FF8800" opacity="0.3"/>
  <rect x="352" y="65" width="4" height="18" fill="#FF8800" opacity="0.3"/>
  <rect x="422" y="72" width="4" height="12" fill="#FF8800" opacity="0.3"/>
  
  <!-- Layer 5: Water drip effects from shower heads -->
  <circle cx="206" cy="115" r="2" fill="#0000FF" opacity="0.5"/>
  <circle cx="287" cy="120" r="2" fill="#0000FF" opacity="0.5"/>
  <circle cx="356" cy="118" r="2" fill="#0000FF" opacity="0.5"/>
  <circle cx="426" cy="112" r="2" fill="#0000FF" opacity="0.5"/>
  <circle cx="105" cy="125" r="1" fill="#0000FF" opacity="0.4"/>
  <circle cx="535" cy="122" r="1" fill="#0000FF" opacity="0.4"/>
  
  <!-- Layer 6: Clogged floor drain with debris -->
  <rect x="280" y="340" width="80" height="15" fill="#000000" stroke="#333333" stroke-width="2" rx="2"/>
  <!-- Grate bars -->
  <line x1="290" y1="340" x2="290" y2="355" stroke="#333333" stroke-width="2"/>
  <line x1="305" y1="340" x2="305" y2="355" stroke="#333333" stroke-width="2"/>
  <line x1="320" y1="340" x2="320" y2="355" stroke="#333333" stroke-width="2"/>
  <line x1="335" y1="340" x2="335" y2="355" stroke="#333333" stroke-width="2"/>
  <!-- Debris in drain -->
  <rect x="285" y="342" width="10" height="8" fill="#221111" opacity="0.7"/>
  <rect x="310" y="340" width="8" height="10" fill="#1a0d00" opacity="0.6"/>
  
  <!-- Loose floor grate in corner -->
  <rect x="540" y="350" width="50" height="20" fill="#222222" stroke="#444444" stroke-width="2" transform="rotate(5 565 360)"/>
  <line x1="548" y1="352" x2="550" y2="368" stroke="#333333" stroke-width="1"/>
  <line x1="558" y1="353" x2="560" y2="369" stroke="#333333" stroke-width="1"/>
  <line x1="568" y1="354" x2="570" y2="370" stroke="#333333" stroke-width="1"/>
  <line x1="578" y1="355" x2="580" y2="371" stroke="#333333" stroke-width="1"/>
  <!-- Dark opening under loose grate -->
  <rect x="542" y="365" width="45" height="12" fill="#000000"/>
  
  <!-- Layer 7: Steam wisps rising from cracks -->
  <ellipse cx="150" cy="300" rx="15" ry="20" fill="#FFFFFF" opacity="0.06"/>
  <ellipse cx="150" cy="280" rx="12" ry="15" fill="#FFFFFF" opacity="0.04"/>
  <ellipse cx="480" cy="290" rx="18" ry="25" fill="#FFFFFF" opacity="0.05"/>
  <ellipse cx="480" cy="270" rx="14" ry="18" fill="#FFFFFF" opacity="0.03"/>
  
  <!-- Layer 8: Atmospheric shadows -->
  <ellipse cx="320" cy="380" rx="120" ry="10" fill="#000000" opacity="0.5"/>
  
  <!-- Layer 9: Distant wall decorations (Victorian ornamentation) -->
  <circle cx="320" cy="160" r="25" fill="none" stroke="#444444" stroke-width="2"/>
  <circle cx="320" cy="160" r="15" fill="none" stroke="#333333" stroke-width="1"/>
  <rect x="310" y="150" width="20" height="20" fill="#333333" opacity="0.3"/>
</svg>