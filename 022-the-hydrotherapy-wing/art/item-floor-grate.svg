<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" fill="#000000" stroke="#FFFFFF" stroke-width="1"/>
  
  <!-- Square iron floor grate -->
  <!-- Main grate frame -->
  <rect x="10" y="10" width="44" height="44" fill="#333333" stroke="#555555" stroke-width="2" rx="2"/>
  
  <!-- Vertical bars -->
  <rect x="16" y="12" width="3" height="40" fill="#444444"/>
  <rect x="24" y="12" width="3" height="40" fill="#444444"/>
  <rect x="32" y="12" width="3" height="40" fill="#444444"/>
  <rect x="40" y="12" width="3" height="40" fill="#444444"/>
  
  <!-- Horizontal bars -->
  <rect x="12" y="18" width="40" height="3" fill="#444444"/>
  <rect x="12" y="28" width="40" height="3" fill="#444444"/>
  <rect x="12" y="38" width="40" height="3" fill="#444444"/>
  
  <!-- Open drain holes visible through grate -->
  <rect x="13" y="13" width="3" height="5" fill="#000000"/>
  <rect x="20" y="13" width="4" height="5" fill="#000000"/>
  <rect x="28" y="13" width="4" height="5" fill="#000000"/>
  <rect x="36" y="13" width="4" height="5" fill="#000000"/>
  <rect x="44" y="13" width="3" height="5" fill="#000000"/>
  
  <rect x="13" y="22" width="3" height="6" fill="#000000"/>
  <rect x="20" y="22" width="4" height="6" fill="#000000"/>
  <rect x="28" y="22" width="4" height="6" fill="#000000"/>
  <rect x="36" y="22" width="4" height="6" fill="#000000"/>
  <rect x="44" y="22" width="3" height="6" fill="#000000"/>
  
  <rect x="13" y="32" width="3" height="6" fill="#000000"/>
  <rect x="20" y="32" width="4" height="6" fill="#000000"/>
  <rect x="28" y="32" width="4" height="6" fill="#000000"/>
  <rect x="36" y="32" width="4" height="6" fill="#000000"/>
  <rect x="44" y="32" width="3" height="6" fill="#000000"/>
  
  <rect x="13" y="42" width="3" height="5" fill="#000000"/>
  <rect x="20" y="42" width="4" height="5" fill="#000000"/>
  <rect x="28" y="42" width="4" height="5" fill="#000000"/>
  <rect x="36" y="42" width="4" height="5" fill="#000000"/>
  <rect x="44" y="42" width="3" height="5" fill="#000000"/>
  
  <!-- Debris/dirt on grate -->
  <rect x="18" y="24" width="4" height="3" fill="#1a0d00" opacity="0.6"/>
  <rect x="34" y="34" width="5" height="3" fill="#1a0d00" opacity="0.5"/>
  
  <!-- Rust spots -->
  <rect x="12" y="12" width="3" height="3" fill="#FF8800" opacity="0.3"/>
  <rect x="49" y="49" width="3" height="3" fill="#FF8800" opacity="0.3"/>
</svg>