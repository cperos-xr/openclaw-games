<svg viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background - dark metallic crawlspace -->
  <rect width="640" height="400" fill="#050805"/>
  
  <!-- Layer 2: Metal grating floor -->
  <rect x="0" y="340" width="640" height="60" fill="#111111"/>
  <!-- Grating pattern -->
  <line x1="0" y1="350" x2="640" y2="350" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="0" y1="360" x2="640" y2="360" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="0" y1="370" x2="640" y2="370" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="0" y1="380" x2="640" y2="380" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="0" y1="390" x2="640" y2="390" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="20" y1="340" x2="20" y2="400" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="50" y1="340" x2="50" y2="400" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="80" y1="340" x2="80" y2="400" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="110" y1="340" x2="110" y2="400" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="140" y1="340" x2="140" y2="400" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="170" y1="340" x2="170" y2="400" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="200" y1="340" x2="200" y2="400" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="230" y1="340" x2="230" y2="400" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="260" y1="340" x2="260" y2="400" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="290" y1="340" x2="290" y2="400" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="320" y1="340" x2="320" y2="400" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="350" y1="340" x2="350" y2="400" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="380" y1="340" x2="380" y2="400" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="410" y1="340" x2="410" y2="400" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="440" y1="340" x2="440" y2="400" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="470" y1="340" x2="470" y2="400" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="500" y1="340" x2="500" y2="400" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="530" y1="340" x2="530" y2="400" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="560" y1="340" x2="560" y2="400" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="590" y1="340" x2="590" y2="400" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="620" y1="340" x2="620" y2="400" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Layer 3: Thick horizontal pipes -->
  <!-- Main pipe row -->
  <rect x="0" y="80" width="640" height="30" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="0" y="140" width="640" height="25" fill="#222222" stroke="#151515" stroke-width="2"/>
  <rect x="0" y="200" width="640" height="28" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Vertical pipe connections -->
  <rect x="100" y="50" width="20" height="180" fill="#222222" stroke="#151515" stroke-width="1"/>
  <rect x="250" y="60" width="18" height="170" fill="#222222" stroke="#151515" stroke-width="1"/>
  <rect x="400" y="55" width="20" height="175" fill="#222222" stroke="#151515" stroke-width="1"/>
  <rect x="540" y="65" width="18" height="165" fill="#222222" stroke="#151515" stroke-width="1"/>
  
  <!-- Pipe joints/elbows -->
  <circle cx="110" cy="80" r="12" fill="#333333" stroke="#222222" stroke-width="2"/>
  <circle cx="259" cy="140" r="11" fill="#333333" stroke="#222222" stroke-width="2"/>
  <circle cx="410" cy="200" r="13" fill="#333333" stroke="#222222" stroke-width="2"/>
  <circle cx="549" cy="110" r="11" fill="#333333" stroke="#222222" stroke-width="2"/>
  
  <!-- Layer 4: Valves -->
  <!-- Small valves on pipes -->
  <circle cx="150" cy="95" r="8" fill="#444444" stroke="#555555" stroke-width="2"/>
  <line x1="150" y1="87" x2="150" y2="78" stroke="#555555" stroke-width="2"/>
  
  <circle cx="320" cy="153" r="8" fill="#444444" stroke="#555555" stroke-width="2"/>
  <line x1="320" y1="145" x2="320" y2="136" stroke="#555555" stroke-width="2"/>
  
  <circle cx="480" cy="214" r="8" fill="#444444" stroke="#555555" stroke-width="2"/>
  <line x1="480" y1="206" x2="480" y2="197" stroke="#555555" stroke-width="2"/>
  
  <!-- Layer 5: Central pressure valve (large wheel) -->
  <circle cx="320" cy="260" r="40" fill="#333333" stroke="#555555" stroke-width="3"/>
  <!-- Spokes -->
  <line x1="320" y1="220" x2="320" y2="245" stroke="#555555" stroke-width="4"/>
  <line x1="320" y1="275" x2="320" y2="300" stroke="#555555" stroke-width="4"/>
  <line x1="280" y1="260" x2="305" y2="260" stroke="#555555" stroke-width="4"/>
  <line x1="335" y1="260" x2="360" y2="260" stroke="#555555" stroke-width="4"/>
  <line x1="292" y1="232" x2="310" y2="250" stroke="#555555" stroke-width="4"/>
  <line x1="330" y1="270" x2="348" y2="288" stroke="#555555" stroke-width="4"/>
  <line x1="348" y1="232" x2="330" y2="250" stroke="#555555" stroke-width="4"/>
  <line x1="310" y1="270" x2="292" y2="288" stroke="#555555" stroke-width="4"/>
  <!-- Center hub -->
  <circle cx="320" cy="260" r="8" fill="#444444" stroke="#555555" stroke-width="2"/>
  
  <!-- Layer 6: Pressure gauges -->
  <circle cx="80" cy="180" r="15" fill="#111111" stroke="#444444" stroke-width="2"/>
  <line x1="80" y1="180" x2="88" y2="172" stroke="#FF0000" stroke-width="1"/>
  <circle cx="80" cy="180" r="1" fill="#FF0000"/>
  
  <circle cx="560" cy="160" r="15" fill="#111111" stroke="#444444" stroke-width="2"/>
  <line x1="560" y1="160" x2="568" y2="152" stroke="#FF0000" stroke-width="1"/>
  <circle cx="560" cy="160" r="1" fill="#FF0000"/>
  
  <!-- Layer 7: Rust and grime on pipes -->
  <rect x="50" y="82" width="30" height="8" fill="#FF8800" opacity="0.2"/>
  <rect x="200" y="142" width="25" height="6" fill="#FF8800" opacity="0.15"/>
  <rect x="370" y="202" width="20" height="10" fill="#FF8800" opacity="0.2"/>
  <rect x="500" y="85" width="28" height="7" fill="#FF8800" opacity="0.15"/>
  
  <!-- Layer 8: Scattered tools on floor -->
  <!-- Wrench -->
  <rect x="180" y="360" width="20" height="4" fill="#666666" transform="rotate(15 190 362)"/>
  <rect x="175" y="358" width="8" height="8" fill="#555555" transform="rotate(15 179 362)"/>
  
  <!-- Screwdriver -->
  <rect x="420" y="365" width="25" height="3" fill="#777777" transform="rotate(-10 432 366)"/>
  <rect x="442" y="363" width="6" height="7" fill="#888888" transform="rotate(-10 445 366)"/>
  
  <!-- Layer 9: Stagnant water puddles -->
  <ellipse cx="150" cy="375" rx="30" ry="6" fill="#000088" opacity="0.3"/>
  <ellipse cx="450" cy="378" rx="25" ry="5" fill="#000088" opacity="0.25"/>
  
  <!-- Layer 10: Atmospheric gloom -->
  <ellipse cx="320" cy="200" rx="200" ry="120" fill="#000000" opacity="0.3"/>
  
  <!-- Dim overhead light source -->
  <circle cx="320" cy="30" r="8" fill="#FFFF00" opacity="0.2"/>
  <ellipse cx="320" cy="60" rx="40" ry="50" fill="#FFFF00" opacity="0.04"/>
</svg>