<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" fill="#000000" stroke="#FFFFFF" stroke-width="1"/>
  
  <!-- Brass cogwheel/gear -->
  <!-- Main gear body -->
  <circle cx="32" cy="32" r="20" fill="#B8860B" stroke="#DAA520" stroke-width="2"/>
  
  <!-- Inner circle -->
  <circle cx="32" cy="32" r="12" fill="#8B6914" stroke="#B8860B" stroke-width="2"/>
  
  <!-- Center hole -->
  <circle cx="32" cy="32" r="6" fill="#000000" stroke="#8B6914" stroke-width="2"/>
  
  <!-- Gear teeth around circumference -->
  <!-- Top tooth -->
  <rect x="28" y="8" width="8" height="6" fill="#DAA520"/>
  <!-- Top-right tooth -->
  <rect x="42" y="12" width="6" height="8" fill="#DAA520" transform="rotate(30 45 16)"/>
  <!-- Right tooth -->
  <rect x="48" y="28" width="6" height="8" fill="#DAA520"/>
  <!-- Bottom-right tooth -->
  <rect x="42" y="44" width="6" height="8" fill="#DAA520" transform="rotate(30 45 48)"/>
  <!-- Bottom tooth -->
  <rect x="28" y="50" width="8" height="6" fill="#DAA520"/>
  <!-- Bottom-left tooth -->
  <rect x="16" y="44" width="6" height="8" fill="#DAA520" transform="rotate(30 19 48)"/>
  <!-- Left tooth -->
  <rect x="10" y="28" width="6" height="8" fill="#DAA520"/>
  <!-- Top-left tooth -->
  <rect x="16" y="12" width="6" height="8" fill="#DAA520" transform="rotate(30 19 16)"/>
  
  <!-- Brass shine/highlight -->
  <ellipse cx="28" cy="24" rx="6" ry="3" fill="#FFD700" opacity="0.2"/>
  
  <!-- Subtle wear marks -->
  <rect x="35" y="35" width="4" height="3" fill="#A0522D" opacity="0.3"/>
  <rect x="22" y="38" width="3" height="4" fill="#A0522D" opacity="0.2"/>
</svg>