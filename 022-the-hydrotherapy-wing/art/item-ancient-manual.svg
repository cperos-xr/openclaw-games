<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" fill="#000000" stroke="#FFFFFF" stroke-width="1"/>
  
  <!-- Water-damaged operator's manual booklet -->
  <!-- Book cover -->
  <rect x="14" y="14" width="36" height="38" fill="#8B7355" stroke="#654321" stroke-width="2" rx="2"/>
  
  <!-- Book spine on left -->
  <rect x="14" y="14" width="6" height="38" fill="#654321"/>
  
  <!-- Pages visible on right edge -->
  <rect x="46" y="16" width="2" height="34" fill="#D2B48C"/>
  <line x1="47" y1="20" x2="48" y2="20" stroke="#C19A6B" stroke-width="0.5"/>
  <line x1="47" y1="25" x2="48" y2="25" stroke="#C19A6B" stroke-width="0.5"/>
  <line x1="47" y1="30" x2="48" y2="30" stroke="#C19A6B" stroke-width="0.5"/>
  <line x1="47" y1="35" x2="48" y2="35" stroke="#C19A6B" stroke-width="0.5"/>
  <line x1="47" y1="40" x2="48" y2="40" stroke="#C19A6B" stroke-width="0.5"/>
  <line x1="47" y1="45" x2="48" y2="45" stroke="#C19A6B" stroke-width="0.5"/>
  
  <!-- Title text on cover -->
  <text x="32" y="24" text-anchor="middle" fill="#1a0d00" font-size="4" font-family="monospace" font-weight="bold">HYDRO</text>
  <text x="32" y="30" text-anchor="middle" fill="#1a0d00" font-size="4" font-family="monospace" font-weight="bold">THERAPY</text>
  <text x="32" y="36" text-anchor="middle" fill="#1a0d00" font-size="3" font-family="monospace">MACHINERY</text>
  <text x="32" y="41" text-anchor="middle" fill="#1a0d00" font-size="3" font-family="monospace">OPERATING</text>
  <text x="32" y="46" text-anchor="middle" fill="#1a0d00" font-size="3" font-family="monospace">INSTR.</text>
  
  <!-- Water damage stains -->
  <ellipse cx="20" cy="42" rx="8" ry="6" fill="#8B4513" opacity="0.3"/>
  <ellipse cx="40" cy="20" rx="5" ry="4" fill="#8B4513" opacity="0.25"/>
  
  <!-- Warped/crinkled edges showing brittleness -->
  <path d="M 14 48 Q 16 50 18 52" fill="none" stroke="#555555" stroke-width="1"/>
  <path d="M 48 14 Q 50 16 50 18" fill="none" stroke="#555555" stroke-width="1"/>
</svg>