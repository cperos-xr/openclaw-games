<svg viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Layer 1: Background void -->
  <rect width="640" height="400" fill="#000000"/>
  
  <!-- Layer 2: Marble floor with perspective -->
  <rect x="0" y="280" width="640" height="120" fill="#1a1a1a"/>
  <line x1="0" y1="290" x2="640" y2="290" stroke="#222222" stroke-width="2"/>
  <line x1="0" y1="310" x2="640" y2="310" stroke="#222222" stroke-width="2"/>
  <line x1="0" y1="340" x2="640" y2="340" stroke="#222222" stroke-width="2"/>
  <line x1="0" y1="370" x2="640" y2="370" stroke="#222222" stroke-width="2"/>
  
  <!-- Layer 3: Ornate tile border on floor -->
  <rect x="0" y="280" width="640" height="10" fill="#333333"/>
  <rect x="0" y="380" width="640" height="10" fill="#333333"/>
  
  <!-- Layer 4: Walls -->
  <rect x="0" y="0" width="100" height="280" fill="#111111"/>
  <rect x="540" y="0" width="100" height="280" fill="#111111"/>
  
  <!-- Layer 5: Cracked plaster texture on walls -->
  <line x1="10" y1="40" x2="60" y2="120" stroke="#222222" stroke-width="1"/>
  <line x1="550" y1="60" x2="590" y2="150" stroke="#222222" stroke-width="1"/>
  <line x1="30" y1="100" x2="50" y2="200" stroke="#222222" stroke-width="1"/>
  
  <!-- Layer 6: Tall windows with moonlight -->
  <rect x="120" y="40" width="80" height="180" fill="#000088" stroke="#444444" stroke-width="3"/>
  <rect x="440" y="40" width="80" height="180" fill="#000088" stroke="#444444" stroke-width="3"/>
  
  <!-- Window crossbars -->
  <line x1="160" y1="40" x2="160" y2="220" stroke="#444444" stroke-width="2"/>
  <line x1="120" y1="130" x2="200" y2="130" stroke="#444444" stroke-width="2"/>
  <line x1="480" y1="40" x2="480" y2="220" stroke="#444444" stroke-width="2"/>
  <line x1="440" y1="130" x2="520" y2="130" stroke="#444444" stroke-width="2"/>
  
  <!-- Moonlight glow through windows -->
  <rect x="120" y="40" width="80" height="180" fill="#0000FF" opacity="0.15"/>
  <rect x="440" y="40" width="80" height="180" fill="#0000FF" opacity="0.15"/>
  
  <!-- Layer 7: Moonbeam on floor -->
  <polygon points="130,220 190,220 210,280 110,280" fill="#0000FF" opacity="0.08"/>
  <polygon points="450,220 510,220 530,280 430,280" fill="#0000FF" opacity="0.08"/>
  
  <!-- Layer 8: Iron gate -->
  <g id="iron-gate">
    <rect x="240" y="80" width="160" height="220" fill="none" stroke="#555555" stroke-width="4"/>
    <!-- Vertical bars -->
    <line x1="260" y1="80" x2="260" y2="300" stroke="#555555" stroke-width="4"/>
    <line x1="290" y1="80" x2="290" y2="300" stroke="#555555" stroke-width="4"/>
    <line x1="320" y1="80" x2="320" y2="300" stroke="#555555" stroke-width="4"/>
    <line x1="350" y1="80" x2="350" y2="300" stroke="#555555" stroke-width="4"/>
    <line x1="380" y1="80" x2="380" y2="300" stroke="#555555" stroke-width="4"/>
    <!-- Decorative top -->
    <polygon points="240,80 250,60 270,80" fill="#555555"/>
    <polygon points="290,80 300,60 320,80" fill="#555555"/>
    <polygon points="340,80 350,60 370,80" fill="#555555"/>
    <polygon points="390,80 400,60 400,80" fill="#555555"/>
  </g>
  
  <!-- Layer 9: Broken glass on floor -->
  <polygon points="150,350 160,340 155,360" fill="#AAAAAA" opacity="0.4"/>
  <polygon points="480,360 490,350 485,370" fill="#AAAAAA" opacity="0.4"/>
  <polygon points="300,370 310,365 305,380" fill="#AAAAAA" opacity="0.4"/>
  
  <!-- Layer 10: Atmospheric shadows -->
  <ellipse cx="160" cy="370" rx="60" ry="10" fill="#000000" opacity="0.5"/>
  <ellipse cx="480" cy="370" rx="60" ry="10" fill="#000000" opacity="0.5"/>
</svg>