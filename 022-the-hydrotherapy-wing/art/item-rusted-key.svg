<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" fill="#000000" stroke="#FFFFFF" stroke-width="1"/>
  
  <!-- Rusted iron key - heavy, corroded -->
  <!-- Key bow (ring) -->
  <circle cx="20" cy="24" r="10" fill="none" stroke="#8B4513" stroke-width="4"/>
  <circle cx="20" cy="24" r="5" fill="none" stroke="#8B4513" stroke-width="2"/>
  
  <!-- Key shaft -->
  <rect x="28" y="22" width="28" height="5" fill="#8B4513" rx="1"/>
  
  <!-- Key teeth -->
  <rect x="46" y="27" width="4" height="8" fill="#8B4513"/>
  <rect x="52" y="27" width="4" height="6" fill="#8B4513"/>
  
  <!-- Rust texture spots -->
  <rect x="32" y="23" width="4" height="2" fill="#CD853F" opacity="0.5"/>
  <rect x="40" y="24" width="3" height="2" fill="#CD853F" opacity="0.4"/>
  <rect x="35" y="23" width="3" height="2" fill="#A0522D" opacity="0.6"/>
  <rect x="48" y="28" width="3" height="2" fill="#A0522D" opacity="0.5"/>
  
  <!-- Corrosion on ring -->
  <rect x="14" y="18" width="4" height="3" fill="#CD853F" opacity="0.4"/>
  <rect x="22" y="30" width="3" height="3" fill="#A0522D" opacity="0.5"/>
</svg>