<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" fill="#000000" stroke="#FFFFFF" stroke-width="1"/>
  
  <!-- Surgical scalpel with wooden handle -->
  <!-- Wooden handle -->
  <rect x="10" y="28" width="28" height="10" fill="#8B4513" rx="2"/>
  <!-- Handle texture lines -->
  <line x1="14" y1="28" x2="14" y2="38" stroke="#654321" stroke-width="1"/>
  <line x1="20" y1="28" x2="20" y2="38" stroke="#654321" stroke-width="1"/>
  <line x1="26" y1="28" x2="26" y2="38" stroke="#654321" stroke-width="1"/>
  <line x1="32" y1="28" x2="32" y2="38" stroke="#654321" stroke-width="1"/>
  
  <!-- Metal ferrule connecting handle to blade -->
  <rect x="36" y="29" width="4" height="8" fill="#888888"/>
  
  <!-- Steel blade -->
  <polygon points="40,30 40,36 58,33" fill="#CCCCCC" stroke="#AAAAAA" stroke-width="1"/>
  
  <!-- Dried brown residue on blade -->
  <rect x="45" y="31" width="8" height="2" fill="#8B0000" opacity="0.4"/>
  <rect x="50" y="33" width="5" height="2" fill="#8B0000" opacity="0.3"/>
  
  <!-- Sharp edge highlight -->
  <line x1="40" y1="30" x2="58" y2="33" stroke="#FFFFFF" stroke-width="0.5" opacity="0.5"/>
</svg>