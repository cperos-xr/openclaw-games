<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" fill="#000000" stroke="#FFFFFF" stroke-width="1"/>
  
  <!-- Large iron pressure valve handle - wheel with 6 spokes -->
  <!-- Outer rim -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#555555" stroke-width="4"/>
  
  <!-- Inner rim -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#444444" stroke-width="2"/>
  
  <!-- Six spokes -->
  <line x1="32" y1="12" x2="32" y2="20" stroke="#555555" stroke-width="4"/>
  <line x1="32" y1="44" x2="32" y2="52" stroke="#555555" stroke-width="4"/>
  
  <!-- Diagonal spokes at 60 degree intervals -->
  <line x1="15" y1="22" x2="21" y2="26" stroke="#555555" stroke-width="4"/>
  <line x1="43" y1="38" x2="49" y2="42" stroke="#555555" stroke-width="4"/>
  
  <line x1="15" y1="42" x2="21" y2="38" stroke="#555555" stroke-width="4"/>
  <line x1="43" y1="26" x2="49" y2="22" stroke="#555555" stroke-width="4"/>
  
  <!-- Center hub -->
  <circle cx="32" cy="32" r="8" fill="#444444" stroke="#555555" stroke-width="2"/>
  
  <!-- Center mounting hole -->
  <circle cx="32" cy="32" r="4" fill="#000000" stroke="#333333" stroke-width="1"/>
  
  <!-- Grip texture on rim (small notches) -->
  <rect x="30" y="8" width="4" height="4" fill="#666666"/>
  <rect x="30" y="52" width="4" height="4" fill="#666666"/>
  <rect x="8" y="30" width="4" height="4" fill="#666666"/>
  <rect x="52" y="30" width="4" height="4" fill="#666666"/>
  
  <!-- Iron texture/rust -->
  <rect x="24" y="14" width="5" height="3" fill="#FF8800" opacity="0.2"/>
  <rect x="38" y="45" width="4" height="3" fill="#FF8800" opacity="0.15"/>
  <rect x="14" y="36" width="3" height="4" fill="#FF8800" opacity="0.2"/>
</svg>