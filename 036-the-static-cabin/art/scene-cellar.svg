<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <!-- Earth Walls with Roots -->
    <pattern id="earth-walls" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="#1a1208"/>
      <path d="M 0 0 Q 30 50 10 100 M 50 0 Q 80 50 60 100 M 90 0 Q 70 50 90 100" fill="none" stroke="#2a1a0d" stroke-width="3"/>
    </pattern>
    <!-- Soil Floor Texture -->
    <pattern id="soil-floor" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="#000" x="2" y="3"/>
      <rect width="1" height="1" fill="#000" x="7" y="5"/>
      <rect width="1" height="1" fill="#0d0d0d" x="0" y="0"/>
    </pattern>
  </defs>

  <!-- Layer 1: Background - Cold, Earth-walled Womb -->
  <rect width="640" height="400" fill="#0a0a00"/>
  <rect x="50" y="0" width="540" height="300" fill="url(#earth-walls)"/>
  
  <!-- Layer 2: Vibrating Earth Texture -->
  <rect x="0" y="0" width="640" height="300" fill="transparent" stroke="#222" stroke-width="2" opacity="0.4"/>
  
  <!-- Layer 3: Floor (Cold and Earthy) -->
  <rect x="0" y="300" width="640" height="100" fill="#150f08"/>
  <rect x="0" y="300" width="640" height="100" fill="url(#soil-floor)"/>
  
  <!-- Layer 4: Tube-Caddy with Vacuum Tubes -->
  <g id="tube-caddy" transform="translate(250, 180)">
    <rect x="0" y="0" width="140" height="120" fill="#111" stroke="#333" stroke-width="4"/>
    <rect x="10" y="10" width="120" height="100" fill="#080808" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Individual Tube Outlines (Electro-Voice model style) -->
    <g transform="translate(15, 20) scale(0.18)">
      <path fill="#FF8800" opacity="0.4" d="m133.2 25-53.69 94H432.5l-53.7-94H133.2zM25 137v46h462v-46H25zm32 64v46h46v-46H57zm352 0v46h46v-46h-46zM57 265v46h46v-46H57zm352 0v46h46v-46h-46zM57 329v78h46v-78H57zm352 0v78h46v-78h-46zM25 425v62h462v-62H25z"/>
    </g>
    <g transform="translate(55, 20) scale(0.18)">
      <path fill="#FF8800" opacity="0.4" d="m133.2 25-53.69 94H432.5l-53.7-94H133.2zM25 137v46h462v-46H25zm32 64v46h46v-46H57zm352 0v46h46v-46h-46zM57 265v46h46v-46H57zm352 0v46h46v-46h-46zM57 329v78h46v-78H57zm352 0v78h46v-78h-46zM25 425v62h462v-62H25z"/>
    </g>
    <g transform="translate(95, 20) scale(0.18)">
      <path fill="#FF8800" opacity="0.9" d="m133.2 25-53.69 94H432.5l-53.7-94H133.2zM25 137v46h462v-46H25zm32 64v46h46v-46H57zm352 0v46h46v-46h-46zM57 265v46h46v-46H57zm352 0v46h46v-46h-46zM57 329v78h46v-78H57zm352 0v78h46v-78h-46zM25 425v62h462v-62H25z"/> <!-- The one you can take -->
    </g>
  </g>

  <!-- Layer 5: Stored Potatoes etc. -->
  <g id="storage" transform="translate(50, 240)">
    <circle cx="20" cy="80" r="10" fill="#331a00"/>
    <circle cx="45" cy="85" r="12" fill="#331a00"/>
    <circle cx="70" cy="80" r="8" fill="#331a00"/>
  </g>

  <!-- Layer 6: Atmospheric Deep Shadows and Vibration -->
  <!-- Shadow cast by the caddy -->
  <rect x="230" y="320" width="200" height="20" fill="#000" opacity="0.6"/>
  <!-- Vibrating Root Outline (Subtle Glow) -->
  <rect x="0" y="300" width="640" height="100" fill="#33FF33" opacity="0.02"/>
</svg>