<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <!-- Dark Wood Grain -->
    <pattern id="dark-wood" width="60" height="20" patternUnits="userSpaceOnUse">
      <rect width="60" height="20" fill="#1a0d00"/>
      <rect x="0" y="2" width="58" height="16" fill="#110800" stroke="#000" stroke-width="0.5"/>
    </pattern>
    <!-- Metal Hash Pattern (Padlock/Hatch) -->
    <pattern id="metal-hash" width="10" height="10" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="10" y2="10" stroke="#333" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Layer 1: Background - Cramped Wood Walls -->
  <rect width="640" height="400" fill="#0d0600"/>
  <rect x="0" y="0" width="300" height="400" fill="url(#dark-wood)" stroke="#000" stroke-width="2"/>
  <rect x="340" y="0" width="300" height="400" fill="url(#dark-wood)" stroke="#000" stroke-width="2"/>

  <!-- Layer 2: Shelves and Canned Goods -->
  <g id="shelves" transform="translate(40, 40)">
    <rect width="200" height="10" fill="#331a00" stroke="#000" stroke-width="2"/>
    <rect y="60" width="200" height="10" fill="#331a00" stroke="#000" stroke-width="2"/>
    <!-- Cans -->
    <rect x="10" y="-20" width="15" height="20" fill="#336600"/> <!-- Pea Can -->
    <rect x="30" y="-20" width="15" height="20" fill="#660000"/> <!-- Soup Can -->
    <rect x="50" y="-20" width="15" height="20" fill="#000066"/> <!-- Bean Can -->
    <rect x="15" y="40" width="15" height="20" fill="#336600"/>
    <rect x="45" y="40" width="15" height="20" fill="#660000"/>
  </g>

  <!-- Layer 3: Floor and Trapdoor -->
  <rect x="0" y="300" width="640" height="100" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <g id="floor-trapdoor" transform="translate(200, 320)">
    <rect width="240" height="60" fill="#221100" stroke="#000" stroke-width="3"/>
    <line x1="20" y1="30" x2="220" y2="30" stroke="#110800" stroke-width="2"/>
    <!-- Padlock (Locked) -->
    <g id="padlock" transform="translate(100, 10) scale(0.2)">
      <path fill="#FF8800" stroke="#000" stroke-width="4" d="M121 17v30h270V17H121zm16 48v46h30V65h-30zm208 0v46h30V65h-30zm-224 64v30h270v-30H121zm16 48v46h30v-46h-30zm208 0v46h30v-46h-30zm-224 64v30h270v-30H121zm16 48v46h30v-46h-30zm208 0v46h30v-46h-30zm-224 64v30h270v-30H121zm16 48v46h30v-46h-30zm208 0v46h30v-46h-30zm-224 64v30h270v-30H121z"/>
    </g>
  </g>

  <!-- Layer 4: Sink with Morse Code Drips -->
  <g id="sink" transform="translate(450, 150)">
    <rect width="120" height="80" fill="#222" stroke="#444" stroke-width="2"/>
    <path d="M 10 0 Q 60 10 110 0" fill="none" stroke="#444" stroke-width="3"/> <!-- Basin -->
    <rect x="50" y="-30" width="20" height="30" fill="#333"/> <!-- Faucet -->
    <!-- Drip Sequence -->
    <circle cx="60" cy="40" r="2" fill="#0000FF" opacity="0.6"/>
    <circle cx="60" cy="55" r="2" fill="#0000FF" opacity="0.4"/>
    <rect x="58" y="65" width="4" height="2" fill="#0000FF" opacity="0.3"/> <!-- Dash -->
  </g>

  <!-- Layer 5: Item - Oil Can -->
  <g id="item-oil-can" transform="translate(480, 240) scale(0.4)">
    <!-- Oil Can Silhouette (Placeholder-style path based on common shapes) -->
    <path fill="#FF8800" d="M 20 50 L 80 50 L 100 100 L 0 100 Z"/> <!-- Base -->
    <rect x="40" y="0" width="20" height="50" fill="#FF8800"/> <!-- Spout -->
    <path d="M 10 70 Q 30 70 30 90" fill="none" stroke="#FF8800" stroke-width="4"/> <!-- Handle -->
  </g>

  <!-- Layer 6: Atmospheric Shadow Pools -->
  <ellipse cx="320" cy="380" rx="200" ry="20" fill="#000000" opacity="0.4"/>
</svg>