<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#1a1a2e"/>
  <!-- walls -->
  <rect x="0" y="0" width="640" height="280" fill="#0f3460"/>
  <!-- floor with cables -->
  <rect x="0" y="280" width="640" height="120" fill="#2a2a4a"/>
  <!-- cables pulsing -->
  <g stroke="#0f0" stroke-width="2">
    <path d="M100,280 Q200,260 300,280 T500,280"/>
    <path d="M150,300 Q250,280 350,300 T550,300"/>
  </g>
  <!-- test equipment rack -->
  <rect x="50" y="150" width="120" height="100" fill="#1a1a2e" stroke="#0f0" stroke-width="2"/>
  <!-- signal analyzer on rack -->
  <g transform="translate(80,180)">
    <rect x="0" y="0" width="30" height="20" fill="#2a2a4a" stroke="#0f0" stroke-width="1"/>
    <circle cx="15" cy="10" r="3" fill="#0f0"/>
  </g>
  <!-- exit north to archive -->
  <rect x="300" y="200" width="80" height="60" fill="#0f3460" stroke="#0f0" stroke-width="4"/>
  <text x="340" y="235" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">ARCHIVE</text>
  <!-- exit south to control -->
  <rect x="300" y="320" width="80" height="60" fill="#0f3460" stroke="#0f0" stroke-width="4"/>
  <text x="340" y="355" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">CTRL</text>
</svg>
