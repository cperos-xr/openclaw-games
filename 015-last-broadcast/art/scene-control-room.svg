<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#1a1a2e"/>
  <!-- floor -->
  <rect x="0" y="300" width="640" height="100" fill="#2a2a4a"/>
  <!-- walls -->
  <rect x="0" y="0" width="640" height="300" fill="#0f3460"/>
  <!-- large console -->
  <rect x="100" y="180" width="440" height="80" fill="#1a1a2e" stroke="#0f0" stroke-width="4"/>
  <!-- sliders -->
  <g fill="#0f0">
    <rect x="150" y="200" width="10" height="30"/>
    <rect x="200" y="200" width="10" height="30"/>
    <rect x="250" y="200" width="10" height="30"/>
    <rect x="300" y="200" width="10" height="30"/>
    <rect x="350" y="200" width="10" height="30"/>
    <rect x="400" y="200" width="10" height="30"/>
  </g>
  <!-- modulator unit -->
  <g transform="translate(500,200)">
    <rect x="0" y="0" width="60" height="40" fill="#1a1a2e" stroke="#d00" stroke-width="2"/>
    <text x="30" y="20" font-family="monospace" font-size="8" fill="#d00" text-anchor="middle">MOD</text>
  </g>
  <!-- exits -->
  <rect x="100" y="220" width="80" height="60" fill="#0f3460" stroke="#0f0" stroke-width="4"/>
  <text x="140" y="255" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">CLOSET</text>
  <rect x="500" y="220" width="80" height="60" fill="#0f3460" stroke="#0f0" stroke-width="4"/>
  <text x="540" y="255" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">XMIT</text>
</svg>
