<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#1a1a2e"/>
  <!-- floor -->
  <rect x="0" y="300" width="640" height="100" fill="#2a2a4a"/>
  <!-- walls -->
  <rect x="0" y="0" width="640" height="300" fill="#0f3460"/>
  <!-- vacuum tube array -->
  <g fill="#1a1a2e" stroke="#0f0" stroke-width="3">
    <circle cx="150" cy="150" r="20"/>
    <circle cx="220" cy="150" r="20"/>
    <circle cx="290" cy="150" r="20"/>
    <circle cx="360" cy="150" r="20"/>
    <circle cx="430" cy="150" r="20"/>
    <circle cx="500" cy="150" r="20"/>
  </g>
  <!-- main cable to antenna -->
  <g transform="translate(320,100)">
    <line x1="0" y1="0" x2="0" y2="100" stroke="#ff4500" stroke-width="4"/>
    <text x="0" y="110" font-family="monospace" font-size="8" fill="#ff4500" text-anchor="middle">MAIN</text>
  </g>
  <!-- ferrite beads on bench -->
  <g transform="translate(100,250)">
    <rect x="0" y="0" width="40" height="20" fill="#2a2a4a" stroke="#0f0" stroke-width="2"/>
    <rect x="10" y="5" width="5" height="10" fill="#0f0"/>
    <rect x="20" y="5" width="5" height="10" fill="#0f0"/>
    <rect x="30" y="5" width="5" height="10" fill="#0f0"/>
  </g>
  <!-- emergency knife on bench -->
  <g transform="translate(500,260)">
    <rect x="0" y="0" width="30" height="15" fill="#4a0000" stroke="#f00" stroke-width="1"/>
  </g>
  <!-- exits -->
  <rect x="260" y="320" width="80" height="60" fill="#0f3460" stroke="#0f0" stroke-width="4"/>
  <text x="300" y="355" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">CTRL</text>
  <rect x="500" y="200" width="80" height="80" fill="#0f3460" stroke="#0f0" stroke-width="4"/>
  <text x="540" y="242" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">SEC</text>
</svg>
