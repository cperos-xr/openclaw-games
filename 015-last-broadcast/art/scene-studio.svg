<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#1a1a2e"/>
  <!-- floor -->
  <rect x="0" y="300" width="640" height="100" fill="#2a2a4a"/>
  <!-- walls -->
  <rect x="0" y="0" width="640" height="300" fill="#0f3460"/>
  <!-- anchor desk -->
  <rect x="200" y="200" width="240" height="80" fill="#2a2a4a" stroke="#0f0" stroke-width="4"/>
  <!-- cameras -->
  <g transform="translate(150,150)">
    <rect x="0" y="0" width="30" height="40" fill="#1a1a2e" stroke="#0f0" stroke-width="2"/>
    <circle cx="15" cy="25" r="6" fill="#0f0"/>
  </g>
  <g transform="translate(460,150)">
    <rect x="0" y="0" width="30" height="40" fill="#1a1a2e" stroke="#0f0" stroke-width="2"/>
    <circle cx="15" cy="25" r="6" fill="#0f0"/>
  </g>
  <!-- playback deck -->
  <g transform="translate(300,250)">
    <rect x="0" y="0" width="40" height="20" fill="#1a1a2e" stroke="#0f0" stroke-width="2"/>
    <circle cx="20" cy="10" r="5" fill="#0f0"/>
  </g>
  <!-- exit west to lobby -->
  <rect x="100" y="200" width="60" height="80" fill="#1a1a2e" stroke="#0f0" stroke-width="4"/>
  <text x="130" y="245" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">LOBBY</text>
  <!-- exit south to archive -->
  <rect x="300" y="320" width="80" height="60" fill="#1a1a2e" stroke="#0f0" stroke-width="4"/>
  <text x="340" y="355" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">ARCHIVE</text>
</svg>
