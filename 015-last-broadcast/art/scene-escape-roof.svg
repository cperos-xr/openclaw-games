<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#000"/>
  <!-- night sky with stars -->
  <g fill="#fff">
    <circle cx="100" cy="50" r="2"/>
    <circle cx="200" cy="80" r="1.5"/>
    <circle cx="300" cy="30" r="2"/>
    <circle cx="400" cy="70" r="1"/>
    <circle cx="500" cy="40" r="2"/>
    <circle cx="600" cy="90" r="1.5"/>
    <circle cx="50" cy="120" r="1"/>
    <circle cx="550" cy="130" r="2"/>
  </g>
  <!-- rooftop -->
  <rect x="0" y="250" width="640" height="150" fill="#0d0d1a"/>
  <!-- service ladder -->
  <g stroke="#0f0" stroke-width="4">
    <line x1="300" y1="150" x2="300" y2="250"/>
    <line x1="320" y1="150" x2="320" y2="250"/>
    <line x1="300" y1="200" x2="320" y2="200"/>
  </g>
  <!-- helicopter approaching -->
  <g transform="translate(500,100)">
    <ellipse cx="0" cy="0" rx="15" ry="5" fill="#2a2a4a"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#0f0" stroke-width="2"/>
    <line x1="-25" y1="-5" x2="25" y2="-5" stroke="#0f0" stroke-width="2"/>
  </g>
</svg>
