<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Dark generator room -->
  <rect width="640" height="400" fill="#000000"/>
  
  <!-- Floor -->
  <rect y="350" width="640" height="50" fill="#1A1A1A" stroke="#000000" stroke-width="2"/>
  
  <!-- Walls -->
  <rect x="0" y="0" width="640" height="350" fill="#000000"/>
  
  <!-- Massive diesel generator (center) -->
  <rect x="220" y="100" width="200" height="200" fill="#2F2F2F" stroke="#000000" stroke-width="4"/>
  <!-- Generator details -->
  <rect x="230" y="110" width="180" height="20" fill="#1A1A1A"/>
  <rect x="230" y="140" width="180" height="20" fill="#1A1A1A"/>
  <rect x="230" y="170" width="180" height="20" fill="#1A1A1A"/>
  <rect x="230" y="200" width="180" height="20" fill="#1A1A1A"/>
  <!-- Frost on generator -->
  <rect x="220" y="100" width="200" height="20" fill="#E0F8FF" opacity="0.5"/>
  
  <!-- Control panels -->
  <!-- Left panel -->
  <rect x="50" y="100" width="120" height="200" fill="#2F2F2F" stroke="#000000" stroke-width="3"/>
  <rect x="60" y="110" width="100" height="15" fill="#1A1A1A"/> <!-- gauges -->
  <rect x="60" y="135" width="100" height="15> fill="#1A1A1A"/>
  <rect x="60" y="160" width="100" height="15" fill="#1A1A1A"/>
  <rect x="60" y="185" width="100" height="15" fill="#1A1A1A"/>
  <rect x="60" y="210" width="100" height="15" fill="#1A1A1A"/>
  <!-- Smashed panel -->
  <rect x="80" y="160" width="60" height="40" fill="#000000"/>
  <line x1="80" y1="160" x2="140" y2="200" stroke="#FF0000" stroke-width="2"/>
  <line x1="140" y1="160" x2="80" y2="200" stroke="#FF0000" stroke-width="2"/>
  
  <!-- Right panel -->
  <rect x="470" y="100" width="120" height="200" fill="#2F2F2F" stroke="#000000" stroke-width="3"/>
  <rect x="480" y="110" width="100" height="15" fill="#1A1A1A"/>
  <rect x="480" y="135" width="100" height="15" fill="#1A1A1A"/>
  <rect x="480" y="160" width="100" height="15" fill="#1A1A1A"/>
  <rect x="480" y="185" width="100" height="15" fill="#1A1A1A"/>
  <rect x="480" y="210" width="100" height="15" fill="#1A1A1A"/>
  
  <!-- Vault door (south) -->
  <rect x="290" y="250" width="60" height="100" fill="#8B0000" stroke="#000000" stroke-width="3"/>
  <!-- Frost glyphs on vault door -->
  <path d="M300,270 Q310,250 320,270 T330,270 Q340,250 350,270" fill="none" sting="#0000FF" stroke-width="2"/>
  <path d="M305,290 Q310,270 315,290 T320,290 Q325,270 330,290 T335,290 Q340,270 345,290" fill="none" stroke="#0000FF" stroke-width="2"/>
  <!-- Viewport -->
  <ellipse cx="320" cy="300" rx="20" ry="15" fill="#E0F8FF" stroke="#000000" stroke-width="1"/>
  
  <!-- Workbench -->
  <rect x="100" y="280" width="150" height="30" fill="#8B4513" stroke="#000000" stroke-width="2"/>
  <rect x="110" y="290" width="130" height="10" fill="#654321"/>
  
  <!-- Frequency coupler -->
  <rect x="120" y="240" width="60" height="40" fill="#2F2F2F" stroke="#000000" stroke-width="2"/>
  <rect x="125" y="245" width="10" height="30" fill="#00FF00"/> <!-- input -->
  <rect x="155" y="245" width="10" height="30" fill="#0000FF"/> <!-- output -->
  
  <!-- Vibration lines -->
  <path d="M220,180 Q270,150 320,180 T370,180 Q420,150 470,180" fill="none" stroke="#FFFF00" stroke-width="2" opacity="0.7"/>
  <path d="M220,200 Q270,170 320,200 T370,200 Q420,170 470,200" fill="none" stroke="#FFFF00" stroke-width="2" opacity="0.5"/>
  
  <!-- Power lines -->
  <line x1="0" y1="200" x2="640" y2="200" stroke="#00FF00" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="220" x2="640" y2="220" stroke="#00FF00" stroke-width="1" opacity="0.3"/>
</svg>