<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Dark corridor -->
  <rect width="640" height="400" fill="#000000"/>
  
  <!-- Floor -->
  <rect y="350" width="640" height="50" fill="#1A1A1A" stroke="#000000" stroke-width="2"/>
  
  <!-- Walls -->
  <rect x="0" y="0" width="640" height="350" fill="#000000"/>
  
  <!-- Red emergency lighting effect -->
  <rect y="0" width="640" height="350" fill="#8B0000" opacity="0.2"/>
  
  <!-- Frost patterns on walls -->
  <path d="M50,100 Q70,80 90,100 T130,100 Q150,80 170,100 T210,100 Q230,80 250,100 T290,100 Q310,80 330,100 T370,100 Q390,80 410,100 T450,100 Q470,80 490,100 T530,100 Q550,80 570,100 T610,100" stroke="#8B0000" stroke-width="2" fill="none"/>
  <path d="M80,150 Q100,130 120,150 T160,150 Q180,130 200,150 T240,150 Q260,130 280,150 T320,150 Q340,130 360,150 T400,150 Q420,130 440,150 T480,150 Q500,130 520,150 T560,150 Q580,130 600,150" stroke="#8B0000" stroke-width="2" fill="none"/>
  
  <!-- Doors -->
  <!-- Comm room door (west) -->
  <rect x="20" y="150" width="60" height="100" fill="#2F2F2F" stroke="#000000" stroke-width="3"/>
  <text x="30" y="210" text-anchor="middle" transform="rotate(-90 30,210)" fill="#FFFFFF" font-size="10">COMM</text>
  
  <!-- Lab door (east) -->
  <rect x="560" y="150" width="60" height="100" fill="#2F2F2F" stroke="#000000" stroke-width="3"/>
  <rect x="570" y="160" width="40" height="20" fill="#FF8800"/>
  <text x="590" y="175" text-anchor="middle" fill="#000000" font-size="8">LAB</text>
  
  <!-- Generator room door (north) -->
  <rect x="290" y="20" width="60" height="100" fill="#2F2F2F" stroke="#000000" stroke-width="3"/>
  <rect x="300" y="30" width="40" height="20" fill="#FF0000"/>
  
  <!-- Fallen locker -->
  <rect x="100" y="280" width="80" height="60" fill="#8B0000" stroke="#000000" stroke-width="2" transform="rotate(15 100,280)">
    <animateTransform attributeName="transform" type="rotate" from "0 100 280" to "15 100 280" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="100" y="280" width="20" height="60" fill="#654321" transform="rotate(15 100,280)"/>
  
  <!-- Spilled items from locker -->
  <rect x="120" y="320" width="25" height="15" fill="#000080"/>
  <rect x="150" y="320" width="15" height="10" fill="#FFFFFF"/>
  <rect x="170" y="325" width="10" height="5" fill="#8B4513"/>
  
  <!-- Maintenance keycard -->
  <rect x="320" y="340" width="20" height="12" fill="#FF8800" stroke="#000000" stroke-width="1"/>
  <rect x="322" y="342" width="16" height="8" fill="#FFFF00"/>
  
  <!-- Corridor perspective lines -->
  <line x1="0" y1="200" x2="320" y2="200" stroke="#404040" stroke-width="1"/>
  <line x1="0" y1="250" x2="320" y2="250" stroke="#404040" stroke-width="1"/>
  <line x1="320" y1="200" x2="640" y2="100" stroke="#404040" stroke-width="1"/>
  <line x1="320" y1="250" x2="640" y2="150" stroke="#404040" stroke-width="1"/>
</svg>