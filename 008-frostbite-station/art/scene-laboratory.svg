<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Dark laboratory -->
  <rect width="640" height="400" fill="#000000"/>
  
  <!-- Floor -->
  <rect y="350" width="640" height="50" fill="#1A1A1A" stroke="#000000" stroke-width="2"/>
  
  <!-- Walls -->
  <rect x="0" y="0" width="640" height="350" fill="#000000"/>
  
  <!-- Permafrost sampling rig (center) -->
  <rect x="270" y="50" width="100" height="250" fill="#8B0000" stroke="#000000" stroke-width="3"/>
  <rect x="280" y="60" width="80" height="20" fill="#2F2F2F"/>
  <rect x="280" y="90" width="80" height="20" fill="#2F2F2F"/>
  <rect x="280" y="120" width="80" height="20" fill="#2F2F2F"/>
  <rect x="280" y="150" width="80" height="20" fill="#2F2F2F"/>
  <rect x="280" y="180" width="80" height="20" fill="#2F2F2F"/>
  <rect x="280" y="210" width="80" height="20" fill="#2F2F2F"/>
  <rect x="280" y="240" width="80" height="20" fill="#2F2F2F"/>
  
  <!-- Drill bit -->
  <rect x="305" y="30" width="10" height="30" fill="#C0C0C0" stroke="#000000" stroke-width="1"/>
  <polygon points="310,30 300,50 320,50" fill="#C0C0C0" stroke="#000000" stroke-width="1"/>
  
  <!-- Borehole in wall -->
  <rect x="315" y="100" width="10" height="80" fill="#E0F8FF" stroke="#000000" stroke-width="1"/>
  <!-- Dark mass in borehole -->
  <rect x="315" y="150" width="10" height="30" fill="#2F2F2F"/>
  
  <!-- Workbench -->
  <rect x="100" y="280" width="200" height="30" fill="#8B4513" stroke="#000000" stroke-width="2"/>
  <rect x="110" y="290" width="180" height="10" fill="#654321"/>
  
  <!-- Sample drill on workbench -->
  <rect x="120" y="250" width="60" height="20" fill="#8B0000" stroke="#000000" stroke-width="2"/>
  <rect x="125" y="255" width="50" height="10" fill="#2F2F2F"/>
  <rect x="130" y="240" width="40" height="5" fill="#C0C0C0"/>
  
  <!-- Spilled toolbox -->
  <rect x="200" y="270" width="80" height="30" fill="#8B4513" stroke="#000000" stroke-width="2"/>
  <rect x="205" y="275" width="20" height="10" fill="#C0C0C0"/> <!-- wrench -->
  <rect x="230" y="275" width="15" height="10" fill="#C0C0C0"/> <!-- screwdriver -->
  <rect x="250" y="275" width="10" height="10" fill="#C0C0C0"/> <!-- pliers -->
  
  <!-- Spare parts cabinet -->
  <rect x="400" y="100" width="100" height="150" fill="#8B4513" stroke="#000000" stroke-width="2"/>
  <rect x="405" y="105" width="90" height="20" fill="#654321"/> <!-- door -->
  <rect x="410" y="130" width="20" height="10" fill="#FF0000"/> <!-- fuse -->
  <rect x="440" y="130" width="10" height="10" fill="#0000FF"/> <!-- wire -->
  <rect x="460" y="130" width="10" height="10" fill="#00FF00"/> <!-- wire -->
  
  <!-- Broken sample jars -->
  <rect x="500" y="300" width="30" height="20" fill="#E0F8FF" stroke="#000000" stroke-width="1"/>
  <rect x="505" y="305" width="20" height="10" fill="#FFFFFF"/> <!-- ice -->
  <polygon points="500,320 510,300 530,300 540,320" fill="#8B0000"/> <!-- shattered glass -->
  
  <rect x="540" y="300" width="30" height="20" fill="#E0F8FF" stroke="#000000" stroke-width="1"/>
  <rect x="545" y="305" width="20" height="10" fill="#FFFFFF"/> <!-- ice -->
  <polygon points="540,320 550,300 570,300 580,320" fill="#8B0000"/> <!-- shattered glass -->
  
  <!-- Frost spirals on floor -->
  <path d="M320,350 C340,320 300,280 320,250 C340,220 300,180 320,150" fill="none" stroke="#8B0000" stroke-width="2"/>
  <path d="300,350 C320,320 280,280 300,250 C320,220 280,180 300,150" fill="none" stroke="#8B0000" stroke-width="2"/>
</svg>