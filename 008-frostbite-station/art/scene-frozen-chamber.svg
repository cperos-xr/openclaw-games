<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Dark cavern -->
  <rect width="640" height="400" fill="#000000"/>
  
  <!-- Ice floor -->
  <rect y="350" width="640" height="50" fill="#E0F8FF" opacity="0.8" stroke="#000000" stroke-width="2"/>
  
  <!-- Ice walls (glowing) -->
  <rect x="0" y="0" width="640" height="350" fill="#E0F8FF"/>
  <!-- Inner dark layer for depth -->
  <rect x="20" y="20" width="600" height="310" fill="#000080" opacity="0.3"/>
  
  <!-- Frozen shadows in ice -->
  <path d="M100,100 Q120,80 140,100 T180,100 Q200,80 220,100 T260,100 Q280,80 300,100 T340,100 Q360,80 380,100 T420,100 Q440,80 460,100 T500,100 Q520,80 540,100 T580,100" fill="#000080" opacity="0.6"/>
  <path d="M150,200 Q170,180 190,200 T230,200 Q250,180 270,200 T310,200 Q330,180 350,200 T390,200 Q410,180 430,200 T470,200 Q490,180 510,200 T550,200 Q570,180 590,200" fill="#000080" opacity="0.5"/>
  
  <!-- Ancient device (center) -->
  <rect x="270" y="100" width="100" height="150" fill="#000000" stroke="#0000FF" stroke-width="3"/>
  <!-- Device details -->
  <rect x="280" y="110" width="80" height="20" fill="#2F2F2F"/>
  <rect x="280" y="140" width="80" height="20" fill="#2F2F2F"/>
  <rect x="280" y="170" width="80" height="20" fill="#2F2F2F"/>
  <rect x="280" y="200" width="80" height="20" fill="#2F2F2F"/>
  <rect x="280" y="230" width="80" height="20" fill="#2F2F2F"/>
  
  <!-- Glyphs on device -->
  <path d="M285,120 Q295,100 305,120 T315,120 Q325,100 335,120" fill="none" stroke="#00FFFF" stroke-width="1"/>
  <path d="M290,140 Q300,120 310,140 T320,140 Q330,120 340,140" fill="none" stroke="#00FFFF" stroke-width="1"/>
  <path d="M295,160 Q305,140 315,160 T325,160 Q335,140 345,160" fill="none" stroke="#00FFFF" stroke-width="1"/>
  <path d="M300,180 Q310,160 320,180 T330,180 Q340,160 350,180" fill="none" stroke="#00FFFF" stroke-width="1"/>
  <path d="M305,200 Q315,180 325,200 T335,200 Q345,180 355,200" fill="none" stroke="#00FFFF" stroke-width="1"/>
  
  <!-- Pedestal -->
  <rect x="295" y="260" width="50" height="30" fill="#8B4513" stroke="#000000" stroke-width="2"/>
  <!-- Slot in pedestal -->
  <rect x="305" y="260" width="30" height="30" fill="#000000"/>
  
  <!-- Ice core artifact in pedestal -->
  <rect x="307" y="262" width="26" height="26" fill="#E0F8FF" stroke="#000000" stroke-width="1"/>
  <!-- Dark mass inside -->
  <rect x="310" y="270" width="20" height="10" fill="#2F2F2F"/>
  
  <!-- Pulsing light around pedestal -->
  <ellipse cx="320" cy="280" rx="35" ry="25" fill="#00FFFF" opacity="0.3"/>
  
  <!-- Cold breath lines -->
  <path d="M100,300 Q150,250 200,300 T300,300 Q350,250 400,300 T500,300 Q550,250 600,300" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  <path d="M120,320 Q170,270 220,320 T320,320 Q370,270 420,320 T520,320 Q570,270 620,320" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
</svg>