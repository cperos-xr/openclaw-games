<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Dark room -->
  <rect width="640" height="400" fill="#000000"/>
  
  <!-- Floor -->
  <rect y="350" width="640" height="50" fill="#1A1A1A" stroke="#000000" stroke-width="2"/>
  
  <!-- Walls -->
  <rect x="0" y="0" width="640" height="350" fill="#000000"/>
  
  <!-- Equipment racks -->
  <!-- Left rack -->
  <rect x="50" y="50" width="100" height="250" fill="#2F2F2F" stroke="#000000" stroke-width="2"/>
  <rect x="55" y="60" width="90" height="20" fill="#1A1A1A"/>
  <rect x="55" y="90" width="90" height="20" fill="#1A1A1A"/>
  <rect x="55" y="120" width="90" height="20" fill="#1A1A1A"/>
  <rect x="55" y="150" width="90" height="20" fill="#1A1A1A"/>
  <rect x="55" y="180" width="90" height="20" fill="#1A1A1A"/>
  <rect x="55" y="210" width="90" height="20" fill="#1A1A1A"/>
  
  <!-- Right rack -->
  <rect x="490" y="50" width="100" height="250" fill="#2F2F2F" stroke="#000000" stroke-width="2"/>
  <rect x="495" y="60" width="90" height="20" fill="#1A1A1A"/>
  <rect x="495" y="90" width="90" height="20" fill="#1A1A1A"/>
  <rect x="495" y="120" width="90" height="20" fill="#1A1A1A"/>
  <rect x="495" y="150" width="90" height="20" fill="#1A1A1A"/>
  <rect x="495" y="180" width="90" height="20" fill="#1A1A1A"/>
  <rect x="495" y="210" width="90" height="20" fill="#1A1A1A"/>
  
  <!-- Central console -->
  <rect x="250" y="150" width="140" height="100" fill="#2F2F2F" stroke="#000000" stroke-width="3"/>
  <rect x="260" y="160" width="120" height="20" fill="#1A1A1A"/>
  <rect x="260" y="190" width="120" height="20" fill="#1A1A1A"/>
  <rect x="260" y="220" width="120" height="20" fill="#1A1A1A"/>
  
  <!-- Frozen spill on floor -->
  <ellipse cx="320" cy="370" rx="30" ry="15" fill="#8B4513" opacity="0.7"/>
  
  <!-- Frequency transmitter -->
  <rect x="300" y="280" width="40" height="30" fill="#00FF00" stroke="#000000" stroke-width="2"/>
  <rect x="305" y="285" width="30" height="20" fill="#000000"/>
  <circle cx="320" cy="295" r="3" fill="#00FF00"/>
  
  <!-- World map on wall -->
  <rect x="200" y="80" width="240" height="120" fill="#000080" stroke="#000000" stroke-width="2"/>
  <!-- Map details -->
  <rect x="210" y="90" width="10" height="10" fill="#FF0000"/> <!-- Frostbite Station -->
  <circle cx="220" cy="100" r="3" fill="#FFFFFF"/>
  <circle cx="250" cy="110" r="2" fill="#FFFFFF"/>
  <circle cx="280" cy="95" r="2" fill="#FFFFFF"/>
  <circle cx="310" cy="105" r="2" fill="#FFFFFF"/>
  <circle cx="350" cy="100" r="2" fill="#FFFFFF"/>
  <!-- Circle around Frostbite Station -->
  <ellipse cx="215" cy="95" rx="20" ry="15" fill="none" stroke="#000000" stroke-width="2"/>
  <!-- GROUND ZERO text area -->
  <rect x="240" y="110" width="80" height="20" fill="#000000"/>
  
  <!-- Note on console -->
  <rect x="270" y="170" width="100" height="30" fill="#8B0000" stroke="#000000" stroke-width="1"/>
  
  <!-- Chair -->
  <rect x="300" y="230" width="40" height="20" fill="#8B0000"/>
  <rect x="295" y="250" width="50" height="10" fill="#8B0000"/>
</svg>