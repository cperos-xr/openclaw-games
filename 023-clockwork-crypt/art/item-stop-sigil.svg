<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Stop Sigil - lead medallion with STOP symbol -->
  <!-- Medallion body (octagonal/round) -->
  <circle cx="32" cy="32" r="22" fill="#4a4a52" stroke="#2a2a32" stroke-width="3"/>
  <!-- Inner circle -->
  <circle cx="32" cy="32" r="18" fill="#5a5a62" stroke="#3a3a42" stroke-width="1"/>
  <!-- STOP text (stylized block letters) -->
  <!-- S -->
  <path d="M 18 28 Q 16 26 18 24 Q 20 22 22 24 L 22 26 Q 20 28 18 28 Z" fill="#2a2a32"/>
  <path d="M 18 32 Q 20 34 22 32 L 22 30 Q 20 28 18 30 Z" fill="#2a2a32"/>
  <!-- T -->
  <line x1="26" y1="24" x2="26" y2="34" stroke="#2a2a32" stroke-width="3"/>
  <line x1="23" y1="24" x2="29" y2="24" stroke="#2a2a32" stroke-width="3"/>
  <!-- O -->
  <ellipse cx="36" cy="29" rx="3" ry="5" fill="none" stroke="#2a2a32" stroke-width="2"/>
  <!-- P -->
  <line x1="42" y1="24" x2="42" y2="34" stroke="#2a2a32" stroke-width="2"/>
  <path d="M 42 24 Q 48 24 48 27 Q 48 30 42 30" fill="none" stroke="#2a2a32" stroke-width="2"/>
  <!-- Cold aura -->
  <circle cx="32" cy="32" r="24" fill="#8888AA" opacity="0.08"/>
  <!-- Hanging loop at top -->
  <circle cx="32" cy="8" r="3" fill="none" stroke="#4a4a52" stroke-width="2"/>
</svg>
