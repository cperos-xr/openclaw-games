<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Pendulum Weight - brass bob etched with names -->
  <!-- Pendulum bob (teardrop/round shape) -->
  <circle cx="32" cy="36" r="18" fill="#CC8800" stroke="#FF8800" stroke-width="2"/>
  <!-- Brass highlight -->
  <circle cx="28" cy="32" r="8" fill="#FFAA33" opacity="0.3"/>
  <!-- Etched names (decorative lines suggesting engraved text) -->
  <line x1="20" y1="32" x2="44" y2="32" stroke="#8B6500" stroke-width="1"/>
  <line x1="22" y1="36" x2="42" y2="36" stroke="#8B6500" stroke-width="1"/>
  <line x1="24" y1="40" x2="40" y2="40" stroke="#8B6500" stroke-width="1"/>
  <!-- Suspension hook at top -->
  <circle cx="32" cy="14" r="3" fill="none" stroke="#CC8800" stroke-width="2"/>
  <line x1="32" y1="11" x2="32" y2="8" stroke="#CC8800" stroke-width="2"/>
  <!-- Weight shadow/detail -->
  <ellipse cx="32" cy="48" rx="14" ry="4" fill="#8B6500" opacity="0.4"/>
</svg>
