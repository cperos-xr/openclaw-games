<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Oil Flask - cracked glass flask of thick black oil -->
  <!-- Flask body -->
  <ellipse cx="32" cy="38" rx="16" ry="18" fill="#1a1a1a" stroke="#444444" stroke-width="2"/>
  <!-- Glass highlight -->
  <ellipse cx="28" cy="34" rx="6" ry="8" fill="#333333" opacity="0.4"/>
  <!-- Flask neck -->
  <rect x="28" y="14" width="8" height="10" fill="#444444" stroke="#333" stroke-width="1"/>
  <!-- Cork stopper -->
  <rect x="27" y="10" width="10" height="5" fill="#8B4513" rx="1"/>
  <!-- Crack in glass -->
  <line x1="20" y1="42" x2="26" y2="36" stroke="#000000" stroke-width="1.5"/>
  <line x1="26" y1="36" x2="24" y2="30" stroke="#000000" stroke-width="1.5"/>
  <!-- Oil dripping from crack -->
  <circle cx="22" cy="44" r="2" fill="#0a0a0a"/>
  <!-- Label/band -->
  <rect x="22" y="48" width="20" height="3" fill="#555555" opacity="0.5"/>
</svg>
