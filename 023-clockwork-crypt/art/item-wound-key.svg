<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Wound Key - winding key with bone-carved handle -->
  <!-- Bone handle (top) -->
  <rect x="26" y="6" width="12" height="18" fill="#E8DCC8" stroke="#C4B896" stroke-width="2" rx="3"/>
  <!-- Bone texture/cracks -->
  <line x1="30" y1="10" x2="30" y2="18" stroke="#C4B896" stroke-width="1"/>
  <line x1="34" y1="10" x2="34" y2="18" stroke="#C4B896" stroke-width="1"/>
  <!-- Shaft -->
  <rect x="29" y="24" width="6" height="14" fill="#888888" stroke="#666666" stroke-width="1"/>
  <!-- Winding head (cross-shaped for winding) -->
  <rect x="24" y="38" width="16" height="4" fill="#FF8800" stroke="#CC5500" stroke-width="1"/>
  <rect x="30" y="34" width="4" height="12" fill="#FF8800" stroke="#CC5500" stroke-width="1"/>
  <!-- Brass winding tip -->
  <rect x="28" y="46" width="8" height="10" fill="#CC8800" stroke="#FF8800" stroke-width="1.5" rx="1"/>
  <!-- Teeth/notches on tip -->
  <rect x="34" y="50" width="3" height="3" fill="#CC8800"/>
  <rect x="34" y="53" width="2" height="2" fill="#CC8800"/>
</svg>
