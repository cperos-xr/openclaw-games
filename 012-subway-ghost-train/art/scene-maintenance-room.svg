<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0a0a1a"/>
  <!-- walls -->
  <rect x="0" y="0" width="640" height="250" fill="#1a1a2a"/>
  <!-- floor -->
  <rect x="0" y="250" width="640" height="150" fill="#0d0d1a"/>
  <!-- tool racks -->
  <g fill="#2a2a3a" stroke="#0f0" stroke-width="2">
    <rect x="50" y="150" width="120" height="80"/>
    <rect x="200" y="150" width="120" height="80"/>
  </g>
  <!-- workbench with lantern -->
  <rect x="400" y="180" width="150" height="50" fill="#2a2a3a" stroke="#0f0" stroke-width="3"/>
  <!-- lantern on bench -->
  <g transform="translate(420,190)">
    <rect x="0" y="0" width="20" height="30" fill="#4a4a5a" stroke="#0f0" stroke-width="1"/>
    <circle cx="10" cy="10" r="8" fill="#0f0"/>
  </g>
  <!-- logbook on bench -->
  <g transform="translate(480,200)">
    <rect x="0" y="0" width="40" height="30" fill="#5a3a1a" stroke="#ffd700" stroke-width="1"/>
  </g>
  <!-- exit west to platform -->
  <rect x="100" y="320" width="80" height="60" fill="#1a1a2a" stroke="#0f0" stroke-width="4"/>
  <text x="140" y="352" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">PLAT</text>
  <!-- exit south to signal -->
  <rect x="300" y="340" width="80" height="40" fill="#1a1a2a" stroke="#0f0" stroke-width="4"/>
  <text x="340" y="372" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">SIGNAL</text>
</svg>
