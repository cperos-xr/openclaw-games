<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0a0a1a"/>
  <!-- platform -->
  <rect x="0" y="250" width="640" height="150" fill="#2a2a3a"/>
  <!-- tracks -->
  <g fill="#1a1a2a">
    <rect x="100" y="270" width="440" height="10"/>
    <rect x="100" y="300" width="440" height="10"/>
  </g>
  <!-- turnstile -->
  <g transform="translate(50,200)">
    <rect x="0" y="0" width="60" height="80" fill="#3a3a4a" stroke="#0f0" stroke-width="3"/>
    <rect x="10" y="20" width="40" height="40" fill="#0f0"/>
  </g>
  <!-- tunnel entrance south -->
  <rect x="300" y="150" width="120" height="100" fill="#1a1a2a" stroke="#0f0" stroke-width="4"/>
  <text x="360" y="195" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">TUNNEL</text>
  <!-- flickering sign -->
  <g transform="translate(500,80)">
    <rect x="0" y="0" width="80" height="30" fill="#000" stroke="#f00" stroke-width="2"/>
    <text x="40" y="18" font-family="monospace" font-size="8" fill="#f00" text-anchor="middle">NO SERVICE</text>
  </g>
</svg>
