<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0a0a1a"/>
  <!-- walls -->
  <rect x="0" y="0" width="640" height="250" fill="#1a1a2a"/>
  <!-- floor -->
  <rect x="0" y="250" width="640" height="150" fill="#0d0d1a"/>
  <!-- relay racks -->
  <g fill="#2a2a3a" stroke="#0f0" stroke-width="2">
    <rect x="50" y="100" width="150" height="120"/>
    <rect x="450" y="100" width="150" height="120"/>
  </g>
  <!-- signal console -->
  <g transform="translate(260,120)">
    <rect x="0" y="0" width="120" height="60" fill="#1a1a2a" stroke="#0f0" stroke-width="3"/>
    <rect x="10" y="20" width="100" height="20" fill="#0f0"/>
    <text x="60" y="32" font-family="monospace" font-size="8" fill="#000" text-anchor="middle">TRAIN 7</text>
  </g>
  <!-- breaker panel -->
  <g transform="translate(500,250)">
    <rect x="0" y="0" width="80" height="50" fill="#2a2a3a" stroke="#f00" stroke-width="2"/>
    <rect x="10" y="15" width="20" height="20" fill="#f00"/>
    <text x="40" y="28" font-family="monospace" font-size="8" fill="#f00" text-anchor="middle">EMPTY</text>
  </g>
  <!-- brake handle on shelf -->
  <g transform="translate(100,200)">
    <rect x="0" y="0" width="60" height="30" fill="#2a2a3a" stroke="#0f0" stroke-width="2"/>
    <circle cx="30" cy="15" r="8" fill="#ff4500"/>
  </g>
  <!-- exits -->
  <rect x="200" y="330" width="80" height="60" fill="#1a1a2a" stroke="#0f0" stroke-width="4"/>
  <text x="240" y="362" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">PLAT</text>
  <rect x="300" y="80" width="80" height="60" fill="#1a1a2a" stroke="#0f0" stroke-width="4"/>
  <text x="340" y="112" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">MAINT</text>
</svg>
