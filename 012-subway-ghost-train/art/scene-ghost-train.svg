<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0a0a1a"/>
  <!-- train car outline -->
  <ellipse cx="320" cy="200" rx="200" ry="80" fill="none" stroke="#0f0" stroke-width="4"/>
  <!-- ghostly passengers -->
  <g fill="#666" opacity="0.6">
    <ellipse cx="260" cy="180" rx="15" ry="30"/>
    <ellipse cx="320" cy="180" rx="15" ry="30"/>
    <ellipse cx="380" cy="180" rx="15" ry="30"/>
  </g>
  <!-- emergency brake mechanism -->
  <g transform="translate(280,250)">
    <circle cx="20" cy="20" r="30" fill="#2a2a3a" stroke="#0f0" stroke-width="3"/>
    <line x1="20" y1="20" x2="20" y2="50" stroke="#888" stroke-width="4"/>
    <circle cx="20" cy="20" r="8" fill="#f00"/>
  </g>
  <!-- train control panel -->
  <g transform="translate(450,200)">
    <rect x="0" y="0" width="60" height="40" fill="#1a1a2a" stroke="#0f0" stroke-width="2"/>
    <text x="30" y="20" font-family="monospace" font-size="8" fill="#0f0" text-anchor="middle">BRAKE</text>
  </g>
</svg>
