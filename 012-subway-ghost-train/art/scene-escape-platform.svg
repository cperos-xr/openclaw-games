<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0a0a1a"/>
  <!-- moonlit platform -->
  <rect x="0" y="250" width="640" height="150" fill="#2a2a3a"/>
  <!-- moonlight shaft -->
  <rect x="200" y="0" width="240" height="250" fill="#e0e0ff" opacity="0.1"/>
  <!-- exit signs -->
  <g transform="translate(100,100)">
    <rect x="0" y="0" width="80" height="40" fill="#000" stroke="#0f0" stroke-width="3"/>
    <text x="40" y="22" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">EXIT</text>
  </g>
  <g transform="translate(460,100)">
    <rect x="0" y="0" width="80" height="40" fill="#000" stroke="#0f0" stroke-width="3"/>
    <text x="40" y="22" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">EXIT</text>
  </g>
  <!-- ghostly train fading -->
  <ellipse cx="320" cy="180" rx="150" ry="60" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="10,5" opacity="0.5"/>
</svg>
