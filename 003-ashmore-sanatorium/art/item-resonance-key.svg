<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Resonance Key - Inventory Icon -->
  <rect x="0" y="0" width="64" height="64" fill="#2A2A44"/>
  <!-- Handle base -->
  <rect x="26" y="44" width="12" height="8" fill="#B8860B" stroke="#000000" stroke-width="2"/>
  <!-- Shaft -->
  <line x1="32" y1="44" x2="32" y2="28" stroke="#B8860B" stroke-width="4"/>
  <!-- Tuning fork prongs -->
  <line x1="26" y1="28" x2="26" y2="16" stroke="#B8860B" stroke-width="3"/>
  <line x1="38" y1="28" x2="38" y2="16" stroke="#B8860B" stroke-width="3"/>
  <!-- Prong tips -->
  <circle cx="26" cy="16" r="3" fill="#DAA520" stroke="#000000" stroke-width="1"/>
  <circle cx="38" cy="16" r="3" fill="#DAA520" stroke="#000000" stroke-width="1"/>
  <!-- Pale glow -->
  <ellipse cx="32" cy="20" rx="14" ry="10" fill="#AAEEFF" opacity="0.3"/>
  <ellipse cx="32" cy="22" rx="8" ry="6" fill="#AAEEFF" opacity="0.5"/>
  <ellipse cx="32" cy="24" rx="4" ry="3" fill="#FFFFFF" opacity="0.7"/>
  <!-- Vibration lines -->
  <line x1="18" y1="18" x2="22" y2="20" stroke="#AAEEFF" stroke-width="1" opacity="0.6"/>
  <line x1="42" y1="20" x2="46" y2="18" stroke="#AAEEFF" stroke-width="1" opacity="0.6"/>
  <line x1="28" y1="12" x2="30" y2="8" stroke="#AAEEFF" stroke-width="1" opacity="0.6"/>
  <line x1="34" y1="12" x2="36" y2="8" stroke="#AAEEFF" stroke-width="1" opacity="0.6"/>
</svg>