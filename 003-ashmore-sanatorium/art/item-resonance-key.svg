<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Layer 1: Resonance Key Body - Stylized as an early resonator (looks medical) -->
  <!-- Main handle and base -->
  <path d="M 12 56 L 52 56 L 52 50 L 12 50 Z" fill="#4B3A2G" stroke="#000" stroke-width="2"/>
  <path d="M 28 50 L 28 36 L 36 36 L 36 50 Z" fill="#5A5A7A" stroke="#000" stroke-width="1.5"/>
  
  <!-- Layer 2: Resonator Chamber (Spherical aspect) -->
  <circle cx="32" cy="24" r="16" fill="#B8860B" stroke="#000" stroke-width="2"/>
  <!-- Decorative glass/glow -->
  <circle cx="32" cy="24" r="10" fill="#AAEEFF" opacity="0.3" stroke="#000" stroke-width="1"/>
  
  <!-- Layer 3: Resonance Stabilization Tines (Musical note fork element) -->
  <path d="M 24 16 L 24 8 Q 24 0 32 0 Q 40 0 40 8 L 40 16" fill="none" stroke="#B8860B" stroke-width="4"/>
  <path d="M 26 18 Q 32 10 38 18" fill="none" stroke="#DAA520" stroke-width="2" opacity="0.5"/>
  
  <!-- "Resonance" Pulse effect -->
  <circle cx="32" cy="24" r="20" fill="none" stroke="#AAEEFF" stroke-width="1" opacity="0.2"/>
  <circle cx="32" cy="24" r="24" fill="none" stroke="#AAEEFF" stroke-width="0.5" opacity="0.1"/>
