<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Patient Ledger - Inventory Icon -->
  <rect x="0" y="0" width="64" height="64" fill="#2A2A44"/>
  <!-- Leather cover -->
  <rect x="16" y="10" width="32" height="44" fill="#8B6914" stroke="#000000" stroke-width="2"/>
  <!-- Spine -->
  <rect x="16" y="10" width="5" height="44" fill="#6A4A10" stroke="#000000" stroke-width="1"/>
  <!-- Pages visible on right -->
  <rect x="44" y="12" width="2" height="40" fill="#D2B48C" stroke="#000000" stroke-width="0.5"/>
  <!-- Open page -->
  <rect x="22" y="14" width="22" height="36" fill="#D2B48C" stroke="#000000" stroke-width="1"/>
  <!-- Binding line -->
  <line x1="33" y1="14" x2="33" y2="50" stroke="#000000" stroke-width="1"/>
  <!-- Text lines -->
  <line x1="25" y1="22" x2="41" y2="22" stroke="#000000" stroke-width="1"/>
  <line x1="25" y1="27" x2="41" y2="27" stroke="#000000" stroke-width="1"/>
  <line x1="25" y1="32" x2="41" y2="32" stroke="#000000" stroke-width="1"/>
  <line x1="25" y1="37" x2="41" y2="37" stroke="#000000" stroke-width="1"/>
  <!-- Red circle -->
  <circle cx="33" cy="42" r="6" fill="#FF0000" stroke="#000000" stroke-width="1" opacity="0.7"/>
  <!-- Numbers inside circle -->
  <text x="33" y="45" font-family="monospace" font-size="7" fill="#000000" text-anchor="middle">739</text>
</svg>