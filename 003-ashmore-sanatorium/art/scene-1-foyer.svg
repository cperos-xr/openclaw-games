<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <!-- Apple II Style - The Foyer -->
  <defs>
    <pattern id="frost" patternUnits="userSpaceOnUse" width="8" height="8">
      <line x1="0" y1="0" x2="8" y2="8" stroke="#AAEEFF" stroke-width="1" opacity="0.5"/>
      <line x1="8" y1="0" x2="0" y2="8" stroke="#AAEEFF" stroke-width="1" opacity="0.5"/>
    </pattern>
    <pattern id="marble" patternUnits="userSpaceOnUse" width="16" height="16">
      <rect width="16" height="16" fill="#444466"/>
      <line x1="0" y1="0" x2="16" y2="0" stroke="#555588" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="16" stroke="#555588" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- Background walls -->
  <rect x="0" y="0" width="640" height="250" fill="#2A2A44" stroke="#000000" stroke-width="4"/>
  
  <!-- Floor with marble pattern -->
  <rect x="0" y="250" width="640" height="150" fill="url(#marble)" stroke="#000000" stroke-width="4"/>
  
  <!-- Wall texture - peeling wallpaper -->
  <rect x="10" y="10" width="200" height="100" fill="#3A3A5A" stroke="#000000" stroke-width="2"/>
  <rect x="220" y="10" width="200" height="100" fill="#3A3A5A" stroke="#000000" stroke-width="2"/>
  <rect x="430" y="10" width="200" height="100" fill="#3A3A5A" stroke="#000000" stroke-width="2"/>
  
  <!-- Frost overlay on walls -->
  <rect x="0" y="0" width="640" height="250" fill="url(#frost)"/>
  
  <!-- Wrought iron banister (left side) -->
  <rect x="20" y="100" width="8" height="150" fill="#111133" stroke="#000000" stroke-width="3"/>
  <line x1="28" y1="100" x2="120" y2="50" stroke="#111133" stroke-width="4"/>
  <line x1="28" y1="130" x2="110" y2="80" stroke="#111133" stroke-width="2"/>
  <line x1="28" y1="160" x2="100" y2="110" stroke="#111133" stroke-width="2"/>
  
  <!-- Chandelier -->
  <line x1="320" y1="0" x2="320" y2="60" stroke="#AAAAAA" stroke-width="3"/>
  <ellipse cx="320" cy="70" rx="40" ry="15" fill="#8888BB" stroke="#000000" stroke-width="2"/>
  <!-- Ice stalactites on chandelier -->
  <polygon points="290,80 295,120 285,120" fill="#AAEEFF" stroke="#000000" stroke-width="1"/>
  <polygon points="310,80 315,130 305,130" fill="#AAEEFF" stroke="#000000" stroke-width="1"/>
  <polygon points="330,80 335,125 325,125" fill="#AAEEFF" stroke="#000000" stroke-width="1"/>
  <polygon points="350,80 355,115 345,115" fill="#AAEEFF" stroke="#000000" stroke-width="1"/>
  
  <!-- Reception desk -->
  <rect x="100" y="200" width="120" height="50" fill="#5A3A2A" stroke="#000000" stroke-width="3"/>
  <rect x="105" y="205" width="110" height="5" fill="#6A4A3A" stroke="#000000" stroke-width="1"/>
  
  <!-- Guest book on desk -->
  <rect x="130" y="207" width="30" height="20" fill="#8B6914" stroke="#000000" stroke-width="2"/>
  <line x1="145" y1="207" x2="145" y2="227" stroke="#000000" stroke-width="1"/>
  
  <!-- Master key on hook -->
  <circle cx="240" cy="180" r="3" fill="#B8860B" stroke="#000000" stroke-width="1"/>
  <rect x="238" y="183" width="4" height="15" fill="#B8860B" stroke="#000000" stroke-width="1"/>
  <rect x="235" y="198" width="10" height="4" fill="#B8860B" stroke="#000000" stroke-width="1"/>
  
  <!-- Records door -->
  <rect x="450" y="100" width="80" height="150" fill="#5A3A2A" stroke="#000000" stroke-width="4"/>
  <rect x="455" y="105" width="70" height="140" fill="#6A4A3A" stroke="#000000" stroke-width="2"/>
  <circle cx="525" cy="175" r="5" fill="#B8860B" stroke="#000000" stroke-width="2"/>
  <!-- Gold lettering -->
  <!-- "RECORDS" sign-simulated marks -->
  <path d="M475 88 L480 88 M483 88 L488 88 M491 88 L496 88 M499 88 L505 88" stroke="#DAA520" stroke-width="1.5"/>
  <path d="M480 92 L490 92 M495 92 L500 92" stroke="#DAA520" stroke-width="1.2"/>
  
  <!-- The Warden (hulking figure) -->
  <rect x="320" y="120" width="40" height="130" fill="#3A3A5A" stroke="#000000" stroke-width="3"/>
  <!-- Head -->
  <circle cx="340" cy="105" r="18" fill="#4A4A6A" stroke="#000000" stroke-width="2"/>
  <!-- Eyes -->
  <circle cx="334" cy="102" r="3" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <circle cx="346" cy="102" r="3" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <circle cx="334" cy="102" r="1.5" fill="#000000"/>
  <circle cx="346" cy="102" r="1.5" fill="#000000"/>
  <!-- Raised foot (mid-stride) -->
  <rect x="350" y="240" width="20" height="10" fill="#3A3A5A" stroke="#000000" stroke-width="2" transform="rotate(-20 350 240)"/>
  <!-- Uniform details -->
  <line x1="325" y1="140" x2="355" y2="140" stroke="#000000" stroke-width="1"/>
  <line x1="325" y1="160" x2="355" y2="160" stroke="#000000" stroke-width="1"/>
  
  <!-- Frost on floor -->
  <rect x="0" y="250" width="640" height="20" fill="#AAEEFF" opacity="0.2"/>
</svg>