<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <!-- Apple II Style - Observatory -->
  <defs>
    <pattern id="stars" patternUnits="userSpaceOnUse" width="40" height="40">
      <rect width="40" height="40" fill="#0A0A2A"/>
      <circle cx="5" cy="5" r="1" fill="#FFFFFF"/>
      <circle cx="20" cy="15" r="0.5" fill="#FFFFFF"/>
      <circle cx="35" cy="8" r="1" fill="#FFFFFF"/>
      <circle cx="10" cy="30" r="0.5" fill="#FFFFFF"/>
      <circle cx="30" cy="35" r="1" fill="#FFFFFF"/>
    </pattern>
    <pattern id="glass" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="6" fill="#AAEEFF" opacity="0.2"/>
      <line x1="0" y1="0" x2="6" y2="6" stroke="#FFFFFF" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Starry night sky -->
  <rect x="0" y="0" width="640" height="250" fill="url(#stars)" stroke="#000000" stroke-width="4"/>
  
  <!-- Circular room walls (glass and steel) -->
  <ellipse cx="320" cy="250" rx="300" ry="150" fill="none" stroke="#555577" stroke-width="4"/>
  <ellipse cx="320" cy="250" rx="295" ry="145" fill="none" stroke="#666688" stroke-width="2"/>
  
  <!-- Glass panes in dome -->
  <line x1="320" y1="100" x2="320" y2="250" stroke="#555577" stroke-width="2"/>
  <line x1="100" y1="180" x2="540" y2="180" stroke="#555577" stroke-width="2"/>
  <line x1="170" y1="130" x2="470" y2="220" stroke="#555577" stroke-width="1"/>
  <line x1="470" y1="130" x2="170" y2="220" stroke="#555577" stroke-width="1"/>
  
  <!-- Ice on windows (fracturing) -->
  <polygon points="50,180 80,160 70,200" fill="#AAEEFF" opacity="0.3"/>
  <polygon points="570,170 600,150 590,190" fill="#AAEEFF" opacity="0.3"/>
  <!-- Evaporating ice -->
  <polygon points="300,110 320,90 340,110" fill="#AAEEFF" opacity="0.2"/>
  
  <!-- Massive telescope -->
  <rect x="100" y="180" width="120" height="20" fill="#555577" stroke="#000000" stroke-width="3"/>
  <rect x="200" y="175" width="80" height="30" fill="#666688" stroke="#000000" stroke-width="3"/>
  <!-- Telescope lens (frosted) -->
  <ellipse cx="280" cy="190" rx="15" ry="20" fill="#AAEEFF" stroke="#000000" stroke-width="2"/>
  <ellipse cx="280" cy="190" rx="10" ry="15" fill="#FFFFFF" opacity="0.4"/>
  <!-- Mount -->
  <rect x="160" y="200" width="20" height="50" fill="#444466" stroke="#000000" stroke-width="2"/>
  
  <!-- The Frostwell - central apparatus -->
  <rect x="270" y="220" width="100" height="30" fill="#555577" stroke="#000000" stroke-width="3"/>
  <!-- Cylindrical body -->
  <rect x="290" y="160" width="60" height="60" fill="#B8860B" stroke="#000000" stroke-width="3"/>
  <!-- Crystal top -->
  <polygon points="300,160 320,130 340,160" fill="#AAEEFF" stroke="#000000" stroke-width="2"/>
  <!-- Pulsing blue light -->
  <ellipse cx="320" cy="190" rx="20" ry="15" fill="#0000FF" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="320" cy="190" rx="12" ry="8" fill="#AAEEFF" opacity="0.7">
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Light beam shooting upward -->
  <polygon points="315,130 325,130 330,50 310,50" fill="#AAEEFF" opacity="0.3"/>
  <polygon points="318,130 322,130 325,60 315,60" fill="#FFFFFF" opacity="0.2"/>
  
  <!-- Control panel -->
  <rect x="400" y="230" width="100" height="50" fill="#444466" stroke="#000000" stroke-width="3"/>
  <!-- Dials -->
  <circle cx="425" cy="250" r="8" fill="#333355" stroke="#000000" stroke-width="2"/>
  <circle cx="460" cy="250" r="8" fill="#333355" stroke="#000000" stroke-width="2"/>
  <line x1="425" y1="250" x2="430" y2="245" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="460" y1="250" x2="465" y2="248" stroke="#FFFFFF" stroke-width="1"/>
  <!-- Switches -->
  <rect x="490" y="240" width="5" height="15" fill="#555577" stroke="#000000" stroke-width="1"/>
  <rect x="490" y="240" width="5" height="5" fill="#00FF00" stroke="#000000" stroke-width="0.5"/>
  <!-- Keyhole (tuning fork shaped) -->
  <circle cx="445" cy="265" r="5" fill="#000000" stroke="#000000" stroke-width="1"/>
  <line x1="443" y1="270" x2="443" y2="276" stroke="#000000" stroke-width="2"/>
  <line x1="447" y1="270" x2="447" y2="276" stroke="#000000" stroke-width="2"/>
  
  <!-- Plaque -->
  <rect x="395" y="215" width="110" height="12" fill="#B8860B" stroke="#000000" stroke-width="1"/>
  <!-- "Resonance Stabilization Array" Plaque/Label marks -->
  <path d="M420 220 L440 220 M445 220 L465 220 M470 220 L485 220" stroke="#000" stroke-width="0.8"/>
  <path d="M425 224 L445 224 M450 224 L475 224" stroke="#000" stroke-width="0.5"/>
  
  <!-- Floor -->
  <rect x="0" y="300" width="640" height="100" fill="#3A3A5A" stroke="#000000" stroke-width="4"/>
  <rect x="200" y="300" width="240" height="100" fill="#4A4A6A" stroke="#000000" stroke-width="2"/>
  
  <!-- Dawn horizon -->
  <rect x="0" y="60" width="640" height="20" fill="#FF8800" opacity="0.3"/>
  <rect x="0" y="70" width="640" height="10" fill="#FFFF00" opacity="0.2"/>
  
  <!-- Light intensifying -->
  <ellipse cx="320" cy="180" rx="40" ry="30" fill="#FFFFFF" opacity="0.1">
    <animate attributeName="rx" values="30;50;30" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="20;40;20" dur="3s" repeatCount="indefinite"/>
  </ellipse>
</svg>