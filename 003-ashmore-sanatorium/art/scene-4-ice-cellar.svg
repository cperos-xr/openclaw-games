<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <!-- Apple II Style - Ice Cellar -->
  <defs>
    <pattern id="ice" patternUnits="userSpaceOnUse" width="10" height="10">
      <rect width="10" height="10" fill="#AAEEFF" opacity="0.3"/>
      <polygon points="0,10 5,0 10,10" fill="#FFFFFF" opacity="0.2"/>
    </pattern>
    <pattern id="stone" patternUnits="userSpaceOnUse" width="16" height="8">
      <rect width="16" height="8" fill="#4A4A6A"/>
      <line x1="0" y1="0" x2="16" y2="0" stroke="#5A5A7A" stroke-width="1"/>
      <line x1="0" y1="4" x2="0" y2="4" stroke="#5A5A7A" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- Stone walls -->
  <rect x="0" y="0" width="640" height="280" fill="url(#stone)" stroke="#000000" stroke-width="4"/>
  
  <!-- Ice floor -->
  <rect x="0" y="280" width="640" height="120" fill="#AAEEFF" stroke="#000000" stroke-width="4"/>
  <rect x="0" y="280" width="640" height="120" fill="url(#ice)"/>
  
  <!-- Storage lockers on left -->
  <rect x="20" y="60" width="50" height="220" fill="#555577" stroke="#000000" stroke-width="3"/>
  <rect x="25" y="70" width="40" height="45" fill="#666688" stroke="#000000" stroke-width="2"/>
  <rect x="25" y="125" width="40" height="45" fill="#666688" stroke="#000000" stroke-width="2"/>
  <rect x="25" y="180" width="40" height="45" fill="#666688" stroke="#000000" stroke-width="2"/>
  <rect x="25" y="235" width="40" height="40" fill="#666688" stroke="#000000" stroke-width="2"/>
  <!-- Ice on lockers -->
  <rect x="20" y="60" width="50" height="10" fill="#AAEEFF" opacity="0.4"/>
  
  <!-- More lockers -->
  <rect x="80" y="80" width="50" height="200" fill="#555577" stroke="#000000" stroke-width="3"/>
  <rect x="85" y="90" width="40" height="45" fill="#666688" stroke="#000000" stroke-width="2"/>
  <rect x="85" y="145" width="40" height="45" fill="#666688" stroke="#000000" stroke-width="2"/>
  <rect x="85" y="200" width="40" height="75" fill="#666688" stroke="#000000" stroke-width="2"/>
  
  <!-- Scratching sound indicator -->
  <!-- "~scratch~" Scratched wall marks -->
  <path d="M50 165 L60 175 M55 160 L65 170 M70 165 L80 175 M75 160 L85 170" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="1.5"/>
  
  <!-- Autopsy table in center -->
  <rect x="250" y="200" width="140" height="10" fill="#AAAAAA" stroke="#000000" stroke-width="3"/>
  <rect x="260" y="210" width="5" height="90" fill="#888888" stroke="#000000" stroke-width="2"/>
  <rect x="375" y="210" width="5" height="90" fill="#888888" stroke="#000000" stroke-width="2"/>
  <!-- Mirror finish -->
  <rect x="255" y="202" width="130" height="4" fill="#FFFFFF" opacity="0.3"/>
  
  <!-- Wall safe -->
  <rect x="450" y="100" width="80" height="80" fill="#555577" stroke="#000000" stroke-width="4"/>
  <rect x="455" y="105" width="70" height="70" fill="#666688" stroke="#000000" stroke-width="2"/>
  <!-- Combination dial -->
  <circle cx="490" cy="140" r="15" fill="#333355" stroke="#000000" stroke-width="2"/>
  <circle cx="490" cy="140" r="10" fill="#444466" stroke="#000000" stroke-width="1"/>
  <line x1="490" y1="130" x2="490" y2="138" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Placard -->
  <rect x="455" y="85" width="70" height="12" fill="#D2B48C" stroke="#000000" stroke-width="1"/>
  <!-- "Patient Records" Simulated text -->
  <path d="M470 92 L475 92 M478 92 L482 92 M485 92 L490 92 M494 92 L510 92" stroke="#000" stroke-width="0.8"/>
  <path d="M475 96 L485 96 M490 96 L505 96" stroke="#000" stroke-width="0.5"/>
  
  <!-- Patient ledger beside safe -->
  <rect x="540" y="120" width="30" height="40" fill="#8B6914" stroke="#000000" stroke-width="2"/>
  <line x1="555" y1="120" x2="555" y2="160" stroke="#000000" stroke-width="1"/>
  <!-- Red circle entry -->
  <circle cx="548" cy="140" r="5" fill="#FF0000" stroke="#000000" stroke-width="1" opacity="0.7"/>
  <!-- Numbers -->
  <!-- "7-3-9" Simulated numerical signs -->
  <path d="M545 152 L548 152 M552 152 L555 152 M559 152 L562 152" stroke="#000" stroke-width="1.2"/>
  <path d="M548 156 L552 156 M556 156 L560 156" stroke="#000" stroke-width="0.8"/>
  
  <!-- North door (Director's Office) -->
  <rect x="250" y="20" width="140" height="60" fill="#5A3A2A" stroke="#000000" stroke-width="4"/>
  <rect x="255" y="25" width="130" height="50" fill="#6A4A3A" stroke="#000000" stroke-width="2"/>
  <!-- Tuning fork lock -->
  <line x1="320" y1="50" x2="320" y2="65" stroke="#B8860B" stroke-width="3"/>
  <line x1="315" y1="50" x2="315" y2="58" stroke="#B8860B" stroke-width="3"/>
  <line x1="325" y1="50" x2="325" y2="58" stroke="#B8860B" stroke-width="3"/>
  <circle cx="315" cy="58" r="3" fill="#B8860B"/>
  <circle cx="325" cy="58" r="3" fill="#B8860B"/>
  <!-- "DIRECTOR'S OFFICE" Simulated text -->
  <path d="M280 12 L290 12 M295 12 L310 12 M315 12 L330 12 M335 12 L350 12" stroke="#FFFFFF" stroke-width="1.2"/>
  <path d="M290 16 L310 16 M320 16 L345 16" stroke="#FFFFFF" stroke-width="0.8" opacity="0.6"/>
  
  <!-- Ice formations on walls -->
  <polygon points="0,0 30,0 20,60 10,40" fill="#AAEEFF" stroke="#000000" stroke-width="1"/>
  <polygon points="610,0 640,0 630,50 620,30" fill="#AAEEFF" stroke="#000000" stroke-width="1"/>
  <polygon points="200,0 250,0 240,40 210,35" fill="#AAEEFF" stroke="#000000" stroke-width="1"/>
  
  <!-- Frost breath effect -->
  <ellipse cx="320" cy="350" rx="60" ry="15" fill="#FFFFFF" opacity="0.1"/>
</svg>