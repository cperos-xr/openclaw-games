<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Battery Cell - Inventory Icon -->
  <rect x="0" y="0" width="64" height="64" fill="#2A2A44"/>
  <!-- Battery casing -->
  <rect x="20" y="12" width="24" height="40" fill="#444466" stroke="#000000" stroke-width="2"/>
  <!-- Top cap -->
  <rect x="22" y="14" width="20" height="6" fill="#555577" stroke="#000000" stroke-width="1"/>
  <!-- Bottom -->
  <rect x="22" y="46" width="20" height="4" fill="#555577" stroke="#000000" stroke-width="1"/>
  <!-- Inner blue glow -->
  <ellipse cx="32" cy="32" rx="8" ry="12" fill="#0000FF" opacity="0.5"/>
  <ellipse cx="32" cy="32" rx="5" ry="8" fill="#AAEEFF" opacity="0.7"/>
  <!-- Pulsing effect -->
  <ellipse cx="32" cy="32" rx="3" ry="5" fill="#FFFFFF" opacity="0.8"/>
  <!-- Metallic bands -->
  <rect x="20" y="22" width="24" height="3" fill="#B8860B" stroke="#000000" stroke-width="1"/>
  <rect x="20" y="39" width="24" height="3" fill="#B8860B" stroke="#000000" stroke-width="1"/>
  <!-- Frost on top -->
  <rect x="24" y="14" width="16" height="2" fill="#AAEEFF" opacity="0.3"/>
</svg>