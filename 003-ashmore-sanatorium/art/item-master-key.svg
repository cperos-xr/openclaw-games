<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Master Key - Inventory Icon -->
  <rect x="0" y="0" width="64" height="64" fill="#2A2A44"/>
  <!-- Key bow (handle) -->
  <circle cx="22" cy="22" r="12" fill="#B8860B" stroke="#000000" stroke-width="2"/>
  <circle cx="22" cy="22" r="7" fill="#DAA520" stroke="#000000" stroke-width="1"/>
  <!-- Key shaft -->
  <rect x="30" y="19" width="22" height="6" fill="#B8860B" stroke="#000000" stroke-width="2"/>
  <!-- Key bit (teeth) -->
  <rect x="48" y="25" width="6" height="14" fill="#B8860B" stroke="#000000" stroke-width="2"/>
  <rect x="50" y="30" width="4" height="4" fill="#DAA520" stroke="#000000" stroke-width="1"/>
  <!-- Frost accent -->
  <rect x="18" y="10" width="8" height="3" fill="#AAEEFF" opacity="0.5"/>
  <rect x="40" y="17" width="6" height="2" fill="#AAEEFF" opacity="0.3"/>
</svg>