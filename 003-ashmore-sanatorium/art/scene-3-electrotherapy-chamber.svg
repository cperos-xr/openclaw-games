<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <!-- Apple II Style - Electrotherapy Chamber -->
  <defs>
    <pattern id="rust" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="6" fill="#666688"/>
      <circle cx="3" cy="3" r="1" fill="#8B4513" opacity="0.5"/>
    </pattern>
    <pattern id="tile" patternUnits="userSpaceOnUse" width="20" height="20">
      <rect width="20" height="20" fill="#3A3A5A"/>
      <line x1="0" y1="0" x2="20" y2="0" stroke="#4A4A6A" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="20" stroke="#4A4A6A" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- Background walls -->
  <rect x="0" y="0" width="640" height="280" fill="#2A2A44" stroke="#000000" stroke-width="4"/>
  
  <!-- Floor tiles -->
  <rect x="0" y="280" width="640" height="120" fill="url(#tile)" stroke="#000000" stroke-width="4"/>
  
  <!-- Metal gurneys on left wall -->
  <rect x="20" y="150" width="100" height="40" fill="#555577" stroke="#000000" stroke-width="3"/>
  <rect x="25" y="155" width="90" height="5" fill="#666688" stroke="#000000" stroke-width="1"/>
  <!-- Restraints -->
  <rect x="40" y="157" width="15" height="3" fill="#5A3A2A" stroke="#000000" stroke-width="1"/>
  <rect x="80" y="157" width="15" height="3" fill="#5A3A2A" stroke="#000000" stroke-width="1"/>
  <!-- Legs -->
  <rect x="35" y="190" width="5" height="90" fill="#555577" stroke="#000000" stroke-width="2"/>
  <rect x="95" y="190" width="5" height="90" fill="#555577" stroke="#000000" stroke-width="2"/>
  
  <!-- Second gurney -->
  <rect x="140" y="160" width="90" height="35" fill="#555577" stroke="#000000" stroke-width="3"/>
  <rect x="145" y="164" width="80" height="4" fill="#666688" stroke="#000000" stroke-width="1"/>
  <rect x="155" y="195" width="5" height="85" fill="#555577" stroke="#000000" stroke-width="2"/>
  <rect x="210" y="195" width="5" height="85" fill="#555577" stroke="#000000" stroke-width="2"/>
  
  <!-- Wires from ceiling -->
  <line x1="100" y1="0" x2="100" y2="150" stroke="#B87333" stroke-width="2"/>
  <line x1="180" y1="0" x2="180" y2="160" stroke="#B87333" stroke-width="2"/>
  <line x1="250" y1="0" x2="250" y2="100" stroke="#B87333" stroke-width="2"/>
  <!-- Frayed ends -->
  <circle cx="100" cy="150" r="3" fill="#000000"/>
  <circle cx="180" cy="160" r="3" fill="#000000"/>
  <circle cx="250" cy="100" r="3" fill="#000000"/>
  
  <!-- Massive generator in center -->
  <rect x="280" y="120" width="120" height="140" fill="url(#rust)" stroke="#000000" stroke-width="4"/>
  <rect x="285" y="125" width="110" height="5" fill="#7777AA" stroke="#000000" stroke-width="1"/>
  <!-- Open panel -->
  <rect x="310" y="170" width="60" height="50" fill="#3A3A5A" stroke="#000000" stroke-width="2"/>
  <!-- Battery terminals -->
  <rect x="320" y="185" width="15" height="8" fill="#B8860B" stroke="#000000" stroke-width="1"/>
  <rect x="350" y="185" width="15" height="8" fill="#B8860B" stroke="#000000" stroke-width="1"/>
  <!-- Dials on generator -->
  <circle cx="300" cy="145" r="8" fill="#444466" stroke="#000000" stroke-width="2"/>
  <circle cx="380" cy="145" r="8" fill="#444466" stroke="#000000" stroke-width="2"/>
  <line x1="300" y1="145" x2="305" y2="140" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="380" y1="145" x2="385" y2="150" stroke="#FFFFFF" stroke-width="1"/>
  
  <!-- Battery cell on shelf -->
  <rect x="420" y="180" width="50" height="8" fill="#5A3A2A" stroke="#000000" stroke-width="2"/>
  <rect x="430" y="165" width="30" height="20" fill="#444466" stroke="#000000" stroke-width="2"/>
  <!-- Blue glow inside -->
  <ellipse cx="445" cy="175" rx="8" ry="6" fill="#0000FF" opacity="0.6"/>
  <ellipse cx="445" cy="175" rx="5" ry="4" fill="#AAEEFF" opacity="0.8"/>
  
  <!-- Monitoring equipment on wall -->
  <rect x="480" y="80" width="140" height="80" fill="#333355" stroke="#000000" stroke-width="3"/>
  <!-- Dead dials -->
  <circle cx="510" cy="110" r="12" fill="#2A2A44" stroke="#000000" stroke-width="2"/>
  <circle cx="550" cy="110" r="12" fill="#2A2A44" stroke="#000000" stroke-width="2"/>
  <circle cx="590" cy="110" r="12" fill="#2A2A44" stroke="#000000" stroke-width="2"/>
  <!-- Cracked glass -->
  <line x1="505" y1="105" x2="515" y2="115" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  <line x1="545" y1="105" x2="555" y2="115" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  
  <!-- Schematic diagram -->
  <rect x="480" y="180" width="140" height="100" fill="#D2B48C" stroke="#000000" stroke-width="2"/>
  <!-- Red line (CRYO-FEED) -->
  <line x1="500" y1="200" x2="500" y2="260" stroke="#FF0000" stroke-width="3"/>
  <line x1="500" y1="260" x2="600" y2="260" stroke="#FF0000" stroke-width="3"/>
  <text x="550" y="275" font-family="monospace" font-size="8" fill="#FF0000">CRYO-FEED</text>
  
  <!-- East door (Ice Cellar Access) -->
  <rect x="560" y="100" width="70" height="180" fill="#555577" stroke="#000000" stroke-width="4"/>
  <!-- Snowflake symbol -->
  <text x="595" y="180" font-family="monospace" font-size="20" fill="#AAEEFF" text-anchor="middle">*</text>
  <text x="595" y="210" font-family="monospace" font-size="8" fill="#FFFFFF" text-anchor="middle">ICE CELLAR</text>
  <!-- Keyhole -->
  <circle cx="615" cy="230" r="5" fill="#000000" stroke="#000000" stroke-width="1"/>
  <rect x="613" y="235" width="4" height="8" fill="#000000"/>
</svg>