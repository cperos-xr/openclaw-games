<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <!-- Apple II Style - Director's Office -->
  <defs>
    <pattern id="wood" patternUnits="userSpaceOnUse" width="8" height="4">
      <rect width="8" height="4" fill="#5A3A2A"/>
      <line x1="0" y1="2" x2="8" y2="2" stroke="#6A4A3A" stroke-width="0.5"/>
    </pattern>
    <pattern id="papers" patternUnits="userSpaceOnUse" width="12" height="12">
      <rect width="12" height="12" fill="#D2B48C" opacity="0.5"/>
    </pattern>
  </defs>
  
  <!-- Background walls -->
  <rect x="0" y="0" width="640" height="250" fill="#3A3A5A" stroke="#000000" stroke-width="4"/>
  
  <!-- Floor -->
  <rect x="0" y="250" width="640" height="150" fill="url(#wood)" stroke="#000000" stroke-width="4"/>
  
  <!-- Wall of windows (iced over) -->
  <rect x="150" y="30" width="340" height="180" fill="#AAEEFF" stroke="#000000" stroke-width="4"/>
  <rect x="155" y="35" width="330" height="170" fill="#FFFFFF" opacity="0.3"/>
  <!-- Window panes -->
  <line x1="320" y1="30" x2="320" y2="210" stroke="#000000" stroke-width="3"/>
  <line x1="150" y1="120" x2="490" y2="120" stroke="#000000" stroke-width="3"/>
  <!-- Ice patterns on windows -->
  <polygon points="200,40 210,60 190,65" fill="#FFFFFF" opacity="0.4"/>
  <polygon points="350,50 365,80 340,75" fill="#FFFFFF" opacity="0.4"/>
  <polygon points="430,45 440,70 420,75" fill="#FFFFFF" opacity="0.4"/>
  
  <!-- Massive oak desk -->
  <rect x="200" y="220" width="240" height="40" fill="#5A3A2A" stroke="#000000" stroke-width="4"/>
  <rect x="205" y="225" width="230" height="5" fill="#6A4A3A" stroke="#000000" stroke-width="1"/>
  <!-- Desk legs -->
  <rect x="220" y="260" width="15" height="40" fill="#4A2A1A" stroke="#000000" stroke-width="2"/>
  <rect x="405" y="260" width="15" height="40" fill="#4A2A1A" stroke="#000000" stroke-width="2"/>
  
  <!-- Papers scattered on desk -->
  <rect x="220" y="227" width="25" height="15" fill="url(#papers)" stroke="#000000" stroke-width="1" transform="rotate(5 232 234)"/>
  <rect x="260" y="228" width="30" height="12" fill="url(#papers)" stroke="#000000" stroke-width="1" transform="rotate(-8 275 234)"/>
  <rect x="350" y="226" width="20" height="18" fill="url(#papers)" stroke="#000000" stroke-width="1" transform="rotate(12 360 235)"/>
  
  <!-- Blueprints -->
  <rect x="300" y="227" width="35" height="20" fill="#8888BB" stroke="#000000" stroke-width="1"/>
  <line x1="305" y1="232" x2="330" y2="232" stroke="#000000" stroke-width="0.5"/>
  <line x1="305" y1="238" x2="330" y2="238" stroke="#000000" stroke-width="0.5"/>
  <circle cx="317" cy="242" r="3" stroke="#000000" stroke-width="0.5" fill="none"/>
  
  <!-- Resonance key on desk -->
  <line x1="420" y1="235" x2="420" y2="245" stroke="#B8860B" stroke-width="3"/>
  <line x1="415" y1="235" x2="415" y2="242" stroke="#B8860B" stroke-width="3"/>
  <line x1="425" y1="235" x2="425" y2="242" stroke="#B8860B" stroke-width="3"/>
  <circle cx="415" cy="242" r="3" fill="#B8860B"/>
  <circle cx="425" cy="242" r="3" fill="#B8860B"/>
  <!-- Pale glow -->
  <ellipse cx="420" cy="240" rx="12" ry="8" fill="#AAEEFF" opacity="0.4"/>
  
  <!-- Phonograph on side table -->
  <rect x="500" y="200" width="60" height="10" fill="#5A3A2A" stroke="#000000" stroke-width="2"/>
  <rect x="510" y="170" width="40" height="30" fill="#5A3A2A" stroke="#000000" stroke-width="3"/>
  <!-- Turntable -->
  <ellipse cx="530" cy="200" rx="15" ry="5" fill="#333355" stroke="#000000" stroke-width="1"/>
  <!-- Wax cylinder -->
  <rect x="523" y="175" width="14" height="15" fill="#D2B48C" stroke="#000000" stroke-width="1"/>
  <!-- Note beside it -->
  <rect x="565" y="185" width="25" height="20" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
  <text x="570" y="193" font-family="monospace" font-size="5" fill="#000000">Final</text>
  <text x="570" y="200" font-family="monospace" font-size="5" fill="#000000">log...</text>
  
  <!-- Spiral staircase -->
  <path d="M 100 250 Q 80 200 90 150 Q 100 100 85 60" fill="none" stroke="#555577" stroke-width="4"/>
  <path d="M 110 250 Q 90 200 100 150 Q 110 100 95 60" fill="none" stroke="#666688" stroke-width="2"/>
  <!-- Steps -->
  <line x1="85" y1="230" x2="115" y2="230" stroke="#555577" stroke-width="2"/>
  <line x1="88" y1="200" x2="112" y2="200" stroke="#555577" stroke-width="2"/>
  <line x1="83" y1="170" x2="107" y2="170" stroke="#555577" stroke-width="2"/>
  <line x1="86" y1="140" x2="110" y2="140" stroke="#555577" stroke-width="2"/>
  <line x1="82" y1="110" x2="106" y2="110" stroke="#555577" stroke-width="2"/>
  <!-- Metal gate -->
  <rect x="75" y="40" width="40" height="25" fill="none" stroke="#555577" stroke-width="3"/>
  <line x1="80" y1="45" x2="80" y2="60" stroke="#555577" stroke-width="1"/>
  <line x1="88" y1="45" x2="88" y2="60" stroke="#555577" stroke-width="1"/>
  <line x1="96" y1="45" x2="96" y2="60" stroke="#555577" stroke-width="1"/>
  <line x1="104" y1="45" x2="104" y2="60" stroke="#555577" stroke-width="1"/>
  <!-- Tuning fork slot in gate -->
  <line x1="90" y1="50" x2="90" y2="56" stroke="#B8860B" stroke-width="2"/>
  <line x1="87" y1="50" x2="87" y2="54" stroke="#B8860B" stroke-width="2"/>
  <line x1="93" y1="50" x2="93" y2="54" stroke="#B8860B" stroke-width="2"/>
  
  <!-- Portrait of Dr. Ashmore -->
  <rect x="520" y="50" width="80" height="100" fill="#5A3A2A" stroke="#000000" stroke-width="4"/>
  <rect x="525" y="55" width="70" height="90" fill="#4A4A6A" stroke="#000000" stroke-width="1"/>
  <!-- Face -->
  <ellipse cx="560" cy="95" rx="18" ry="22" fill="#D2B48C" stroke="#000000" stroke-width="1"/>
  <!-- Severe eyes -->
  <circle cx="554" cy="90" r="3" fill="#000000"/>
  <circle cx="566" cy="90" r="3" fill="#000000"/>
  <!-- Grim mouth -->
  <line x1="555" y1="105" x2="565" y2="105" stroke="#000000" stroke-width="1"/>
  <!-- Frost on frame -->
  <rect x="520" y="50" width="80" height="5" fill="#AAEEFF" opacity="0.3"/>
  
  <!-- Charged air effect -->
  <line x1="300" y1="10" x2="310" y2="30" stroke="#AAEEFF" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="15" x2="390" y2="35" stroke="#AAEEFF" stroke-width="1" opacity="0.5"/>
  <line x1="350" y1="5" x2="355" y2="25" stroke="#AAEEFF" stroke-width="1" opacity="0.5"/>
</svg>