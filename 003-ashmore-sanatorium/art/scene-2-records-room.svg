<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <!-- Apple II Style - Records Room -->
  <defs>
    <pattern id="paper" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="4" fill="#D2B48C"/>
      <line x1="0" y1="2" x2="4" y2="2" stroke="#C2A47C" stroke-width="0.5"/>
    </pattern>
    <pattern id="metal" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#666688"/>
      <line x1="0" y1="0" x2="8" y2="8" stroke="#7777AA" stroke-width="0.5"/>
    </pattern>
  </defs>
  
  <!-- Background walls -->
  <rect x="0" y="0" width="640" height="300" fill="#3A3A5A" stroke="#000000" stroke-width="4"/>
  
  <!-- Floor -->
  <rect x="0" y="300" width="640" height="100" fill="#4A4A3A" stroke="#000000" stroke-width="4"/>
  
  <!-- Filing cabinets on left wall -->
  <rect x="20" y="80" width="60" height="220" fill="url(#metal)" stroke="#000000" stroke-width="3"/>
  <rect x="25" y="100" width="50" height="40" fill="#7777AA" stroke="#000000" stroke-width="2"/>
  <rect x="25" y="150" width="50" height="40" fill="#7777AA" stroke="#000000" stroke-width="2"/>
  <rect x="25" y="200" width="50" height="40" fill="#7777AA" stroke="#000000" stroke-width="2"/>
  <rect x="25" y="250" width="50" height="40" fill="#7777AA" stroke="#000000" stroke-width="2"/>
  
  <!-- More filing cabinets -->
  <rect x="90" y="100" width="60" height="200" fill="url(#metal)" stroke="#000000" stroke-width="3"/>
  <rect x="95" y="120" width="50" height="40" fill="#7777AA" stroke="#000000" stroke-width="2"/>
  <rect x="95" y="170" width="50" height="40" fill="#7777AA" stroke="#000000" stroke-width="2"/>
  <rect x="95" y="220" width="50" height="40" fill="#7777AA" stroke="#000000" stroke-width="2"/>
  
  <!-- Papers spilling out -->
  <rect x="60" y="140" width="15" height="8" fill="url(#paper)" stroke="#000000" stroke-width="1" transform="rotate(15 67 144)"/>
  <rect x="130" y="160" width="12" height="6" fill="url(#paper)" stroke="#000000" stroke-width="1" transform="rotate(-10 136 163)"/>
  <rect x="140" y="210" width="18" height="8" fill="url(#paper)" stroke="#000000" stroke-width="1" transform="rotate(5 149 214)"/>
  
  <!-- Large desk in center -->
  <rect x="250" y="200" width="140" height="60" fill="#5A3A2A" stroke="#000000" stroke-width="4"/>
  <rect x="255" y="205" width="130" height="5" fill="#6A4A3A" stroke="#000000" stroke-width="1"/>
  
  <!-- Typewriter -->
  <rect x="270" y="210" width="40" height="20" fill="#333355" stroke="#000000" stroke-width="2"/>
  <rect x="275" y="215" width="30" height="8" fill="#444466" stroke="#000000" stroke-width="1"/>
  
  <!-- Cipher wheel -->
  <circle cx="350" cy="225" r="18" fill="#B8860B" stroke="#000000" stroke-width="2"/>
  <circle cx="350" cy="225" r="12" fill="#DAA520" stroke="#000000" stroke-width="1"/>
  <circle cx="350" cy="225" r="6" fill="#AAEEFF" stroke="#000000" stroke-width="1"/>
  <line x1="350" y1="213" x2="350" y2="237" stroke="#000000" stroke-width="1"/>
  <line x1="338" y1="225" x2="362" y2="225" stroke="#000000" stroke-width="1"/>
  
  <!-- Journal -->
  <rect x="380" y="215" width="25" height="30" fill="#8B6914" stroke="#000000" stroke-width="2"/>
  <line x1="392" y1="215" x2="392" y2="245" stroke="#000000" stroke-width="1"/>
  <!-- Scribbled numbers -->
  <!-- "739" Simulated marks -->
  <path d="M392 228 L394 228 M397 228 L399 228" stroke="#000" stroke-width="1"/>
  <path d="M394 231 L397 231" stroke="#000" stroke-width="1.2"/>
  
  <!-- Large map on wall -->
  <rect x="450" y="50" width="170" height="200" fill="#D2B48C" stroke="#000000" stroke-width="3"/>
  <rect x="455" y="55" width="160" height="190" fill="#C2A47C" stroke="#000000" stroke-width="1"/>
  <!-- Map details -->
  <rect x="480" y="80" width="30" height="30" fill="#5A3A2A" stroke="#000000" stroke-width="1"/>
  <rect x="520" y="100" width="40" height="25" fill="#5A3A2A" stroke="#000000" stroke-width="1"/>
  <rect x="470" y="140" width="50" height="30" fill="#5A3A2A" stroke="#000000" stroke-width="1"/>
  <!-- Red pins -->
  <circle cx="495" cy="95" r="3" fill="#FF0000" stroke="#000000" stroke-width="1"/>
  <circle cx="540" cy="112" r="3" fill="#FF0000" stroke="#000000" stroke-width="1"/>
  <circle cx="495" cy="155" r="3" fill="#FF0000" stroke="#000000" stroke-width="1"/>
  <!-- Trail line -->
  <line x1="495" y1="95" x2="540" y2="112" stroke="#FF0000" stroke-width="2"/>
  <line x1="540" y1="112" x2="495" y2="155" stroke="#FF0000" stroke-width="2"/>
  
  <!-- North door (Electrotherapy) -->
  <rect x="280" y="10" width="80" height="60" fill="#444466" stroke="#000000" stroke-width="3"/>
  <circle cx="350" cy="40" r="4" fill="#666688" stroke="#000000" stroke-width="1"/>
  <!-- "ELECTROTHERAPY" Sign-simulated marks -->
  <path d="M290 8 L300 8 M305 8 L320 8 M325 8 L340 8 M345 8 L355 8" stroke="#FFFFFF" stroke-width="1"/>
  <path d="M300 12 L315 12 M325 12 L345 12" stroke="#FFFFFF" stroke-width="0.8" opacity="0.6"/>
  
  <!-- South stairs -->
  <rect x="250" y="320" width="140" height="80" fill="#2A2A44" stroke="#000000" stroke-width="3"/>
  <line x1="260" y1="330" x2="380" y2="330" stroke="#000000" stroke-width="2"/>
  <line x1="265" y1="345" x2="375" y2="345" stroke="#000000" stroke-width="2"/>
  <line x1="270" y1="360" x2="370" y2="360" stroke="#000000" stroke-width="2"/>
  <!-- Chain and padlock -->
  <line x1="290" y1="325" x2="290" y2="380" stroke="#888888" stroke-width="3"/>
  <circle cx="290" cy="352" r="6" fill="#B8860B" stroke="#000000" stroke-width="2"/>
</svg>