<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Ashmore Sanatorium — OpenClaw Adventures</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  background: #000;
  color: #33ff33;
  font-family: 'Press Start 2P', 'Courier New', monospace;
  font-size: 12px;
  line-height: 1.6;
  overflow: hidden;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 999;
  background: repeating-linear-gradient(
    transparent,
    transparent 2px,
    rgba(0,0,0,0.12) 2px,
    rgba(0,0,0,0.12) 4px
  );
  pointer-events: none;
}

#game-container {
  display: grid;
  grid-template-columns: 1fr 320px;
  grid-template-rows: auto 1fr auto;
  height: 100vh;
  gap: 8px;
  padding: 8px;
}

#header {
  grid-column: 1 / -1;
  text-align: center;
  padding: 8px;
  border-bottom: 1px solid #226622;
}

#art-display {
  grid-row: 2;
  background: #111;
  border: 2px solid #33ff33;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

#art-display svg,
#art-display img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

#art-display .no-art {
  color: #226622;
  font-size: 14px;
}

#text-panel {
  grid-row: 2;
  display: flex;
  flex-direction: column;
  border: 2px solid #33ff33;
  background: #111;
}

#scene-name {
  background: #000;
  padding: 8px;
  border-bottom: 1px solid #33ff33;
  text-align: center;
  font-size: 14px;
  color: #ffff33;
}

#text-display {
  flex: 1;
  padding: 12px;
  overflow-y: auto;
}

#text-display p {
  margin-bottom: 12px;
}

#text-display .system {
  color: #33bbff;
}

#text-display .success {
  color: #ffff33;
}

#text-display .locked {
  color: #ff3333;
}

#text-display .error {
  color: #ff5555;
}

#command-bar {
  grid-column: 1;
  grid-row: 3;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 8px;
  border-top: 1px solid #226622;
}

.cmd-btn {
  background: #111;
  color: #33ff33;
  border: 1px solid #33ff33;
  padding: 8px 12px;
  font-family: inherit;
  font-size: 10px;
  cursor: pointer;
}

.cmd-btn.active {
  background: #33ff33;
  color: #000;
}

#exits-bar {
  grid-column: 2;
  grid-row: 3;
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 8px;
  border-top: 1px solid #226622;
}

.exit-btn {
  background: #111;
  color: #33ff33;
  border: 1px solid #33ff33;
  width: 60px;
  height: 40px;
  font-family: inherit;
  font-size: 10px;
  cursor: pointer;
}

.exit-btn.available {
  background: #226622;
}

.exit-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

#inventory-bar {
  grid-column: 1 / -1;
  grid-row: 4;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px;
  border-top: 1px solid #226622;
  min-height: 48px;
}

#inv-label {
  color: #ffff33;
  font-size: 10px;
}

#inv-empty {
  color: #226622;
  font-size: 10px;
}

.inv-item {
  background: #111;
  color: #33ff33;
  border: 1px solid #33ff33;
  padding: 6px 10px;
  font-size: 10px;
  cursor: pointer;
}

.inv-item.selected {
  background: #33ff33;
  color: #000;
}

.inv-item.item-new {
  animation: itemGlow 1s ease-in-out 3;
}

/* Animation keyframes */
@keyframes puzzle-solved {
  0% { filter: brightness(1) drop-shadow(0 0 4px #ffff33); }
  50% { filter: brightness(1.8) drop-shadow(0 0 20px #ffff33); }
  100% { filter: brightness(1) drop-shadow(0 0 4px #ffff33); }
}

@keyframes unlockPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

@keyframes itemGlow {
  0% { box-shadow: 0 0 4px #33ff33; }
  50% { box-shadow: 0 0 16px #33ff33; }
  100% { box-shadow: 0 0 4px #33ff33; }
}

.puzzle-solved {
  animation: puzzle-solved 0.6s ease-out;
}

.unlock-pulse {
  animation: unlockPulse 0.6s ease-out;
}

.look-target {
  color: #ffff33;
  text-decoration: underline;
  cursor: pointer;
}

.look-target:hover {
  color: #ffcc00;
}

.hint {
  color: #FFAA00 !important;
  font-style: italic;
  border-left: 2px solid #FFAA00;
  padding-left: 8px;
  margin: 5px 0;
}
.hint::before {
  content: "🤔 HINT: ";
  font-weight: bold;
}
#hint-toggle {
  background: #000;
  color: #33ff33;
  border: 1px solid #33ff33;
  padding: 5px 10px;
  cursor: pointer;
  font-family: 'Press Start 2P', 'Courier New', monospace;
  margin-left: 10px;
}

#footer {
  grid-column: 1 / -1;
  text-align: center;
  padding: 8px;
  color: #113311;
  font-size: 8px;
  border-top: 1px solid #113311;
}
</style>
</head>
<body>
<div id="game-container">
  <div id="header">
    <h1>THE ASHMORE SANATORIUM</h1>
    <div>OpenClaw Adventures — Game #003</div>
  </div>

  <div id="art-display">

  </div>

  <div id="text-panel">

  </div>

  <div id="command-bar">
    <button class="cmd-btn" data-cmd="look">LOOK</button>
    <button class="cmd-btn" data-cmd="take">TAKE</button>
    <button class="cmd-btn" data-cmd="use">USE</button>
    <button class="cmd-btn" data-cmd="examine">EXAMINE</button>
    <button id="hint-toggle" class="cmd-btn">HINTS: ON</button>
  </div>

  <div id="exits-bar">
    <button class="exit-btn" data-dir="north">NORTH</button>
    <button class="exit-btn" data-dir="south">SOUTH</button>
    <button class="exit-btn" data-dir="east">EAST</button>
    <button class="exit-btn" data-dir="west">WEST</button>
  </div>

  <div id="inventory-bar">
    <span id="inv-label">INVENTORY:</span>
    <span id="inv-empty">(empty)</span>
  </div>

  <div id="footer">
    OpenClaw Point & Click Studio | Commands: LOOK, TAKE, USE, EXAMINE | Click exits to move | Press / to restart

</div>

  "electrotherapy-chamber": "<img src=\"art/scene-electrotherapy-chamber.png\" alt=\"scene-electrotherapy-chamber\">",
  "ice-cellar": "<img src=\"art/scene-ice-cellar.png\" alt=\"scene-ice-cellar\">",
  "directors-office": "<img src=\"art/scene-directors-office.png\" alt=\"scene-directors-office\">",
  "observatory": "<img src=\"art/scene-observatory.png\" alt=\"scene-observatory\">",
  "master-key": "<img src=\"art/item-master-key.png\" alt=\"item-master-key\">",
  "cipher-wheel": "<img src=\"art/item-cipher-wheel.png\" alt=\"item-cipher-wheel\">",
  "battery-cell": "<img src=\"art/item-battery-cell.png\" alt=\"item-battery-cell\">",
  "patient-ledger": "<img src=\"art/item-patient-ledger.png\" alt=\"item-patient-ledger\">",
  "resonance-key": "<img src=\"art/item-resonance-key.png\" alt=\"item-resonance-key\">"
};

// ============================================================
// THE ASHMORE SANATORIUM — Game Logic
// Engine: Vanilla JS point-and-click adventure
// Author: Hex Corbin
// ============================================================

// ---- Game State ----
const state = {
  currentScene: 'foyer',
  inventory: [],
  solvedPuzzles: [],
  visitedScenes: ['foyer'],
  activeCommand: null,
  selectedItem: null,
  won: false,
  hintsEnabled: true,
  hintTimeouts: []
};

// ---- DOM References ----
const artDisplay = document.getElementById('art-display');
const sceneName = document.getElementById('scene-name');
const textDisplay = document.getElementById('text-display');
const invBar = document.getElementById('inventory-bar');
const exitsBar = document.getElementById('exits-bar');

// ---- Display Helpers ----
function addText(text, cls = '') {
  const p = document.createElement('p');
  p.className = cls;
  p.innerHTML = text;
  textDisplay.appendChild(p);
  textDisplay.scrollTop = textDisplay.scrollHeight;
}

function clearText() { textDisplay.innerHTML = ''; }

// ---- Hint System ----
function clearHintTimers() {
  state.hintTimeouts.forEach(timeout => clearTimeout(timeout));
  state.hintTimeouts = [];
}

function showHint(sceneId, index) {
  if (!state.hintsEnabled) return;
  const hints = GAME_DATA.hints && GAME_DATA.hints[sceneId];
  if (!hints || index >= hints.length) return;
  const hint = hints[index];
  addText(hint.text, 'hint');
}

function startHintTimer(sceneId) {
  clearHintTimers();
  const hints = GAME_DATA.hints && GAME_DATA.hints[sceneId];
  if (!hints || !state.hintsEnabled) return;
  hints.forEach((hint, idx) => {
    const timeout = setTimeout(() => showHint(sceneId, idx), hint.delay * 1000);
    state.hintTimeouts.push(timeout);
  });
}

function toggleHints() {
  state.hintsEnabled = !state.hintsEnabled;
  const btn = document.getElementById('hint-toggle');
  if (btn) btn.textContent = state.hintsEnabled ? 'HINTS: ON' : 'HINTS: OFF';
  if (!state.hintsEnabled) {
    clearHintTimers();
  } else {
    startHintTimer(state.currentScene);
  }
}

// ---- Visual Feedback: Puzzle Solved ----
function flashPuzzleSolved() {
  artDisplay.classList.add('puzzle-solved');
  setTimeout(() => artDisplay.classList.remove('puzzle-solved'), 600);
}

// ---- Visual Feedback: Item Glow ----
function flashItemNew() {
  const invItems = invBar.querySelectorAll('.inv-item');
  invItems.forEach(el => {
    el.classList.add('item-new');
    setTimeout(() => el.classList.remove('item-new'), 2000);
  });
}

// ---- Locked Exit Check ----
// CRITICAL: Every movement must call this first
function canExit(sceneId, direction) {
  const scene = GAME_DATA.scenes.find(s => s.id === sceneId);
  if (!scene || !scene.exits || !scene.exits[direction]) return false;

  // Check if any unsolved puzzle blocks this exit
  const blocker = GAME_DATA.puzzles.find(p =>
    p.blocksExit &&
    p.blocksExit.scene === sceneId &&
    p.blocksExit.direction === direction &&
    !state.solvedPuzzles.includes(p.id)
  );

  if (blocker) {
    const msg = blocker.blockedMessage || blocker.blocked ||
      'Something prevents you from going that way.';
    addText(`[The way ${direction} is blocked. ${msg}]`, 'locked');
    return false;
  }
  return true;
}

// ---- Scene Rendering ----
function renderScene(sceneId) {
  const scene = GAME_DATA.scenes.find(s => s.id === sceneId);
  if (!scene) { addText('ERROR: Scene not found!', 'error'); return; }

  state.currentScene = sceneId;
  if (!state.visitedScenes.includes(sceneId)) state.visitedScenes.push(sceneId);

  // Hint timer
  clearHintTimers();
  startHintTimer(sceneId);

  // Update scene name
  sceneName.textContent = scene.name.toUpperCase();

  // Update art
  const artKey = sceneId;
  if (window.GAME_ART && window.GAME_ART[artKey]) {
    artDisplay.innerHTML = window.GAME_ART[artKey];
  } else {
    artDisplay.innerHTML = '<span class="no-art">[ ' + scene.name.toUpperCase() + ' ]</span>';
  }

  // Display prose
  clearText();
  addText(scene.prose);

  // Show available items (not yet taken)
  const availableItems = (scene.items || []).filter(itemId =>
    !state.inventory.includes(itemId)
  );
  if (availableItems.length > 0) {
    const itemNames = availableItems.map(id => {
      const item = GAME_DATA.items.find(i => i.id === id);
      return item ? `<span class="look-target" data-look="${id}">${item.name}</span>` : id;
    });
    addText('You notice: ' + itemNames.join(', '), 'system');
  }

  // Show unsolved puzzles as interactive targets
  const scenePuzzles = (scene.puzzles || []).filter(pid =>
    !state.solvedPuzzles.includes(pid)
  );
  scenePuzzles.forEach(pid => {
    const puzzle = GAME_DATA.puzzles.find(p => p.id === pid);
    if (puzzle) {
      // Make the puzzle a clickable target for the USE command
      addText(`There is something here that catches your attention... <span class="look-target" data-look="${pid}">[investigate]</span>`, 'system');
    }
  });

  // Render exits (with locked/unlocked state)
  renderExits(scene.exits || {});

  // Render inventory
  renderInventory();

  // Check win condition
  checkWin();

  // Save state
  saveState();
}

// ---- Exit Rendering ----
function renderExits(exits) {
  exitsBar.innerHTML = '';
  const directions = ['north', 'south', 'east', 'west'];
  directions.forEach(dir => {
    const btn = document.createElement('button');
    const targetScene = exits[dir];
    const blocked = targetScene && !canExit(state.currentScene, dir);
    const available = targetScene && !blocked;

    btn.className = 'exit-btn' + (available ? ' available' : '');
    btn.textContent = dir.toUpperCase();
    btn.disabled = !available;

    if (available) {
      btn.onclick = () => go(targetScene);
    }
    exitsBar.appendChild(btn);
  });
}

// ---- Inventory Rendering ----
function renderInventory() {
  // Remove existing item elements (keep the label)
  const existing = invBar.querySelectorAll('.inv-item');
  existing.forEach(el => el.remove());
  const empty = document.getElementById('inv-empty');

  if (state.inventory.length === 0) {
    empty.style.display = '';
  } else {
    empty.style.display = 'none';
    state.inventory.forEach(itemId => {
      const item = GAME_DATA.items.find(i => i.id === itemId);
      if (!item) return;
      const el = document.createElement('span');
      el.className = 'inv-item' + (state.selectedItem === itemId ? ' selected' : '');
      el.textContent = item.name;
      el.onclick = () => selectItem(itemId);
      invBar.appendChild(el);
    });
  }
}

// ---- Command Handlers ----
function setCommand(cmd) {
  state.activeCommand = cmd;
  document.querySelectorAll('.cmd-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cmd === cmd);
  });

  if (cmd === 'look') {
    const scene = GAME_DATA.scenes.find(s => s.id === state.currentScene);
    if (scene && scene.lookDescriptions) {
      const targets = Object.keys(scene.lookDescriptions);
      if (targets.length > 0) {
        addText('You can examine: ' + targets.map(t =>
          `<span class="look-target" data-look="${t}">${t}</span>`
        ).join(', '), 'system');
      }
    }
  } else if (cmd === 'use') {
    if (state.inventory.length > 0) {
      addText('Select an item from your inventory, then click USE, then a target.', 'system');
    } else {
      addText('You have nothing to use.', 'system');
    }
  } else if (cmd === 'take') {
    const scene = GAME_DATA.scenes.find(s => s.id === state.currentScene);
    const available = (scene.items || []).filter(id => !state.inventory.includes(id));
    if (available.length > 0) {
      available.forEach(id => takeItem(id));
    } else {
      addText('Nothing here to take.', 'system');
    }
  }
}

// ---- Item Selection ----
function selectItem(itemId) {
  state.selectedItem = state.selectedItem === itemId ? null : itemId;
  renderInventory();
  if (state.selectedItem) {
    const item = GAME_DATA.items.find(i => i.id === itemId);
    addText(`Selected: ${item.name}. Now choose a target or action.`, 'system');
  }
}

// ---- Take Item ----
function takeItem(itemId) {
  if (state.inventory.includes(itemId)) return;
  const item = GAME_DATA.items.find(i => i.id === itemId);
  if (!item) return;
  const scene = GAME_DATA.scenes.find(s => s.id === state.currentScene);
  if (!scene || !(scene.items || []).includes(itemId)) return;

  state.inventory.push(itemId);
  addText(`You picked up: ${item.name}`, 'success');
  renderInventory();
  flashItemNew();
  saveState();
}

// ---- Look At Target ----
function lookAt(target) {
  const scene = GAME_DATA.scenes.find(s => s.id === state.currentScene);
  if (scene && scene.lookDescriptions && scene.lookDescriptions[target]) {
    addText(scene.lookDescriptions[target]);
  } else {
    // Check if it's an item
    const item = GAME_DATA.items.find(i => i.id === target);
    if (item) {
      addText(item.description);
    } else {
      addText('Nothing interesting about that.', 'system');
    }
  }
}

// ---- Use Item On Target ----
function useItemOn(itemId, targetId) {
  // Find a puzzle in the current scene that:
  // 1. Requires this item
  // 2. Has not been solved yet
  // 3. The target matches the puzzle id (targetId should be the puzzle id from item's usedOn)
  const puzzle = GAME_DATA.puzzles.find(p =>
    p.scene === state.currentScene &&
    p.requires.includes(itemId) &&
    !state.solvedPuzzles.includes(p.id) &&
    p.id === targetId
  );

  if (puzzle && puzzle.requires.every(req => state.inventory.includes(req))) {
    state.solvedPuzzles.push(puzzle.id);
    addText(puzzle.result, 'success');
    flashPuzzleSolved();

    // Reveal items or unlock scenes
    (puzzle.reveals || []).forEach(revealId => {
      const revealItem = GAME_DATA.items.find(i => i.id === revealId);
      if (revealItem && !state.inventory.includes(revealId)) {
        state.inventory.push(revealId);
        addText(`You found: ${revealItem.name}!`, 'success');
      }
    });

    renderInventory();
    renderExits(GAME_DATA.scenes.find(s => s.id === state.currentScene).exits || {});
    flashItemNew();
    checkWin();
    saveState();
  } else {
    addText("That doesn't seem to work.", 'system');
  }
}

// ---- Movement ----
function go(sceneId) {
  if (!canExit(state.currentScene, Object.keys(GAME_DATA.scenes.find(s => s.id === state.currentScene).exits || {}).find(k => GAME_DATA.scenes.find(s => s.id === state.currentScene).exits[k] === sceneId))) {
    return;
  }
  addText('---', 'system');
  renderScene(sceneId);
}

// ---- Win Condition ----
function checkWin() {
  if (state.won) return;
  const wc = GAME_DATA.winCondition;
  if (!wc) return;
  if (state.currentScene === wc.scene &&
      wc.requires.every(req => state.inventory.includes(req))) {
    state.won = true;
    addText('', '');
    addText('*** ' + wc.description + ' ***', 'success');
    addText('', '');
    addText('CONGRATULATIONS! YOU HAVE COMPLETED THE GAME!', 'success');
    addText('Type /restart to play again.', 'system');
    flashPuzzleSolved();
  }
}

// ---- Persistence ----
function saveState() {
  try {
    localStorage.setItem('game-' + GAME_DATA.slug, JSON.stringify(state));
  } catch(e) {}
}

function loadState() {
  try {
    const saved = localStorage.getItem('game-' + GAME_DATA.slug);
    if (saved) {
      const s = JSON.parse(saved);
      Object.assign(state, s);
      return true;
    }
  } catch(e) {}
  return false;
}

// ---- Event Listeners ----
document.querySelectorAll('.cmd-btn').forEach(btn => {
  btn.onclick = () => setCommand(btn.dataset.cmd);
});

document.getElementById('hint-toggle').addEventListener('click', toggleHints);

document.addEventListener('click', (e) => {
  if (e.target.classList.contains('look-target')) {
    const target = e.target.dataset.look;
    if (state.activeCommand === 'use' && state.selectedItem) {
      useItemOn(state.selectedItem, target);
    } else {
      lookAt(target);
    }
  }
});

// ---- Special Command: Restart ----
document.addEventListener('keydown', (e) => {
  if (e.key === '/' || (e.ctrlKey && e.key === 'r')) {
    e.preventDefault();
    try {
      localStorage.removeItem('game-' + GAME_DATA.slug);
    } catch(err) {}
    location.reload();
  }
});

// ---- Initialize ----
function init() {
  if (Object.keys(GAME_DATA).length === 0) {
    addText('ERROR: No game data loaded.', 'error');
    return;
  }

  addText('=== ' + GAME_DATA.title.toUpperCase() + ' ===', 'success');
  addText(GAME_DATA.setting, 'system');
  addText('', '');
  addText('Commands: LOOK | TAKE | USE | EXAMINE', 'system');
  addText('Click exits to move between rooms.', 'system');
  addText('---', 'system');

  if (!loadState()) {
    renderScene('foyer');
  } else {
    renderScene(state.currentScene);
    addText('[Game restored from save]', 'system');
  }
}

init();

</script>
