<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0a0a1a"/>
  <!-- walls -->
  <rect x="0" y="0" width="640" height="250" fill="#1a1a2a"/>
  <!-- floor sticky with ooze -->
  <rect x="0" y="250" width="640" height="150" fill="#2a2a3a"/>
  <g fill="#3a3a4a" opacity="0.6">
    <ellipse cx="100" cy="300" rx="40" ry="15"/>
    <ellipse cx="300" cy="320" rx="60" ry="20"/>
    <ellipse cx="540" cy="290" rx="50" ry="18"/>
  </g>
  <!-- workbench with tools -->
  <rect x="50" y="200" width="150" height="50" fill="#2a2a3a" stroke="#0f0" stroke-width="4"/>
  <!-- plasma cutter on bench -->
  <g transform="translate(80,210)">
    <rect x="0" y="0" width="20" height="30" fill="#4a4a5a" stroke="#0f0" stroke-width="2"/>
    <rect x="5" y="10" width="10" height="15" fill="#0f0"/>
  </g>
  <!-- power conduit on ceiling -->
  <g transform="translate(0,80)">
    <rect x="0" y="0" width="640" height="10" fill="#1a1a2a" stroke="#ff4500" stroke-width="2"/>
    <circle cx="320" cy="5" r="8" fill="#ff4500"/>
  </g>
  <!-- exit north to crew-quarters -->
  <rect x="300" y="50" width="80" height="60" fill="#2a2a3a" stroke="#0f0" stroke-width="4"/>
  <text x="340" y="85" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">CREW</text>
  <!-- exit south to engineering-bay -->
  <rect x="300" y="320" width="80" height="60" fill="#2a2a3a" stroke="#0f0" stroke-width="4"/>
  <text x="340" y="355" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">ENG</text>
</svg>
