<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0a0a1a"/>
  <!-- walls -->
  <rect x="0" y="0" width="640" height="230" fill="#1a1a2a"/>
  <!-- floor covered in grey ooze -->
  <rect x="0" y="230" width="640" height="170" fill="#2a2a3a"/>
  <g fill="#3a3a4a" opacity="0.7">
    <rect x="100" y="250" width="200" height="100"/>
    <rect x="350" y="270" width="180" height="80"/>
  </g>
  <!-- supply crates -->
  <g fill="#2a2a3a" stroke="#0f0" stroke-width="2">
    <rect x="50" y="150" width="60" height="60"/>
    <rect x="130" y="150" width="60" height="60"/>
    <rect x="50" y="230" width="60" height="60"/>
    <rect x="130" y="230" width="60" height="60"/>
  </g>
  <!-- communications array panel -->
  <g transform="translate(500,100)">
    <rect x="0" y="0" width="80" height="50" fill="#1a1a2a" stroke="#0f0" stroke-width="2"/>
    <rect x="10" y="15" width="60" height="20" fill="#0f0"/>
    <text x="40" y="28" font-family="monospace" font-size="8" fill="#000" text-anchor="middle">TX</text>
  </g>
  <!-- escape pod hatch (sealed) -->
  <g transform="translate(300,80)">
    <rect x="0" y="0" width="100" height="120" fill="#2a2a3a" stroke="#f00" stroke-width="4"/>
    <text x="50" y="60" font-family="monospace" font-size="10" fill="#f00" text-anchor="middle">POD</text>
  </g>
  <!-- exits -->
  <rect x="200" y="350" width="80" height="40" fill="#1a1a2a" stroke="#0f0" stroke-width="4"/>
  <text x="240" y="372" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">LAB</text>
  <rect x="500" y="300" width="80" height="60" fill="#1a1a2a" stroke="#0f0" stroke-width="4"/>
  <text x="540" y="335" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">POD BAY</text>
</svg>
