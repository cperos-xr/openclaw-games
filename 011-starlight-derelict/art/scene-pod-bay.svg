<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0a0a1a"/>
  <!-- walls -->
  <rect x="0" y="0" width="640" height="200" fill="#1a1a2a"/>
  <!-- floor -->
  <rect x="0" y="200" width="640" height="200" fill="#0d0d1a"/>
  <!-- escape pod -->
  <ellipse cx="320" cy="220" rx="150" ry="80" fill="#2a2a3a" stroke="#0f0" stroke-width="4"/>
  <text x="320" y="225" font-family="monospace" font-size="14" fill="#0f0" text-anchor="middle">ESCAPE POD</text>
  <!-- cockpit canopy -->
  <ellipse cx="320" cy="180" rx="100" ry="40" fill="#0a0a1a" stroke="#0f0" stroke-width="2"/>
  <!-- control panel inside -->
  <g transform="translate(280,260)">
    <rect x="0" y="0" width="80" height="40" fill="#1a1a2a" stroke="#0f0" stroke-width="2"/>
    <text x="40" y="20" font-family="monospace" font-size="8" fill="#0f0" text-anchor="middle">INSERT CHIP</text>
  </g>
  <!-- docking clamps (outside view) -->
  <g transform="translate(100,50)">
    <rect x="0" y="0" width="40" height="80" fill="#2a2a3a" stroke="#f00" stroke-width="2"/>
    <text x="20" y="45" font-family="monospace" font-size="8" fill="#f00" text-anchor="middle">CLAMP</text>
  </g>
  <g transform="translate(500,50)">
    <rect x="0" y="0" width="40" height="80" fill="#2a2a3a" stroke="#f00" stroke-width="2"/>
    <text x="20" y="45" font-family="monospace" font-size="8" fill="#f00" text-anchor="middle">CLAMP</text>
  </g>
</svg>
