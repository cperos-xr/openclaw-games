<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0a0a1a"/>
  <!-- metallic walls -->
  <rect x="0" y="0" width="640" height="250" fill="#1a1a2a"/>
  <!-- floor -->
  <rect x="0" y="250" width="640" height="150" fill="#0d0d1a"/>
  <!-- inner door -->
  <rect x="200" y="150" width="100" height="120" fill="#2a2a3a" stroke="#0f0" stroke-width="4"/>
  <text x="250" y="210" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">INNER</text>
  <!-- outer hatch -->
  <circle cx="480" cy="180" r="60" fill="#1a1a2a" stroke="#f00" stroke-width="6"/>
  <text x="480" y="185" font-family="monospace" font-size="10" fill="#f00" text-anchor="middle">HATCH</text>
  <!-- EVA suit -->
  <g transform="translate(100,180)">
    <rect x="0" y="20" width="40" height="60" fill="#2a2a3a" stroke="#0f0" stroke-width="2"/>
    <circle cx="20" cy="10" r="15" fill="#1a1a2a" stroke="#0f0" stroke-width="2"/>
    <line x1="20" y1="25" x2="20" y2="50" stroke="#0f0" stroke-width="2"/>
  </g>
  <!-- access keycard on floor -->
  <g transform="translate(320,300)">
    <rect x="0" y="0" width="30" height="20" fill="#4a7fff" stroke="#0f0" stroke-width="2"/>
  </g>
</svg>
