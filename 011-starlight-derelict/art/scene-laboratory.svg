<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0a0a1a"/>
  <!-- walls -->
  <rect x="0" y="0" width="640" height="250" fill="#1a1a2a"/>
  <!-- floor -->
  <rect x="0" y="250" width="640" height="150" fill="#0d0d1a"/>
  <!-- workstations -->
  <g fill="#2a2a3a" stroke="#0f0" stroke-width="2">
    <rect x="50" y="180" width="120" height="70"/>
    <rect x="200" y="180" width="120" height="70"/>
    <rect x="350" y="180" width="120" height="70"/>
  </g>
  <!-- overturned petri dishes -->
  <g transform="translate(80,220)" fill="#3a3a4a">
    <circle cx="10" cy="10" r="8"/>
    <circle cx="30" cy="10" r="8"/>
  </g>
  <!-- containment chamber (shattered) -->
  <rect x="450" y="100" width="120" height="100" fill="#1a1a2a" stroke="#f00" stroke-width="4"/>
  <text x="510" y="155" font-family="monospace" font-size="10" fill="#f00" text-anchor="middle">BREACH</text>
  <!-- terminal flickering -->
  <g transform="translate(500,250)">
    <rect x="0" y="0" width="60" height="40" fill="#2a2a3a" stroke="#0f0" stroke-width="2"/>
    <text x="30" y="20" font-family="monospace" font-size="8" fill="#0f0" text-anchor="middle">ERR</text>
  </g>
  <!-- data crystal on console -->
  <g transform="translate(530,270)">
    <polygon points="10,0 20,15 0,15" fill="#0ff" stroke="#0f0" stroke-width="1"/>
  </g>
  <!-- exits -->
  <rect x="150" y="320" width="80" height="60" fill="#1a1a2a" stroke="#0f0" stroke-width="4"/>
  <text x="190" y="352" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">STORAGE</text>
  <rect x="300" y="280" width="80" height="60" fill="#1a1a2a" stroke="#0f0" stroke-width="4"/>
  <text x="340" y="312" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">ENG</text>
</svg>
