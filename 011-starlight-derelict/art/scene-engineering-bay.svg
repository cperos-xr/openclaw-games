<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0a0a1a"/>
  <!-- walls -->
  <rect x="0" y="0" width="640" height="220" fill="#1a1a2a"/>
  <!-- floor -->
  <rect x="0" y="220" width="640" height="180" fill="#0d0d1a"/>
  <!-- power core -->
  <circle cx="320" cy="150" r="50" fill="#2a2a3a" stroke="#ff4500" stroke-width="4"/>
  <text x="320" y="155" font-family="monospace" font-size="12" fill="#ff4500" text-anchor="middle">CORE</text>
  <!-- coolant pipes -->
  <g stroke="#4a4a5a" stroke-width="6">
    <path d="M100,150 L100,250 L200,250"/>
    <path d="M540,150 L540,250 L440,250"/>
  </g>
  <!-- viscous leak -->
  <ellipse cx="320" cy="260" rx="30" ry="10" fill="#4a4a5a"/>
  <!-- emergency power terminal -->
  <g transform="translate(500,120)">
    <rect x="0" y="0" width="60" height="40" fill="#2a2a3a" stroke="#0f0" stroke-width="2"/>
    <circle cx="30" cy="20" r="10" fill="#0f0"/>
  </g>
  <!-- shut-down valve (coated in growth) -->
  <g transform="translate(100,200)">
    <circle cx="20" cy="20" r="20" fill="#2a2a3a" stroke="#0f0" stroke-width="2"/>
    <circle cx="20" cy="20" r="12" fill="#3a5a3a"/>
  </g>
  <!-- exits -->
  <rect x="200" y="350" width="80" height="40" fill="#1a1a2a" stroke="#0f0" stroke-width="4"/>
  <text x="240" y="372" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">LAB</text>
  <rect x="340" y="50" width="80" height="60" fill="#1a1a2a" stroke="#0f0" stroke-width="4"/>
  <text x="380" y="82" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">MAINT</text>
</svg>
