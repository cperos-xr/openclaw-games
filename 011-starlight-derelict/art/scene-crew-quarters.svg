<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0a0a1a"/>
  <rect x="0" y="0" width="640" height="200" fill="#1a1a2a"/>
  <rect x="0" y="200" width="640" height="200" fill="#0d0d1a"/>
  <!-- rows of sleeping pods -->
  <g fill="#2a2a3a" stroke="#0f0" stroke-width="2">
    <rect x="50" y="80" width="60" height="40"/>
    <rect x="150" y="80" width="60" height="40"/>
    <rect x="250" y="80" width="60" height="40"/>
    <rect x="350" y="80" width="60" height="40"/>
    <rect x="450" y="80" width="60" height="40"/>
    <rect x="550" y="80" width="60" height="40"/>
    <rect x="50" y="150" width="60" height="40"/>
    <rect x="150" y="150" width="60" height="40"/>
    <rect x="250" y="150" width="60" height="40"/>
    <rect x="350" y="150" width="60" height="40"/>
    <rect x="450" y="150" width="60" height="40"/>
    <rect x="550" y="150" width="60" height="40"/>
  </g>
  <!-- grey residue on floor -->
  <rect x="0" y="300" width="640" height="100" fill="#3a3a4a" opacity="0.5"/>
  <!-- locker ajar -->
  <g transform="translate(500,200)">
    <rect x="0" y="0" width="40" height="60" fill="#2a2a3a" stroke="#0f0" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="60" stroke="#0f0" stroke-width="2" transform="rotate(20)"/>
  </g>
  <!-- exit south to maintenance-bay -->
  <rect x="300" y="350" width="80" height="40" fill="#1a1a2a" stroke="#0f0" stroke-width="4"/>
  <text x="340" y="372" font-family="monospace" font-size="10" fill="#0f0" text-anchor="middle">MAINT</text>
</svg>
