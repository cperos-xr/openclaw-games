<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Beacon Alignment Code - Parchment with gear symbols -->
  <!-- Parchment scroll -->
  <rect x="10" y="10" width="44" height="44" fill="#FFFF00" opacity="0.3" stroke="#FF8800" stroke-width="1.5" rx="1"/>
  <rect x="10" y="10" width="44" height="44" fill="#FF8800" opacity="0.12" stroke="none" rx="1"/>
  <!-- Scrolled top edge -->
  <ellipse cx="32" cy="10" rx="22" ry="4" fill="#FF8800" opacity="0.25" stroke="#FF8800" stroke-width="1.5"/>
  <!-- Scrolled bottom edge -->
  <ellipse cx="32" cy="54" rx="22" ry="4" fill="#FF8800" opacity="0.2" stroke="#FF8800" stroke-width="1"/>
  <!-- Gear symbols - the alignment code -->
  <!-- Gear 1 (top-left) -->
  <circle cx="20" cy="22" r="6" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="20" cy="22" r="3" fill="#000" opacity="0.3"/>
  <!-- Gear 1 teeth -->
  <rect x="19" y="14" width="2" height="4" fill="#000" opacity="0.7"/>
  <rect x="19" y="26" width="2" height="4" fill="#000" opacity="0.7"/>
  <rect x="12" y="21" width="4" height="2" fill="#000" opacity="0.7"/>
  <rect x="24" y="21" width="4" height="2" fill="#000" opacity="0.7"/>
  <!-- Gear 2 (top-right) -->
  <circle cx="42" cy="22" r="6" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="42" cy="22" r="3" fill="#000" opacity="0.3"/>
  <rect x="41" y="14" width="2" height="4" fill="#000" opacity="0.7"/>
  <rect x="41" y="26" width="2" height="4" fill="#000" opacity="0.7"/>
  <rect x="34" y="21" width="4" height="2" fill="#000" opacity="0.7"/>
  <rect x="46" y="21" width="4" height="2" fill="#000" opacity="0.7"/>
  <!-- Gear 3 (middle, larger) -->
  <circle cx="32" cy="34" r="8" fill="none" stroke="#FF8800" stroke-width="2.5"/>
  <circle cx="32" cy="34" r="4" fill="#FF8800" opacity="0.3"/>
  <!-- Gear 3 teeth -->
  <rect x="30" y="24" width="4" height="5" fill="#FF8800" opacity="0.7"/>
  <rect x="30" y="39" width="4" height="5" fill="#FF8800" opacity="0.7"/>
  <rect x="22" y="33" width="5" height="4" fill="#FF8800" opacity="0.7"/>
  <rect x="37" y="33" width="5" height="4" fill="#FF8800" opacity="0.7"/>
  <!-- Diagonal teeth -->
  <rect x="26" y="27" width="3" height="3" fill="#FF8800" opacity="0.5"/>
  <rect x="35" y="27" width="3" height="3" fill="#FF8800" opacity="0.5"/>
  <rect x="26" y="38" width="3" height="3" fill="#FF8800" opacity="0.5"/>
  <rect x="35" y="38" width="3" height="3" fill="#FF8800" opacity="0.5"/>
  <!-- Connecting lines between gears -->
  <line x1="26" y1="22" x2="36" y2="26" stroke="#FF8800" stroke-width="1.5" opacity="0.4"/>
  <line x1="36" y1="22" x2="26" y2="26" stroke="#FF8800" stroke-width="1.5" opacity="0.4"/>
  <line x1="26" y1="28" x2="28" y2="32" stroke="#FF8800" stroke-width="1" opacity="0.3"/>
  <line x1="38" y1="28" x2="36" y2="32" stroke="#FF8800" stroke-width="1" opacity="0.3"/>
  <!-- Bottom code symbols - abstract numbers/sequence -->
  <line x1="18" y1="46" x2="26" y2="46" stroke="#000" stroke-width="1.5" opacity="0.6"/>
  <line x1="30" y1="46" x2="34" y2="46" stroke="#000" stroke-width="1.5" opacity="0.6"/>
  <line x1="38" y1="46" x2="46" y2="46" stroke="#000" stroke-width="1.5" opacity="0.6"/>
  <circle cx="23" cy="50" r="1.5" fill="#000" opacity="0.4"/>
  <circle cx="29" cy="50" r="1.5" fill="#000" opacity="0.4"/>
  <circle cx="35" cy="50" r="1.5" fill="#000" opacity="0.4"/>
  <circle cx="41" cy="50" r="1.5" fill="#000" opacity="0.4"/>
</svg>
