<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Captured Chronos Spark - Jar containing glowing chronos spark -->
  <!-- Jar body - glass -->
  <rect x="20" y="16" width="24" height="30" fill="#33FF33" opacity="0.08" stroke="#FFFFFF" stroke-width="2" rx="3"/>
  <!-- Glass highlight -->
  <line x1="23" y1="18" x2="23" y2="44" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>
  <!-- Spark glow inside jar -->
  <ellipse cx="32" cy="32" rx="12" ry="14" fill="#FFFF00" opacity="0.1"/>
  <ellipse cx="32" cy="32" rx="8" ry="10" fill="#FFFF00" opacity="0.15"/>
  <!-- Chronos spark - jagged lightning -->
  <line x1="27" y1="24" x2="31" y2="30" stroke="#FFFF00" stroke-width="2.5"/>
  <line x1="31" y1="30" x2="28" y2="34" stroke="#FFFF00" stroke-width="2.5"/>
  <line x1="28" y1="34" x2="34" y2="32" stroke="#FFFF00" stroke-width="2"/>
  <line x1="34" y1="32" x2="30" y2="38" stroke="#FFFF00" stroke-width="2"/>
  <line x1="30" y1="38" x2="36" y2="36" stroke="#FFFF00" stroke-width="1.5"/>
  <!-- Spark core -->
  <circle cx="31" cy="31" r="2" fill="#FFFFFF" opacity="0.6"/>
  <!-- Silver filigree bands (dimmed by spark glow) -->
  <line x1="20" y1="22" x2="44" y2="22" stroke="#33FF33" stroke-width="1" opacity="0.3"/>
  <line x1="20" y1="28" x2="44" y2="28" stroke="#33FF33" stroke-width="1" opacity="0.3"/>
  <line x1="20" y1="34" x2="44" y2="34" stroke="#33FF33" stroke-width="1" opacity="0.3"/>
  <line x1="20" y1="40" x2="44" y2="40" stroke="#33FF33" stroke-width="1" opacity="0.3"/>
  <!-- Jar base -->
  <rect x="18" y="44" width="28" height="5" fill="#33FF33" opacity="0.25" stroke="#33FF33" stroke-width="1.5" rx="1"/>
  <!-- Jar lid -->
  <rect x="22" y="12" width="20" height="6" fill="#33FF33" opacity="0.3" stroke="#33FF33" stroke-width="1.5" rx="1"/>
  <rect x="24" y="10" width="16" height="4" fill="#33FF33" opacity="0.2" stroke="#33FF33" stroke-width="1" rx="1"/>
  <!-- Outer spark aura -->
  <ellipse cx="32" cy="32" rx="16" ry="18" fill="#FFFF00" opacity="0.04"/>
</svg>
