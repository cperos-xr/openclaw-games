<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Library Keycard - Brass and bone punch-card with ticking clockwork -->
  <!-- Card body - brass -->
  <rect x="12" y="20" width="40" height="24" fill="#FF8800" stroke="#000" stroke-width="2" rx="2"/>
  <!-- Brass highlight/shine -->
  <rect x="14" y="22" width="36" height="3" fill="#FFFF00" opacity="0.15" rx="1"/>
  <!-- Bone section (right portion) -->
  <rect x="38" y="20" width="14" height="24" fill="#FFFF00" opacity="0.2" stroke="#000" stroke-width="1.5" rx="1"/>
  <!-- Punch holes - constellation pattern -->
  <circle cx="20" cy="28" r="2.5" fill="#000000"/>
  <circle cx="28" cy="28" r="2.5" fill="#000000"/>
  <circle cx="36" cy="28" r="2.5" fill="#000000"/>
  <circle cx="44" cy="28" r="2" fill="#000000"/>
  <circle cx="20" cy="34" r="2.5" fill="#000000"/>
  <circle cx="28" cy="34" r="2.5" fill="#000000"/>
  <circle cx="44" cy="34" r="2" fill="#000000"/>
  <circle cx="20" cy="40" r="2.5" fill="#000000"/>
  <circle cx="32" cy="40" r="2.5" fill="#000000"/>
  <circle cx="44" cy="40" r="2" fill="#000000"/>
  <!-- Constellation lines between key holes -->
  <line x1="20" y1="28" x2="28" y2="28" stroke="#33FF33" stroke-width="0.8" opacity="0.4"/>
  <line x1="28" y1="28" x2="36" y2="28" stroke="#33FF33" stroke-width="0.8" opacity="0.4"/>
  <line x1="20" y1="28" x2="20" y2="34" stroke="#33FF33" stroke-width="0.8" opacity="0.3"/>
  <line x1="28" y1="34" x2="32" y2="40" stroke="#33FF33" stroke-width="0.8" opacity="0.3"/>
  <!-- Tiny ticking clockwork gears on bone section -->
  <circle cx="45" cy="32" r="3" fill="none" stroke="#FF8800" stroke-width="1"/>
  <circle cx="45" cy="32" r="1.5" fill="#FF8800" opacity="0.3"/>
  <!-- Gear teeth mini -->
  <line x1="45" y1="29" x2="45" y2="28" stroke="#FF8800" stroke-width="1"/>
  <line x1="45" y1="36" x2="45" y2="37" stroke="#FF8800" stroke-width="1"/>
  <line x1="42" y1="32" x2="41" y2="32" stroke="#FF8800" stroke-width="1"/>
  <line x1="48" y1="32" x2="49" y2="32" stroke="#FF8800" stroke-width="1"/>
  <!-- Second tiny gear -->
  <circle cx="45" cy="38" r="2" fill="none" stroke="#FF8800" stroke-width="0.8"/>
  <circle cx="45" cy="38" r="1" fill="#FF8800" opacity="0.2"/>
  <!-- Cold-to-the-touch accent -->
  <line x1="14" y1="42" x2="50" y2="42" stroke="#0000FF" stroke-width="0.5" opacity="0.15"/>
</svg>
