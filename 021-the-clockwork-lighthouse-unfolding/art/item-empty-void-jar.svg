<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Empty Void Jar - Glass jar with silver filigree -->
  <!-- Jar body - glass -->
  <rect x="20" y="16" width="24" height="30" fill="#AA00FF" opacity="0.1" stroke="#FFFFFF" stroke-width="2" rx="3"/>
  <!-- Glass highlight -->
  <line x1="23" y1="18" x2="23" y2="44" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>
  <!-- Silver filigree - Ouroboros pattern (horizontal bands) -->
  <line x1="20" y1="22" x2="44" y2="22" stroke="#AA00FF" stroke-width="1.5" opacity="0.6"/>
  <line x1="20" y1="26" x2="44" y2="26" stroke="#AA00FF" stroke-width="1.5" opacity="0.6"/>
  <line x1="20" y1="30" x2="44" y2="30" stroke="#AA00FF" stroke-width="1.5" opacity="0.6"/>
  <line x1="20" y1="34" x2="44" y2="34" stroke="#AA00FF" stroke-width="1.5" opacity="0.6"/>
  <line x1="20" y1="38" x2="44" y2="38" stroke="#AA00FF" stroke-width="1.5" opacity="0.6"/>
  <!-- Ouroboros snake motif at center -->
  <circle cx="28" cy="30" r="3" fill="none" stroke="#AA00FF" stroke-width="1.5" opacity="0.7"/>
  <path d="M 30 30 Q 32 28 34 30" fill="none" stroke="#AA00FF" stroke-width="1" opacity="0.6"/>
  <!-- Jar base -->
  <rect x="18" y="44" width="28" height="5" fill="#AA00FF" opacity="0.3" stroke="#AA00FF" stroke-width="1.5" rx="1"/>
  <!-- Jar lid -->
  <rect x="22" y="12" width="20" height="6" fill="#AA00FF" opacity="0.4" stroke="#AA00FF" stroke-width="1.5" rx="1"/>
  <rect x="24" y="10" width="16" height="4" fill="#AA00FF" opacity="0.3" stroke="#AA00FF" stroke-width="1" rx="1"/>
  <!-- Glass clouding -->
  <rect x="22" y="18" width="20" height="26" fill="#AA00FF" opacity="0.05"/>
</svg>
