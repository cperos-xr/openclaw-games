<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <pattern id="static-edges" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="2" height="2" fill="#FFFFFF"/>
      <rect x="2" y="2" width="2" height="2" fill="#FFFFFF"/>
    </pattern>
    <pattern id="void-chaos" width="6" height="6" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="6" y2="6" stroke="#000" stroke-width="1"/>
      <line x1="6" y1="0" x2="0" y2="6" stroke="#000" stroke-width="1"/>
    </pattern>
  </defs>
  <!-- Layer 1: Background - room being consumed by void -->
  <rect width="640" height="400" fill="#000000"/>
  <!-- Residual room walls being eaten away -->
  <rect x="0" y="0" width="640" height="100" fill="#1a0d00" opacity="0.4"/>
  <rect x="0" y="20" width="60" height="200" fill="#1a0d00" opacity="0.3"/>
  <rect x="580" y="20" width="60" height="200" fill="#1a0d00" opacity="0.3"/>
  <!-- Layer 2: Cracked/disappearing floor -->
  <rect x="0" y="300" width="640" height="100" fill="#0d0600"/>
  <!-- Floor cracks leading to void -->
  <line x1="200" y1="320" x2="240" y2="380" stroke="#000000" stroke-width="3"/>
  <line x1="220" y1="310" x2="260" y2="370" stroke="#000000" stroke-width="2"/>
  <line x1="400" y1="315" x2="370" y2="375" stroke="#000000" stroke-width="3"/>
  <line x1="420" y1="325" x2="395" y2="380" stroke="#000000" stroke-width="2"/>
  <!-- Floor sections disappearing into void -->
  <polygon points="250,340 280,300 310,300 320,360" fill="#000000" opacity="0.6"/>
  <polygon points="370,335 360,300 330,300 315,355" fill="#000000" opacity="0.5"/>
  <polygon points="300,380 340,360 350,400 290,400" fill="#000000" opacity="0.7"/>
  <!-- Floor white static edges where reality tears -->
  <line x1="250" y1="340" x2="280" y2="300" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
  <line x1="280" y1="300" x2="310" y2="300" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
  <line x1="310" y1="300" x2="320" y2="360" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
  <line x1="360" y1="300" x2="370" y2="335" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
  <line x1="330" y1="300" x2="360" y2="300" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
  <!-- Layer 3: Reality Console (center) -->
  <rect x="220" y="200" width="200" height="80" fill="#1a0d00" stroke="#FF8800" stroke-width="3"/>
  <!-- Console top panel -->
  <rect x="225" y="205" width="190" height="20" fill="#331a00" stroke="#FF8800" stroke-width="1"/>
  <!-- Brass levers -->
  <rect x="250" y="208" width="4" height="14" fill="#FF8800" stroke="#000" stroke-width="1"/>
  <rect x="249" y="206" width="6" height="4" fill="#FFFF00" stroke="#000" stroke-width="0.5"/>
  <rect x="275" y="208" width="4" height="14" fill="#FF8800" stroke="#000" stroke-width="1"/>
  <rect x="274" y="206" width="6" height="4" fill="#FFFF00" stroke="#000" stroke-width="0.5"/>
  <rect x="300" y="208" width="4" height="14" fill="#FF8800" stroke="#000" stroke-width="1"/>
  <rect x="299" y="206" width="6" height="4" fill="#FFFF00" stroke="#000" stroke-width="0.5"/>
  <rect x="325" y="208" width="4" height="14" fill="#FF8800" stroke="#000" stroke-width="1"/>
  <rect x="324" y="206" width="6" height="4" fill="#FFFF00" stroke="#000" stroke-width="0.5"/>
  <rect x="350" y="208" width="4" height="14" fill="#FF8800" stroke="#000" stroke-width="1"/>
  <rect x="349" y="206" width="6" height="4" fill="#FFFF00" stroke="#000" stroke-width="0.5"/>
  <rect x="375" y="208" width="4" height="14" fill="#FF8800" stroke="#000" stroke-width="1"/>
  <rect x="374" y="206" width="6" height="4" fill="#FFFF00" stroke="#000" stroke-width="0.5"/>
  <!-- Ticking dials -->
  <circle cx="245" cy="240" r="12" fill="#000000" stroke="#FF8800" stroke-width="2"/>
  <circle cx="245" cy="240" r="8" fill="none" stroke="#FFFF00" stroke-width="1"/>
  <line x1="245" y1="240" x2="245" y2="233" stroke="#FFFF00" stroke-width="1.5"/>
  <circle cx="280" cy="240" r="12" fill="#000000" stroke="#FF8800" stroke-width="2"/>
  <circle cx="280" cy="240" r="8" fill="none" stroke="#FFFF00" stroke-width="1"/>
  <line x1="280" y1="240" x2="287" y2="240" stroke="#FFFF00" stroke-width="1.5"/>
  <circle cx="315" cy="240" r="12" fill="#000000" stroke="#FF8800" stroke-width="2"/>
  <circle cx="315" cy="240" r="8" fill="none" stroke="#FFFF00" stroke-width="1"/>
  <line x1="315" y1="240" x2="315" y2="234" stroke="#FFFF00" stroke-width="1.5"/>
  <!-- Ring socket (center of console) -->
  <circle cx="355" cy="250" r="10" fill="#000000" stroke="#FF8800" stroke-width="2"/>
  <circle cx="355" cy="250" r="7" fill="none" stroke="#33FF33" stroke-width="1.5"/>
  <circle cx="355" cy="250" r="4" fill="#33FF33" opacity="0.3"/>
  <!-- Ring socket hum -->
  <circle cx="355" cy="250" r="14" fill="#33FF33" opacity="0.08"/>
  <!-- Numbered dial markings -->
  <text x="240" y="265" fill="#FFFF00" font-size="6" font-family="monospace" opacity="0.5">47</text>
  <text x="275" y="265" fill="#FFFF00" font-size="6" font-family="monospace" opacity="0.5">12</text>
  <text x="310" y="265" fill="#FFFF00" font-size="6" font-family="monospace" opacity="0.5">89</text>
  <!-- Console support legs -->
  <rect x="230" y="280" width="6" height="30" fill="#663300" stroke="#000" stroke-width="1"/>
  <rect x="404" y="280" width="6" height="30" fill="#663300" stroke="#000" stroke-width="1"/>
  <!-- Layer 4: The Hole in Reality (center, expanding tear) -->
  <!-- Main void tear - jagged black shape -->
  <polygon points="320,50 300,80 280,70 270,100 255,95 250,130 260,150 250,180 265,210 270,190 290,220 310,230 320,250 330,230 350,220 370,190 375,210 390,180 380,150 390,130 385,95 370,100 360,70 340,80" fill="#000000"/>
  <!-- White static feathered edges -->
  <polygon points="320,47 298,77 278,67 267,97 252,92 247,127 257,147 247,177 262,207 268,187 287,217 307,227 318,247 332,227 348,217 368,192 373,207 388,177 378,147 388,127 383,92 368,97 358,67 342,77" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.7"/>
  <!-- Additional jagged edge details -->
  <line x1="300" y1="55" x2="290" y2="72" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
  <line x1="340" y1="55" x2="350" y2="72" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
  <line x1="270" y1="85" x2="260" y2="100" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
  <line x1="370" y1="85" x2="380" y2="100" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
  <line x1="255" y1="140" x2="260" y2="160" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
  <line x1="385" y1="140" x2="380" y2="160" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
  <!-- Layer 5: Blackness pulsation within the tear -->
  <ellipse cx="320" cy="150" rx="50" ry="80" fill="#000000" opacity="0.9"/>
  <!-- Purple void bleed at edges -->
  <ellipse cx="320" cy="150" rx="65" ry="95" fill="#AA00FF" opacity="0.05"/>
  <!-- Layer 6: Void gale - subtle streaks -->
  <line x1="280" y1="100" x2="260" y2="80" stroke="#0000FF" stroke-width="1" opacity="0.15"/>
  <line x1="360" y1="100" x2="380" y2="80" stroke="#0000FF" stroke-width="1" opacity="0.15"/>
  <line x1="270" y1="180" x2="245" y2="170" stroke="#0000FF" stroke-width="1" opacity="0.12"/>
  <line x1="370" y1="180" x2="395" y2="170" stroke="#0000FF" stroke-width="1" opacity="0.12"/>
  <!-- Layer 7: Red danger/stress indicators on walls -->
  <rect x="10" y="150" width="30" height="3" fill="#FF0000" opacity="0.4"/>
  <rect x="600" y="150" width="30" height="3" fill="#FF0000" opacity="0.4"/>
  <line x1="0" y1="100" x2="50" y2="120" stroke="#FF0000" stroke-width="2" opacity="0.3"/>
  <line x1="640" y1="100" x2="590" y2="120" stroke="#FF0000" stroke-width="2" opacity="0.3"/>
  <!-- Layer 8: Structural collapse debris floating -->
  <rect x="150" y="180" width="8" height="8" fill="#1a0d00" opacity="0.5"/>
  <rect x="480" y="170" width="6" height="6" fill="#1a0d00" opacity="0.4"/>
  <rect x="180" y="120" width="5" height="5" fill="#1a0d00" opacity="0.3"/>
  <rect x="460" y="130" width="7" height="7" fill="#1a0d00" opacity="0.35"/>
  <!-- Small floor pieces floating near tear -->
  <rect x="300" y="260" width="10" height="4" fill="#0d0600" opacity="0.6" transform="rotate(-15 305 262)"/>
  <rect x="340" y="265" width="8" height="3" fill="#0d0600" opacity="0.5" transform="rotate(10 344 267)"/>
</svg>
